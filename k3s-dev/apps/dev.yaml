# Dev 환경 - Java 백엔드 서비스들
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-auth-guard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/k3s-dev
    path: common-charts/apps/java-service
    helm:
      valueFiles:
        - ../../../k3s-dev/values/values-auth-guard.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
