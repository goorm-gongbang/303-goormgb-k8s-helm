# auth-guard - Dev 환경
# ECR: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/auth-guard

replicaCount: 1

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/auth-guard
  tag: "81f3615"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false  # API Gateway 뒤에서 동작

# Service
servicePort: &port 8080
service:
  type: ClusterIP
  port: *port

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: *port
  initialDelaySeconds: 5
  periodSeconds: 5
