# seat - Dev 환경
# ECR: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/seat

replicaCount: 1

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/seat
  tag: "81f3615"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false

# Service
servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

# Health checks (Spring Boot Actuator)
livenessProbe:
  httpGet:
    path: /actuator/health
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3
