# OAuth2 Proxy - Swagger 인증용

replicaCount: 1

# Monitoring 노드에 배치
nodeSelector:
  role: monitoring

tolerations:
  - key: role
    value: monitoring
    effect: NoSchedule

# Google OAuth 설정
config:
  cookieSecure: true
  cookieDomain: ".playball.one"

# Upstream services
upstreams:
  apiGateway: "http://api-gateway.prod-webs.svc.cluster.local:8085"
  aiDefense: "http://ai-defense.prod-ai.svc.cluster.local:8000"

# ESO - AWS Secrets Manager에서 OAuth credentials + 이메일 목록 가져옴
eso:
  enabled: true
  secretKey: staging/infra/oauth-teams

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
