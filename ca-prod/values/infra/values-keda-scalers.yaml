# KEDA ScaledObject - Staging
# 앱별 오토스케일링 규칙

scalers:
  # === Web Services ===
  api-gateway:
    enabled: true
    namespace: prod-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"
    cron:
      # 경기 30분 전 pre-warming (예시: 19시 경기)
      - start: "30 18 * * *"
        end: "00 22 * * *"
        desiredReplicas: "3"

  auth-guard:
    enabled: true
    namespace: prod-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"
    cron:
      - start: "30 18 * * *"
        end: "00 22 * * *"
        desiredReplicas: "3"

  queue:
    enabled: true
    namespace: prod-webs
    minReplicas: 1
    maxReplicas: 8
    cpu:
      threshold: "80"
    kafka:
      consumerGroup: queue-consumer
      topic: order-events
      lagThreshold: "100"
    cron:
      - start: "30 18 * * *"
        end: "00 22 * * *"
        desiredReplicas: "4"

  seat:
    enabled: true
    namespace: prod-webs
    minReplicas: 1
    maxReplicas: 8
    cpu:
      threshold: "80"
    cron:
      - start: "30 18 * * *"
        end: "00 22 * * *"
        desiredReplicas: "4"

  order-core:
    enabled: true
    namespace: prod-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"
    kafka:
      consumerGroup: order-consumer
      topic: order-events
      lagThreshold: "100"
    cron:
      - start: "30 18 * * *"
        end: "00 22 * * *"
        desiredReplicas: "3"

  # === AI Services ===
  ai-defense:
    enabled: true
    namespace: prod-ai
    deploymentName: prod-ai-defense
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"

  authz-adapter:
    enabled: true
    namespace: prod-ai
    deploymentName: prod-authz-adapter
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"
