# ExternalDNS - Route53 DNS Record Management
# Staging Environment (Main Account: 406223549139)

# ServiceAccount with IRSA
serviceAccount:
  create: true
  name: external-dns
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::406223549139:role/playball-prod-external-dns

# AWS Provider 설정
provider: aws

# Route53 설정
extraArgs:
  - --source=service
  - --source=ingress
  - --aws-zone-type=public
  - --txt-owner-id=playball-prod-eks
  # 관리할 도메인 필터
  - --domain-filter=playball.one
  - --domain-filter=staging.playball.one

# 정책: upsert-only (레코드 생성/갱신만, 삭제 안 함)
# sync는 EKS 축소/재기동 시 Route53 레코드가 삭제되는 위험이 있음
policy: upsert-only

# 로그 레벨
logLevel: info

# 노드 배치
nodeSelector:
  role: infra
tolerations:
  - key: role
    value: infra
    effect: NoSchedule

# 리소스 설정
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
