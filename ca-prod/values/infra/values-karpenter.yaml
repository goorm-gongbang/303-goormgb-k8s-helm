# Karpenter Configuration - Prod
# EKS Cluster: playball-prod-eks

# Service Account with IRSA
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::990521646433:role/playball-prod-karpenter-controller

# Controller Settings
settings:
  clusterName: playball-prod-eks
  interruptionQueue: playball-prod-karpenter-interruption

# Controller Resources
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Replicas (HA: leader election으로 자동 master 선출)
replicas: 2

# Logging
logLevel: info

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  additionalLabels:
    release: prom

# Infra 노드에 배치
nodeSelector:
  role: infra
tolerations:
  - key: role
    value: infra
    effect: NoSchedule

# HA: AZ별 분산 배치
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: karpenter
        topologyKey: topology.kubernetes.io/zone
topologySpreadConstraints: []
