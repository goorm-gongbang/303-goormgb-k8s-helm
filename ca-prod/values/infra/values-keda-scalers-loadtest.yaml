# KEDA ScaledObject - Load Test
# 부하테스트 전용 오토스케일링 (CPU 기반, 빠른 반응)

scalers:
  # === Load-test Web Services ===
  api-gateway:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"

  auth-guard:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"

  queue:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 16
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    # kafka:
    #   consumerGroup: queue-consumer
    #   topic: order-events
    #   lagThreshold: "50"

  seat:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 16
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"

  order-core:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    # kafka:
    #   consumerGroup: order-consumer
    #   topic: order-events
    #   lagThreshold: "50"
