# KEDA ScaledObject - Load Test
# 부하테스트 전용 — KEDA 비활성화 (수동 스케일링)

scalers:
  # === Load-test Web Services ===
  api-gateway:
    enabled: false
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10

  auth-guard:
    enabled: false
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10

  queue:
    enabled: false
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 16

  seat:
    enabled: false
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 16

  order-core:
    enabled: false
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 10
