# KEDA - Event-Driven Autoscaling
# Kafka lag, Redis queue, Cron pre-warming 기반 Pod 오토스케일링

# Kyverno require-labels 정책 충족
podLabels:
  keda:
    version: "2.19.0"
  metricsAdapter:
    version: "2.19.0"
  webhooks:
    version: "2.19.0"

# HA: operator replicas 2 (leader election)
operator:
  replicaCount: 2

# Infra 노드에 배치 (on-demand, spot 회수 영향 방지)
nodeSelector:
  role: infra

tolerations:
  - key: role
    value: infra
    effect: NoSchedule

# HA: AZ별 분산 배치
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: keda-operator
        topologyKey: topology.kubernetes.io/zone

# Prometheus 메트릭
prometheus:
  metricServer:
    enabled: true
  operator:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prom

# 리소스
resources:
  operator:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  metricServer:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
