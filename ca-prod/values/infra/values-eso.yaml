# EKS Staging - External Secrets Operator Configuration
# AWS Secrets Manager 연동 (IRSA 사용)

# ServiceAccount with IRSA annotation
serviceAccount:
  create: true
  name: external-secrets
  annotations:
    # Main account IRSA role (terraform output external_secrets_irsa_role_arn)
    eks.amazonaws.com/role-arn: arn:aws:iam::990521646433:role/playball-prod-external-secrets-irsa

# Webhook ServiceAccount (같은 IRSA 사용)
webhook:
  serviceAccount:
    create: true
    name: external-secrets-webhook
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::990521646433:role/playball-prod-external-secrets-irsa

# CertController ServiceAccount
certController:
  serviceAccount:
    create: true
    name: external-secrets-cert-controller
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::990521646433:role/playball-prod-external-secrets-irsa

# CRD 설치
installCRDs: true

# Infra 노드에 배치
nodeSelector:
  role: infra
tolerations:
  - key: role
    value: infra
    effect: NoSchedule

webhook:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule

certController:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule
