# AWS Load Balancer Controller - Prod (Main Account)
# EKS에서 ALB/NLB를 관리하는 컨트롤러

clusterName: goormgb-prod-eks

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    # Main account IRSA role (terraform apply 후 업데이트 필요)
    # terraform output aws_lb_controller_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::406223549139:role/goormgb-prod-aws-lb-controller"

# 리소스 제한
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 리전 설정
region: ap-northeast-2
vpcId: ""  # 자동 감지

# 로그 레벨
logLevel: info

# 노드 배치
nodeSelector:
  role: infra
tolerations:
  - key: role
    value: infra
    effect: NoSchedule

# Webhook 인증서 자동 생성
enableCertManager: false

# Pod disruption budget
podDisruptionBudget:
  maxUnavailable: 1
