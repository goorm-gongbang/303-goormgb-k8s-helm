# Istio IngressGateway - API
# ALB Ingress에서 라우팅됨 (api.staging.playball.one)

name: istio-ingressgateway

# Labels for Gateway CRD selector
labels:
  istio: ingressgateway

# ClusterIP - ALB Ingress에서 라우팅
service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: https
      port: 443
      targetPort: 8443

# Apps 노드에 배치 (Karpenter 자동 스케일링 활용)
# infra 노드에서 분리하여 ArgoCD/Grafana 등 영향 방지
nodeSelector:
  role: app

# Managed 노드 우선, Karpenter spot 차선
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
      - weight: 50
        preference:
          matchExpressions:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand"]
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              istio: ingressgateway
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "2"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
