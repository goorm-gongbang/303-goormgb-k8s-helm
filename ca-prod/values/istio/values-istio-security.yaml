# EKS Prod - Istio Security
# WAF-like protection using EnvoyFilter + Lua

enabled: true

# 적용 대상 (Istio IngressGateway)
selector:
  labels:
    istio: ingressgateway

# 차단 모드: block (차단) | detect (로그만)
# Prod 환경에서는 block 모드 사용
mode: block

# 로깅 설정
logging:
  enabled: true
  level: warn

# 탐지 패턴
patterns:
  sqlInjection:
    enabled: true
  xss:
    enabled: true
  pathTraversal:
    enabled: true
  commandInjection:
    enabled: true
  ldapInjection:
    enabled: true
  xxeInjection:
    enabled: true
  ssrf:
    enabled: true
  log4shell:
    enabled: true
  headerInjection:
    enabled: true
  botScanner:
    enabled: true

# 제외 경로 (health check, metrics, 내부 서비스 등)
excludePaths:
  # Grafana 내부 API (Loki 쿼리 등 - SQL Injection 오탐 방지)
  - "/api/datasources/"

  # Health checks
  - "/health"
  - "/healthz"
  - "/ready"
  - "/readyz"
  - "/livez"
  - "/actuator/health"
  - "/actuator/info"
  - "/actuator/prometheus"

  # Metrics & Monitoring
  - "/metrics"
  - "/stats/prometheus"

  # Kubernetes probes
  - "/api/v1/health"

  # Swagger/OpenAPI
  - "/swagger"
  - "/swagger-ui"
  - "/v3/api-docs"
  - "/openapi"

  # Kiali
  - "/kiali"

# 응답 설정
response:
  statusCode: 403
  body: "Forbidden: Security violation detected"

# 내부 경로 차단 (외부 접근 불가)
# 주의: 접미사 와일드카드(*/path)는 오탐 위험이 있어 접두사 기반만 사용
denyPaths:
  enabled: true
  paths:
    # Prometheus/Metrics (접두사 기반만 사용)
    - "/api/prometheus*"
    - "/actuator/prometheus*"
    - "/metrics*"
    # Health checks (접두사 기반만 사용)
    - "/health*"
    - "/healthz*"
    - "/ready*"
    - "/readyz*"
    - "/livez*"
    - "/actuator/health*"

# External Authorization (AI Defense) - gRPC Adapter
extAuthz:
  enabled: true

  # gRPC authz adapter 연결 설정 (202-goormgb-authz-adapter)
  service:
    host: authz-adapter.prod-ai.svc.cluster.local
    port: 9001

  # 타임아웃 설정
  connectTimeout: "0.5s"
  timeout: "0.8s"

  # AI 서버 장애 시 통과 허용 (fail-open)
  failOpen: true

  # ext_authz 제외 경로 (AI direct routes, health checks)
  excludePaths:
    - "/ai/"
    - "/health"
    - "/healthz"
    - "/ready"
    - "/metrics"
    - "/actuator/"

  # ext_authz 적용 대상 API (Critical APIs)
  includePaths:
    # Queue 서비스
    - method: POST
      pattern: "^/queue/matches/[0-9]+/enter$"
      eventType: QUEUE_ENTER

    # Seat 서비스 - 추천 블럭 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/recommendations/blocks$"
      eventType: RECOMMENDATION_BLOCKS

    # Seat 서비스 - 좌석 자동 배정
    - method: POST
      pattern: "^/seat/matches/[0-9]+/recommendations/blocks/[0-9]+/assign$"
      eventType: ASSIGN_HOLD

    # Seat 서비스 - 구역 리스트 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/seat-groups$"
      eventType: SEAT_ENTRY

    # Seat 서비스 - 블럭별 포도알 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/sections/[0-9]+/blocks$"
      eventType: SECTION_BLOCKS

    # Seat 서비스 - Hold 생성
    - method: POST
      pattern: "^/seat/matches/[0-9]+/seat-holds$"
      eventType: SEAT_HOLDS

# ============================================================
# Rate Limiting 설정
# ============================================================
rateLimiting:
  # --- Local Rate Limit (Envoy 내장) ---
  local:
    enabled: true

    # 기본 설정 (전체 경로에 적용)
    default:
      enabled: true
      tokensPerFill: 100        # 초당 100 요청
      fillInterval: 1s
      maxTokens: 100

    # IP별 제한
    perClient:
      enabled: true
      tokensPerFill: 50         # IP당 초당 50 요청
      fillInterval: 1s
      maxTokens: 100

    # 경로별 제한
    perRoute:
      enabled: true
      routes:
        - path: "/auth/"
          tokensPerFill: 10
          fillInterval: 1s
          maxTokens: 20
        - path: "/payment/"
          tokensPerFill: 5
          fillInterval: 1s
          maxTokens: 10
        - path: "/signup"
          tokensPerFill: 3
          fillInterval: 1s
          maxTokens: 5

    response:
      statusCode: 429
      body: "Too Many Requests"
      headers:
        - name: "Retry-After"
          value: "60"
        - name: "X-RateLimit-Limit"
          value: "100"

    logging:
      enabled: true
      onlyLimited: true

  # --- Global Rate Limit (Redis 기반) ---
  global:
    enabled: true

    redis:
      internal: false
      host: "${SPRING_DATA_REDIS_HOST}"  # ElastiCache (ESO: prod/services/redis)
      port: "${SPRING_DATA_REDIS_PORT}"

    service:
      replicas: 1
      image: docker.io/envoyproxy/ratelimit:master

    domain: "goormgb-prod-ratelimit"

    descriptors:
      # IP별 전역 제한: 분당 300회
      - key: remote_address
        rateLimit:
          requestsPerUnit: 300
          unit: minute

      # 로그인: IP당 분당 10회
      - key: path
        value: "/auth/kakao/login"
        descriptors:
          - key: remote_address
            rateLimit:
              requestsPerUnit: 10
              unit: minute

      # 회원가입: IP당 분당 5회
      - key: path
        value: "/auth/signup"
        descriptors:
          - key: remote_address
            rateLimit:
              requestsPerUnit: 5
              unit: minute

      # 결제: IP당 분당 20회
      - key: path
        value: "/order/payment"
        descriptors:
          - key: remote_address
            rateLimit:
              requestsPerUnit: 20
              unit: minute

      # 좌석 선점: IP당 분당 30회
      - key: path
        value: "/seat/hold"
        descriptors:
          - key: remote_address
            rateLimit:
              requestsPerUnit: 30
              unit: minute

      # 내부 대역 무제한 (Pod 간 통신)
      - key: remote_address
        value: "10.0.0.0/8"
        rateLimit:
          unlimited: true

  # 제외 경로
  excludePaths:
    - "/health"
    - "/healthz"
    - "/ready"
    - "/metrics"
    - "/actuator/health"

# ============================================================
# mTLS 설정 (서비스 간 통신 암호화)
# ============================================================
mtls:
  enabled: true
  mode: STRICT  # STRICT: mTLS 필수, PERMISSIVE: 허용
  namespaces:
    - prod-webs
    - monitoring
    # - prod-ai  # AI 서비스 사용시 활성화

  # OTEL Collector 예외 설정
  # OTEL Java agent는 Istio sidecar를 거치지 않고 직접 연결하므로
  # plain HTTP도 허용해야 함 (PERMISSIVE)
  otelCollector:
    enabled: true
    namespace: monitoring
    selector:
      app.kubernetes.io/name: opentelemetry-collector

  # App 서비스 예외 설정
  # monitoring namespace의 Prometheus가 plain HTTP로 actuator를 scrape할 수 있도록
  # 앱 메트릭 포트에만 mTLS 비활성화 (management 포트 9090 분리)
  metricsScrapeExceptions:
    - name: auth-guard-metrics
      namespace: prod-webs
      selector:
        app: prod-auth-guard
      metricsPort: 9090
      mode: DISABLE
    - name: queue-metrics
      namespace: prod-webs
      selector:
        app: prod-queue
      metricsPort: 9090
      mode: DISABLE
    - name: seat-metrics
      namespace: prod-webs
      selector:
        app: prod-seat
      metricsPort: 9090
      mode: DISABLE
    - name: order-core-metrics
      namespace: prod-webs
      selector:
        app: prod-order-core
      metricsPort: 9090
      mode: DISABLE
    - name: api-gateway-metrics
      namespace: prod-webs
      selector:
        app: prod-api-gateway
      metricsPort: 9090
      mode: DISABLE

  # AI 서비스 예외 설정
  # Prometheus 메트릭 스크래핑을 위해 PERMISSIVE 모드 필요
  aiServices:
    enabled: true
    namespace: prod-ai
    services:
      - name: ai-defense
        selector:
          app: prod-ai-defense
        metricsPort: 8000
      - name: authz-adapter
        selector:
          app: prod-authz-adapter
        metricsPort: 9090

# ============================================================
# JWT 인증 설정
# ============================================================
jwtAuth:
  enabled: false  # 우선 비활성화

  issuers:
    # Kakao OAuth
    - name: kakao
      issuer: "https://kauth.kakao.com"
      jwksUri: "https://kauth.kakao.com/.well-known/jwks.json"
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "

    # 자체 Auth 서비스 (prod 네임스페이스)
    - name: goormgb-auth
      issuer: "https://auth.goormgb.com"
      jwksUri: "http://auth-guard.prod-webs.svc.cluster.local:8080/.well-known/jwks.json"
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "

  forwardOriginalToken: true

  # 공개 경로 (JWT 불필요)
  publicPaths:
    # 인증 관련
    - "/auth/*"
    - "/oauth/*"
    - "/login"
    - "/signup"
    - "/api/auth/*"

    # 헬스체크
    - "/health"
    - "/healthz"
    - "/ready"
    - "/readyz"
    - "/actuator/health"
    - "/actuator/info"

    # 메트릭
    - "/metrics"
    - "/actuator/prometheus"

    # 공개 API
    - "/api/public/*"
    - "/order/clubs"
    - "/order/clubs/*/info"
    - "/order/matches"

    # 정적 리소스
    - "/static/*"
    - "/assets/*"
    - "/favicon.ico"
    - "/robots.txt"

    # Swagger/API 문서
    - "/swagger-ui/*"
    - "/v3/api-docs/*"
    - "/api-docs/*"

    # Grafana (별도 인증)
    - "/grafana/*"

  # 인증 필수 경로
  protectedPaths:
    - "/api/user/*"
    - "/api/booking/*"
    - "/api/payment/*"
    - "/order/reservations/*"
    - "/order/my/*"

  unauthorizedResponse:
    enabled: true

# ============================================================
# 관리 도구 IP 화이트리스트 (WAF 대신 Istio Policy 사용)
# ============================+===============================
adminTools:
  ipWhitelist:
    enabled: true
    # 허용할 공인 IP 리스트 (사무실, VPN 등)
    allowedIPs:
      - "122.34.166.131/32"
    # 보호할 도메인 리스트
    protectedHosts:
      - "argocd.playball.one"
      - "grafana.playball.one"
      # prod에서는 미사용 (staging only)
      # - "redis.playball.one"
      # - "prometheus.playball.one"
      # - "kafka-ui.playball.one"
      # - "cloudbeaver.playball.one"
