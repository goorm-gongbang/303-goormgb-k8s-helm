# EKS Staging - Istio 설정 (Helm values)
# Domain: playball.one
# Components: istio-base, istiod, istio-gateway, kiali

# ===== Istio Base =====
base:
  global:
    istioNamespace: istio-system

# ===== Istiod =====
istiod:
  global:
    istioNamespace: istio-system

    # Sidecar Proxy 기본 리소스 설정
    proxy:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

  meshConfig:
    enableTracing: true
    defaultConfig:
      tracing:
        sampling: 50 # 50% 샘플링 (staging 환경)
        zipkin:
          address: "tempo.monitoring.svc.cluster.local:9411"

    # Access logging
    accessLogFile: /dev/stdout

  pilot:
    # infra 노드에 배치
    nodeSelector:
      role: infra
    tolerations:
      - key: role
        value: infra
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

    autoscaleEnabled: true
    autoscaleMin: 2
    autoscaleMax: 3

    # HA: AZ별 분산 배치
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: istiod
            topologyKey: topology.kubernetes.io/zone

# ===== Shared Gateway =====
# 공용 Gateway (인프라 서비스용)
sharedGateway:
  enabled: true
  name: playball-gateway
  tls:
    # AWS ACM 인증서 사용 (CloudFront에서 TLS 종료)
    # Gateway에서는 HTTP로 수신
    mode: SIMPLE
    credentialName: ""  # ACM 사용시 불필요
  hosts:
    - "argocd.playball.one"
    - "grafana.playball.one"

# ===== Kiali =====
kiali-server:
  server:
    web_port: 443
    web_schema: https

  auth:
    strategy: openid
    openid:
      client_id_from_secret: kiali-oidc-secret
      client_id_secret_key: client_id
      issuer_uri: "https://accounts.google.com"
      scopes: ["openid", "email", "profile"]
      username_claim: "email"
      disable_rbac: true

  # Istio 라벨 설정 - app 라벨 사용 (app.kubernetes.io/name 대신)
  istio_labels:
    app_label_name: app
    version_label_name: version

  deployment:
    # monitoring 노드에 배치
    node_selector:
      role: monitoring
    tolerations:
      - key: role
        value: monitoring
        effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

  external_services:
    prometheus:
      url: "http://prom-prometheus.monitoring.svc.cluster.local:9090"

    grafana:
      enabled: true
      in_cluster_url: "http://grafana.monitoring.svc.cluster.local:80"
      url: "https://grafana.playball.one"

    tracing:
      enabled: true
      provider: tempo
      in_cluster_url: "http://tempo.monitoring.svc.cluster.local:3200"
      use_grpc: false
      tempo_config:
        org_id: "1"
        cache_enabled: true
        cache_capacity: 200

# Kiali VirtualService (공용 Gateway 사용)
kialiVirtualService:
  enabled: true

# Kiali OIDC - Google OAuth
oidc:
  enabled: true
  secretManagerKey: "staging/infra/oauth-teams"
