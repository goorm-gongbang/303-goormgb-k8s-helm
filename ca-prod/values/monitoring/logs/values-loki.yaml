# EKS Prod - Loki Configuration
# SingleBinary 모드 (S3 백엔드, 환경별 버킷 분리)

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  compactor:
    retention_enabled: true
    delete_request_store: s3

  limits_config:
    retention_period: 72h
    retention_stream:
      - selector: '{namespace=~"(prod-webs|prod-ai)"}'
        priority: 1
        period: 336h
      - selector: '{namespace="k6-tests"}'
        priority: 2
        period: 24h
      - selector: '{namespace="loadtest"}'
        priority: 2
        period: 24h
    allow_structured_metadata: true

  storage:
    type: s3
    bucketNames:
      chunks: goormgb-prod-loki
      ruler: goormgb-prod-loki
      admin: goormgb-prod-loki
    s3:
      region: ap-northeast-2

  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::406223549139:role/goormgb-prod-loki"

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  persistence:
    enabled: false
  extraVolumes:
    - name: data
      emptyDir: {}
  extraVolumeMounts:
    - name: data
      mountPath: /var/loki

# 불필요한 컴포넌트 비활성화 (SingleBinary 모드)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false

# 테스트/캐시 비활성화
test:
  enabled: false
lokiCanary:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false
