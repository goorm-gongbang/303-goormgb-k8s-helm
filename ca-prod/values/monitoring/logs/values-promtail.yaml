# EKS Staging - Promtail Configuration
# Loki로 로그 전송

config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    pipelineStages:
      - cri: {}
    # Pod의 'app' 라벨을 Loki 'app' 라벨로 설정 (Prometheus와 통일)
    extraRelabelConfigs:
      - source_labels:
          - __meta_kubernetes_pod_label_app
        target_label: app
        regex: (.+)
        action: replace

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
