# Alert rule set (prod)
# 정리 기준: 5xx, PodCrashLoop, RedisDown만 유지 (security 별도)
# 제거: API P99, NodeNotReady, Cluster CPU/Memory, Postgres Connections, Redis Memory

additionalPrometheusRulesMap:
  prod-ops-and-security:
    groups:
      - name: prod.ops.rules
        rules:
          - alert: ProdHttp5xxWarning
            expr: |
              100 * sum by (app) (
                rate(
                  http_server_request_duration_seconds_count{
                    namespace="prod-webs",
                    app=~"prod-(api-gateway|auth-guard|order-core|queue|seat)",
                    http_response_status_code=~"5.."
                  }[5m]
                )
              )
              /
              clamp_min(
                sum by (app) (
                  rate(
                    http_server_request_duration_seconds_count{
                      namespace="prod-webs",
                      app=~"prod-(api-gateway|auth-guard|order-core|queue|seat)"
                    }[5m]
                  )
                ),
                1
              ) > 1
            for: 5m
            labels:
              severity: warning
              environment: prod
              team: dev
            annotations:
              summary: "prod 환경 5xx 에러율 경고"
              description: "최근 5m 동안 prod 웹 서비스의 5xx 에러율이 1%를 초과했습니다."

          - alert: ProdHttp5xxCritical
            expr: |
              100 * sum by (app) (
                rate(
                  http_server_request_duration_seconds_count{
                    namespace="prod-webs",
                    app=~"prod-(api-gateway|auth-guard|order-core|queue|seat)",
                    http_response_status_code=~"5.."
                  }[5m]
                )
              )
              /
              clamp_min(
                sum by (app) (
                  rate(
                    http_server_request_duration_seconds_count{
                      namespace="prod-webs",
                      app=~"prod-(api-gateway|auth-guard|order-core|queue|seat)"
                    }[5m]
                  )
                ),
                1
              ) > 3
            for: 5m
            labels:
              severity: critical
              environment: prod
              team: dev
            annotations:
              summary: "prod 환경 5xx 에러율 치명"
              description: "최근 5m 동안 prod 웹 서비스의 5xx 에러율이 3%를 초과했습니다."

          - alert: ProdPodCrashLoopCritical
            expr: |
              sum by (namespace, pod) (
                increase(kube_pod_container_status_restarts_total{namespace="prod-webs"}[10m])
              ) > 3
            for: 0m
            labels:
              severity: critical
              environment: prod
              team: dev
            annotations:
              summary: "prod 환경 Pod 재시작 급증"
              description: "최근 10m 동안 prod 웹 서비스 Pod 재시작이 3회를 초과했습니다."

          - alert: ProdRedisDownCritical
            expr: |
              min(redis_up{namespace="data"}) == 0
            for: 1m
            labels:
              severity: critical
              environment: prod
              team: dev
            annotations:
              summary: "prod Redis 비가용 감지"
              description: "Redis 인스턴스가 응답하지 않습니다."

      - name: prod.security.rules
        rules:
          - alert: ProdMacroDetectedWarning
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 50
            for: 0m
            labels:
              severity: warning
              environment: prod
              team: security
            annotations:
              summary: "prod 매크로/봇 탐지 경고"
              description: "최근 5m 동안 매크로/봇 탐지 수가 50건을 초과했습니다."

          - alert: ProdMacroDetectedCritical
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 200
            for: 0m
            labels:
              severity: critical
              environment: prod
              team: security
            annotations:
              summary: "prod 매크로/봇 탐지 치명"
              description: "최근 5m 동안 매크로/봇 탐지 수가 200건을 초과했습니다."

          - alert: ProdBlockedIpWarning
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 100
            for: 0m
            labels:
              severity: warning
              environment: prod
              team: security
            annotations:
              summary: "prod 차단 IP 수 경고"
              description: "최근 5m 동안 차단 IP 수가 100건을 초과했습니다."

          - alert: ProdBlockedIpCritical
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 500
            for: 0m
            labels:
              severity: critical
              environment: prod
              team: security
            annotations:
              summary: "prod 차단 IP 수 치명"
              description: "최근 5m 동안 차단 IP 수가 500건을 초과했습니다."

          - alert: ProdAuthFailureRateWarning
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 30
            for: 5m
            labels:
              severity: warning
              environment: prod
              team: security
            annotations:
              summary: "prod 인증 실패율 경고"
              description: "최근 5m 동안 인증 실패율이 30%를 초과했습니다."

          - alert: ProdAuthFailureRateCritical
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 50
            for: 5m
            labels:
              severity: critical
              environment: prod
              team: security
            annotations:
              summary: "prod 인증 실패율 치명"
              description: "최근 5m 동안 인증 실패율이 50%를 초과했습니다."

          - alert: ProdWafBlockedRequestsWarning
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 200
            for: 5m
            labels:
              severity: warning
              environment: prod
              team: security
            annotations:
              summary: "prod WAF 차단 요청 급증 경고"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 200건을 초과했습니다."

          - alert: ProdWafBlockedRequestsCritical
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 1000
            for: 5m
            labels:
              severity: critical
              environment: prod
              team: security
            annotations:
              summary: "prod WAF 차단 요청 급증 치명"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 1000건을 초과했습니다."

          - alert: ProdKyvernoPrivilegedInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="disallow-privileged-containers", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="disallow-privileged-containers", status="fail"})
              ) > 1
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno privileged 컨테이너 위반"
              description: "disallow-privileged-containers 정책 위반이 1건을 초과했습니다."

          - alert: ProdKyvernoCriticalNamespaceInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="protect-critical-namespaces", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="protect-critical-namespaces", status="fail"})
              ) > 1
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno 중요 네임스페이스 변경 시도"
              description: "protect-critical-namespaces 정책 위반이 1건을 초과했습니다."

          - alert: ProdKyvernoLatestTagInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="disallow-latest-tag", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="disallow-latest-tag", status="fail"})
              ) > 3
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno latest 태그 사용 위반"
              description: "disallow-latest-tag 정책 위반이 3건을 초과했습니다."

          - alert: ProdKyvernoResourceLimitsInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="require-resource-limits", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="require-resource-limits", status="fail"})
              ) > 5
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno 리소스 제한 누락"
              description: "require-resource-limits 정책 위반이 5건을 초과했습니다."

          - alert: ProdKyvernoRequiredLabelsInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="require-labels", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="require-labels", status="fail"})
              ) > 5
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno 필수 라벨 누락"
              description: "require-labels 정책 위반이 5건을 초과했습니다."

          - alert: ProdKyvernoArgocdManagementInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="require-argocd-management", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="require-argocd-management", status="fail"})
              ) > 3
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno ArgoCD 관리 라벨 누락"
              description: "require-argocd-management 정책 위반이 3건을 초과했습니다."

          - alert: ProdKyvernoProbesInfo
            expr: |
              (
                sum(policy_report_result{source="kyverno", policy="require-probes", status="fail"})
                +
                sum(cluster_policy_report_result{source="kyverno", policy="require-probes", status="fail"})
              ) > 5
            for: 0m
            labels:
              severity: info
              environment: prod
              team: security
              service_name: kyverno
              namespace: kyverno
            annotations:
              summary: "prod Kyverno Probe 누락"
              description: "require-probes 정책 위반이 5건을 초과했습니다."
