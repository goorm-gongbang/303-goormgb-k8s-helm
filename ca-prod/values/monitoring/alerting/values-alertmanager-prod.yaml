              {{- if or (eq $incidentId "") (lt $ts $incidentId) -}}{{- $incidentId = $ts -}}{{- end -}}
              {{- end -}}
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 경고 복구{{ else }}🟡 경고 발생{{ end }} [{{ if ne $incidentId "" }}{{ $incidentId }}{{ else }}unknown{{ end }}]
            text: |-
              {{- $startedAt := "" -}}
              {{- $resolvedAt := "" -}}
              {{- range .Alerts -}}
