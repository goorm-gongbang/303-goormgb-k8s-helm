# Alertmanager routing/receivers (staging)

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "staging/monitoring"
      securityWebhooksEnabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-discord-webhooks

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'job', 'service_name']
      group_wait: 5s
      group_interval: 5m
      repeat_interval: 10m
      receiver: 'null'
      routes:
        - match:
            team: security
            environment: staging
            severity: critical
          receiver: 'discord-security-critical'
          repeat_interval: 30m
        - match:
            team: security
            environment: staging
            severity: warning
          receiver: 'discord-security-warning'
          repeat_interval: 30m
        - match:
            team: security
            environment: staging
            severity: info
          receiver: 'discord-security-info'
          repeat_interval: 10m
        - match:
            environment: staging
            severity: critical
          receiver: 'discord-critical'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: warning
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: info
          receiver: 'discord-info'
          repeat_interval: 10m
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            alertname: InfoInhibitor
          receiver: 'null'

    receivers:
      - name: 'discord-critical'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/critical'
            send_resolved: true

      - name: 'discord-warning'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/warning'
            send_resolved: true

      - name: 'discord-info'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/info'
            send_resolved: true

      - name: 'discord-security-critical'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/security-critical'
            send_resolved: true

      - name: 'discord-security-warning'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/security-warning'
            send_resolved: true

      - name: 'discord-security-info'
        webhook_configs:
          - url: 'http://alertmanager-discord-relay.monitoring.svc.cluster.local:8080/security-info'
            send_resolved: true
      - name: 'null'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace', 'job']
