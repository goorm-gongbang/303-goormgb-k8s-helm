# authz-adapter - Prod 환경
# Go 기반 gRPC ext_authz 서비스

replicaCount: 1

image:
  name: "staging/playball/ai/authz-adapter"
  tag: "7fecb3d.5"
  pullPolicy: Always

# EKS 노드 IAM Role이 ECR 접근 권한 보유 - imagePullSecrets 불필요
imagePullSecrets: []

# Graviton (ARM64) 노드에 배치
nodeSelector:
  kubernetes.io/arch: arm64

# gRPC 메인 포트를 service.port로 사용
service:
  type: ClusterIP
  port: 9001
  portName: grpc
  grpc:
    enabled: false  # 메인 포트가 이미 gRPC
    port: 9001      # GRPC_PORT 환경변수용

# Prometheus Metrics
metrics:
  enabled: true
  port: 9090
  portName: metrics
  path: /metrics
  interval: 15s

# authz-adapter 전용 설정
authzAdapter:
  enabled: true
  aiDefenseUrl: "http://ai-defense.prod-ai.svc.cluster.local:8000/ai/evaluate"
  aiDefenseTimeoutMs: 1000
  logLevel: info

# Redis Blacklist 설정 (ElastiCache)
env:
  - name: REDIS_BLACKLIST_ENABLED
    value: "true"
  - name: REDIS_TLS_ENABLED
    value: "true"
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_PORT
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "2"
  - name: BLACKLIST_TTL_SECS
    value: "604800"  # 7일
  - name: WHITELIST_TTL_SECS
    value: "2592000"  # 30일

# OpenTelemetry
otel:
  enabled: true
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"

# Health checks (Go HTTP 서버)
livenessProbe:
  httpGet:
    path: /healthz
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Istio sidecar 비활성화 (ext_authz는 sidecar 없이 동작)
istio:
  sidecar: false

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: role
              operator: In
              values: ["app"]
