# ArgoCD Installation Values (argo/argo-cd chart)
# EKS Prod - ClusterIP (ALB Ingress로 노출)

# Global 노드 배치 설정 (Infra 노드에 배치)
global:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule

# Server 설정
server:
  # Insecure 모드 (TLS는 ALB에서 처리)
  extraArgs:
    - --insecure

  # ClusterIP - ALB Ingress에서 라우팅
  service:
    type: ClusterIP

  # 리소스 제한 (prod 환경)
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Controller 설정 (25+ apps reconcile로 메모리 증가 필요)
controller:
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Repo Server 설정
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 1Gi

# Redis 설정 (내장 Redis 사용)
redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ApplicationSet Controller
applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Notifications Controller
notifications:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Global 설정
configs:
  # RBAC - Helm에서 직접 관리 (ESO 덮어쓰기 방지)
  rbac:
    create: true
    policy.default: "role:none"
    scopes: "[email]"
    policy.csv: |
      p, role:developer-prod, applications, get, */*, allow
      p, role:developer-prod, logs, get, */*, allow
      g, 212clab@gmail.com, role:admin
      g, rhuba23@gmail.com, role:admin
      g, chamchi0129@gmail.com, role:admin

  cm:
    create: true
    url: https://argocd.playball.one
    admin.enabled: "true"
    server.allowedRedirectURLs: https://argocd.playball.one
    oidc.config: |
      name: Google
      issuer: https://accounts.google.com
      clientID: $argocd-google-oauth:clientId
      clientSecret: $argocd-google-oauth:clientSecret
      redirectURI: https://argocd.playball.one/auth/callback
      requestedScopes:
        - openid
        - profile
        - email
    # Calico 리소스 Healthy 처리 (EKS에서는 사용 안 함)
    resource.customizations.health.operator.tigera.io_Installation: |
      hs = {}
      hs.status = "Healthy"
      return hs
    resource.customizations.health.operator.tigera.io_APIServer: |
      hs = {}
      hs.status = "Healthy"
      return hs
