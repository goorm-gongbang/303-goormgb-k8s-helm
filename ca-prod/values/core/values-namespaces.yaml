# EKS Staging - Namespace 설정
# Istio sidecar injection 활성화

namespaces:
  # Application namespaces
  - name: prod-webs
    istio: true
  - name: prod-ai
    istio: true

  # Load-test namespaces (부하 테스트 전용)
  - name: loadtest-webs
    istio: true
  - name: loadtest-ai
    istio: true
  - name: data
    istio: false  # Redis 등 데이터 레이어
  - name: messaging
    istio: false  # Kafka - 이벤트 스트리밍

  # Infrastructure namespaces
  - name: monitoring
    istio: false
  - name: external-dns
    istio: false
