{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter-ai
  labels:
    app: redis-exporter-ai
    app.kubernetes.io/name: redis-exporter-ai
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.exporter.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: redis-exporter-ai
{{- end }}
