nameOverride: alertmanager-discord-relay

image:
  repository: python
  tag: "3.12-alpine"
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  username: Alertmanager
  logsUrl: https://grafana.playball.one/d/cfevec81ezw8wc?var-namespace=prod-webs
  securityInfoUrl: https://policy-reporter.playball.one/#/
  criticalMention: "@개발팀 @admins"
