# ClusterSecretStore for EKS prod
# IRSA 기반 - ServiceAccount를 통해 IAM Role 인증

clusterSecretStore:
  enabled: true
  name: aws-secrets-manager
  region: ap-northeast-2
  # ESO ServiceAccount (IRSA role이 연결된 SA)
  serviceAccount:
    name: external-secrets
    namespace: external-secrets

# Service Config - 앱 서비스용 환경변수
# 시크릿 구조:
#   - prod/services/db       : DB + Redis 연결정보
#   - prod/services/jwt      : JWT + Admission 토큰 설정 (통합)
#   - prod/services/smtp     : 이메일 발송용 SMTP 자격증명
serviceConfig:
  enabled: true
  namespace: prod-webs
  secretManagerPrefix: prod/services
