{{- range .Values.namespaces }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $.Values.secretName }}
  namespace: {{ . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ $.Values.secretName }}
  data:
    # === Redis (AI Defense 세션 저장소) ===
    - secretKey: AI_REDIS_HOST
      remoteRef:
        key: prod/ai-service
        property: redis_host
    - secretKey: AI_REDIS_PORT
      remoteRef:
        key: prod/ai-service
        property: redis_port
    # === PostgreSQL (AI Defense policy control-plane) ===
    - secretKey: AI_PG_HOST
      remoteRef:
        key: prod/ai-service
        property: pg_host
    - secretKey: AI_PG_PORT
      remoteRef:
        key: prod/ai-service
        property: pg_port
    - secretKey: AI_PG_USERNAME
      remoteRef:
        key: prod/ai-service
        property: pg_username
    - secretKey: AI_PG_PASSWORD
      remoteRef:
        key: prod/ai-service
        property: pg_password
    - secretKey: AI_PG_DBNAME
      remoteRef:
        key: prod/ai-service
        property: pg_dbname
    # === ClickHouse (AI Defense observability warehouse) ===
    - secretKey: AI_CLICKHOUSE_USER
      remoteRef:
        key: prod/ai-service
        property: ch_user
    - secretKey: AI_CLICKHOUSE_PASSWORD
      remoteRef:
        key: prod/ai-service
        property: ch_password
    # === Auth-Guard Block Sync ===
    - secretKey: AUTH_GUARD_URL
      remoteRef:
        key: prod/ai-service
        property: AUTH_GUARD_URL
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: prod/ai-service
        property: INTERNAL_API_KEY
{{- end }}
