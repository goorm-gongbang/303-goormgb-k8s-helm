apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiali-oidc-secret
  namespace: istio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: kiali-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: prod/infra/oauth-teams
        property: clientId
    - secretKey: oidc-secret
      remoteRef:
        key: prod/infra/oauth-teams
        property: clientSecret
