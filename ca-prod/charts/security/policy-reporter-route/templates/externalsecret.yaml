# OAuth2 Proxy credentials from AWS Secrets Manager (Prod)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-reporter-oauth-creds
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: policy-reporter-oauth-creds
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: prod/infra/oauth-teams
        property: clientId
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: prod/infra/oauth-teams
        property: clientSecret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: prod/infra/oauth-teams
        property: cookieSecret
---
# Allowed emails list (Prod)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-reporter-oauth-emails
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: policy-reporter-oauth-emails
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        authenticated-emails.txt: "{{ `{{ .emails }}` }}"
  data:
    - secretKey: emails
      remoteRef:
        key: prod/infra/oauth-teams
        property: allowedEmails
