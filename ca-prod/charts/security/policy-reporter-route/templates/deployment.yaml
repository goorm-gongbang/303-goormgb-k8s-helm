apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-reporter-oauth-proxy
  namespace: kyverno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-reporter-oauth-proxy
  template:
    metadata:
      labels:
        app: policy-reporter-oauth-proxy
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      nodeSelector:
        role: infra
      tolerations:
        - key: role
          value: infra
          effect: NoSchedule
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=google
            - --email-domain=*
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://policy-reporter.prod.playball.one/oauth2/callback
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-refresh=1h
            - --cookie-expire=4h
            - --authenticated-emails-file=/etc/oauth2-proxy/authenticated-emails.txt
            - --skip-provider-button=false
            - --reverse-proxy=true
            - --proxy-prefix=/oauth2
            - --upstream=http://policy-reporter-ui.kyverno.svc.cluster.local:8080
          envFrom:
            - secretRef:
                name: policy-reporter-oauth-creds
          ports:
            - name: http-proxy
              containerPort: 4180
              protocol: TCP
          volumeMounts:
            - name: oauth-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: oauth-emails
          secret:
            secretName: policy-reporter-oauth-emails
