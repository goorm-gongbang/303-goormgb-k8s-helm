# AI 서비스 기본 설정 (Python, Go 등)
# 환경별 override: dev/values/apps/values-<app>.yaml

replicaCount: 1

# ECR 설정 (root values에서 상속)
ecr:
  accountId: ""
  region: "ap-northeast-2"

image:
  # 이미지 경로 (예: dev/goormgb/ai)
  name: ""
  # (deprecated) 전체 URL
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-pull-secret

nameOverride: ""
fullnameOverride: ""

# Service
service:
  type: ClusterIP
  port: 8000  # uvicorn default
  portName: http  # http or grpc
  # gRPC용 추가 포트 (authz-adapter 등)
  grpc:
    enabled: false
    port: 9001
    portName: grpc

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Python apps may need writable dirs
  capabilities:
    drop:
      - ALL

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# HPA
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false
    host: ""
    # 외부 Gateway 참조 (Gateway CRD 생성 안 함)
    externalRef: ""  # e.g., "istio-system/api-gateway"
    # Context path (prefix matching)
    contextPath: ""  # e.g., "/ai"
    tls:
      enabled: true
      credentialName: goormgb-tls
  # CORS 설정
  cors:
    enabled: false
    allowOrigins: []
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowHeaders:
      - "*"
    allowCredentials: true
    maxAge: "24h"

# FastAPI health checks
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Environment variables
env: []
# - name: ENVIRONMENT
#   value: "dev"

# ConfigMap/Secret references
envFrom: []
# - configMapRef:
#     name: ai-config
# - secretRef:
#     name: ai-secrets

# Prometheus Metrics (ServiceMonitor)
metrics:
  enabled: false
  port: 9090
  portName: metrics
  path: /metrics
  interval: 15s

# OpenTelemetry (앱에 opentelemetry SDK 필요)
# pip install opentelemetry-api opentelemetry-sdk opentelemetry-instrumentation-fastapi
otel:
  enabled: false
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"

# authz-adapter 전용 설정
authzAdapter:
  enabled: false
  aiDefenseUrl: ""
  aiDefenseTimeoutMs: 800
  logLevel: info
