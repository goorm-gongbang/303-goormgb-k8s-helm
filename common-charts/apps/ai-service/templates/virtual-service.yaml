{{- if .Values.istio.gateway.enabled }}
{{- $gatewayName := .Values.istio.gateway.name | default (printf "%s-gw" (include "ai-service.fullname" .)) }}
{{- $gatewayRef := .Values.istio.gateway.externalRef | default $gatewayName }}
{{- $contextPath := .Values.istio.gateway.contextPath | default "/" }}
{{- if not .Values.istio.gateway.externalRef }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  labels:
    {{- include "ai-service.labels" . | nindent 4 }}
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.istio.gateway.tls.credentialName }}
      hosts:
        - {{ .Values.istio.gateway.host | quote }}
        {{- range .Values.istio.gateway.extraHosts | default (list) }}
        - {{ . | quote }}
        {{- end }}
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.istio.gateway.host | quote }}
        {{- range .Values.istio.gateway.extraHosts | default (list) }}
        - {{ . | quote }}
        {{- end }}
      tls:
        httpsRedirect: true
---
{{- end }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ include "ai-service.fullname" . }}-vs
  labels:
    {{- include "ai-service.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.istio.gateway.host | quote }}
    {{- range .Values.istio.gateway.extraHosts | default (list) }}
    - {{ . | quote }}
    {{- end }}
  gateways:
    - {{ $gatewayRef }}
  http:
    # Main route
    - match:
        - uri:
            prefix: {{ $contextPath }}
      {{- if .Values.istio.cors }}
      {{- if .Values.istio.cors.enabled }}
      corsPolicy:
        allowOrigins:
          {{- range .Values.istio.cors.allowOrigins }}
          - exact: {{ . | quote }}
          {{- end }}
        allowMethods:
          {{- range .Values.istio.cors.allowMethods | default (list "GET" "POST" "PUT" "DELETE" "OPTIONS") }}
          - {{ . }}
          {{- end }}
        allowHeaders:
          {{- range .Values.istio.cors.allowHeaders | default (list "*") }}
          - {{ . | quote }}
          {{- end }}
        allowCredentials: {{ .Values.istio.cors.allowCredentials | default true }}
        maxAge: {{ .Values.istio.cors.maxAge | default "24h" | quote }}
      {{- end }}
      {{- end }}
      route:
        - destination:
            host: {{ include "ai-service.fullname" . }}
            port:
              number: {{ .Values.service.port }}
    {{- if .Values.istio.gateway.redirect }}
    {{- if .Values.istio.gateway.redirect.enabled }}
    # Redirect (e.g., /ai -> /ai/)
    - match:
        - uri:
            exact: {{ .Values.istio.gateway.redirect.from }}
      redirect:
        uri: {{ .Values.istio.gateway.redirect.to }}
    {{- end }}
    {{- end }}
{{- end }}
