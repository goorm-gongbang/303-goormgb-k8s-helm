# Next.js 앱 기본 설정
# 환경별 override: environments/apps/<env>/values-frontend.yaml

replicaCount: 1

image:
  repository: ""  # ECR 주소 (values에서 override)
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-creds

nameOverride: ""
fullnameOverride: ""

# Service
service:
  type: ClusterIP
  port: 3000

# Resources (Node.js는 Java보다 가벼움)
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# HPA
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false
    host: ""
    tls:
      enabled: true
      credentialName: goormgb-tls

# Health checks
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Graceful shutdown
terminationGracePeriodSeconds: 15

# Environment variables
env: []
# - name: NEXT_PUBLIC_API_URL
#   value: "https://api.goormgb.space"

# ConfigMap/Secret references
envFrom: []
# - configMapRef:
#     name: frontend-config

# Node.js options
nodeOptions: "--max-old-space-size=256"
