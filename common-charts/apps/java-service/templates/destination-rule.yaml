{{- if and .Values.istio .Values.istio.destinationRule }}
{{- if .Values.istio.destinationRule.enabled }}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ include "java-service.fullname" . }}-dr
  labels:
    {{- include "java-service.labels" . | nindent 4 }}
spec:
  host: {{ include "java-service.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: {{ .Values.istio.destinationRule.loadBalancer | default "ROUND_ROBIN" }}
    {{- if .Values.istio.destinationRule.connectionPool }}
    connectionPool:
      {{- toYaml .Values.istio.destinationRule.connectionPool | nindent 6 }}
    {{- end }}
    {{- if .Values.istio.destinationRule.outlierDetection }}
    outlierDetection:
      {{- toYaml .Values.istio.destinationRule.outlierDetection | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
