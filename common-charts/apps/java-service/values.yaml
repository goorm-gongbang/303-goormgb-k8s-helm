# Java Spring Boot 서비스 기본 설정
# 환경별 override: environments/apps/<env>/values-<app>.yaml

replicaCount: 1

# ECR 설정 (root values에서 상속)
ecr:
  accountId: ""
  region: "ap-northeast-2"

image:
  # 이미지 경로 (예: dev/goormgb/api-gateway)
  name: ""
  # (deprecated) 전체 URL - ecr + name 방식 권장
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-pull-secret

nameOverride: ""
fullnameOverride: ""

# Spring Boot context path (예: /auth, /order, /queue, /seat)
# 각 서비스 values에서 override
contextPath: ""

# Service
service:
  type: ClusterIP
  port: 8080

# Resources
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# HPA
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false
    host: ""
    tls:
      enabled: true
      credentialName: goormgb-tls
  # Retry policy for connection stability
  retries:
    attempts: 3
    perTryTimeout: "2s"
    retryOn: "connect-failure,refused-stream,503,reset"

# Spring Boot Actuator health checks
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 180
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 90
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Environment variables
env: []
# - name: SPRING_PROFILES_ACTIVE
#   value: "dev"

# ConfigMap/Secret references (ESO에서 생성)
envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

# JVM options
javaOpts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

# OpenTelemetry Java Agent
otel:
  enabled: false
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
