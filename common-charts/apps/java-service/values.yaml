# Java Spring Boot 서비스 기본 설정
# 환경별 override: environments/apps/<env>/values-<app>.yaml

replicaCount: 1

# ECR 설정 (root values에서 상속)
ecr:
  accountId: ""
  region: "ap-northeast-2"

image:
  # 이미지 경로 (예: dev/goormgb/api-gateway)
  name: ""
  # (deprecated) 전체 URL - ecr + name 방식 권장
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-pull-secret

nameOverride: ""
fullnameOverride: ""

# Spring Boot context path (예: /auth, /order, /queue, /seat)
# 각 서비스 values에서 override
contextPath: ""

# Service
service:
  type: ClusterIP
  port: 8080

# Resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Node scheduling
nodeSelector:
  role: app

tolerations: []

# Affinity는 deployment 템플릿에서 기본값 적용
# - podAffinity: 같은 partOf 서비스들은 같은 노드 선호
# - podAntiAffinity: 같은 서비스 레플리카는 다른 노드로 분산
# 커스텀 설정 시 여기서 override
affinity: {}

# 서비스 그룹 (같은 노드에 묶일 서비스들)
partOf: staging-webs

# PodDisruptionBudget
pdb:
  enabled: false
  minAvailable: 1

# HPA
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false
    host: ""
    tls:
      enabled: true
      credentialName: goormgb-tls
  # Retry policy for connection stability
  retries:
    attempts: 3
    perTryTimeout: "2s"
    retryOn: "connect-failure,refused-stream,503,reset"

# Spring Boot Actuator health checks
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 90
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 45
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Graceful shutdown
terminationGracePeriodSeconds: 30

# Environment variables
env: []
# - name: SPRING_PROFILES_ACTIVE
#   value: "dev"

# ConfigMap/Secret references (ESO에서 생성)
envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

# JVM options
javaOpts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

# OpenTelemetry Java Agent
otel:
  enabled: false
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"

# Prometheus 메트릭 수집 (Spring Boot Actuator)
# PodMonitor로 /actuator/prometheus 엔드포인트 스크레이핑
# 기본 비활성화 - 환경별 values에서 활성화
metrics:
  enabled: false
  # Service port name (deployment에서 정의한 포트명)
  portName: http
  # Actuator prometheus 엔드포인트
  path: /actuator/prometheus
  # 스크레이핑 주기
  interval: 30s
