{{- if .Values.topics }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kafka.fullname" . }}-create-topics
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "kafka.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: topic-creator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: topic-creator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BOOTSTRAP_SERVER="{{ include "kafka.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"

              echo "Waiting for Kafka broker to be ready..."
              until kafka-broker-api-versions.sh --bootstrap-server "$BOOTSTRAP_SERVER" > /dev/null 2>&1; do
                echo "Waiting for Kafka..."
                sleep 5
              done
              echo "Kafka broker is ready!"

              {{- range .Values.topics }}
              echo "Creating topic: {{ .name }}"
              kafka-topics.sh --bootstrap-server "$BOOTSTRAP_SERVER" \
                --create \
                --if-not-exists \
                --topic "{{ .name }}" \
                --partitions {{ .partitions | default 3 }} \
                --replication-factor {{ .replicationFactor | default 1 }} \
                || echo "Topic {{ .name }} may already exist"
              {{- end }}

              echo "Topic creation completed!"
              kafka-topics.sh --bootstrap-server "$BOOTSTRAP_SERVER" --list
{{- end }}
