apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kafka.fullname" . }}-config
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
data:
  # KRaft 초기화 스크립트
  init-kraft.sh: |
    #!/bin/bash
    set -e

    KRAFT_CLUSTER_ID="${KAFKA_CLUSTER_ID}"
    DATA_DIR="/var/lib/kafka/data"
    META_PROPERTIES="$DATA_DIR/meta.properties"

    # 클러스터 ID가 없으면 생성
    if [ -z "$KRAFT_CLUSTER_ID" ]; then
      KRAFT_CLUSTER_ID=$(kafka-storage.sh random-uuid)
      echo "Generated new cluster ID: $KRAFT_CLUSTER_ID"
    fi

    # 이미 포맷된 경우 스킵
    if [ -f "$META_PROPERTIES" ]; then
      echo "Kafka data directory already formatted"
      exit 0
    fi

    echo "Formatting Kafka storage with cluster ID: $KRAFT_CLUSTER_ID"
    kafka-storage.sh format -t "$KRAFT_CLUSTER_ID" -c /etc/kafka/server.properties --ignore-formatted
