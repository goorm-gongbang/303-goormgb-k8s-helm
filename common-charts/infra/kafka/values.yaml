# Apache Kafka KRaft Mode (Zookeeper-less)
# Dev/Staging 공용 차트

image:
  repository: apache/kafka
  tag: "3.7.1"
  pullPolicy: IfNotPresent

replicas: 1

kraft:
  # 고정 클러스터 ID (base64 URL-safe, 22자)
  # 환경별로 다르게 설정 권장
  clusterId: ""

config:
  # KRaft 필수 설정
  processRoles: broker,controller
  # replicas > 1인 경우 동적 생성됨
  controllerQuorumVoters: ""

  # Listener 설정
  listeners: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
  advertisedListeners: ""  # 환경별 설정 필수
  controllerListenerNames: CONTROLLER
  interBrokerListenerName: PLAINTEXT

  # 토픽 기본값
  numPartitions: 3
  defaultReplicationFactor: 1
  minInsyncReplicas: 1

  # 로그 보존
  logRetentionHours: 72
  logRetentionBytes: 5368709120  # 5GB

  # 오프셋 토픽
  offsetsTopicReplicationFactor: 1
  transactionStateLogReplicationFactor: 1
  transactionStateLogMinIsr: 1

  # 성능 튜닝
  numNetworkThreads: 3
  numIoThreads: 8
  socketSendBufferBytes: 102400
  socketReceiveBufferBytes: 102400
  socketRequestMaxBytes: 104857600

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1536Mi

service:
  port: 9092
  controllerPort: 9093

jmx:
  enabled: false
  port: 9999

exporter:
  enabled: true
  image:
    repository: danielqsj/kafka-exporter
    tag: v1.7.0
    pullPolicy: IfNotPresent
  port: 9308
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Topic 자동 생성 (초기 설정)
topics:
  - name: payment-completed
    partitions: 3
    replicationFactor: 1
  - name: order-created
    partitions: 3
    replicationFactor: 1
  - name: order-cancelled
    partitions: 3
    replicationFactor: 1
