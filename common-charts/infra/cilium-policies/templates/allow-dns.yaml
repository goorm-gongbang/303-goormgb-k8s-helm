{{- if and .Values.enabled .Values.allowDns.enabled (not .Values.auditMode) }}
# Phase 2: DNS 허용 - 모든 Pod이 CoreDNS에 쿼리 가능
# 이 정책 없으면 서비스 디스커버리 불가!
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns-to-coredns
  annotations:
    description: "Allow all pods to query CoreDNS"
    phase: "2"
spec:
  description: |
    DNS 쿼리 허용
    - 모든 Pod → kube-system/kube-dns (CoreDNS)
    - UDP/TCP 53 포트
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
{{- end }}
