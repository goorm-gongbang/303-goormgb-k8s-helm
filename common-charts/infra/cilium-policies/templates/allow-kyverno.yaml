{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
{{- if .Values.allowServices.kyverno }}
{{- if .Values.allowServices.kyverno.enabled }}
# kyverno namespace 통신 정책
---
# 1. Kyverno -> Kubernetes API
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-k8s-api
  namespace: kyverno
  annotations:
    description: "Allow Kyverno to access Kubernetes API"
spec:
  description: "Kyverno -> Kubernetes API 허용"
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
# 2. Kyverno 내부 통신
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: kyverno
  annotations:
    description: "Allow internal kyverno namespace communication"
spec:
  description: "kyverno 내부 통신 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kyverno
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kyverno
---
# 3. DNS 쿼리 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-dns
  namespace: kyverno
  annotations:
    description: "Allow DNS queries to CoreDNS"
spec:
  description: "kyverno -> kube-dns (DNS 쿼리) 허용"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
{{- end }}
{{- end }}
{{- end }}
