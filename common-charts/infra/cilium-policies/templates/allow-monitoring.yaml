{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
# Phase 2: monitoring namespace 통신 정책
---
# 0. monitoring 내부 통신 허용 (Grafana <-> Prometheus, Loki, Tempo 등)
{{- if .Values.allowServices.monitoring.allowInternal }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: monitoring
  annotations:
    description: "Allow internal monitoring namespace communication"
spec:
  description: "monitoring 내부 통신 허용 (Grafana, Prometheus, Loki, Tempo 등)"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
{{- end }}
---
# 1. Prometheus가 모든 namespace의 metrics 스크래핑 허용
{{- if .Values.allowServices.monitoring.allowScrape }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-prometheus-scrape
  annotations:
    description: "Allow Prometheus to scrape metrics from all namespaces"
spec:
  description: "Prometheus → 전체 namespace metrics 스크래핑 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            # 일반적인 metrics 포트들
            - port: "9090"   # Prometheus
              protocol: TCP
            - port: "9091"   # Pushgateway
              protocol: TCP
            - port: "9093"   # Alertmanager
              protocol: TCP
            - port: "9100"   # Node Exporter
              protocol: TCP
            - port: "9153"   # CoreDNS
              protocol: TCP
            - port: "9962"   # Cilium Agent
              protocol: TCP
            - port: "9963"   # Cilium Operator
              protocol: TCP
            - port: "9965"   # Hubble
              protocol: TCP
            - port: "15020"  # Istio Pilot
              protocol: TCP
            - port: "15090"  # Istio Envoy
              protocol: TCP
{{- end }}
---
# 2. Grafana가 Loki 접근 허용
{{- if .Values.allowServices.monitoring.allowGrafanaToLoki }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-grafana-to-loki
  namespace: monitoring
  annotations:
    description: "Allow Grafana to query Loki"
spec:
  description: "Grafana → Loki 쿼리 허용"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: loki
      toPorts:
        - ports:
            - port: "3100"   # Loki HTTP
              protocol: TCP
{{- end }}
---
# 3. Alloy/Promtail이 로그 수집을 위해 접근 허용
{{- if .Values.allowServices.monitoring.allowLogCollection }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-log-collection
  annotations:
    description: "Allow Alloy/Promtail to collect logs"
spec:
  description: "Alloy → 전체 namespace 로그 수집 허용"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "3100"   # Loki
              protocol: TCP
            - port: "4317"   # OTLP gRPC
              protocol: TCP
            - port: "4318"   # OTLP HTTP
              protocol: TCP
{{- end }}
{{- end }}
