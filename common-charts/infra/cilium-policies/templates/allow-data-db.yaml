{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
{{- if .Values.allowServices.dataDb }}
{{- if .Values.allowServices.dataDb.enabled }}
# Phase 4: data-db namespace 통신 정책
# PostgreSQL, CloudBeaver 전용
---
# 1. data-db 내부 통신 허용 (PostgreSQL Replication 등)
{{- if .Values.allowServices.dataDb.allowInternal }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: data-db
  annotations:
    description: "Allow internal data-db namespace communication"
spec:
  description: "data-db 내부 통신 허용 (PostgreSQL Replication 등)"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: data-db
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: data-db
{{- end }}
---
# 2. dev-webs에서 PostgreSQL 접근 허용
{{- if .Values.allowServices.dataDb.allowFromWebs }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-webs
  namespace: data-db
  annotations:
    description: "Allow traffic from dev-webs to PostgreSQL"
spec:
  description: "dev-webs -> data-db (PostgreSQL) 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: dev-webs
      toPorts:
        - ports:
            - port: "5432"   # PostgreSQL
              protocol: TCP
{{- end }}
---
# 3. monitoring에서 메트릭 스크래핑 허용
{{- if .Values.allowServices.dataDb.allowFromMonitoring }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-monitoring
  namespace: data-db
  annotations:
    description: "Allow Prometheus to scrape PostgreSQL metrics"
spec:
  description: "Prometheus -> data-db 메트릭 스크래핑 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9187"   # postgres_exporter
              protocol: TCP
{{- end }}
{{- end }}
{{- end }}
{{- end }}
