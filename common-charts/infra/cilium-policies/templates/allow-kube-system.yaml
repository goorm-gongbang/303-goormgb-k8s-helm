{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
# Phase 2: kube-system namespace 통신 정책
# Cilium, CoreDNS 등 핵심 인프라 통신 허용
---
# 1. Cilium Agent 간 통신 허용
{{- if .Values.allowServices.kubeSystem.allowCilium }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cilium-agent
  namespace: kube-system
  annotations:
    description: "Allow Cilium agent communication"
spec:
  description: "Cilium Agent 간 통신 허용 (health check, cluster mesh)"
  endpointSelector:
    matchLabels:
      k8s-app: cilium
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s-app: cilium
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: cilium
{{- end }}
---
# 2. Hubble Relay 통신 허용
{{- if .Values.allowServices.kubeSystem.allowHubble }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hubble
  namespace: kube-system
  annotations:
    description: "Allow Hubble communication"
spec:
  description: "Hubble Relay ↔ Agent 통신 허용"
  endpointSelector:
    matchLabels:
      k8s-app: hubble-relay
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s-app: hubble-ui
      toPorts:
        - ports:
            - port: "4245"   # Hubble Relay
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: cilium
      toPorts:
        - ports:
            - port: "4244"   # Hubble peer
              protocol: TCP
{{- end }}
{{- end }}
