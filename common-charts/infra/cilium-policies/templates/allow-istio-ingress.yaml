{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
{{- if .Values.allowServices.istioIngress }}
{{- if .Values.allowServices.istioIngress.enabled }}
# Phase 3: istio-ingress namespace 정책
# istio-ingress namespace 분리 후 활성화
---
# 1. 외부에서 IngressGateway로 들어오는 트래픽 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: {{ .Values.istioIngress.namespace }}
  annotations:
    description: "Allow external traffic to IngressGateway"
spec:
  description: "외부 트래픽 → IngressGateway 허용"
  endpointSelector:
    matchLabels:
      app: {{ .Values.istioIngress.appLabel }}
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
            - port: "15021"  # Health check
              protocol: TCP
---
# 2. IngressGateway에서 앱 namespace로 나가는 트래픽 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-apps
  namespace: {{ .Values.istioIngress.namespace }}
  annotations:
    description: "Allow IngressGateway to reach app namespaces"
spec:
  description: "IngressGateway → 앱 namespace 허용"
  endpointSelector:
    matchLabels:
      app: {{ .Values.istioIngress.appLabel }}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: dev-webs
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: dev-ai
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
---
# 3. IngressGateway에서 istiod로 통신 허용 (xDS)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-istiod
  namespace: {{ .Values.istioIngress.namespace }}
  annotations:
    description: "Allow IngressGateway to communicate with istiod"
spec:
  description: "IngressGateway → istiod (xDS) 허용"
  endpointSelector:
    matchLabels:
      app: {{ .Values.istioIngress.appLabel }}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: istio-system
            app: istiod
      toPorts:
        - ports:
            - port: "15010"  # xDS plaintext
              protocol: TCP
            - port: "15012"  # xDS TLS
              protocol: TCP
            - port: "15014"  # Control plane monitoring
              protocol: TCP
{{- end }}
{{- end }}
{{- end }}
