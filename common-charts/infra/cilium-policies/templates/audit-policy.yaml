{{- if and .Values.enabled .Values.auditMode }}
# Phase 1: Audit 모드 - 모든 트래픽 허용하면서 관측
# Hubble에서 트래픽 패턴을 파악한 후 Phase 2로 전환
#
# 확인 방법:
#   hubble observe --namespace dev-webs --follow
#   hubble observe --namespace dev-ai --follow
#
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: audit-observe-all
  annotations:
    description: "Audit mode - observe all traffic without blocking"
    phase: "1"
spec:
  description: |
    Phase 1: Audit 모드
    - 모든 트래픽 허용 (차단 없음)
    - Hubble로 실제 트래픽 패턴 관측
    - 이 정보를 기반으로 Phase 2 정책 설계
  endpointSelector: {}
  egress:
    - toEntities:
        - all
  ingress:
    - fromEntities:
        - all
{{- end }}
