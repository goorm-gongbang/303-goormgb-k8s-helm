{{- if and .Values.enabled .Values.allowServices.enabled (not .Values.auditMode) }}
{{- if .Values.allowServices.argocd }}
# argocd namespace 통신 정책
---
# 1. argocd 내부 통신 허용
{{- if .Values.allowServices.argocd.allowInternal }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: argocd
  annotations:
    description: "Allow internal argocd namespace communication"
spec:
  description: "argocd 내부 통신 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
{{- end }}
---
# 2. Istio IngressGateway에서 들어오는 트래픽 허용
{{- if .Values.allowServices.argocd.allowFromIngress }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-ingress
  namespace: argocd
  annotations:
    description: "Allow traffic from Istio IngressGateway"
spec:
  description: "Istio IngressGateway -> ArgoCD 허용"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .Values.istioIngress.namespace | default "istio-system" }}
            app: {{ .Values.istioIngress.appLabel | default "istio-ingressgateway" }}
{{- end }}
---
# 3. ArgoCD -> Kubernetes API
{{- if .Values.allowServices.argocd.allowToK8sApi }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-k8s-api
  namespace: argocd
  annotations:
    description: "Allow ArgoCD to access Kubernetes API"
spec:
  description: "ArgoCD -> Kubernetes API 허용"
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
{{- end }}
{{- end }}
{{- end }}
