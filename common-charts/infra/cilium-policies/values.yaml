# CiliumNetworkPolicy Configuration
# Phase 1: Audit 모드 (기본)
# Phase 2: 점진적 적용

# 전체 정책 활성화
enabled: true

# Audit 모드 - 차단하지 않고 로깅만 (Phase 1)
auditMode: true

# Default Deny 정책 (Phase 2+)
defaultDeny:
  enabled: false
  namespaces:
    - dev-webs
    - dev-ai
    - data

# DNS 허용 정책 (Phase 2+)
allowDns:
  enabled: false

# 서비스 간 통신 정책 (Phase 2+)
allowServices:
  enabled: false

  # dev-webs namespace 정책
  devWebs:
    # 내부 통신 허용
    allowInternal: true
    # Istio Ingress에서 들어오는 트래픽 허용
    allowFromIngress: true
    # data namespace로 나가는 트래픽 허용
    allowToData: true
    # dev-ai로 나가는 트래픽 허용
    allowToAi: true

  # dev-ai namespace 정책
  devAi:
    allowInternal: true
    allowFromWebs: true
    allowToData: true

  # data namespace 정책
  data:
    allowFromWebs: true
    allowFromAi: true
    allowInternal: true

# 서비스 간 통신: monitoring
  monitoring:
    # Prometheus scrape 허용
    allowScrape: true
    # Grafana → Loki 허용
    allowGrafanaToLoki: true
    # Alloy 로그 수집 허용
    allowLogCollection: true

  # 서비스 간 통신: kube-system
  kubeSystem:
    # Cilium Agent 간 통신
    allowCilium: true
    # Hubble 통신
    allowHubble: true

  # 외부 네트워크 접근
  external:
    # 외부 HTTPS 접근 허용 (AWS, OAuth 등)
    allowHttps: true
    # FQDN 기반 세밀한 제어
    allowFqdn: false
