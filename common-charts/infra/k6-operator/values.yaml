# k6-operator wrapper chart
# 분산 부하 테스트를 위한 k6-operator 설치

k6-operator:
  # Manager 설정
  manager:
    replicas: 1

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  # Prometheus 메트릭 활성화
  prometheus:
    enabled: true

  # ServiceMonitor 생성 (Prometheus가 k6-operator 메트릭 수집)
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus-stack

  # RBAC
  rbac:
    create: true

  # ServiceAccount
  serviceAccount:
    create: true
    name: k6-operator

# 로컬 k6에서 메트릭 전송을 위한 설정
# k6 실행 시 --out prometheus=namespace=monitoring 옵션 사용
# 또는 Remote Write 엔드포인트 사용

# Node placement
nodeSelector: {}
tolerations: []
