{{- if .Values.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: waf-lua-filter
  namespace: istio-system
  labels:
    app: istio-security
spec:
  workloadSelector:
    labels:
      {{- toYaml .Values.selector.labels | nindent 6 }}
  configPatches:
    {{- if and .Values.autoBlocklist .Values.autoBlocklist.enabled }}
    # WAF 탐지 IP 자동 등록을 위한 authz-adapter HTTP 클러스터
    - applyTo: CLUSTER
      match:
        context: GATEWAY
      patch:
        operation: ADD
        value:
          name: waf_blocklist_cluster
          type: STRICT_DNS
          connect_timeout: 0.25s
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: waf_blocklist_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.autoBlocklist.cluster.host }}
                          port_value: {{ .Values.autoBlocklist.cluster.port }}
    {{- end }}
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                -- Istio Security WAF Filter
                -- Generated by Helm chart: istio-security

                local BLOCK_MODE = {{ eq .Values.mode "block" }}
                local LOG_ENABLED = {{ .Values.logging.enabled }}
                local AUTO_BLOCKLIST = {{ and .Values.autoBlocklist .Values.autoBlocklist.enabled | ternary "true" "false" }}
                {{- if and .Values.autoBlocklist .Values.autoBlocklist.enabled }}
                local BLOCKLIST_CLUSTER = "waf_blocklist_cluster"
                local BLOCKLIST_AUTHORITY = "{{ .Values.autoBlocklist.cluster.host }}:{{ .Values.autoBlocklist.cluster.port }}"
                local BLOCKLIST_PATH = "{{ .Values.autoBlocklist.path | default "/admin/blacklist" }}"
                local BLOCKLIST_TIMEOUT_MS = {{ .Values.autoBlocklist.timeoutMs | default 200 }}
                {{- end }}

                -- 제외 경로
                local EXCLUDE_PATHS = {
                  {{- range .Values.excludePaths }}
                  "{{ . }}",
                  {{- end }}
                }

                -- IP Whitelist (정확 매칭 — 여기에 해당하면 모든 WAF 검사 bypass)
                local IP_WHITELIST = {
                  {{- range .Values.ipWhitelist }}
                  ["{{ . }}"] = true,
                  {{- end }}
                }

                -- IP Whitelist 접두사 (예: "39.119.192." 로 /24 근사)
                local IP_WHITELIST_PREFIXES = {
                  {{- range .Values.ipWhitelistPrefixes }}
                  "{{ . }}",
                  {{- end }}
                }

                -- SQL Injection 패턴
                local SQL_PATTERNS = {
                  {{- if .Values.patterns.sqlInjection.enabled }}
                  {{- range .Values.patterns.sqlInjection.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- XSS 패턴
                local XSS_PATTERNS = {
                  {{- if .Values.patterns.xss.enabled }}
                  {{- range .Values.patterns.xss.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- Path Traversal 패턴
                local PATH_PATTERNS = {
                  {{- if .Values.patterns.pathTraversal.enabled }}
                  {{- range .Values.patterns.pathTraversal.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- Command Injection 패턴
                local CMD_PATTERNS = {
                  {{- if .Values.patterns.commandInjection.enabled }}
                  {{- range .Values.patterns.commandInjection.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- LDAP Injection 패턴
                local LDAP_PATTERNS = {
                  {{- if .Values.patterns.ldapInjection.enabled }}
                  {{- range .Values.patterns.ldapInjection.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- XXE Injection 패턴
                local XXE_PATTERNS = {
                  {{- if .Values.patterns.xxeInjection.enabled }}
                  {{- range .Values.patterns.xxeInjection.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- SSRF 패턴
                local SSRF_PATTERNS = {
                  {{- if .Values.patterns.ssrf.enabled }}
                  {{- range .Values.patterns.ssrf.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- Log4Shell 패턴
                local LOG4J_PATTERNS = {
                  {{- if .Values.patterns.log4shell.enabled }}
                  {{- range .Values.patterns.log4shell.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- Header Injection 패턴
                local HEADER_PATTERNS = {
                  {{- if .Values.patterns.headerInjection.enabled }}
                  {{- range .Values.patterns.headerInjection.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- Bot/Scanner 패턴
                local BOT_PATTERNS = {
                  {{- if .Values.patterns.botScanner.enabled }}
                  {{- range .Values.patterns.botScanner.rules }}
                  { name = [=[{{ .name }}]=], pattern = [=[{{ .pattern }}]=], desc = [=[{{ .description }}]=] },
                  {{- end }}
                  {{- end }}
                }

                -- JSON 이스케이프 함수 (보안: untrusted input에 필수 적용)
                local function json_escape(str)
                  if str == nil then return "" end
                  str = tostring(str)
                  -- JSON 특수문자 이스케이프
                  str = str:gsub('\\', '\\\\')  -- 백슬래시 먼저
                  str = str:gsub('"', '\\"')   -- 큰따옴표
                  str = str:gsub('\n', '\\n')  -- 개행
                  str = str:gsub('\r', '\\r')  -- 캐리지 리턴
                  str = str:gsub('\t', '\\t')  -- 탭
                  str = str:gsub('\b', '\\b')  -- 백스페이스
                  str = str:gsub('\f', '\\f')  -- 폼피드
                  -- 제어 문자 제거 (0x00-0x1F)
                  str = str:gsub('[%c]', '')
                  return str
                end

                -- UTF-8 안전 문자열 자르기 함수 (멀티바이트 문자 경계 보호)
                local function utf8_safe_sub(str, max_bytes)
                  if str == nil or str == "" then return "" end
                  if #str <= max_bytes then return str end

                  local pos = max_bytes
                  -- UTF-8 continuation byte (10xxxxxx = 0x80-0xBF) 건너뛰기
                  while pos > 0 and str:byte(pos) >= 0x80 and str:byte(pos) <= 0xBF do
                    pos = pos - 1
                  end
                  -- 멀티바이트 시작 문자(11xxxxxx = 0xC0 이상)면 해당 문자 제외
                  if pos > 0 and str:byte(pos) >= 0xC0 then
                    pos = pos - 1
                  end
                  return str:sub(1, pos)
                end

                -- URL 디코딩 함수
                local function url_decode(str)
                  if str == nil then return "" end
                  str = string.gsub(str, "+", " ")
                  str = string.gsub(str, "%%(%x%x)", function(h)
                    return string.char(tonumber(h, 16))
                  end)
                  return str
                end

                -- 경로 제외 체크
                local function is_excluded_path(path)
                  for _, excluded in ipairs(EXCLUDE_PATHS) do
                    if string.find(path, excluded, 1, true) then
                      return true
                    end
                  end
                  return false
                end

                -- IP whitelist 체크 (정확 IP 또는 접두사 매칭)
                local function is_whitelisted_ip(client_ip)
                  if client_ip == nil or client_ip == "" or client_ip == "unknown" then
                    return false
                  end
                  if IP_WHITELIST[client_ip] then
                    return true
                  end
                  for _, prefix in ipairs(IP_WHITELIST_PREFIXES) do
                    if string.sub(client_ip, 1, #prefix) == prefix then
                      return true
                    end
                  end
                  return false
                end

                -- 패턴 매칭 함수
                local function check_patterns(input, patterns, category)
                  if input == nil or input == "" then
                    return nil
                  end

                  local decoded = url_decode(input)

                  for _, rule in ipairs(patterns) do
                    if string.match(input, rule.pattern) or string.match(decoded, rule.pattern) then
                      return {
                        category = category,
                        rule = rule.name,
                        description = rule.desc,
                        matched = input
                      }
                    end
                  end
                  return nil
                end

                -- 로그 출력 함수 (JSON 포맷, 보안 강화)
                local function log_security_event(request_handle, event_type, details, client_ip, path, blocked)
                  if not LOG_ENABLED then return end

                  -- 모든 untrusted input에 JSON 이스케이프 적용
                  local safe_client_ip = json_escape(client_ip or "unknown")
                  local safe_path = json_escape(path or "")
                  local safe_matched = json_escape(utf8_safe_sub(details.matched or "", 100))
                  local safe_description = json_escape(details.description or "")
                  local safe_rule = json_escape(details.rule or "unknown")
                  local safe_category = json_escape(details.category or "unknown")

                  local log_entry = string.format(
                    '{"timestamp":"%s","level":"warn","type":"security","event":"%s","category":"%s","rule":"%s","description":"%s","client_ip":"%s","path":"%s","blocked":%s,"matched":"%s"}',
                    os.date("!%Y-%m-%dT%H:%M:%SZ"),
                    event_type,
                    safe_category,
                    safe_rule,
                    safe_description,
                    safe_client_ip,
                    safe_path,
                    blocked and "true" or "false",
                    safe_matched
                  )

                  request_handle:logWarn(log_entry)
                end

                -- 모든 패턴 카테고리를 하나의 테이블로 통합 (리팩토링)
                local PATH_CHECK_PATTERNS = {
                  { patterns = SQL_PATTERNS, category = "SQL_INJECTION", event = "SQL_INJECTION_DETECTED" },
                  { patterns = XSS_PATTERNS, category = "XSS", event = "XSS_DETECTED" },
                  { patterns = PATH_PATTERNS, category = "PATH_TRAVERSAL", event = "PATH_TRAVERSAL_DETECTED" },
                  { patterns = CMD_PATTERNS, category = "COMMAND_INJECTION", event = "COMMAND_INJECTION_DETECTED" },
                  { patterns = LDAP_PATTERNS, category = "LDAP_INJECTION", event = "LDAP_INJECTION_DETECTED" },
                  { patterns = XXE_PATTERNS, category = "XXE_INJECTION", event = "XXE_INJECTION_DETECTED" },
                  { patterns = SSRF_PATTERNS, category = "SSRF", event = "SSRF_DETECTED" },
                  { patterns = LOG4J_PATTERNS, category = "LOG4SHELL", event = "LOG4SHELL_DETECTED" },
                  { patterns = HEADER_PATTERNS, category = "HEADER_INJECTION", event = "HEADER_INJECTION_DETECTED" },
                }

                local HEADER_CHECK_PATTERNS = {
                  { patterns = BOT_PATTERNS, category = "BOT_SCANNER", event = "BOT_SCANNER_DETECTED" },
                  { patterns = LOG4J_PATTERNS, category = "LOG4SHELL", event = "LOG4SHELL_DETECTED" },
                  { patterns = XSS_PATTERNS, category = "XSS", event = "XSS_DETECTED" },
                }


                {{- if and .Values.autoBlocklist .Values.autoBlocklist.enabled }}
                -- 자동 blacklist 대상 카테고리 (FP 위험 낮은 것만 — 단일 탐지 시 즉시 등록)
                local AUTO_BLOCK_CATEGORIES = {
                  {{- range .Values.autoBlocklist.categories }}
                  ["{{ . }}"] = true,
                  {{- end }}
                }

                {{- $thr := .Values.autoBlocklist.threshold | default dict }}
                {{- if and $thr.enabled $thr.categories }}
                -- Threshold 기반 카테고리 (윈도우 내 N회 탐지 후 등록 — FP 위험 중간)
                local THRESHOLD_CATEGORIES = {
                  {{- range $thr.categories }}
                  ["{{ . }}"] = true,
                  {{- end }}
                }
                local THRESHOLD_WINDOW = {{ $thr.windowSeconds | default 300 }}
                local THRESHOLD_COUNT = {{ $thr.count | default 3 }}

                -- IP+category 별 탐지 카운터 (메모리 기반, pod 재시작 시 초기화)
                local waf_counters = {}
                local WAF_ENTRY_TTL = THRESHOLD_WINDOW * 2
                local waf_last_gc = os.time()
                local WAF_GC_INTERVAL = 30

                local function waf_gc_expired()
                  local now = os.time()
                  if now - waf_last_gc < WAF_GC_INTERVAL then return end
                  waf_last_gc = now
                  local to_delete = {}
                  for key, c in pairs(waf_counters) do
                    if now - c.last_seen > WAF_ENTRY_TTL then
                      table.insert(to_delete, key)
                    end
                  end
                  for _, k in ipairs(to_delete) do waf_counters[k] = nil end
                end

                -- 탐지 카운트 증가 및 threshold 초과 여부 반환
                local function bump_threshold(client_ip, category)
                  waf_gc_expired()
                  local now = os.time()
                  local key = client_ip .. ":" .. category
                  local c = waf_counters[key]
                  if c == nil or (now - c.window_start) >= THRESHOLD_WINDOW then
                    waf_counters[key] = { count = 1, window_start = now, last_seen = now }
                    return false, 1
                  end
                  c.count = c.count + 1
                  c.last_seen = now
                  if c.count >= THRESHOLD_COUNT then
                    waf_counters[key] = nil  -- 등록 후 리셋 (재등록 방지)
                    return true, c.count
                  end
                  return false, c.count
                end
                {{- else }}
                local THRESHOLD_CATEGORIES = {}
                local function bump_threshold(_, _) return false, 0 end
                {{- end }}

                -- adapter에 IP blacklist 등록 요청 (async, fire-and-forget)
                local function send_to_blocklist(request_handle, client_ip, match, path)
                  if not AUTO_BLOCKLIST then return end
                  if client_ip == nil or client_ip == "" or client_ip == "unknown" then return end

                  local cat = match.category
                  if AUTO_BLOCK_CATEGORIES[cat] then
                    -- 고신뢰: 단일 탐지 즉시 등록
                  elseif THRESHOLD_CATEGORIES[cat] then
                    -- 중간신뢰: threshold 초과 시에만
                    local exceeded, _ = bump_threshold(client_ip, cat)
                    if not exceeded then return end
                  else
                    return
                  end

                  local reason = "waf:" .. (match.category or "unknown") .. ":" .. (match.rule or "unknown")
                  local body = string.format(
                    '{"ip":"%s","reason":"%s","source":"waf","category":"%s","rule":"%s","path":"%s","matched":"%s"}',
                    json_escape(client_ip),
                    json_escape(reason),
                    json_escape(match.category or ""),
                    json_escape(match.rule or ""),
                    json_escape(path or ""),
                    json_escape(utf8_safe_sub(match.matched or "", 100))
                  )

                  pcall(function()
                    request_handle:httpCall(
                      BLOCKLIST_CLUSTER,
                      {
                        [":method"] = "POST",
                        [":path"] = BLOCKLIST_PATH,
                        [":authority"] = BLOCKLIST_AUTHORITY,
                        ["content-type"] = "application/json",
                      },
                      body,
                      BLOCKLIST_TIMEOUT_MS,
                      true  -- asynchronous: respond에 영향 X
                    )
                  end)
                end
                {{- else }}
                local function send_to_blocklist(_, _, _, _) end
                {{- end }}

                -- 공통 패턴 검사 및 응답 함수
                local function check_and_respond(request_handle, input, pattern_list, client_ip, path)
                  for _, p in ipairs(pattern_list) do
                    local match = check_patterns(input, p.patterns, p.category)
                    if match then
                      log_security_event(request_handle, p.event, match, client_ip, path, BLOCK_MODE)
                      if BLOCK_MODE then
                        send_to_blocklist(request_handle, client_ip, match, path)
                        request_handle:respond(
                          {[":status"] = "{{ .Values.response.statusCode }}"},
                          "{{ .Values.response.body }}"
                        )
                        return true  -- 차단됨
                      end
                      -- detect 모드에서는 계속 검사 (모든 패턴 로깅)
                    end
                  end
                  return false  -- 차단 안됨
                end

                function envoy_on_request(request_handle)
                  local headers = request_handle:headers()
                  local path = headers:get(":path") or ""
                  local method = headers:get(":method") or ""
                  local client_ip = headers:get("x-forwarded-for") or headers:get("x-real-ip") or "unknown"

                  -- 첫 번째 IP만 추출 (X-Forwarded-For는 쉼표로 구분)
                  client_ip = string.match(client_ip, "([^,]+)")
                  -- 앞뒤 공백 제거 (x-forwarded-for: "ip1, ip2" 포맷 대응)
                  if client_ip then
                    client_ip = string.match(client_ip, "^%s*(.-)%s*$")
                  end

                  -- IP Whitelist: 등록된 IP는 WAF 전부 bypass
                  if is_whitelisted_ip(client_ip) then
                    return
                  end

                  -- 제외 경로 체크
                  if is_excluded_path(path) then
                    return
                  end

                  -- Path/Query String 검사
                  if check_and_respond(request_handle, path, PATH_CHECK_PATTERNS, client_ip, path) then
                    return
                  end

                  -- User-Agent 헤더 검사
                  local user_agent = headers:get("user-agent") or ""
                  if check_and_respond(request_handle, user_agent, HEADER_CHECK_PATTERNS, client_ip, path) then
                    return
                  end

                  -- Referer 헤더 검사
                  local referer = headers:get("referer") or ""
                  if referer ~= "" then
                    if check_and_respond(request_handle, referer, PATH_CHECK_PATTERNS, client_ip, path) then
                      return
                    end
                  end

                end
{{- end }}
