{{- if .Values.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: waf-lua-filter
  namespace: istio-system
  labels:
    app: istio-security
spec:
  workloadSelector:
    labels:
      {{- toYaml .Values.selector.labels | nindent 6 }}
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                -- Istio Security WAF Filter
                -- Generated by Helm chart: istio-security

                local BLOCK_MODE = {{ eq .Values.mode "block" }}
                local LOG_ENABLED = {{ .Values.logging.enabled }}

                -- 제외 경로
                local EXCLUDE_PATHS = {
                  {{- range .Values.excludePaths }}
                  "{{ . }}",
                  {{- end }}
                }

                -- SQL Injection 패턴
                local SQL_PATTERNS = {
                  {{- if .Values.patterns.sqlInjection.enabled }}
                  {{- range .Values.patterns.sqlInjection.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- XSS 패턴
                local XSS_PATTERNS = {
                  {{- if .Values.patterns.xss.enabled }}
                  {{- range .Values.patterns.xss.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- Path Traversal 패턴
                local PATH_PATTERNS = {
                  {{- if .Values.patterns.pathTraversal.enabled }}
                  {{- range .Values.patterns.pathTraversal.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- Command Injection 패턴
                local CMD_PATTERNS = {
                  {{- if .Values.patterns.commandInjection.enabled }}
                  {{- range .Values.patterns.commandInjection.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- LDAP Injection 패턴
                local LDAP_PATTERNS = {
                  {{- if .Values.patterns.ldapInjection.enabled }}
                  {{- range .Values.patterns.ldapInjection.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- XXE Injection 패턴
                local XXE_PATTERNS = {
                  {{- if .Values.patterns.xxeInjection.enabled }}
                  {{- range .Values.patterns.xxeInjection.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- SSRF 패턴
                local SSRF_PATTERNS = {
                  {{- if .Values.patterns.ssrf.enabled }}
                  {{- range .Values.patterns.ssrf.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- Log4Shell 패턴
                local LOG4J_PATTERNS = {
                  {{- if .Values.patterns.log4shell.enabled }}
                  {{- range .Values.patterns.log4shell.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- Header Injection 패턴
                local HEADER_PATTERNS = {
                  {{- if .Values.patterns.headerInjection.enabled }}
                  {{- range .Values.patterns.headerInjection.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- Bot/Scanner 패턴
                local BOT_PATTERNS = {
                  {{- if .Values.patterns.botScanner.enabled }}
                  {{- range .Values.patterns.botScanner.rules }}
                  { name = "{{ .name }}", pattern = "{{ .pattern }}", desc = "{{ .description }}" },
                  {{- end }}
                  {{- end }}
                }

                -- URL 디코딩 함수
                local function url_decode(str)
                  if str == nil then return "" end
                  str = string.gsub(str, "+", " ")
                  str = string.gsub(str, "%%(%x%x)", function(h)
                    return string.char(tonumber(h, 16))
                  end)
                  return str
                end

                -- 경로 제외 체크
                local function is_excluded_path(path)
                  for _, excluded in ipairs(EXCLUDE_PATHS) do
                    if string.find(path, excluded, 1, true) then
                      return true
                    end
                  end
                  return false
                end

                -- 패턴 매칭 함수
                local function check_patterns(input, patterns, category)
                  if input == nil or input == "" then
                    return nil
                  end

                  local decoded = url_decode(input)

                  for _, rule in ipairs(patterns) do
                    if string.match(input, rule.pattern) or string.match(decoded, rule.pattern) then
                      return {
                        category = category,
                        rule = rule.name,
                        description = rule.desc,
                        matched = input
                      }
                    end
                  end
                  return nil
                end

                -- 로그 출력 함수 (JSON 포맷)
                local function log_security_event(request_handle, event_type, details, client_ip, path, blocked)
                  if not LOG_ENABLED then return end

                  local log_entry = string.format(
                    '{"timestamp":"%s","level":"warn","type":"security","event":"%s","category":"%s","rule":"%s","description":"%s","client_ip":"%s","path":"%s","blocked":%s,"matched":"%s"}',
                    os.date("!%Y-%m-%dT%H:%M:%SZ"),
                    event_type,
                    details.category or "unknown",
                    details.rule or "unknown",
                    details.description or "",
                    client_ip or "unknown",
                    path or "",
                    blocked and "true" or "false",
                    (details.matched or ""):gsub('"', '\\"'):sub(1, 100)
                  )

                  request_handle:logWarn(log_entry)
                end

                function envoy_on_request(request_handle)
                  local headers = request_handle:headers()
                  local path = headers:get(":path") or ""
                  local method = headers:get(":method") or ""
                  local client_ip = headers:get("x-forwarded-for") or headers:get("x-real-ip") or "unknown"

                  -- 첫 번째 IP만 추출 (X-Forwarded-For는 쉼표로 구분)
                  client_ip = string.match(client_ip, "([^,]+)")

                  -- 제외 경로 체크
                  if is_excluded_path(path) then
                    return
                  end

                  -- 검사 대상: path + query string
                  local check_target = path

                  -- SQL Injection 체크
                  local sql_match = check_patterns(check_target, SQL_PATTERNS, "SQL_INJECTION")
                  if sql_match then
                    log_security_event(request_handle, "SQL_INJECTION_DETECTED", sql_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- XSS 체크
                  local xss_match = check_patterns(check_target, XSS_PATTERNS, "XSS")
                  if xss_match then
                    log_security_event(request_handle, "XSS_DETECTED", xss_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- Path Traversal 체크
                  local path_match = check_patterns(check_target, PATH_PATTERNS, "PATH_TRAVERSAL")
                  if path_match then
                    log_security_event(request_handle, "PATH_TRAVERSAL_DETECTED", path_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- Command Injection 체크
                  local cmd_match = check_patterns(check_target, CMD_PATTERNS, "COMMAND_INJECTION")
                  if cmd_match then
                    log_security_event(request_handle, "COMMAND_INJECTION_DETECTED", cmd_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- LDAP Injection 체크
                  local ldap_match = check_patterns(check_target, LDAP_PATTERNS, "LDAP_INJECTION")
                  if ldap_match then
                    log_security_event(request_handle, "LDAP_INJECTION_DETECTED", ldap_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- XXE Injection 체크
                  local xxe_match = check_patterns(check_target, XXE_PATTERNS, "XXE_INJECTION")
                  if xxe_match then
                    log_security_event(request_handle, "XXE_INJECTION_DETECTED", xxe_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- SSRF 체크
                  local ssrf_match = check_patterns(check_target, SSRF_PATTERNS, "SSRF")
                  if ssrf_match then
                    log_security_event(request_handle, "SSRF_DETECTED", ssrf_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- Log4Shell 체크
                  local log4j_match = check_patterns(check_target, LOG4J_PATTERNS, "LOG4SHELL")
                  if log4j_match then
                    log_security_event(request_handle, "LOG4SHELL_DETECTED", log4j_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- Header Injection 체크
                  local header_match = check_patterns(check_target, HEADER_PATTERNS, "HEADER_INJECTION")
                  if header_match then
                    log_security_event(request_handle, "HEADER_INJECTION_DETECTED", header_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end

                  -- Bot/Scanner 체크 (User-Agent 헤더)
                  local user_agent = headers:get("user-agent") or ""
                  local bot_match = check_patterns(user_agent, BOT_PATTERNS, "BOT_SCANNER")
                  if bot_match then
                    log_security_event(request_handle, "BOT_SCANNER_DETECTED", bot_match, client_ip, path, BLOCK_MODE)
                    if BLOCK_MODE then
                      request_handle:respond(
                        {[":status"] = "{{ .Values.response.statusCode }}"},
                        "{{ .Values.response.body }}"
                      )
                      return
                    end
                  end
                end
{{- end }}
