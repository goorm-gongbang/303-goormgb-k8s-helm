{{- if and .Values.enabled .Values.adminTools .Values.adminTools.ipWhitelist .Values.adminTools.ipWhitelist.enabled }}
# Admin Tools IP Whitelist
# CloudBeaver, Kafka-UI, Prometheus 등 관리 도구 접근 제한
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: admin-tools-ip-whitelist
  namespace: istio-system
  labels:
    app: istio-security
    component: admin-tools-whitelist
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: DENY
  rules:
    - from:
        - source:
            notIpBlocks:
              {{- range .Values.adminTools.ipWhitelist.allowedIPs }}
              - "{{ . }}/32"
              {{- end }}
      to:
        - operation:
            hosts:
              {{- range .Values.adminTools.ipWhitelist.protectedHosts }}
              - {{ . | quote }}
              {{- end }}
{{- end }}
