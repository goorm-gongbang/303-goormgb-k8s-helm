{{- if and .Values.mtls .Values.mtls.enabled }}
# Mesh-wide mTLS 설정
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: {{ .Values.mtls.mode | default "STRICT" }}
---
# 각 네임스페이스별 mTLS (명시적 설정)
{{- range $ns := .Values.mtls.namespaces | default (list "staging-webs" "monitoring") }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ $ns }}
spec:
  mtls:
    mode: {{ $.Values.mtls.mode | default "STRICT" }}
---
{{- end }}
{{- end }}
{{- if and .Values.mtls .Values.mtls.metricsScrapeExceptions }}
# App 서비스 - Prometheus 메트릭 스크래핑 예외 설정
{{- range $svc := .Values.mtls.metricsScrapeExceptions }}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ $svc.name }}
  namespace: {{ $svc.namespace | default "staging-webs" }}
spec:
  selector:
    matchLabels:
      {{- toYaml $svc.selector | nindent 6 }}
  mtls:
    mode: STRICT
  portLevelMtls:
    {{ $svc.metricsPort }}:
      mode: {{ $svc.mode | default "DISABLE" }}
{{- end }}
{{- end }}
{{- if and .Values.mtls .Values.mtls.otelCollector .Values.mtls.otelCollector.enabled }}
# OTEL Collector - mTLS PERMISSIVE 설정
# OTEL Java agent는 Istio sidecar를 거치지 않고 직접 연결하므로
# plain HTTP 연결도 허용해야 함
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: otel-collector
  namespace: {{ .Values.mtls.otelCollector.namespace | default "monitoring" }}
spec:
  selector:
    matchLabels:
      {{- toYaml .Values.mtls.otelCollector.selector | nindent 6 }}
  mtls:
    mode: PERMISSIVE
  portLevelMtls:
    4317:
      mode: PERMISSIVE
    4318:
      mode: PERMISSIVE
{{- end }}
{{- if and .Values.mtls .Values.mtls.aiServices .Values.mtls.aiServices.enabled }}
# AI 서비스 - Prometheus 메트릭 스크래핑을 위한 PERMISSIVE 설정
{{- range $svc := .Values.mtls.aiServices.services }}
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.mtls.aiServices.namespace | default "staging-ai" }}
spec:
  selector:
    matchLabels:
      {{- toYaml $svc.selector | nindent 6 }}
  mtls:
    mode: STRICT
  portLevelMtls:
    {{ $svc.metricsPort }}:
      mode: PERMISSIVE
{{- end }}
{{- end }}
