apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus-stack.fullname" . }}-dashboards-infra-team-cicd
  labels:
    {{- include "prometheus-stack.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "인프라팀/CI-CD"
data:
  {{- $files := .Files.Glob "files/grafana-dashboards/infra-team-observability/cicd/*.json" }}
  {{- range $path, $_ := $files }}
  {{ base $path }}: |-
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
