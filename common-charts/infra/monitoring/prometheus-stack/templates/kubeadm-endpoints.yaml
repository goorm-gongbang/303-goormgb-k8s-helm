# kubeadm 컨트롤 플레인 Endpoints
# kube-prometheus-stack이 Service는 생성하지만 kubeadm에서는 Endpoints가 자동 생성되지 않음
{{- if .Values.kubeadm }}
{{- if .Values.kubeadm.enabled }}
{{- $cpIP := .Values.kubeadm.controlPlaneIP }}

# Etcd Endpoints
{{- if (index .Values "kube-prometheus-stack" "kubeEtcd" "enabled") }}
apiVersion: v1
kind: Endpoints
metadata:
  name: prom-kube-etcd
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-etcd
    release: prometheus-stack
subsets:
  - addresses:
      - ip: {{ $cpIP }}
    ports:
      - name: http-metrics
        port: {{ (index .Values "kube-prometheus-stack" "kubeEtcd" "service" "port") | default 2381 }}
{{- end }}
---
# Kube Controller Manager Endpoints
{{- if (index .Values "kube-prometheus-stack" "kubeControllerManager" "enabled") }}
apiVersion: v1
kind: Endpoints
metadata:
  name: prom-kube-controller-manager
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-controller-manager
    release: prometheus-stack
subsets:
  - addresses:
      - ip: {{ $cpIP }}
    ports:
      - name: http-metrics
        port: {{ (index .Values "kube-prometheus-stack" "kubeControllerManager" "service" "port") | default 10257 }}
{{- end }}
---
# Kube Scheduler Endpoints
{{- if (index .Values "kube-prometheus-stack" "kubeScheduler" "enabled") }}
apiVersion: v1
kind: Endpoints
metadata:
  name: prom-kube-scheduler
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-scheduler
    release: prometheus-stack
subsets:
  - addresses:
      - ip: {{ $cpIP }}
    ports:
      - name: http-metrics
        port: {{ (index .Values "kube-prometheus-stack" "kubeScheduler" "service" "port") | default 10259 }}
{{- end }}

{{- end }}
{{- end }}
