{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/security-ops/*.json" -}}
{{- $enabled := false -}}
{{- $folderName := "DEV 보안 모니터링" -}}
{{- if and .Values.dashboards .Values.dashboards.securityOps -}}
{{- $enabled = .Values.dashboards.securityOps.enabled | default false -}}
{{- $folderName = .Values.dashboards.securityOps.folderName | default "DEV 보안 모니터링" -}}
{{- end -}}
{{- if and $enabled (gt (len $dashboardFiles) 0) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-security-ops
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
{{- range $path, $_ := $dashboardFiles }}
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
