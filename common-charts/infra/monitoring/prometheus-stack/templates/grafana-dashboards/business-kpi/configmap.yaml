{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/business-kpi/*.json" -}}
{{- if and (dig "dashboards" "businessKpi" "enabled" false .Values) (gt (len $dashboardFiles) 0) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-business-kpi
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "알람 현황판"
data:
{{- range $path, $_ := $dashboardFiles }}
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
