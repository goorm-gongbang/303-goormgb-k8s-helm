{{- if and .Values.dashboards .Values.dashboards.infraTeam .Values.dashboards.infraTeam.cdnFolderName -}}
{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/infra-team-observability/cdn/*.json" -}}
{{- $folderName := .Values.dashboards.infraTeam.cdnFolderName -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-infra-team-cdn
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
{{- range $path, $_ := $dashboardFiles }}
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
