{{- $folderName := "DEV CICD 모니터링" -}}
{{- if and .Values.dashboards .Values.dashboards.infraTeam .Values.dashboards.infraTeam.cicdFolderName -}}
{{- $folderName = .Values.dashboards.infraTeam.cicdFolderName -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboards-infra-team-cicd
  namespace: {{ .Release.Namespace }}
  labels:
    app: prometheus-stack
    release: {{ .Release.Name }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
  {{- $files := .Files.Glob "files/grafana-dashboards/infra-team-observability/cicd/*.json" }}
  {{- range $path, $_ := $files }}
  {{ base $path }}: |-
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
