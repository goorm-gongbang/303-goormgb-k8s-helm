{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/infra-team-observability/infra/*.json" -}}
{{- $excludeList := list -}}
{{- if and .Values.dashboards .Values.dashboards.infraTeam -}}
{{- $excludeList = .Values.dashboards.infraTeam.exclude | default list -}}
{{- end -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-infra-team-infra
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "플랫폼 관측 (인프라)"
data:
{{- range $path, $_ := $dashboardFiles }}
{{- $filename := base $path -}}
{{- if not (has $filename $excludeList) }}
  {{ $filename }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
