{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/infra-team-observability/staging/*.json" -}}
{{- $folderName := "STAGING 플랫폼 관측(인프라)" -}}
{{- if and .Values.dashboards .Values.dashboards.infraTeam -}}
{{- $folderName = .Values.dashboards.infraTeam.stagingFolderName | default "STAGING 플랫폼 관측(인프라)" -}}
{{- end -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-infra-team-staging
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
{{- range $path, $_ := $dashboardFiles }}
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
