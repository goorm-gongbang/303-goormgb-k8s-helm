{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/business-pm-observability/*.json" -}}
{{- $folderName := "DEV 사용자 행동 분석(PM)" -}}
{{- if and .Values.dashboards .Values.dashboards.businessPm .Values.dashboards.businessPm.folderName -}}
{{- $folderName = .Values.dashboards.businessPm.folderName -}}
{{- end -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-business-pm
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
{{- range $path, $_ := $dashboardFiles }}
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
