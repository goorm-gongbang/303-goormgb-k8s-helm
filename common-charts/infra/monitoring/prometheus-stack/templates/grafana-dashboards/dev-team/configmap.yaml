{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/dev-team-observability/*.json" -}}
{{- $excludeList := dig "dashboards" "devTeam" "exclude" list .Values -}}
{{- $namespacePattern := dig "dashboards" "devTeam" "namespacePattern" "dev-webs" .Values -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-dev-team-observability
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "서비스 관측 (개발)"
data:
{{- range $path, $_ := $dashboardFiles }}
{{- $filename := base $path -}}
{{- if not (has $filename $excludeList) }}
  {{ $filename }}: |-
{{ $.Files.Get $path | replace "__NAMESPACE_PATTERN__" $namespacePattern | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
