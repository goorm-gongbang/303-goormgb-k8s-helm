{{- $dashboardFiles := .Files.Glob "files/grafana-dashboards/dev-team-observability/*.json" -}}
{{- $excludeList := list -}}
{{- $namespacePattern := "dev-webs" -}}
{{- $defaultNamespace := "dev-webs" -}}
{{- $namespaceRegex := "/(dev-webs)/" -}}
{{- $redisClusterPattern := "goormgb-.*" -}}
{{- $dbInstancePattern := "goormgb-dev-postgresql" -}}
{{- $awsAccountId := "" -}}
{{- $folderName := "DEV 서비스 관측(개발)" -}}
{{- if and .Values.dashboards .Values.dashboards.devTeam -}}
{{- $excludeList = .Values.dashboards.devTeam.exclude | default list -}}
{{- $namespacePattern = .Values.dashboards.devTeam.namespacePattern | default "dev-webs" -}}
{{- $defaultNamespace = .Values.dashboards.devTeam.defaultNamespace | default $namespacePattern -}}
{{- $namespaceRegex = .Values.dashboards.devTeam.namespaceRegex | default (printf "/(%s)/" $namespacePattern) -}}
{{- $redisClusterPattern = .Values.dashboards.devTeam.redisClusterPattern | default "goormgb-.*" -}}
{{- $dbInstancePattern = .Values.dashboards.devTeam.dbInstancePattern | default "goormgb-dev-postgresql" -}}
{{- $awsAccountId = .Values.dashboards.devTeam.awsAccountId | default "" -}}
{{- $folderName = .Values.dashboards.devTeam.folderName | default "DEV 서비스 관측(개발)" -}}
{{- end -}}
{{- if gt (len $dashboardFiles) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-dev-team-observability
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monitoring
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $folderName | quote }}
data:
{{- range $path, $_ := $dashboardFiles }}
{{- $filename := base $path -}}
{{- if not (has $filename $excludeList) }}
  {{ $filename }}: |-
{{ $.Files.Get $path | replace "__NAMESPACE_PATTERN__" $namespacePattern | replace "__DEFAULT_NAMESPACE__" $defaultNamespace | replace "__NAMESPACE_REGEX__" $namespaceRegex | replace "__REDIS_CLUSTER_PATTERN__" $redisClusterPattern | replace "__DB_INSTANCE_PATTERN__" $dbInstancePattern | replace "__AWS_ACCOUNT_ID__" $awsAccountId | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
