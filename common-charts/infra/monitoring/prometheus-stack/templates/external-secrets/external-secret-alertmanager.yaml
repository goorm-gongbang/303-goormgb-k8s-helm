{{- if .Values.alertmanager.discord.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-webhooks
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord-webhooks
  data:
    - secretKey: critical-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: criticalWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: warning-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: warningWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: info-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: infoWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: security-critical-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: securityCriticalWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: security-warning-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: securityWarningWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: security-info-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: securityInfoWebhookUrl
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
