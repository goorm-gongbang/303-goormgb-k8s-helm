{{- if .Values.grafana.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
  data:
    - secretKey: admin-user
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: {{ .Values.grafana.eso.secretManagerKey }}
        metadataPolicy: None
        property: username
    - secretKey: admin-password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: {{ .Values.grafana.eso.secretManagerKey }}
        metadataPolicy: None
        property: password
{{- end }}
{{- if .Values.grafana.eso.oauthSecretManagerKey }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-oauth-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: google-oauth-credentials
    template:
      mergePolicy: Merge
      data:
        {{- if .Values.grafana.eso.oauthAllowInsecureEmailLookup }}
        GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP: "true"
        {{- end }}
  data:
    - secretKey: GF_AUTH_GOOGLE_CLIENT_ID
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: {{ .Values.grafana.eso.oauthSecretManagerKey }}
        metadataPolicy: None
        property: clientId
    - secretKey: GF_AUTH_GOOGLE_CLIENT_SECRET
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: {{ .Values.grafana.eso.oauthSecretManagerKey }}
        metadataPolicy: None
        property: clientSecret
{{- end }}
