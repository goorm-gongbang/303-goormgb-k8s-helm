# Calico Felix PodMonitor - Felix 메트릭 수집
# Felix는 각 노드에서 실행되며 9091 포트로 메트릭 노출
# DaemonSet이므로 ServiceMonitor 대신 PodMonitor 사용
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: calico-felix
  namespace: {{ .Release.Namespace }}
  labels:
    app: calico-felix
    release: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      k8s-app: calico-node
  namespaceSelector:
    matchNames:
      - calico-system
  podMetricsEndpoints:
    - port: "9091"
      interval: 30s
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        # instance를 "node명 (IP:port)" 형식으로 변경
        - sourceLabels: [__meta_kubernetes_pod_node_name, __address__]
          separator: " ("
          replacement: "$1$2)"
          targetLabel: instance
