{{- if .Values.gateway.grafana.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: grafana-vs
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - {{ .Values.gateway.grafana.host | quote }}
  gateways:
    - istio-system/goormgb-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ (index .Values "kube-prometheus-stack" "grafana" "fullnameOverride") | default (printf "%s-grafana" .Release.Name) }}
            port:
              number: 80
{{- end }}
