{{- if .Values.alertmanager.discord.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord-webhook
  data:
    # Critical 알람용 (#alerts-critical)
    - secretKey: critical-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: criticalWebhookUrl
    # Warning 알람용 (#alerts-warning)
    - secretKey: warning-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: warningWebhookUrl
    # Info 알람용 (#alerts-info)
    - secretKey: info-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: infoWebhookUrl
{{- end }}
