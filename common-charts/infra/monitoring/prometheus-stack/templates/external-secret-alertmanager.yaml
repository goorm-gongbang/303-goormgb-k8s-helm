{{- if .Values.alertmanager.discord.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord-webhooks
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-discord-webhooks
  data:
    - secretKey: critical-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: criticalWebhookUrl
    - secretKey: warning-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: warningWebhookUrl
    - secretKey: info-webhook-url
      remoteRef:
        key: {{ .Values.alertmanager.discord.eso.secretManagerKey }}
        property: infoWebhookUrl
{{- end }}
