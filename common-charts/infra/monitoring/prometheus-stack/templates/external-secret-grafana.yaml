{{- if .Values.grafana.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
  data:
    - secretKey: admin-user
      remoteRef:
        key: {{ .Values.grafana.eso.secretManagerKey }}
        property: username
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.grafana.eso.secretManagerKey }}
        property: password
{{- end }}
