# Default values for prometheus-stack wrapper
# These can be overridden by environment-specific values

kube-prometheus-stack:
  # CRD는 302-goormgb-k8s-bootstrap에서 별도 설치 (annotation 크기 제한 문제 회피)
  crds:
    enabled: false

  # Prometheus
  prometheus:
    prometheusSpec:
      # 모든 namespace의 ServiceMonitor/PodMonitor 수집
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      retention: 15d
      retentionSize: "10GB"

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  # Grafana
  grafana:
    enabled: true
    # adminPassword는 existingSecret 사용 시 무시됨

    # Sidecar 설정 - ConfigMap에서 대시보드 자동 로드
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: false
          allowUiUpdates: true

    persistence:
      enabled: true
      size: 5Gi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # 추가 datasource (Loki, Jaeger)
    additionalDataSources: []

    # 대시보드 - kube-prometheus-stack 기본 대시보드 사용
    # custom dashboards가 필요하면 configMap으로 마운트 후 아래 설정 추가
    # dashboardProviders: {}
    # dashboardsConfigMaps: {}

  # AlertManager
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    config:
      global:
        resolve_timeout: 5m

      route:
        group_by: ['alertname', 'namespace', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'discord-notifications'
        routes:
          - receiver: 'discord-notifications'
            matchers:
              - severity =~ "critical|warning"

      receivers:
        - name: 'discord-notifications'
          discord_configs:
            - webhook_url: 'https://discord.com/api/webhooks/1480147981414957128/tCmoOt1d1ZUGmbaFET-QIveQq64kZ4Vlo4U700Ax8p-WiOt4km2SzSgyugFWiQKa0j1V'
              title: '{{ if eq .Status "firing" }}🚨 Alert{{ else }}✅ Resolved{{ end }}'
              message: |
                **{{ .CommonLabels.alertname }}**
                {{ range .Alerts }}
                • 상태: {{ .Status }}
                • 심각도: {{ .Labels.severity }}
                • 네임스페이스: {{ .Labels.namespace }}
                • 설명: {{ .Annotations.description }}
                {{ end }}

  # Node Exporter (모든 노드에서 실행)
  nodeExporter:
    enabled: true

  # Kube State Metrics
  kubeStateMetrics:
    enabled: true

# Grafana ESO 설정
grafana:
  eso:
    enabled: false
    secretManagerKey: ""  # 예: dev/monitoring/grafana

# Istio Gateway 설정
gateway:
  grafana:
    enabled: false
    host: ""
  prometheus:
    enabled: false
    host: ""

# Alert Rules (PrometheusRule CRD)
alertRules:
  enabled: true

# Node placement
nodeSelector: {}
tolerations: []
