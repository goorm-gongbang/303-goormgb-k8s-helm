{{- if .Values.faro.virtualService.enabled }}
# Faro VirtualService - api-{env}.playball.one/faro/* 라우팅
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: faro-receiver
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    {{- if .Values.faro.virtualService.hosts }}
    {{- range .Values.faro.virtualService.hosts }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    - {{ .Values.faro.virtualService.host | quote }}
    {{- end }}
  gateways:
    - {{ .Values.faro.virtualService.gateway }}
  http:
    # /faro/* → Alloy Faro Receiver
    - match:
        - uri:
            prefix: /faro
      rewrite:
        uri: /collect
      corsPolicy:
        allowOrigins:
          {{- range .Values.faro.cors.allowOrigins }}
          - exact: {{ . | quote }}
          {{- end }}
        allowMethods:
          - POST
          - OPTIONS
        allowHeaders:
          - content-type
          - x-faro-session-id
        allowCredentials: true
        maxAge: "24h"
      route:
        - destination:
            host: {{ .Values.faro.virtualService.destinationHost | default "alloy" }}.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: 12347
{{- end }}
