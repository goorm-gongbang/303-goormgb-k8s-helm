apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    app: clickhouse
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: native
      port: {{ .Values.service.nativePort }}
      targetPort: native
      protocol: TCP
  selector:
    app: clickhouse
