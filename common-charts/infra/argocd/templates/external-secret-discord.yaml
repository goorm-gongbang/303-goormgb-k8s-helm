{{- if and .Values.notifications.enabled .Values.notifications.discord.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: argocd-notifications-secret
  data:
    # 앱 배포 알림용 (web, ai 등)
    - secretKey: discord-webhook-url
      remoteRef:
        key: {{ .Values.notifications.discord.eso.secretManagerKey }}
        property: {{ .Values.notifications.discord.eso.propertyPrefix | default "" }}discord-webhook-url
    # 인프라 배포 알림용
    - secretKey: discord-webhook-infra-url
      remoteRef:
        key: {{ .Values.notifications.discord.eso.secretManagerKey }}
        property: {{ .Values.notifications.discord.eso.propertyPrefix | default "" }}discord-webhook-infra-url
{{- end }}
