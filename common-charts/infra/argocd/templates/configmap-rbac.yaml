{{- if or .Values.rbac.policy .Values.rbac.eso.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: {{ .Values.rbac.defaultPolicy | default "role:none" | quote }}
  {{- if .Values.rbac.eso.enabled }}
  {{- $secret := lookup "v1" "Secret" "argocd" "argocd-rbac-eso" }}
  {{- if $secret }}
  policy.csv: {{ index $secret.data "policy_csv" | b64dec | quote }}
  {{- else }}
  # ESO Secret이 아직 생성되지 않음 - 재배포 필요
  policy.csv: ""
  {{- end }}
  {{- else }}
  policy.csv: |
{{ .Values.rbac.policy | indent 4 }}
  {{- end }}
  scopes: '[email]'
{{- end }}
