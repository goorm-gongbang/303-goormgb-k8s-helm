{{- if .Values.rbac.eso.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-rbac-eso
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-rbac-eso
  data:
    - secretKey: policy_csv
      remoteRef:
        key: {{ .Values.rbac.eso.secretManagerKey }}
        property: policy_csv
{{- end }}
