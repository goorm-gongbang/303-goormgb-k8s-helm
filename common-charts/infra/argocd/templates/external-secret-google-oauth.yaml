{{- if .Values.oidc.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidcGoogleClientId
      remoteRef:
        key: {{ .Values.oidc.secretManagerKey }}
        property: clientId
    - secretKey: oidcGoogleClientSecret
      remoteRef:
        key: {{ .Values.oidc.secretManagerKey }}
        property: clientSecret
{{- end }}
