{{- if .Values.oidc.enabled }}
# ArgoCD OIDC credentials - argocd-secret에 Merge
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-credentials
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.google.clientId
      remoteRef:
        key: {{ .Values.oidc.secretManagerKey }}
        property: clientId
    - secretKey: oidc.google.clientSecret
      remoteRef:
        key: {{ .Values.oidc.secretManagerKey }}
        property: clientSecret
{{- end }}
