{{- if .Values.oidc.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # ArgoCD URL (server.url 우선, 없으면 gateway.host 사용)
  {{- if .Values.server.url }}
  url: {{ .Values.server.url }}
  {{- else if .Values.gateway.host }}
  url: https://{{ .Values.gateway.host }}
  {{- end }}
  # OIDC Configuration
  oidc.config: |
    name: {{ .Values.oidc.name }}
    issuer: {{ .Values.oidc.issuer }}
    clientID: $argocd-google-oauth:clientId
    clientSecret: $argocd-google-oauth:clientSecret
    {{- if .Values.server.url }}
    redirectURI: {{ .Values.server.url }}/auth/callback
    {{- else if .Values.gateway.host }}
    redirectURI: https://{{ .Values.gateway.host }}/auth/callback
    {{- end }}
    requestedScopes:
      {{- range .Values.oidc.requestedScopes }}
      - {{ . }}
      {{- end }}
{{- end }}
