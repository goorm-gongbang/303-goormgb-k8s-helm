{{- if .Values.notifications.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Discord 서비스 설정
  service.discord: |
    webhooks:
      - url: $discord-webhook-url

  # 알림 템플릿
  template.app-sync-running: |
    discord:
      embeds:
        - title: "{{`{{.app.metadata.name}}`}} 동기화 시작"
          description: "ArgoCD가 애플리케이션 동기화를 시작했습니다."
          color: 0x0DADEA
          fields:
            - name: Application
              value: "{{`{{.app.metadata.name}}`}}"
              inline: true
            - name: Revision
              value: "{{`{{.app.status.sync.revision | trunc 7}}`}}"
              inline: true

  template.app-deployed: |
    discord:
      embeds:
        - title: "{{`{{.app.metadata.name}}`}} 배포 완료"
          description: "애플리케이션이 성공적으로 배포되었습니다."
          color: 0x18BE52
          fields:
            - name: Application
              value: "{{`{{.app.metadata.name}}`}}"
              inline: true
            - name: Revision
              value: "{{`{{.app.status.sync.revision | trunc 7}}`}}"
              inline: true

  template.app-deploy-failed: |
    discord:
      embeds:
        - title: "{{`{{.app.metadata.name}}`}} 배포 실패"
          description: "애플리케이션 배포에 실패했습니다."
          color: 0xE84D3C
          fields:
            - name: Application
              value: "{{`{{.app.metadata.name}}`}}"
              inline: true
            - name: Error
              value: "{{`{{.app.status.operationState.message | trunc 200}}`}}"
              inline: false

  template.app-health-degraded: |
    discord:
      embeds:
        - title: "{{`{{.app.metadata.name}}`}} 상태 이상"
          description: "애플리케이션 상태가 Degraded로 변경되었습니다."
          color: 0xF4D03F
          fields:
            - name: Application
              value: "{{`{{.app.metadata.name}}`}}"
              inline: true
            - name: Health Status
              value: "{{`{{.app.status.health.status}}`}}"
              inline: true

  # 트리거 설정
  trigger.on-sync-running: |
    - when: app.status.operationState.phase in ['Running']
      send: [app-sync-running]

  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-deployed]

  trigger.on-deploy-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-deploy-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
{{- end }}
