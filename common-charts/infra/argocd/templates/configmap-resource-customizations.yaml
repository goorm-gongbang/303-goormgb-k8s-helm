# ArgoCD Resource Customizations
# Calico Installation/APIServer health check 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Calico Installation - 항상 Healthy로 취급
  resource.customizations.health.operator.tigera.io_Installation: |
    hs = {}
    hs.status = "Healthy"
    return hs
  # Calico APIServer - 항상 Healthy로 취급
  resource.customizations.health.operator.tigera.io_APIServer: |
    hs = {}
    hs.status = "Healthy"
    return hs
