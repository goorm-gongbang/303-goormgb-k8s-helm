# ArgoCD configuration
# ArgoCD 자체는 bootstrap repo의 scripts/argocd/install.sh 로 설치

# Istio Gateway 설정 - 환경별로 설정
gateway:
  host: ""
  tls:
    enabled: true
    credentialName: ""

# Google OAuth 설정
oidc:
  enabled: false
  name: Google
  issuer: https://accounts.google.com
  secretManagerKey: ""  # 환경별로 설정 (예: k3s/argocd/google-oauth)
  requestedScopes:
    - openid
    - profile
    - email

# RBAC 설정
rbac:
  policy: ""
  defaultPolicy: ""

# ArgoCD Application 정의 (예시)
applications: []
