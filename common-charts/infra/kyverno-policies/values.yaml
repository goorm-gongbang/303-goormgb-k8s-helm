# Kyverno Policies Configuration (ValidatingPolicy - CEL based)
# Kyverno 1.17+ 호환

# Policy failure mode: Ignore | Fail
# Ignore: 정책 평가 실패 시 리소스 생성 허용
# Fail: 정책 평가 실패 시 리소스 생성 차단
failurePolicy: Ignore

# Validation action: Deny | Audit | Warn
# Deny: 정책 위반 시 리소스 생성 차단 (enforce)
# Audit: 정책 위반 로깅만, 리소스 생성 허용 (audit)
# Warn: 경고 메시지 표시, 리소스 생성 허용
validationAction: Deny

# 정책별 활성화
policies:
  # 필수 라벨 검증
  # Pod에 app, version 라벨이 있는지 확인
  requireLabels:
    enabled: true
    requiredLabels:
      - app
      - version

  # Privileged 컨테이너 차단
  # 보안 위험이 있는 privileged 모드 컨테이너를 금지
  disallowPrivileged:
    enabled: true

  # Latest 태그 금지
  # 명시적 버전 태그 사용을 강제하여 배포 재현성 확보
  disallowLatestTag:
    enabled: true

  # 리소스 제한 필수
  # CPU/Memory limits 설정을 강제하여 노드 리소스 보호
  requireResourceLimits:
    enabled: true
    defaultLimits:
      memory: "512Mi"
      cpu: "500m"

  # Probe 설정 필수
  # readinessProbe, livenessProbe 설정을 강제
  requireProbes:
    enabled: false  # staging에서는 비활성화

  # 핵심 리소스 보호
  # 핵심 네임스페이스의 리소스를 ArgoCD 이외의 사용자가 수정/삭제 금지
  protectCriticalNamespaces:
    enabled: true

  # ArgoCD 전용 관리 강제
  # ArgoCD 라벨이 없는 리소스의 생성 차단 (Shadow IT 방지)
  requireArgocdManagement:
    enabled: true

# 정책에서 제외할 네임스페이스
# 시스템 및 인프라 네임스페이스는 정책 검사에서 제외
excludeNamespaces:
  - kube-system
  - kube-public
  - kube-node-lease
  - kyverno
  - argocd
  - istio-system
  - monitoring
  - external-secrets
  - karpenter
  - cert-manager
  - local-path-storage
  - database
  # CNI: Cilium (kube-system), VPC CNI (kube-system) - 이미 위에서 제외

# 핵심 리소스를 보호할 네임스페이스 리스트
criticalNamespaces:
  - kube-system
  - kyverno
  - argocd
  - istio-system
  - monitoring
  - external-secrets
  - cert-manager
  - karpenter
