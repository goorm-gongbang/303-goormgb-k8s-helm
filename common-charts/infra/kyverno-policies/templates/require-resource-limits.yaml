{{- if .Values.policies.requireResourceLimits.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      모든 컨테이너에 CPU 및 메모리 limits가 설정되어 있는지 확인합니다.
      리소스 제한은 노드 리소스 고갈을 방지하고 안정적인 워크로드 스케줄링을 보장합니다.
spec:
  failurePolicy: {{ .Values.failurePolicy | default "Ignore" }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.excludeNamespaces }}
            - {{ . }}
            {{- end }}
  variables:
    - name: containers
      expression: "object.spec.containers"
  validations:
    - expression: |
        variables.containers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.memory)
        )
      message: "컨테이너에 메모리 limits가 필요합니다."
    - expression: |
        variables.containers.all(c,
          has(c.resources) &&
          has(c.resources.limits) &&
          has(c.resources.limits.cpu)
        )
      message: "컨테이너에 CPU limits가 필요합니다."
  auditAnnotations:
    - key: "policy-violation"
      valueExpression: "'require-resource-limits'"
{{- end }}
