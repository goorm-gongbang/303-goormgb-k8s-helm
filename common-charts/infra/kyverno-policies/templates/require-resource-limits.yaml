{{- if .Values.policies.requireResourceLimits.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      모든 컨테이너에 CPU 및 메모리 limits가 설정되어 있는지 확인합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: false
  rules:
    - name: check-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "모든 컨테이너(containers 및 initContainers)에 CPU 및 메모리 limits가 설정되어 있어야 합니다."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                limits:
                  cpu: "*"
                  memory: "*"
          - list: "request.object.spec.initContainers"
            pattern:
              resources:
                limits:
                  cpu: "*"
                  memory: "*"
{{- end }}
