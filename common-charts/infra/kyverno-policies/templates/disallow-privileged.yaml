{{- if .Values.policies.disallowPrivileged.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      privileged 모드로 실행되는 컨테이너를 차단합니다.
      privileged 컨테이너는 호스트의 모든 장치에 접근할 수 있어 보안 위험이 있습니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: true
  rules:
    - name: check-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "Privileged 컨테이너는 허용되지 않습니다."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              =(securityContext):
                =(privileged): false
          - list: "request.object.spec.initContainers"
            pattern:
              =(securityContext):
                =(privileged): false
          - list: "request.object.spec.ephemeralContainers"
            pattern:
              =(securityContext):
                =(privileged): false
{{- end }}
