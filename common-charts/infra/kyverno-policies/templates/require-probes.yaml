{{- if .Values.policies.requireProbes.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-probes
  annotations:
    policies.kyverno.io/title: Require Probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      모든 컨테이너에 readinessProbe와 livenessProbe가 설정되어 있는지 확인합니다.
      프로브는 Kubernetes가 애플리케이션 상태를 모니터링하고 트래픽을 적절히 라우팅하는 데 필수적입니다.
spec:
  failurePolicy: {{ .Values.failurePolicy | default "Ignore" }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    excludeResourceRules:
      {{- range .Values.excludeNamespaces }}
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        resourceNames: []
        namespaces:
          - {{ . }}
      {{- end }}
  variables:
    - name: containers
      expression: "object.spec.containers"
  validations:
    - expression: |
        variables.containers.all(c, has(c.readinessProbe))
      message: "컨테이너에 readinessProbe가 필요합니다."
    - expression: |
        variables.containers.all(c, has(c.livenessProbe))
      message: "컨테이너에 livenessProbe가 필요합니다."
  auditAnnotations:
    - key: "policy-violation"
      valueExpression: "'require-probes'"
{{- end }}
