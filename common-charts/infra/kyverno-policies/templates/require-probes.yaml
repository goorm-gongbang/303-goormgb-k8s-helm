{{- if .Values.policies.requireProbes.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Require Probes
    policies.kyverno.io/category: Reliability, Availability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      모든 컨테이너에 readinessProbe와 livenessProbe가 설정되어 있는지 확인합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: false
  rules:
    - name: check-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "컨테이너에 readinessProbe 및 livenessProbe가 필요합니다."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              readinessProbe: "*"
              livenessProbe: "*"
          - list: "request.object.spec.initContainers"
            pattern:
              readinessProbe: "*"
              livenessProbe: "*"
{{- end }}
