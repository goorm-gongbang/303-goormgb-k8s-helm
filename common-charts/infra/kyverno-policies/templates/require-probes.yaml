{{- if .Values.policies.requireProbes.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Require Probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      모든 컨테이너에 readinessProbe와 livenessProbe가 설정되어 있는지 확인합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: true
  rules:
    - name: check-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              readinessProbe: "*"
            message: "컨테이너에 readinessProbe가 필요합니다."
          - list: "request.object.spec.containers"
            pattern:
              livenessProbe: "*"
            message: "컨테이너에 livenessProbe가 필요합니다."
{{- end }}
