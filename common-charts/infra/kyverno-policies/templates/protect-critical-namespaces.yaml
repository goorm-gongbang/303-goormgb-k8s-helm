{{- if .Values.policies.protectCriticalNamespaces.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-critical-namespaces
  annotations:
    policies.kyverno.io/title: Protect Critical Namespaces
    policies.kyverno.io/category: Best Practices, Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      핵심 시스템 네임스페이스의 리소스가 ArgoCD 이외의 사용자에 의해 수정되거나 삭제되는 것을 방지합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: false
  rules:
    - name: prevent-unauthorized-changes
      match:
        any:
          - resources:
              namespaces:
                {{- range .Values.criticalNamespaces }}
                - {{ . }}
                {{- end }}
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
          - subjects:
              - kind: ServiceAccount
                name: argocd-application-controller
                namespace: argocd
      validate:
        message: "핵심 네임스페이스({{ request.namespace }})의 리소스는 ArgoCD를 통해서만 수정/삭제할 수 있습니다."
        deny:
          conditions:
            all:
              - key: "{{ request.operation }}"
                operator: In
                value:
                  - UPDATE
                  - DELETE
{{- end }}
