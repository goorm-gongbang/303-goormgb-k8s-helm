{{- if .Values.policies.disallowLatestTag.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      컨테이너 이미지에 'latest' 태그 사용을 금지합니다.
      명시적인 버전 태그를 사용하면 배포 재현성과 롤백이 용이합니다.
spec:
  failurePolicy: {{ .Values.failurePolicy | default "Ignore" }}
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
    excludeResourceRules:
      {{- range .Values.excludeNamespaces }}
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        resourceNames: []
        namespaces:
          - {{ . }}
      {{- end }}
  variables:
    - name: containers
      expression: "object.spec.containers"
    - name: initContainers
      expression: "object.spec.?initContainers.orValue([])"
  validations:
    - expression: |
        variables.containers.all(c,
          !c.image.endsWith(':latest') &&
          !(c.image.matches('^[^:]+$'))
        )
      message: "이미지 태그 ':latest' 또는 태그 미지정은 허용되지 않습니다. 명시적인 버전 태그를 사용하세요. (container)"
    - expression: |
        variables.initContainers.all(c,
          !c.image.endsWith(':latest') &&
          !(c.image.matches('^[^:]+$'))
        )
      message: "이미지 태그 ':latest' 또는 태그 미지정은 허용되지 않습니다. 명시적인 버전 태그를 사용하세요. (initContainer)"
  auditAnnotations:
    - key: "policy-violation"
      valueExpression: "'disallow-latest-tag'"
{{- end }}
