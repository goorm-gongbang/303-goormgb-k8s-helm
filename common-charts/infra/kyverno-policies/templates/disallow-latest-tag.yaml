{{- if .Values.policies.disallowLatestTag.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      컨테이너 이미지에 'latest' 태그 사용을 금지합니다.
      명시적인 버전 태그를 사용하면 배포 재현성과 롤백이 용이합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: true
  rules:
    - name: check-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
      validate:
        message: "이미지 태그 ':latest' 또는 태그 미지정은 허용되지 않습니다. 명시적인 버전 태그를 사용하세요."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                - key: "{{ element.image }}"
                  operator: EndsWith
                  value: ":latest"
                - key: "{{ element.image }}"
                  operator: NotContains
                  value: ":"
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                - key: "{{ element.image }}"
                  operator: EndsWith
                  value: ":latest"
                - key: "{{ element.image }}"
                  operator: NotContains
                  value: ":"
{{- end }}
