{{- if .Values.policies.requireArgocdManagement.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-argocd-management
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    policies.kyverno.io/title: Enforce ArgoCD Management
    policies.kyverno.io/category: GitOps, Governance, Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      ArgoCD가 관리하지 않는 리소스(app.kubernetes.io/instance 라벨이 없는 경우)의 생성을 차단합니다.
spec:
  validationFailureAction: {{ .Values.validationAction | default "Audit" }}
  background: false
  rules:
    - name: check-argocd-label
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - Service
                - Ingress
                - ConfigMap
                - Secret
                - CustomResourceDefinition
                - Namespace
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
          - resources:
              kinds:
                - Event
                - Endpoints
                - EndpointSlice
                - Lease
                - APIService
                - TokenReview
                - SubjectAccessReview
                - SelfSubjectAccessReview
                - SelfSubjectRulesReview
                - CertificateRequest
                - Order
                - Challenge
                - Node
                - NodePool
                - EC2NodeClass
                - ClusterPolicy
                - Policy
                - ValidatingPolicy
          - resources:
              kinds:
                - "*"
              namespaces:
                {{- range .Values.excludeNamespaces }}
                - {{ . }}
                {{- end }}
          # Prometheus Operator가 helm pre-install 훅으로 설치하는 CRD들은 label 미부여
          - resources:
              kinds:
                - CustomResourceDefinition
              names:
                - "*.monitoring.coreos.com"
      validate:
        message: "ArgoCD를 통해서만 리소스를 생성할 수 있습니다. (app.kubernetes.io/instance 라벨 누락)"
        pattern:
          metadata:
            labels:
              app.kubernetes.io/instance: "*"
{{- end }}
