# Telemetry API - Tracing configuration
# - Adds istio.cluster_id tag for Kiali trace queries
# - 100% sampling for dev environment
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
spec:
  tracing:
    - providers:
        - name: "zipkin"
      randomSamplingPercentage: 100
      customTags:
        "istio.cluster_id":
          literal:
            value: "Kubernetes"
        "environment":
          literal:
            value: "dev"
