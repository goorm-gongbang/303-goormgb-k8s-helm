# Telemetry API - Tracing, Metrics & Access Logging configuration
# - Adds istio.cluster_id tag for Kiali trace queries
# - 100% sampling for dev environment
# - Prometheus metrics for istio_requests_total, istio_request_duration, etc.
# - Access logging with custom headers (X-Test-Id, X-Triggered-By)
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
spec:
  # Access logging configuration - captures k6 test headers
  accessLogging:
    - providers:
        - name: envoy
      filter:
        expression: "request.headers['x-test-id'] != ''"
  # Metrics configuration (istio_requests_total, istio_request_duration_milliseconds)
  metrics:
    - providers:
        - name: prometheus
      overrides:
        - match:
            metric: REQUEST_COUNT
          tagOverrides:
            x_test_id:
              operation: UPSERT
              value: "request.headers['x-test-id'] | 'unknown'"
            x_triggered_by:
              operation: UPSERT
              value: "request.headers['x-triggered-by'] | 'unknown'"
        - match:
            metric: REQUEST_DURATION
          tagOverrides:
            x_test_id:
              operation: UPSERT
              value: "request.headers['x-test-id'] | 'unknown'"
            x_triggered_by:
              operation: UPSERT
              value: "request.headers['x-triggered-by'] | 'unknown'"
  # Tracing configuration
  tracing:
    - providers:
        - name: "zipkin"
      randomSamplingPercentage: 100
      customTags:
        "istio.cluster_id":
          literal:
            value: "Kubernetes"
        "environment":
          literal:
            value: "dev"
        "x_test_id":
          header:
            name: "x-test-id"
            defaultValue: "unknown"
        "x_triggered_by":
          header:
            name: "x-triggered-by"
            defaultValue: "unknown"
