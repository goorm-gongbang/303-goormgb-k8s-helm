# EnvoyFilter - Skip tracing for health check endpoints
# Sets x-b3-sampled=0 for health check paths to disable tracing
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: skip-health-tracing
  namespace: istio-system
spec:
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              function envoy_on_request(request_handle)
                local path = request_handle:headers():get(":path")
                if path then
                  if string.match(path, "^/health") or
                     string.match(path, "^/healthz") or
                     string.match(path, "^/readyz") or
                     string.match(path, "^/livez") or
                     string.match(path, "/actuator/health") then
                    request_handle:headers():replace("x-b3-sampled", "0")
                  end
                end
              end
