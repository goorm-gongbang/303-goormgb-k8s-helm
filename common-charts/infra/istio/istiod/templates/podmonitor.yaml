# Envoy Sidecar PodMonitor - 데이터 플레인 메트릭 수집
# istio_requests_total, istio_request_duration_milliseconds 등
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-stats
  namespace: istio-system
  labels:
    app: istio-proxy
    release: prometheus
spec:
  selector:
    matchExpressions:
      - key: security.istio.io/tlsMode
        operator: Exists
  namespaceSelector:
    any: true
  jobLabel: envoy-stats
  podMetricsEndpoints:
    - port: http-envoy-prom  # 15020
      interval: 30s
      path: /stats/prometheus
      relabelings:
        # Pod 정보 유지
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_label_app]
          targetLabel: app
