# Shared Gateway for *.goormgb.space
# istio-ingressgateway는 istioctl로 설치됨
# 이 차트는 Gateway CRD만 생성

sharedGateway:
  enabled: false
  name: goormgb-gateway
  # Phase 3: istio-ingress 분리 시 namespace 변경
  # namespace: istio-ingress
  namespace: istio-system
  selector: ingressgateway
  tls:
    credentialName: goormgb-tls
  hosts:
    - "*.goormgb.space"
