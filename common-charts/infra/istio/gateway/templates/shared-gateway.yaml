{{- if .Values.sharedGateway.enabled }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.sharedGateway.name | default "goormgb-gateway" }}
  namespace: {{ .Values.sharedGateway.namespace | default "istio-system" }}
spec:
  selector:
    istio: {{ .Values.sharedGateway.selector | default "ingressgateway" }}
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.sharedGateway.tls.credentialName | default "goormgb-tls" }}
      hosts:
        {{- range .Values.sharedGateway.hosts }}
        - {{ . | quote }}
        {{- end }}
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        {{- range .Values.sharedGateway.hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if ne (toString (hasKey .Values.sharedGateway "httpsRedirect" | ternary .Values.sharedGateway.httpsRedirect true)) "false" }}
      tls:
        httpsRedirect: true
      {{- end }}
{{- end }}
---
{{- if and .Values.apiGatewayConfig .Values.apiGatewayConfig.enabled }}
# API Gateway - Istio IngressGateway → VirtualService
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.apiGatewayConfig.name | default "api-gateway" }}
  namespace: {{ .Values.apiGatewayConfig.namespace | default .Values.sharedGateway.namespace | default "istio-system" }}
spec:
  selector:
    istio: {{ .Values.apiGatewayConfig.selector | default "ingressgateway" }}
  servers:
    {{- if .Values.apiGatewayConfig.tls }}
    {{- if .Values.apiGatewayConfig.tls.enabled }}
    # HTTPS (Direct TLS termination)
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.apiGatewayConfig.tls.credentialName | default "goormgb-tls" }}
      hosts:
        {{- range .Values.apiGatewayConfig.hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
    {{- end }}
    # HTTP
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        {{- range .Values.apiGatewayConfig.hosts }}
        - {{ . | quote }}
        {{- end }}
      {{- if .Values.apiGatewayConfig.httpsRedirect }}
      tls:
        httpsRedirect: true
      {{- end }}
{{- end }}
