{{- if .Values.kialiVirtualService.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: kiali-vs
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - {{ .Values.kialiVirtualService.host | quote }}
  gateways:
    - istio-system/goormgb-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: kiali
            port:
              number: 20001
{{- end }}
