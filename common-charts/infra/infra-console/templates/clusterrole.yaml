apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "istio-console.fullname" . }}
  labels:
    {{- include "istio-console.labels" . | nindent 4 }}
rules:
  # Core K8s
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "nodes"]
    verbs: ["get", "list", "watch"]

  # Apps (Deployments, ReplicaSets, etc.)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # Istio Networking
  - apiGroups: ["networking.istio.io"]
    resources:
      - gateways
      - virtualservices
      - destinationrules
      - serviceentries
      - sidecars
      - envoyfilters
      - workloadentries
      - workloadgroups
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Istio Security
  - apiGroups: ["security.istio.io"]
    resources:
      - authorizationpolicies
      - peerauthentications
      - requestauthentications
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Istio Telemetry
  - apiGroups: ["telemetry.istio.io"]
    resources:
      - telemetries
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Kyverno Policies
  - apiGroups: ["kyverno.io"]
    resources:
      - clusterpolicies
      - policies
      - policyexceptions
    verbs: ["get", "list", "watch", "update", "patch"]

  # Kyverno Reports
  - apiGroups: ["wgpolicyk8s.io"]
    resources:
      - policyreports
      - clusterpolicyreports
    verbs: ["get", "list", "watch"]
