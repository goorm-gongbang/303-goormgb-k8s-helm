apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infra-console.fullname" . }}
  labels:
    {{- include "infra-console.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "infra-console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "infra-console.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "infra-console.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: "{{ .Values.config.listenAddr }}"
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            {{- if .Values.gitops.enabled }}
            - name: GITHUB_OWNER
              value: "{{ .Values.gitops.github.owner }}"
            - name: GITHUB_REPO
              value: "{{ .Values.gitops.github.repo }}"
            - name: GITHUB_BASE_BRANCH
              value: "{{ .Values.gitops.github.baseBranch }}"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.externalSecret.enabled }}
                  name: {{ include "infra-console.fullname" . }}-github
                  {{- else }}
                  name: {{ .Values.gitops.existingSecret }}
                  {{- end }}
                  key: {{ .Values.gitops.secretKey }}
            {{- end }}
            {{- if .Values.oauth.enabled }}
            - name: OAUTH_REDIRECT_URL
              value: "{{ .Values.oauth.redirectUrl }}"
            - name: SECURE_COOKIE
              value: "{{ .Values.oauth.secureCookie }}"
            {{- if .Values.oauth.allowEmails }}
            - name: OAUTH_ALLOW_EMAILS
              value: "{{ join "," .Values.oauth.allowEmails }}"
            {{- end }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  {{- if .Values.oauth.secretManagerKey }}
                  name: {{ include "infra-console.fullname" . }}-oauth
                  {{- else }}
                  name: {{ .Values.oauth.existingSecret }}
                  {{- end }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.oauth.secretManagerKey }}
                  name: {{ include "infra-console.fullname" . }}-oauth
                  {{- else }}
                  name: {{ .Values.oauth.existingSecret }}
                  {{- end }}
                  key: GOOGLE_CLIENT_SECRET
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.oauth.secretManagerKey }}
                  name: {{ include "infra-console.fullname" . }}-oauth
                  {{- else }}
                  name: {{ .Values.oauth.existingSecret }}
                  {{- end }}
                  key: SESSION_KEY
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
