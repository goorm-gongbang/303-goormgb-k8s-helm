{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "infra-console.fullname" . }}-github
  labels:
    {{- include "infra-console.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "infra-console.fullname" . }}-github
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef.key }}
        property: {{ .Values.externalSecret.remoteRef.property }}
{{- end }}
---
{{- if and .Values.oauth.enabled .Values.oauth.secretManagerKey }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "infra-console.fullname" . }}-oauth
  labels:
    {{- include "infra-console.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.oauth.secretStoreRef.name | default "aws-secrets-manager" }}
    kind: {{ .Values.oauth.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "infra-console.fullname" . }}-oauth
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: {{ .Values.oauth.secretManagerKey }}
        property: clientId
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.oauth.secretManagerKey }}
        property: clientSecret
    - secretKey: SESSION_KEY
      remoteRef:
        key: {{ .Values.oauth.secretManagerKey }}
        property: sessionKey
{{- end }}
