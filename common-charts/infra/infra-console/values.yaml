replicaCount: 1

image:
  repository: ghcr.io/goormgb/istio-console
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
# - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8088

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  logLevel: info
  listenAddr: ":8088"

# GitOps configuration
gitops:
  enabled: false
  github:
    owner: "goormgb"
    repo: "303-goormgb-k8s-helm"
    baseBranch: "develop"
  # Secret containing GITHUB_TOKEN
  existingSecret: ""  # e.g., "infra-console-github"
  secretKey: "GITHUB_TOKEN"

# External Secrets (AWS Secrets Manager)
externalSecret:
  enabled: false
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  remoteRef:
    key: "goormgb/infra-console"
    property: "GITHUB_TOKEN"

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}

# Istio VirtualService configuration
virtualService:
  enabled: true
  gateway: "istio-system/default-gateway"
  hosts:
    - "console.goormgb.space"

# OAuth configuration
oauth:
  enabled: false
  redirectUrl: "https://console.goormgb.space/auth/callback"
  secureCookie: true
  allowEmails: []
  # Secret containing OAuth credentials
  existingSecret: ""  # e.g., "infra-console-oauth"
