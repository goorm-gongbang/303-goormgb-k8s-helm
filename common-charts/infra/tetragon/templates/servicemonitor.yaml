{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tetragon
  labels:
    app.kubernetes.io/name: tetragon
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tetragon
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
  - port: metrics
    interval: {{ .Values.metrics.interval }}
    path: /metrics
{{- end }}
