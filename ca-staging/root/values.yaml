# ECR OCI Registry (main 계정에서 cross-account pull)
ecr:
  accountId: "497012402578"
  region: "ap-northeast-2"

# Git Repository
git:
  repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
  targetRevision: argocd-sync/ca-staging

# ArgoCD Project
project: default

# Destination
destination:
  server: https://kubernetes.default.svc

# =============================================================================
# OCI Charts (ECR에서 직접 참조) - Multi-source Application
# =============================================================================
ociCharts:
  istio-base:
    enabled: true
    description: "Istio CRD 및 기본 리소스 (Gateway, VirtualService 등 CRD 정의)"
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    version: "1.29.1"
    namespace: istio-system
    syncWave: "-4"
    valueFiles:
      - $values/ca-staging/values/istio/values-istio.yaml
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle
          - /webhooks/0/failurePolicy

  istiod:
    enabled: true
    description: "Istio Control Plane - 서비스 메시 정책, mTLS, 트래픽 관리"
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    version: "1.29.1"
    namespace: istio-system
    syncWave: "-3"
    valueFiles:
      - $values/ca-staging/values/istio/values-istio.yaml
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle
          - /webhooks/0/failurePolicy
          - /webhooks/1/clientConfig/caBundle
          - /webhooks/1/failurePolicy
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        jsonPointers:
          - /webhooks
          - /metadata/resourceVersion
      - group: apps
        kind: Deployment
        jsonPointers:
          - /metadata/annotations/deployment.kubernetes.io~1revision
          - /spec
      - group: monitoring.coreos.com
        kind: PodMonitor
        jsonPointers:
          - /spec/podMetricsEndpoints

  # Istio IngressGateway (ClusterIP - ALB Ingress에서 라���팅)
  istio-ingressgateway:
    enabled: true
    description: "Istio Ingress Gateway - ALB에서 트래픽 수신, VirtualService 라���팅"
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    version: "1.29.1"
    namespace: istio-system
    syncWave: "-2"
    valueFiles:
      - $values/ca-staging/values/istio/values-istio-gateway.yaml



  # Karpenter - Node Auto-scaling
  karpenter:
    enabled: true
    description: "Karpenter - EKS 노드 자동 스케일링 (NodePool, EC2NodeClass)"
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    version: "1.11.1"
    namespace: karpenter
    syncWave: "-8"
    valueFiles:
      - $values/ca-staging/values/infra/values-karpenter.yaml
    syncOptions:
      - ServerSideApply=true

  loki:
    enabled: true
    description: "Loki - 로그 수집/저장 (Promtail에서 전송받음, Grafana에서 조회)"
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    version: "6.55.0"
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - $values/ca-staging/values/monitoring/logs/values-loki.yaml
    syncOptions:
      - Replace=true
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  promtail:
    enabled: true
    description: "Promtail - Pod 로그 수집 DaemonSet (Loki로 전송)"
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    version: "6.17.1"
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - $values/ca-staging/values/monitoring/logs/values-promtail.yaml

  kube-prometheus-stack:
    enabled: true
    description: "Prometheus + Alertmanager - 메트릭 수집, 알림 규칙, ServiceMonitor"
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    version: "83.4.0"
    namespace: monitoring
    syncWave: "-1"
    valueFiles:
      - $values/ca-staging/values/monitoring/metrics/values-prometheus-stack.yaml
      - $values/ca-staging/values/monitoring/alerting/values-rules-staging.yaml
      - $values/ca-staging/values/monitoring/alerting/values-alertmanager-staging.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      duration: "15s"
      maxDuration: "5m"
      factor: 2
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /spec/conversion
          - /metadata/annotations
      - group: ""
        kind: Endpoints
        jsonPointers:
          - /metadata
          - /subsets

  aws-load-balancer-controller:
    enabled: true
    description: "AWS Load Balancer Controller - ALB/NLB Ingress 관���"
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    version: "3.2.1"
    namespace: kube-system
    syncWave: "-9"
    valueFiles:
      - $values/ca-staging/values/infra/values-aws-lb-controller.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        name: aws-load-balancer-tls
        jsonPointers:
          - /data
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: aws-load-balancer-webhook
        jsonPointers:
          - /webhooks
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: aws-load-balancer-webhook
        jsonPointers:
          - /webhooks
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations

  external-secrets:
    enabled: true
    description: "External Secrets Operator - AWS Secrets Manager 연���"
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    version: "2.3.0"
    namespace: external-secrets
    syncWave: "-9"
    valueFiles:
      - $values/ca-staging/values/infra/values-eso.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations

  external-dns:
    enabled: true
    description: "External DNS - Route53 DNS 레코드 자동 관리"
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    version: "1.20.0"
    namespace: external-dns
    syncWave: "-8"
    valueFiles:
      - $values/ca-staging/values/infra/values-external-dns.yaml

  tempo:
    enabled: true
    description: "Tempo - 분산 추적 저장소 (Jaeger/Zipkin 호환)"
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    version: "1.24.4"
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - $values/ca-staging/values/monitoring/traces/values-tempo.yaml
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  # Grafana (kube-prometheus-stack에서 분리)
  grafana:
    enabled: true
    description: "Grafana - 대시보드 시각화 (Prometheus, Loki, Tempo 연동)"
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    version: "10.5.15"
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - $values/ca-staging/values/monitoring/visualization/values-grafana.yaml

  opentelemetry-collector:
    enabled: true
    description: "OpenTelemetry Collector - 메트릭/트레이스 수집 파이프라인"
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    version: "0.150.0"
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - $values/ca-staging/values/monitoring/metrics/values-opentelemetry-collector.yaml

  # KEDA - Event-Driven Autoscaling
  keda:
    enabled: true
    description: "KEDA - Kafka lag, Redis queue, Cron 기반 오토스케일링"
    repoURL: https://kedacore.github.io/charts
    chart: keda
    version: "2.19.0"
    namespace: keda-system
    syncWave: "0"
    valueFiles:
      - $values/ca-staging/values/infra/values-keda.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  # Metrics Server - kubectl top nodes/pods
  metrics-server:
    enabled: true
    description: "Metrics Server - kubectl top, HPA 메트릭 제공"
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    version: "3.13.0"
    namespace: kube-system
    syncWave: "-9"
    valueFiles:
      - $values/ca-staging/values/infra/values-metrics-server.yaml

  # Kyverno - Policy Engine
  kyverno:
    enabled: true
    description: "Kyverno - K8s 정책 엔진 (리소스 검증/변환)"
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    version: "3.7.1"
    namespace: kyverno
    syncWave: "-7"
    valueFiles:
      - $values/ca-staging/values/security/values-kyverno.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        jsonPointers:
          - /webhooks
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations
          - /metadata/labels

# =============================================================================
# Git Charts (Git 레포에서 참조) - 단일 source Application
# =============================================================================
gitCharts:
  # === Core ===
  namespaces:
    enabled: true
    description: "Namespace 정의 (staging-webs, staging-ai, monitoring 등)"
    path: common-charts/infra/namespaces
    namespace: default
    syncWave: "-10"
    valueFiles:
      - ../../../ca-staging/values/core/values-namespaces.yaml

  # === Security ===
  rbac:
    enabled: true
    description: "RBAC - ServiceAccount, Role, RoleBinding 정의"
    path: common-charts/infra/rbac
    namespace: default
    valueFiles:
      - ../../../ca-staging/values/security/values-rbac.yaml

  # Network Policies (namespace isolation)
  network-policies:
    enabled: true
    description: "NetworkPolicy - Namespace 간 네트워크 격리"
    path: common-charts/infra/network-policies
    namespace: default
    syncWave: "-9"
    valueFiles:
      - ../../../ca-staging/values/security/values-network-policies.yaml

  # ESO ClusterSecretStore (IRSA 기반)
  eso-config:
    enabled: true
    description: "ESO ClusterSecretStore - AWS Secrets Manager 연결 설정"
    path: ca-staging/charts/eso
    namespace: external-secrets
    syncWave: "-8"

  # AI Service Secrets (Redis 연결 정보)
  ai-service-secrets:
    enabled: true
    description: "AI 서비스 Secret - Redis, PostgreSQL 연결 정보"
    path: ca-staging/charts/security/ai-service-secrets
    namespace: staging-ai
    syncWave: "-6"

  # Mail Config (Gmail SMTP)
  mail-config:
    enabled: true
    description: "메일 설정 - Gmail SMTP Secret"
    path: common-charts/apps/mail-config
    namespace: staging-webs
    syncWave: "-5"
    valueFiles:
      - ../../../ca-staging/values/apps/values-mail-config.yaml

  # KEDA ScaledObjects (앱별 오토스케일링 규칙)
  keda-scalers:
    enabled: false  # 준비 완료, 필요 시 true로 변경
    description: "KEDA ScaledObject - CPU, Kafka lag, Cron pre-warming"
    path: common-charts/infra/keda-scalers
    namespace: staging-webs
    syncWave: "12"
    valueFiles:
      - ../../../ca-staging/values/infra/values-keda-scalers.yaml

  # KEDA ScaledObjects - Load Test (부하테스트 전용)
  keda-scalers-loadtest:
    enabled: false
    description: "KEDA ScaledObject - Load Test 전용 CPU 기반 오토스케일링"
    path: common-charts/infra/keda-scalers
    namespace: loadtest-webs
    syncWave: "16"
    valueFiles:
      - ../../../ca-staging/values/infra/values-keda-scalers-loadtest.yaml

  # Karpenter NodePool & EC2NodeClass
  karpenter-config:
    enabled: true
    description: "Karpenter 설정 - NodePool, EC2NodeClass 정의"
    path: ca-staging/charts/karpenter
    namespace: karpenter
    syncWave: "-6"
    syncOptions:
      - SkipDryRunOnMissingResource=true

  # === ALB Ingress (Host-based routing) ===
  alb-ingress:
    enabled: true
    description: "ALB Ingress - 호스트 기반 라우팅 규칙"
    path: ca-staging/charts/alb-ingress
    namespace: istio-system
    syncWave: "5"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - Prune=false

  # === Istio ===
  istio-gateway:
    enabled: true
    description: "Istio Gateway CRD - 도메인별 트래픽 수신 정의"
    path: common-charts/infra/istio/gateway
    namespace: istio-system
    syncWave: "-2"
    valueFiles:
      - ../../../../ca-staging/values/istio/values-istio.yaml

  istio-security:
    enabled: true
    description: "Istio Security - AuthorizationPolicy, PeerAuth, JWT 검증"
    path: common-charts/infra/istio-security
    namespace: istio-system
    syncWave: "-1"
    valueFiles:
      - ../../../ca-staging/values/istio/values-istio-security.yaml

  # === OCI Chart Extras (추가 모니터링/설정) ===
  istiod-monitoring:
    enabled: true
    description: "Istiod 모니터링 - PodMonitor, Telemetry 설정"
    path: common-charts/infra/istio/istiod
    namespace: istio-system
    syncWave: "-2"
    valueFiles:
      - ../../../../ca-staging/values/istio/values-istio.yaml

  # Kiali VirtualService & DestinationRule
  # Load Test Route (k6 부하테스트용)
  loadtest-route:
    enabled: true
    description: "Load Test 라우팅 - /load-test/* -> loadtest-webs"
    path: ca-staging/charts/istio/loadtest-route
    namespace: istio-system
    syncWave: "0"

  prometheus-extras:
    enabled: true
    description: "Prometheus 추가 설정 - Grafana 대시보드 JSON, 추가 규칙"
    path: common-charts/infra/monitoring/prometheus-stack
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - ../../../../ca-staging/values/monitoring/metrics/values-prometheus-stack.yaml
      - ../../../../ca-staging/values/monitoring/alerting/values-rules-staging.yaml
      - ../../../../ca-staging/values/monitoring/alerting/values-alertmanager-staging.yaml
    syncOptions:
      - Replace=true

  # === ArgoCD Config (OAuth, Applications) ===
  argocd-config:
    enabled: true
    description: "ArgoCD 설정 - Google OAuth, ConfigMap, Notifications"
    path: common-charts/infra/argocd
    namespace: argocd
    valueFiles:
      - ../../../ca-staging/values/core/values-argocd.yaml

  # Kyverno Policies
  kyverno-policies:
    enabled: true
    description: "Kyverno 정책 - 리소스 제한, latest 태그 금지 등"
    path: common-charts/infra/kyverno-policies
    namespace: kyverno
    syncWave: "-6"
    valueFiles:
      - ../../../ca-staging/values/security/values-kyverno-policies.yaml
    syncOptions:
      - SkipDryRunOnMissingResource=true

  # === Monitoring ===
  # tempo: OCI로 이동 (ociCharts.tempo)
  # otel-collector: OCI로 이동 (ociCharts.opentelemetry-collector)

  # CloudBeaver (DB 관리 - 부하테스트용)
  cloudbeaver:
    enabled: true
    description: "CloudBeaver - 웹 기반 DB 관리 도구 (RDS, ClickHouse)"
    path: ca-staging/charts/data/cloudbeaver
    namespace: data
    syncWave: "5"
    valueFiles:
      - ../../../../ca-staging/values/data/values-cloudbeaver.yaml

  # Redis Exporter for AI ElastiCache
  redis-exporter-ai:
    enabled: true
    description: "Redis Exporter - AI ElastiCache 메트릭 수집"
    path: ca-staging/charts/monitoring/redis-exporter-ai
    namespace: staging-ai
    syncWave: "5"

  # RDS Backup CronJob (pg_dump -> S3)
  rds-backup:
    enabled: false
    description: "RDS 백업 - pg_dump CronJob (S3 저장)"
    path: ca-staging/charts/data/rds-backup
    namespace: data
    syncWave: "0"

  # RedisInsight (Redis GUI with Google OAuth)
  redisinsight:
    enabled: true
    description: "RedisInsight - Redis GUI 관리 도구"
    path: common-charts/infra/redisinsight
    namespace: monitoring
    syncWave: "5"
    valueFiles:
      - ../../../ca-staging/values/data/values-redisinsight.yaml

  # ClickHouse for AI Defense observability warehouse
  clickhouse:
    enabled: true
    description: "ClickHouse - AI Defense 관측 데이터 웨어하우스"
    path: common-charts/infra/clickhouse
    namespace: data
    syncWave: "-4"
    valueFiles:
      - ../../../ca-staging/values/data/values-clickhouse.yaml
    retry:
      limit: 5
      duration: "10s"
      maxDuration: "3m"
      factor: 2
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  # === Messaging (Kafka) ===
  kafka:
    enabled: true
    description: "Kafka - 메시지 브로커"
    path: common-charts/infra/kafka
    namespace: messaging
    syncWave: "-5"
    valueFiles:
      - ../../../ca-staging/values/messaging/values-kafka.yaml
    retry:
      limit: 5
      duration: "10s"
      maxDuration: "3m"
      factor: 2
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  kafka-ui:
    enabled: true
    description: "Kafka UI - 웹 기반 Kafka 관리 도구"
    path: dev/charts/data/kafka-ui
    namespace: messaging
    syncWave: "0"
    valueFiles:
      - ../../../../ca-staging/values/messaging/values-kafka-ui.yaml

# =============================================================================
# ApplicationSets
# =============================================================================
applicationSets:
  staging-webs-services:
    enabled: true
    syncWave: "10"
    namespace: staging-webs
    appNamePrefix: "staging"
    chartPath: common-charts/apps/java-service
    valueFilesPattern: ../../../ca-staging/values/apps/values-{{name}}.yaml
    services:
      # 순차 배포: auth-guard → 나머지 서비스 → api-gateway
      - name: auth-guard
        syncWave: "10"
        description: "Auth Guard - JWT 발급/검증, 로그인/회원가입 API"
      - name: queue
        syncWave: "11"
        description: "Queue - 대기열 관리, 입장 순서 처리"
      - name: seat
        syncWave: "11"
        description: "Seat - 좌석 조회/선택, 구역 정보 API"
      - name: order-core
        syncWave: "11"
        description: "Order Core - 주문 생성/결제, 티켓 발급"
      - name: api-gateway
        syncWave: "12"
        description: "API Gateway - 라우팅, 인증 필터, Rate Limit"

  staging-ai-services:
    enabled: true
    syncWave: "10"
    namespace: staging-ai
    appNamePrefix: "staging"
    chartPath: common-charts/apps/ai-service
    valueFilesPattern: ../../../ca-staging/values/apps/values-{{name}}.yaml
    services:
      - name: ai-defense
        description: "AI Defense - 봇 탐지, 트래픽 분석, 정책 평가"
      - name: authz-adapter
        description: "Authz Adapter - Istio ext_authz gRPC 어댑터"

  # staging-ai-etl: ai-defense 앱으로 흡수됨 (같은 이미지 공유, cronJobs.tm-ai-etl)

  # Load-test 전용 서비스 (k6 부하 테스트용)
  loadtest-webs-services:
    enabled: true
    syncWave: "15"
    namespace: loadtest-webs
    appNamePrefix: "loadtest"
    chartPath: common-charts/apps/java-service
    valueFilesPattern: ../../../ca-staging/values/apps-loadtest/values-{{name}}.yaml
    services:
      - name: auth-guard
        syncWave: "15"
        description: "[LoadTest] Auth Guard - 부하테스트용 인증 서비스"
      - name: queue
        syncWave: "16"
        description: "[LoadTest] Queue - 부하테스트용 대기열 서비스"
      - name: seat
        syncWave: "16"
        description: "[LoadTest] Seat - 부하테스트용 좌석 서비스"
      - name: order-core
        syncWave: "16"
        description: "[LoadTest] Order Core - 부하테스트용 주문 서비스"
      - name: api-gateway
        syncWave: "17"
        description: "[LoadTest] API Gateway - 부하테스트용 게이트웨이"

  loadtest-ai-services:
    enabled: true
    syncWave: "15"
    namespace: loadtest-ai
    appNamePrefix: "loadtest"
    chartPath: common-charts/apps/ai-service
    valueFilesPattern: ../../../ca-staging/values/apps-loadtest/values-{{name}}.yaml
    services:
      - name: ai-defense
        syncWave: "15"
        description: "[LoadTest] AI Defense - 부하테스트용 봇 탐지"
      - name: authz-adapter
        syncWave: "16"
        description: "[LoadTest] Authz Adapter - 부하테스트용 ext_authz"


