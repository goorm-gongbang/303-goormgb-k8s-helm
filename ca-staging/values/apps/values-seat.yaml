# seat - Staging 환경
fullnameOverride: "seat"
contextPath: "/seat"
replicaCount: 1

image:
  name: "staging/playball/web/seat"
  tag: "1583897.46"
  pullPolicy: Always

# IRSA로 cross-account ECR 인증 (imagePullSecrets 비활성화)
imagePullSecrets: []

# apps 노드는 taint 없음 - tolerations 불필요

# HA: 노드 분산 + Managed 노드 우선
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
      - weight: 50
        preference:
          matchExpressions:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand"]
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: seat
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: "2"
    memory: 2Gi

istio:
  sidecar: true

servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

# Kafka consumer group ID
env:
  - name: KAFKA_CONSUMER_GROUP_ID
    value: "seat-service"
  # HikariCP connection pool 크기 조정
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "20"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "5"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

# Prometheus metrics (PodMonitor)
# management 포트 분리로 context path 없이 /actuator/prometheus 사용
metrics:
  enabled: true
  port: 9090
  path: /actuator/prometheus
  interval: 30s

# PodDisruptionBudget - 최소 1개 유지
pdb:
  enabled: true
  maxUnavailable: 1
