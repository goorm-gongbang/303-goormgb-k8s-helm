# ai-defense - Staging 환경
# Python FastAPI 기반 AI Defense API

replicaCount: 1

# IRSA ServiceAccount (S3 접근용)
serviceAccountName: ai-defense
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::406223549139:role/goormgb-staging-ai-defense

# Uvicorn 실행 명령어 (root-path 설정 for /ai prefix)
command:
  - "python"
args:
  - "-m"
  - "uvicorn"
  - "traffic_master_ai.defense.api.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--root-path"
  - "/ai"
  - "--workers"
  - "4"

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/staging/playball/ai/defense
  tag: "c3ff0e0.25"
  name: "staging/playball/ai/defense"
  pullPolicy: Always

# Python 모듈 경로 설정 + AI Defense 환경변수
env:
  - name: PYTHONPATH
    value: /app/src
  - name: APP_PORT
    value: "8000"
  # 환경 식별자
  - name: TM_ENV
    value: "staging"
  # Rollout 해시 salt (Secrets Manager: ai-service-config 에 TM_ROLLOUT_SALT 키 추가 필요)
  - name: TM_ROLLOUT_SALT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: TM_ROLLOUT_SALT
  # authoritative state 강제: 로컬 폴백 / 인메모리 Redis 금지
  - name: TM_POLICY_ALLOW_LOCAL_FALLBACK
    value: "false"
  - name: TM_ALLOW_IN_MEMORY_REDIS
    value: "false"
  # Policy projection 재시도 튜닝
  - name: TM_PROJECTION_RETRY_MAX_ATTEMPTS
    value: "2"
  - name: TM_PROJECTION_RETRY_BACKOFF_MS
    value: "50"
  # JSON 로깅 활성화 (Loki 멀티라인 문제 해결)
  - name: TM_LOG_FORMAT
    value: "json"
  # 런타임 상태 관리를 Redis로 명시 (인메모리 방지)
  - name: TM_RUNTIME_STATE_BACKEND
    value: "redis"
  - name: TM_DEFENSE_POLICY_VERSION
    value: "def-pol-2.0.0"
  # Redis 연결 (Secrets Manager에서 가져옴)
  - name: AI_REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_HOST
  - name: AI_REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_PORT
  # 런타임 캐시용 Redis URL (동적 파싱)
  - name: TM_REDIS_URL
    value: "rediss://$(AI_REDIS_HOST):$(AI_REDIS_PORT)/1"
  # CORS 허용 Origin (Frontend)
  - name: TM_CORS_ALLOW_ORIGINS
    value: "https://staging.playball.one"
  # S3 아카이빙 활성화 (IRSA로 접근 - credentials 불필요)
  - name: TM_S3_BUCKET
    value: "playball-staging-ai-audit"
  - name: TM_S3_ARCHIVE_INTERVAL_SECONDS
    value: "60"
  # PostgreSQL (RDS - Secrets Manager에서 가져옴)
  - name: AI_PG_HOST
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_PG_HOST
  - name: AI_PG_PORT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_PG_PORT
  - name: AI_PG_USERNAME
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_PG_USERNAME
  - name: AI_PG_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_PG_PASSWORD
  - name: AI_PG_DBNAME
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_PG_DBNAME
  - name: TM_PG_URL
    value: "postgresql://$(AI_PG_USERNAME):$(AI_PG_PASSWORD)@$(AI_PG_HOST):$(AI_PG_PORT)/$(AI_PG_DBNAME)?sslmode=require"
  # Policy projection staleness 허용치 (ai-defense 내부 background task가 projection 유지)
  - name: TM_POLICY_PROJECTION_MAX_STALENESS_MS
    value: "300000"
  # ClickHouse (클러스터 내부 - Secrets Manager에서 인증 정보 가져옴)
  - name: AI_CLICKHOUSE_USER
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_CLICKHOUSE_USER
  - name: AI_CLICKHOUSE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_CLICKHOUSE_PASSWORD
  - name: TM_CLICKHOUSE_URL
    value: "http://$(AI_CLICKHOUSE_USER):$(AI_CLICKHOUSE_PASSWORD)@clickhouse.data.svc.cluster.local:8123/ai_defense"
  # Auth-Guard Block Sync (봇 탐지 시 유저 차단 연동)
  - name: AUTH_GUARD_URL
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AUTH_GUARD_URL
  - name: INTERNAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: INTERNAL_API_KEY
  # Offline LLM API key (post-review / backoffice copilot fallback adapter)
  - name: TM_OFFLINE_LLM_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: TM_OFFLINE_LLM_API_KEY
  # OpenTelemetry: 새 Semantic Convention 사용 (Java와 통일)
  - name: OTEL_SEMCONV_STABILITY_OPT_IN
    value: "http"
  # Audit 로그 경로 (컨테이너 쓰기 권한 문제 우회)
  - name: TM_DEFENSE_AUDIT_LOG_PATH
    value: "/tmp/logs/defense_decision_audit.jsonl"
  - name: TM_OFFLINE_LLM_AUDIT_PATH
    value: "/tmp/logs/offline_llm_audit.jsonl"

# EKS 노드 IAM Role이 ECR 접근 권한 보유 - imagePullSecrets 불필요
imagePullSecrets: []

# Graviton (ARM64) 노드에 배치
nodeSelector:
  kubernetes.io/arch: arm64

resources:
  requests:
    cpu: 450m
    memory: 384Mi
  limits:
    cpu: "2"
    memory: 3Gi

# Istio VirtualService for /ai/* routing
istio:
  sidecar: true
  gateway:
    enabled: true
    host: "api.staging.playball.one"
    extraHosts:
      - "api.playball.one"
    externalRef: "istio-system/api-gateway"
    contextPath: "/ai/"
    redirect:
      enabled: true
      from: "/ai"
      to: "/ai/"
  cors:
    enabled: true
    allowOrigins:
      - "https://staging.playball.one"
      - "https://www.staging.playball.one"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - "*"
    allowCredentials: true
    maxAge: "24h"

# Service
service:
  type: ClusterIP
  port: 8000

# Health checks (FastAPI endpoints)
# burst 부하에서 worker 점유 시 1초 안에 응답 못 해 SIGKILL 당하는 문제 완화
livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Prometheus Metrics (FastAPI - 같은 포트에서 /metrics 노출)
metrics:
  enabled: true
  port: 8000
  portName: http
  path: /metrics
  interval: 15s

# OpenTelemetry (앱에 opentelemetry SDK 설치 필요)
otel:
  enabled: true
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"

# PreSync Jobs — ArgoCD sync-wave 순서대로 실행, 하나라도 실패 시 Deployment/CronJob 진행 중단
# wave 0 → 1 → 2 → (Deployment/CronJob)
presyncJobs:
  - name: tm-ai-clickhouse-migrate
    syncWave: "-1"
    command:
      - tm-ai-clickhouse-migrate
  - name: tm-ai-storage-migrate
    syncWave: "0"
    command:
      - tm-ai-storage-migrate
  - name: tm-ai-policy-bootstrap
    syncWave: "1"
    command:
      - tm-ai-policy-bootstrap
  - name: tm-ai-policy-projection-resync
    syncWave: "2"
    command:
      - tm-ai-policy-projection-resync
      - --current

# CronJobs — closed-loop 자동화 (최적화 + 사후판단)
cronJobs:
  - name: tm-ai-policy-optimizer
    enabled: true
    schedule: "*/10 * * * *"
    concurrencyPolicy: Forbid
    restartPolicy: Never
    backoffLimit: 1
    command:
      - tm-ai-policy-optimizer
    extraEnv:
      - name: TM_POLICY_OPTIMIZER_ENABLED
        value: "true"
      - name: TM_POLICY_OPTIMIZER_DRY_RUN
        value: "false"
      - name: TM_POLICY_OPTIMIZER_APPLY_ENABLED
        value: "true"
      - name: TM_POLICY_OPTIMIZER_WINDOW_SECONDS
        value: "600"
      - name: TM_POLICY_OPTIMIZER_CANARY_RATIO
        value: "0.05"
      - name: TM_POLICY_OPTIMIZER_MIN_APPLY_COOLDOWN_SECONDS
        value: "300"
      - name: TM_POLICY_OPTIMIZER_ROLLOUT_ID
        value: "offline-optimizer-default"
      - name: TM_POLICY_OPTIMIZER_LOCK_TTL_SECONDS
        value: "300"

  - name: tm-ai-post-review
    enabled: true
    schedule: "*/10 * * * *"
    concurrencyPolicy: Forbid
    restartPolicy: Never
    backoffLimit: 1
    command:
      - tm-ai-post-review

  # S3 Audit → ClickHouse ETL (기존 staging-ai-etl 앱에서 흡수)
  - name: tm-ai-etl
    enabled: true
    schedule: "15 * * * *"
    concurrencyPolicy: Forbid
    restartPolicy: OnFailure
    backoffLimit: 2
    command:
      - tm-ai-etl
    extraEnv:
      - name: TM_ETL_PROCESSED_LEDGER_TTL_SECONDS
        value: "2592000"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
