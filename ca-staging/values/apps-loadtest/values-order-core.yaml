# order-core - Load-test 환경
fullnameOverride: "order-core"
contextPath: "/order"
replicaCount: 1

image:
  name: "staging/playball/web/order-core"
  tag: "10daed3.32"
  pullPolicy: Always

imagePullSecrets: []

nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: order-core
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

istio:
  sidecar: true

servicePort: &port 8083
service:
  type: ClusterIP
  port: *port

# HikariCP connection pool 크기 조정 (부하테스트용)
env:
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "5"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "2"

  # 로그 레벨 WARN (부하테스트 시 로그 감소)
  - name: LOGGING_LEVEL_ROOT
    value: "WARN"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

pdb:
  enabled: true
  minAvailable: 1
