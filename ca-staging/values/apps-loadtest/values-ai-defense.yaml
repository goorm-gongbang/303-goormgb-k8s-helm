# ai-defense - Load-test 환경
# Python FastAPI 기반 AI Defense API

replicaCount: 0

command:
  - "python"
args:
  - "-m"
  - "uvicorn"
  - "traffic_master_ai.defense.api.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--root-path"
  - "/ai"

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/staging/playball/ai/defense
  tag: "1ffee9a.18"
  name: "staging/playball/ai/defense"
  pullPolicy: Always

env:
  - name: PYTHONPATH
    value: /app/src
  - name: APP_PORT
    value: "8000"
  - name: TM_RUNTIME_STATE_BACKEND
    value: "redis"
  - name: TM_DEFENSE_POLICY_VERSION
    value: "def-pol-2.0.0"
  - name: AI_REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_HOST
  - name: AI_REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: ai-service-config
        key: AI_REDIS_PORT
  - name: TM_REDIS_URL
    value: "redis://$(AI_REDIS_HOST):$(AI_REDIS_PORT)/1"
  - name: TM_CORS_ALLOW_ORIGINS
    value: "https://staging.playball.one"
  - name: TM_S3_BUCKET
    value: ""
  - name: TM_CLICKHOUSE_URL
    value: ""
  - name: TM_PG_URL
    value: ""
  - name: OTEL_SEMCONV_STABILITY_OPT_IN
    value: "http"
  # Offline LLM Audit 로그 경로 (컨테이너 쓰기 권한 문제 우회)
  - name: TM_OFFLINE_LLM_AUDIT_PATH
    value: "/tmp/logs/offline_llm_audit.jsonl"

# EKS 노드 IAM Role이 ECR 접근 권한 보유 - imagePullSecrets 불필요

# Load-test 노드에 배치
nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

istio:
  sidecar: true
  gateway:
    enabled: false

service:
  type: ClusterIP
  port: 8000

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

metrics:
  enabled: true
  port: 8000
  portName: http
  path: /metrics
  interval: 15s

otel:
  enabled: true
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"
