# seat - Load-test 환경
fullnameOverride: "seat"
contextPath: "/seat"
replicaCount: 10

image:
  name: "staging/playball/web/seat"
  tag: "432992f.50"
  pullPolicy: Always

imagePullSecrets: []

nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: seat
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "3"
    memory: 2Gi

istio:
  sidecar: true

servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

# HikariCP connection pool 크기 조정 (부하테스트용)
# Seat - DB 쿼리 많음: 블럭/좌석/온보딩 조회, Hold 생성 (5000 VU 대상)
# 3 replicas x 40 pool = 120 connections (3000 VUs 기준 booking-options 동시성 대응)
# 2026-04-16: 25 → 40 상향. acquire wait P99 6.5s 관측 → pool 포화가 seat P99 6s 원인.
env:
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "40"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "15"
  - name: SERVER_TOMCAT_THREADS_MAX
    value: "400"
  - name: SERVER_TOMCAT_THREADS_MIN_SPARE
    value: "50"

  # 로그 레벨 WARN (부하테스트 시 로그 감소)
  - name: LOGGING_LEVEL_ROOT
    value: "WARN"
  # Kafka consumer group (staging과 분리)
  - name: KAFKA_CONSUMER_GROUP_ID
    value: "loadtest-seat-service"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

pdb:
  enabled: true
  maxUnavailable: 1
