# seat - Load-test 환경
fullnameOverride: "seat"
contextPath: "/seat"
replicaCount: 0

image:
  name: "staging/playball/web/seat"
  tag: "55c4719.37"
  pullPolicy: Always

imagePullSecrets: []

nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: seat
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

istio:
  sidecar: true

servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

# HikariCP connection pool 크기 조정 (부하테스트용)
# Seat - DB 쿼리 많음: 블럭/좌석/온보딩 조회, Hold 생성 (5000 VU 대상)
# 4 replicas x 15 pool = 60 connections
env:
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "15"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "5"

  # 로그 레벨 WARN (부하테스트 시 로그 감소)
  - name: LOGGING_LEVEL_ROOT
    value: "WARN"
  # Kafka consumer group (staging과 분리)
  - name: KAFKA_CONSUMER_GROUP_ID
    value: "loadtest-seat-service"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

pdb:
  enabled: true
  minAvailable: 1
