# [DEPRECATED] api-gateway - Istio ingress gateway 로 이관 완료 (2026-04-16)
# JWT 검증/라우팅을 istio-ingressgateway 에서 직접 처리하므로 이 서비스는 더 이상 사용하지 않음.
# replicaCount=0 유지. ArgoCD Application 은 app-of-apps 구조 안전성을 위해 잔존.
# 향후 안정 확인 후 ArgoCD Application CR 과 함께 완전 제거 예정.
fullnameOverride: "api-gateway"
contextPath: ""
replicaCount: 3

image:
  name: "staging/playball/web/api-gateway"
  tag: "ad596a4.39"
  pullPolicy: Always

imagePullSecrets: []

# Load-test 노드에 배치
nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

# HA: 노드 분산
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: api-gateway
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio - VirtualService는 별도 관리
istio:
  sidecar: true
  gateway:
    enabled: false # /load-test/ 라우팅은 별도 VirtualService

# Service
servicePort: &port 8085
service:
  type: ClusterIP
  port: *port

# Environment variables - loadtest-webs 서비스 참조
env:
  # Spring Cloud Gateway HTTP client pool (부하테스트 병목 대응)
  # fixed 1000 → elastic 2000: P50 은 개선됐으나 acquire-timeout 3s 로
  # 인한 tail (P99 8s) 발생. elastic 으로 burst 흡수 + timeout 짧게.
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_TYPE
    value: "elastic"
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_MAX_CONNECTIONS
    value: "2000"
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_ACQUIRE_TIMEOUT
    value: "1500"
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_MAX_IDLE_TIME
    value: "30s"
  - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_RESPONSE_TIMEOUT
    value: "5s"
  - name: ALLOWED_ORIGINS
  - name: AUTH_GUARD_URL
    value: "http://auth-guard.loadtest-webs.svc.cluster.local:8080"
  - name: QUEUE_URL
    value: "http://queue.loadtest-webs.svc.cluster.local:8081"
  - name: SEAT_URL
    value: "http://seat.loadtest-webs.svc.cluster.local:8082"
  - name: ORDER_CORE_URL
    value: "http://order-core.loadtest-webs.svc.cluster.local:8083"
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_PORT
  # HikariCP connection pool - 라우팅만 담당, DB 거의 안 씀
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "3"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "2"
  # 로그 레벨 WARN (부하테스트 시 로그 감소)
  - name: LOGGING_LEVEL_ROOT
    value: "WARN"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

pdb:
  enabled: true
  maxUnavailable: 1
