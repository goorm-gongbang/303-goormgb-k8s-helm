# KEDA ScaledObject - Load Test
# 부하테스트 전용 오토스케일링 (CPU 기반, 빠른 반응)
# cron pre-warming: 현재 min + 2개 (10:40~22:00 KST)

scalers:
  # === Load-test Web Services ===
  api-gateway:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 300
    pollingInterval: 10
    cpu:
      threshold: "80"
    cron:
      - timezone: Asia/Seoul
        start: "40 10 * * *"
        end: "40 11 * * *"
        desiredReplicas: "3"

  auth-guard:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 300
    pollingInterval: 10
    cpu:
      threshold: "80"
    cron:
      - timezone: Asia/Seoul
        start: "40 10 * * *"
        end: "40 11 * * *"
        desiredReplicas: "2"

  queue:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 6
    cooldownPeriod: 300
    pollingInterval: 10
    cpu:
      threshold: "80"
    # kafka: loadtest 환경에 order-events 토픽 없음
    # kafka:
    #   consumerGroup: queue-consumer
    #   topic: order-events
    #   lagThreshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "40 10 * * *"
        end: "40 11 * * *"
        desiredReplicas: "3"

  seat:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 6
    cooldownPeriod: 300
    pollingInterval: 10
    cpu:
      threshold: "80"
    cron:
      - timezone: Asia/Seoul
        start: "40 10 * * *"
        end: "40 11 * * *"
        desiredReplicas: "3"

  order-core:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 300
    pollingInterval: 10
    cpu:
      threshold: "80"
    # kafka: loadtest 환경에 order-events 토픽 없음
    # kafka:
    #   consumerGroup: order-consumer
    #   topic: order-events
    #   lagThreshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "40 10 * * *"
        end: "40 11 * * *"
        desiredReplicas: "2"
