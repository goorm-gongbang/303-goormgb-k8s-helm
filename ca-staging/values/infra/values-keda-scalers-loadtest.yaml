# KEDA ScaledObject - Load Test
# 부하테스트 전용 오토스케일링 (CPU 기반, 빠른 반응)
# cron pre-warming: 현재 min + 2개 (10:40~22:00 KST)

scalers:
  # === Load-test Web Services ===
  api-gateway:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "20 10 * * *"
        end: "30 10 * * *"
        desiredReplicas: "3"

  auth-guard:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "20 10 * * *"
        end: "30 10 * * *"
        desiredReplicas: "3"

  queue:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 6
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    kafka:
      consumerGroup: queue-consumer
      topic: order-events
      lagThreshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "20 10 * * *"
        end: "30 10 * * *"
        desiredReplicas: "3"

  seat:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 6
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "20 10 * * *"
        end: "30 10 * * *"
        desiredReplicas: "3"

  order-core:
    enabled: true
    namespace: loadtest-webs
    minReplicas: 1
    maxReplicas: 4
    cooldownPeriod: 30
    pollingInterval: 10
    cpu:
      threshold: "50"
    kafka:
      consumerGroup: order-consumer
      topic: order-events
      lagThreshold: "50"
    cron:
      - timezone: Asia/Seoul
        start: "20 10 * * *"
        end: "30 10 * * *"
        desiredReplicas: "3"
