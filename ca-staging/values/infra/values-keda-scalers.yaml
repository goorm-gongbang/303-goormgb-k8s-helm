# KEDA ScaledObject - Staging
# 앱별 오토스케일링 규칙

scalers:
  # === Web Services ===
  api-gateway:
    enabled: true
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"

  auth-guard:
    enabled: true
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"

  queue:
    enabled: true
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"
    # kafka:
    #   consumerGroup: queue-consumer
    #   topic: order-events
    #   lagThreshold: "100"

  seat:
    enabled: true
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 2
    cpu:
      threshold: "80"

  order-core:
    enabled: true
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 1
    cpu:
      threshold: "80"
    # kafka:
    #   consumerGroup: order-consumer
    #   topic: order-events
    #   lagThreshold: "100"

  # === AI Services ===
  ai-defense:
    enabled: true
    namespace: staging-ai
    deploymentName: staging-ai-defense
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"

  authz-adapter:
    enabled: true
    namespace: staging-ai
    deploymentName: staging-authz-adapter
    minReplicas: 1
    maxReplicas: 2
    cpu:
      threshold: "80"
