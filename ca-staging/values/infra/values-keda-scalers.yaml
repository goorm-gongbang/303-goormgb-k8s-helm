# KEDA ScaledObject - Staging
# 앱별 오토스케일링 규칙

scalers:
  # === Web Services ===
  api-gateway:
    enabled: false
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"

  auth-guard:
    enabled: false
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"

  queue:
    enabled: false
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 8
    cpu:
      threshold: "80"
    kafka:
      consumerGroup: queue-consumer
      topic: order-events
      lagThreshold: "100"

  seat:
    enabled: false
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 8
    cpu:
      threshold: "80"

  order-core:
    enabled: false
    namespace: staging-webs
    minReplicas: 1
    maxReplicas: 5
    cpu:
      threshold: "80"
    kafka:
      consumerGroup: order-consumer
      topic: order-events
      lagThreshold: "100"

  # === AI Services ===
  ai-defense:
    enabled: false
    namespace: staging-ai
    deploymentName: staging-ai-defense
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"

  authz-adapter:
    enabled: false
    namespace: staging-ai
    deploymentName: staging-authz-adapter
    minReplicas: 1
    maxReplicas: 3
    cpu:
      threshold: "80"
