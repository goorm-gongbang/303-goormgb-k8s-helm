# Alertmanager routing/receivers (staging)

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "staging/monitoring"
      securityWebhooksEnabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-discord-webhooks

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'job', 'service_name']
      group_wait: 5s
      group_interval: 5m
      repeat_interval: 10m
      receiver: 'null'
      routes:
        - match:
            team: security
            environment: staging
            severity: critical
          receiver: 'discord-security-critical'
          repeat_interval: 30m
        - match:
            team: security
            environment: staging
            severity: warning
          receiver: 'discord-security-warning'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: critical
          receiver: 'discord-critical'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: warning
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: info
          receiver: 'discord-info'
          repeat_interval: 10m
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            alertname: InfoInhibitor
          receiver: 'null'

    receivers:
      - name: 'discord-critical'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/critical-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/explore?schemaVersion=1&panes=%7B%223v1%22%3A%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22datasource%22%3A%7B%22type%22%3A%22loki%22%2C%22uid%22%3A%22loki%22%7D%2C%22expr%22%3A%22%7Bnamespace%3D%5C%22staging-webs%5C%22%7D+%7C+json+%7C+level%3D%5C%22ERROR%5C%22%22%2C%22refId%22%3A%22A%22%2C%22editorMode%22%3A%22code%22%2C%22queryType%22%3A%22range%22%2C%22direction%22%3A%22backward%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%2C%22compact%22%3Afalse%7D%7D&orgId=1'
            title: |-
              {{- $incidentId := "" -}}
              {{- range .Alerts -}}
              {{- $ts := (.StartsAt | tz "Asia/Seoul" | date "20060102-150405") -}}
              {{- if or (eq $incidentId "") (lt $ts $incidentId) -}}{{- $incidentId = $ts -}}{{- end -}}
              {{- end -}}
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 장애 복구{{ else }}🚨 장애 감지{{ end }} [{{ if ne $incidentId "" }}{{ $incidentId }}{{ else }}unknown{{ end }}]
            text: |-
              {{ if ne .Status "resolved" }}@개발팀 @admins{{ end }}
              {{- $startedAt := "" -}}
              {{- $resolvedAt := "" -}}
              {{- range .Alerts -}}
              {{- $startTs := (.StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST") -}}
              {{- if or (eq $startedAt "") (lt $startTs $startedAt) -}}{{- $startedAt = $startTs -}}{{- end -}}
              {{- if eq $.Status "resolved" -}}
              {{- $endTs := (.EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST") -}}
              {{- if or (eq $resolvedAt "") (lt $resolvedAt $endTs) -}}{{- $resolvedAt = $endTs -}}{{- end -}}
              {{- end -}}
              {{- end }}
              ```text
              알림: {{ or .CommonLabels.alertname "N/A" }}
              서비스: {{ or .CommonLabels.service_name .CommonLabels.app "N/A" }}
              네임스페이스: {{ or .CommonLabels.namespace "staging-webs" }}
              대상건수: {{ len .Alerts }}
              {{ range .Alerts -}}
              - {{ or .Labels.app "N/A" }} {{ or .Labels.http_route "" }} {{ or .Labels.http_response_status_code "" }} ({{ .Annotations.description | default "상세 없음" }})
              {{ end -}}
              {{ with index .Alerts 0 -}}
              발생(KST): {{ if ne $startedAt "" }}{{ $startedAt }}{{ else }}N/A{{ end }}
              {{ if eq $.Status "resolved" }}복구(KST): {{ if ne $resolvedAt "" }}{{ $resolvedAt }}{{ else }}N/A{{ end }}{{ end }}
              {{- end }}
              ```

