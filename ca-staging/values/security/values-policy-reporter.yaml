# Policy Reporter - Kyverno 정책 위반 리포팅 및 Discord 알림 설정
# Chart: policy-reporter/policy-reporter
# https://github.com/kyverno/policy-reporter

target:
  discord:
    host: https://discord.com
    webhook: /api/webhooks/1493781545293451345/LpvwKo77OcEsMOv5Ci7YEnQyeEmxvMkfAqVYkrOmP5_pPtmEjkqSgtPRi66Nu9Mugf6u
    minimumPriority: "warning"
    sources:
      - kyverno
    skipExistingOnStartup: true

# Kyverno 전용 UI 활성화
ui:
  enabled: true
  plugins:
    kyverno: true
  
  # 사이드카 주입 비활성화
  annotations:
    sidecar.istio.io/inject: "false"

  # 기본 UI 포트 사용
  service:
    port: 8080

  # OAuth2 Proxy 사이드카 추가 (RedisInsight 방식)
  deployment:
    extraContainers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        args:
          - --provider=google
          - --email-domain=*
          - --http-address=0.0.0.0:4180
          - --redirect-url=https://policy-reporter.staging.playball.one/oauth2/callback
          - --cookie-secure=true
          - --cookie-samesite=lax
          - --cookie-refresh=1h
          - --cookie-expire=4h
          - --authenticated-emails-file=/etc/oauth2-proxy/authenticated-emails.txt
          - --skip-provider-button=false
          - --reverse-proxy=true
          - --proxy-prefix=/oauth2
          - --upstream=http://127.0.0.1:8080
        envFrom:
          - secretRef:
              name: policy-reporter-ui-oauth
        ports:
          - name: http-proxy
            containerPort: 4180
            protocol: TCP
              volumeMounts:
                - name: oauth-emails
                  mountPath: /etc/oauth2-proxy
                  readOnly: true
        
            extraVolumes:
              - name: oauth-emails
                secret:
                  secretName: policy-reporter-ui-emails
        # Kyverno Plugin 활성화 (상세 리포팅)
kyvernoPlugin:
  enabled: true

# 리소스 할당량 설정
resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Staging 환경용 모니터링 노드 배치
nodeSelector:
  role: monitoring

tolerations:
  - key: role
    value: monitoring
    effect: NoSchedule

# Prometheus 메트릭 수집 설정
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
