# OAuth2 Proxy credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-reporter-ui-oauth
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: policy-reporter-ui-oauth
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: staging/infra/oauth/admin-tools
        property: clientId
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: staging/infra/oauth/admin-tools
        property: clientSecret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: staging/infra/oauth/admin-tools
        property: cookieSecret
---
# Allowed emails list
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-reporter-ui-emails
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: policy-reporter-ui-emails
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        authenticated-emails.txt: "{{ `{{ .emails }}` }}"
  data:
    - secretKey: emails
      remoteRef:
        key: staging/infra/oauth/admin-tools
        property: allowedEmails
