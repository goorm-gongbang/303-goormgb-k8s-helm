# CloudBeaver for Staging
# Google OAuth via OAuth2 Proxy sidecar
replicaCount: 1

image:
  repository: dbeaver/cloudbeaver
  tag: "24.0.0"
  pullPolicy: IfNotPresent

# OAuth2 Proxy sidecar
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.6.0"
  port: 4180
  config:
    provider: google
    cookieSecure: true
    cookieDomain: ".staging.playball.one"
    cookieRefresh: "1h"
    cookieExpire: "4h"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # ESO: staging/infra/oauth-teams
  eso:
    enabled: true
    secretStoreRef:
      name: "aws-secrets-manager"
      kind: "ClusterSecretStore"
    remoteRef:
      key: "staging/infra/oauth-teams"

service:
  type: ClusterIP
  port: 4180  # OAuth2 Proxy port

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1536Mi

persistence:
  enabled: true
  size: 2Gi
  storageClass: gp3

initialConfig:
  enabled: false
  dataSources: |
    {"folders":{},"connections":{}}

nodeSelector:
  role: monitoring

tolerations:
  - key: role
    value: monitoring
    effect: NoSchedule

# Istio VirtualService
virtualService:
  enabled: true
  host: "cloudbeaver.staging.playball.one"
  gateway: "istio-system/api-gateway"
