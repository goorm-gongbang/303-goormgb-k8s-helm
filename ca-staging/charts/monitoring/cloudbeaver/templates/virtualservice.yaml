{{- if .Values.virtualService.enabled }}
{{- $name := .Values.fullnameOverride | default .Release.Name | default "cloudbeaver" }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ $name }}-vs
spec:
  hosts:
    - {{ .Values.virtualService.host | quote }}
  gateways:
    - {{ .Values.virtualService.gateway }}
  http:
    - match:
        - uri:
            prefix: /
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: connect-failure,refused-stream,503,reset
      route:
        - destination:
            host: {{ $name }}.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: {{ .Values.service.port }}
{{- end }}
