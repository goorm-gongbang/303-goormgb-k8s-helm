# Redis Exporter for AI ElastiCache
enabled: true

image:
  repository: oliver006/redis_exporter
  tag: v1.66.0
  pullPolicy: IfNotPresent

# ElastiCache 연결 설정
redis:
  # Secret에서 가져올 환경변수명
  hostEnvVar: AI_REDIS_HOST
  portEnvVar: AI_REDIS_PORT
  # Secret 참조 (ESO에서 생성)
  secretName: ai-service-config
  # 기본 포트 (Secret에 없을 경우)
  defaultPort: "6379"

# Istio sidecar 비활성화
podAnnotations:
  sidecar.istio.io/inject: "false"

# Exporter 설정
exporter:
  port: 9121
  # TLS 활성화 (ElastiCache transit_encryption_mode: required)
  extraArgs:
    - --redis.addr=rediss://$(AI_REDIS_HOST):$(AI_REDIS_PORT)
    - --skip-tls-verification

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# ServiceMonitor 설정
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  # Prometheus 라벨 (ai-team 대시보드용)
  additionalLabels:
    app: redis-exporter-ai
    team: ai

nodeSelector:
  role: infra

tolerations:
  - key: "role"
    operator: "Equal"
    value: "infra"
    effect: "NoSchedule"
