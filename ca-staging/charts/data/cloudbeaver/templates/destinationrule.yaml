{{- if .Values.virtualService.enabled }}
{{- $name := .Values.fullnameOverride | default .Release.Name | default "cloudbeaver" }}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ $name }}-dr
spec:
  host: {{ $name }}.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
{{- end }}
