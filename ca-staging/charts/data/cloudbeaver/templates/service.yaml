{{- $name := .Values.fullnameOverride | default .Release.Name | default "cloudbeaver" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      {{- if .Values.oauth2Proxy.enabled }}
      targetPort: http
      {{- else }}
      targetPort: cb-http
      {{- end }}
      protocol: TCP
      name: http
  selector:
    app: {{ $name }}
