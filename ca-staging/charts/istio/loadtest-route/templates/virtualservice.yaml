{{- if .Values.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: load-test-route
spec:
  hosts:
    - {{ .Values.host | quote }}
  gateways:
    - {{ .Values.gatewayRef }}
  http:
    # ─── Per-service direct routing (api-gateway 우회) ──────────────
    # /load-test/{service-prefix}/** → {service}.{ns}.svc.cluster.local
    # api-gateway 의 JWT / Rate Limit / Routing 기능은 Istio 로 이관됨.
    {{- if .Values.directRoutes.enabled }}
    {{- range .Values.directRoutes.services }}
    - match:
        - uri:
            prefix: {{ printf "%s%s" $.Values.sourcePath (trimPrefix "/" .prefix) | quote }}
      rewrite:
        uri: {{ .prefix | quote }}
      route:
        - destination:
            host: {{ printf "%s.%s.svc.cluster.local" .name $.Values.directRoutes.namespace | quote }}
            port:
              number: {{ .port }}
      {{- if $.Values.cors.enabled }}
      corsPolicy:
        allowOrigins:
          {{- range $.Values.cors.allowOrigins }}
          - exact: {{ . | quote }}
          {{- end }}
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowHeaders:
          - "*"
        allowCredentials: true
        maxAge: "24h"
      {{- end }}
    {{- end }}
    {{- end }}

    # ─── Fallback: Spring Cloud Gateway (운영중 점진 이관용) ──────────
    # directRoutes 에 매칭되지 않은 /load-test/* 요청을 api-gateway 로.
    # 검증 끝나면 gatewayProxy.enabled: false 로 두고 삭제 예정.
    {{- if .Values.gatewayProxy.enabled }}
    - match:
        - uri:
            prefix: {{ .Values.sourcePath }}
      rewrite:
        uri: /
      route:
        - destination:
            host: {{ .Values.gatewayProxy.destination.host }}
            port:
              number: {{ .Values.gatewayProxy.destination.port }}
      {{- if .Values.cors.enabled }}
      corsPolicy:
        allowOrigins:
          {{- range .Values.cors.allowOrigins }}
          - exact: {{ . | quote }}
          {{- end }}
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        allowHeaders:
          - "*"
        allowCredentials: true
        maxAge: "24h"
      {{- end }}
    {{- end }}
{{- end }}
