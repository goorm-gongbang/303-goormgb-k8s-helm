{{- if and .Values.enabled .Values.rateLimit.enabled }}
# Spring Cloud Gateway 의 RequestRateLimiter 를 Envoy local_ratelimit 으로 이관.
# /load-test/queue/matches/*/enter (POST) 에 token-bucket 제한 적용.
# 전역 아닌 pod-local 이지만 ingressgateway replica × bucket 만큼 허용됨.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: load-test-ratelimit-queue-enter
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    # 1) HTTP connection manager 에 local_ratelimit HTTP filter 삽입
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.local_ratelimit
          typed_config:
            "@type": type.googleapis.com/udpa.type.v1.TypedStruct
            type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
            value:
              stat_prefix: load_test_queue_enter
              # route 레벨에서 config 주입할 것이므로 여기선 빈 값
              token_bucket:
                max_tokens: {{ .Values.rateLimit.queueEnter.burstCapacity }}
                tokens_per_fill: {{ .Values.rateLimit.queueEnter.replenishRate }}
                fill_interval: 1s
              filter_enabled:
                runtime_key: local_rate_limit_enabled
                default_value:
                  numerator: 100
                  denominator: HUNDRED
              filter_enforced:
                runtime_key: local_rate_limit_enforced
                default_value:
                  numerator: 100
                  denominator: HUNDRED
              response_headers_to_add:
                - append: false
                  header:
                    key: x-local-rate-limit
                    value: 'true'
{{- end }}
