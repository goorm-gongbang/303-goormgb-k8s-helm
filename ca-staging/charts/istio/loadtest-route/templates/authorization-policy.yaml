{{- if and .Values.enabled .Values.authz.enabled }}
# /load-test/* 경로에서 JWT 없는 요청만 DENY (공개 경로 제외).
# DENY-only 방식: ALLOW 정책이 없으므로 다른 host/path 트래픽은 Istio 기본 허용 유지.
# (ALLOW 정책이 하나라도 있으면 implicit deny-all 발동 → 다른 서비스 차단됨)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: load-test-require-jwt
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: DENY
  rules:
    - from:
        - source:
            notRequestPrincipals: ["*"]
      to:
        - operation:
            paths:
              - {{ printf "%s*" .Values.sourcePath | quote }}
            notPaths:
              {{- range .Values.authz.publicPaths }}
              - {{ printf "%s*" .prefix | quote }}
              - {{ .prefix | quote }}
              {{- end }}
{{- end }}
