{{/*
ApplicationSets - 서비스 배포용 ApplicationSet (multi-source)
*/}}
{{- $git := .Values.git -}}
{{- $ecr := .Values.ecr -}}
{{- $project := .Values.project -}}
{{- $destination := .Values.destination -}}

{{- range $name, $appSet := .Values.applicationSets }}
{{- if and $appSet.enabled $appSet.services }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "{{ $appSet.syncWave | default "10" }}"
spec:
  generators:
    - list:
        elements:
          {{- range $appSet.services }}
          - name: {{ .name }}
            syncWave: "{{ .syncWave | default $appSet.syncWave | default "10" }}"
          {{- end }}
  template:
    metadata:
      name: '{{ $appSet.namespace }}-{{`{{name}}`}}'
      labels:
        ns: {{ $appSet.namespace }}
      annotations:
        argocd.argoproj.io/sync-wave: '{{`{{syncWave}}`}}'
        notifications.argoproj.io/subscribe.on-deployed.discord-app: ""
        notifications.argoproj.io/subscribe.on-deploy-failed.discord-app: ""
        notifications.argoproj.io/subscribe.on-health-degraded.discord-app: ""
    spec:
      project: {{ $project }}
      sources:
        - repoURL: {{ $git.repoURL }}
          targetRevision: {{ $git.targetRevision }}
          ref: values
        - repoURL: {{ $git.repoURL }}
          targetRevision: {{ $git.targetRevision }}
          path: {{ $appSet.chartPath }}
          helm:
            valueFiles:
              - $values/{{ $appSet.valueFilesPattern | replace "../../../" "" }}
            valuesObject:
              ecr:
                accountId: "{{ $ecr.accountId }}"
                region: "{{ $ecr.region }}"
      destination:
        server: {{ $destination.server }}
        namespace: {{ $appSet.namespace }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{- end }}
{{- end }}
