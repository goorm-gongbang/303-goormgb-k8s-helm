# EKS Staging 클러스터 Istio 설정
# ALB Ingress 사용 - Istio IngressGateway는 API 트래픽만 처리

# istiod (Helm chart values)
pilot:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Sidecar Proxy 기본 리소스 설정
global:
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

meshConfig:
  accessLogFile: /dev/stdout
  enableTracing: true

  # Istio 1.22+ extensionProviders 방식 (Telemetry API 연동)
  extensionProviders:
    - name: zipkin
      zipkin:
        service: tempo.monitoring.svc.cluster.local
        port: 9411

  # 기본 tracing provider 설정
  defaultProviders:
    tracing:
      - zipkin

  defaultConfig:
    tracing:
      sampling: 100  # staging은 100% 샘플링

# Legacy gateways 비활성화 (ALB Ingress 사용)
sharedGateway:
  enabled: false
apiGateway:
  enabled: false
monitoringGateway:
  enabled: false

# API Gateway CRD (Istio IngressGateway용)
# ALB → Istio IngressGateway → VirtualService → API Pods
apiGatewayConfig:
  enabled: true
  name: api-gateway
  selector: ingressgateway
  hosts:
    - "api.staging.playball.one"
    - "cloudbeaver.staging.playball.one"
    - "console.staging.playball.one"
    - "kafka-ui.staging.playball.one"
    - "redis.staging.playball.one"

# =============================================================================
# Kiali - Service Mesh Observability
# =============================================================================
# 멀티클러스터 비활성화 (single cluster 환경)
# 이게 없으면 Kiali가 trace 쿼리에 istio.cluster_id 필터 추가함
clustering:
  enabled: false

auth:
  strategy: openid
  openid:
    client_id: "1089953130952-jok8g6t718k2g4vl7leufoc4tjmiqgt1.apps.googleusercontent.com"
    issuer_uri: "https://accounts.google.com"
    scopes: ["openid", "email", "profile"]
    username_claim: "email"
    disable_rbac: true

deployment:
  node_selector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

external_services:
  prometheus:
    url: "http://prom-prometheus.monitoring.svc.cluster.local:9090"
  grafana:
    enabled: true
    in_cluster_url: "http://grafana.monitoring.svc.cluster.local:80"
  tracing:
    enabled: true
    provider: "tempo"
    in_cluster_url: "http://tempo.monitoring.svc.cluster.local:3200"
    use_grpc: false
    tempo_config:
      org_id: "1"
      cache_enabled: true
      cache_capacity: 200
