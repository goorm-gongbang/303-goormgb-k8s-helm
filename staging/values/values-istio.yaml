# EKS Staging 클러스터 Istio 설정
# ALB Ingress 사용 - Istio IngressGateway는 API 트래픽만 처리

# istiod (Helm chart values)
pilot:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Sidecar Proxy 기본 리소스 설정
global:
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

meshConfig:
  accessLogFile: /dev/stdout

# Legacy gateways 비활성화 (ALB Ingress 사용)
sharedGateway:
  enabled: false
apiGateway:
  enabled: false
monitoringGateway:
  enabled: false

# API Gateway CRD (Istio IngressGateway용)
# ALB → Istio IngressGateway → VirtualService → API Pods
apiGatewayConfig:
  enabled: true
  name: api-gateway
  selector: ingressgateway
  hosts:
    - "api.staging.playball.one"
