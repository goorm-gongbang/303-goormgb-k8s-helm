# EKS Staging 클러스터 Istio 설정

# istiod (Helm chart values)
pilot:
  nodeSelector:
    nodepool: system
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Sidecar Proxy 기본 리소스 설정
global:
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

meshConfig:
  accessLogFile: /dev/stdout

# Gateway 설정 (istio-gateway chart용)
gateway:
  nodeSelector:
    nodepool: system
  service:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

# Shared Gateway (VirtualService에서 참조)
sharedGateway:
  enabled: true
  name: api-gateway
  tls:
    credentialName: staging-tls  # cert-manager에서 생성
  hosts:
    - "*.staging.playball.one"
    - "argocd.staging.playball.one"
    - "grafana.staging.playball.one"
    - "api.staging.playball.one"
