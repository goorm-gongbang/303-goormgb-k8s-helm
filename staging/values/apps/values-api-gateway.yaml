# api-gateway - Staging 환경
# ECR: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/staging/playball/web/api-gateway

fullnameOverride: "api-gateway"

replicaCount: 1

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/staging/playball/web/api-gateway
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Karpenter가 노드 관리 - nodeSelector 없음
tolerations:
  - key: "spot"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: true
    externalRef: "istio-system/api-gateway"
    host: "api.staging.playball.one"
  cors:
    enabled: true
    allowOrigins:
      - "https://staging.playball.one"
      - "http://localhost:3000"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - "*"
    allowCredentials: true
    maxAge: "24h"

# Service
servicePort: &port 8085
service:
  type: ClusterIP
  port: *port

# Environment variables
env:
  - name: ALLOWED_ORIGINS
    value: "https://staging.playball.one,http://localhost:3000"
  - name: AUTH_GUARD_URL
    value: "http://auth-guard.staging-webs.svc.cluster.local:8080"
  - name: QUEUE_URL
    value: "http://queue.staging-webs.svc.cluster.local:8081"
  - name: SEAT_URL
    value: "http://seat.staging-webs.svc.cluster.local:8082"
  - name: ORDER_CORE_URL
    value: "http://order-core.staging-webs.svc.cluster.local:8083"
  - name: RECOMMENDATION_URL
    value: "http://recommendation.staging-webs.svc.cluster.local:8084"
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_PORT

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

otel:
  enabled: false  # staging에서는 우선 비활성화
