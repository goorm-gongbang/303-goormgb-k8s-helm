# seat - Staging 환경
fullnameOverride: "seat"
contextPath: "/seat"
replicaCount: 1

image:
  name: "staging/playball/web/seat"
  tag: "de7ce81.10"
  pullPolicy: Always

# IRSA로 cross-account ECR 인증 (imagePullSecrets 비활성화)
imagePullSecrets: []

# apps 노드는 taint 없음 - tolerations 불필요

# HA: 노드 분산 + Managed 노드 우선
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
      - weight: 50
        preference:
          matchExpressions:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand"]
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: seat
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

istio:
  sidecar: true

servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

# Prometheus metrics (PodMonitor)
metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

# PodDisruptionBudget - 최소 1개 유지
pdb:
  enabled: true
  minAvailable: 1
