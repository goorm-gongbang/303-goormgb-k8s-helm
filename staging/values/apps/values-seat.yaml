# seat - Staging 환경
fullnameOverride: "seat"
contextPath: "/seat"
replicaCount: 1  # 디버깅용 (원래 2)

image:
  name: "staging/playball/web/seat"
  tag: "08a50e4"
  pullPolicy: Always

# IRSA로 cross-account ECR 인증 (imagePullSecrets 비활성화)
imagePullSecrets: []

tolerations:
  - key: "spot"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# HA: 다른 노드에 분산 배치
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: seat
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

istio:
  sidecar: true

servicePort: &port 8082
service:
  type: ClusterIP
  port: *port

envFrom:
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true
