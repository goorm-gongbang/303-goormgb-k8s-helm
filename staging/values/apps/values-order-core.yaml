# order-core - Staging 환경
fullnameOverride: "order-core"
contextPath: "/order"
replicaCount: 1

image:
  name: "staging/playball/web/order-core"
  tag: "af0aa1c.17"
  pullPolicy: Always

# IRSA로 cross-account ECR 인증 (imagePullSecrets 비활성화)
imagePullSecrets: []

# apps 노드는 taint 없음 - tolerations 불필요

# HA: 노드 분산 + Managed 노드 우선
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: karpenter.sh/nodepool
              operator: DoesNotExist
      - weight: 50
        preference:
          matchExpressions:
            - key: karpenter.sh/capacity-type
              operator: In
              values: ["on-demand"]
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: order-core
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

istio:
  sidecar: true

servicePort: &port 8083
service:
  type: ClusterIP
  port: *port

# Kafka consumer group ID
env:
  - name: KAFKA_CONSUMER_GROUP_ID
    value: "order-core-notification"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config
  - secretRef:
      name: mail-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

# Prometheus metrics (PodMonitor)
metrics:
  enabled: true
  path: /order/actuator/prometheus
  interval: 30s

# PodDisruptionBudget - 최소 1개 유지
pdb:
  enabled: true
  minAvailable: 1
