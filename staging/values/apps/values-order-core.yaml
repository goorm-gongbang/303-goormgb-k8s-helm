# order-core - Staging 환경
fullnameOverride: "order-core"
replicaCount: 2  # HA 구성

image:
  # TODO: staging CI/CD 구축 후 staging/playball/web/order-core 로 전환
  name: "dev/goormgb/order-core"
  tag: "e850e82"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Workloads NodePool에 배치
nodeSelector:
  nodepool: workloads

tolerations:
  - key: "spot"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# HA: 다른 노드에 분산 배치
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: order-core
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

istio:
  sidecar: true

servicePort: &port 8083
service:
  type: ClusterIP
  port: *port

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5

otel:
  enabled: false
