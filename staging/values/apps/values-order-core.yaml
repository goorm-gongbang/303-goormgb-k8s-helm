# order-core - Staging 환경
fullnameOverride: "order-core"
contextPath: "/order"
replicaCount: 1

image:
  name: "staging/playball/web/order-core"
  tag: "08a50e4"
  pullPolicy: Always

# IRSA로 cross-account ECR 인증 (imagePullSecrets 비활성화)
imagePullSecrets: []

# apps 노드는 taint 없음 - tolerations 불필요

# HA: 다른 노드에 분산 배치 (필수)
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: staging-order-core
        topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

istio:
  sidecar: true

servicePort: &port 8083
service:
  type: ClusterIP
  port: *port

envFrom:
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

# PodDisruptionBudget - 최소 1개 유지
pdb:
  enabled: true
  minAvailable: 1
