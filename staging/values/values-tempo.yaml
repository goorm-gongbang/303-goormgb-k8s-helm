# Grafana Tempo - Staging 환경
# 분산 추적 저장소

tempo:
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

  # 트레이스 수신 설정
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # 로컬 스토리지
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
      block:
        bloom_filter_false_positive: 0.05

  # 보존 기간 (7일)
  retention: 168h

persistence:
  enabled: true
  size: 20Gi
  storageClassName: gp3
