# Alloy - Staging 환경 설정
# Faro Receiver for Frontend RUM

faro:
  virtualService:
    enabled: true
    host: "api.staging.playball.one"
    gateway: "istio-system/api-gateway"
  cors:
    allowOrigins:
      - "https://staging.playball.one"
      - "http://localhost:3000"

alloy:
  alloy:
    configMap:
      content: |
        // ===== Faro Receiver =====
        faro.receiver "frontend" {
          server {
            listen_address = "0.0.0.0"
            listen_port = 12347
            cors_allowed_origins = [
              "https://staging.playball.one",
              "http://localhost:3000",
            ]
          }

          sourcemaps {}

          output {
            logs   = [loki.write.faro.receiver]
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }

        // ===== Loki Exporter =====
        loki.write "faro" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push"
          }
        }

        // ===== Tempo Exporter =====
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "tempo.monitoring.svc.cluster.local:4317"
            tls {
              insecure = true
            }
          }
        }

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
