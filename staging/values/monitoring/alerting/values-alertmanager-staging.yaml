# Alertmanager routing/receivers (staging)

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "staging/monitoring/discord-webhook-alerts"
  alertmanagerSpec:
    secrets:
      - alertmanager-discord-webhooks

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'job', 'service_name']
      group_wait: 5s
      group_interval: 5m
      repeat_interval: 10m
      receiver: 'null'
      routes:
        - match:
            team: security
            severity: critical
          receiver: 'discord-security-critical'
          repeat_interval: 30m
        - match:
            team: security
            severity: warning
          receiver: 'discord-security-warning'
          repeat_interval: 30m
        - match:
            team: security
            severity: info
          receiver: 'discord-security-info'
          repeat_interval: 30m
        - match:
            severity: critical
          receiver: 'discord-critical'
          repeat_interval: 30m
        - match:
            severity: warning
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            severity: info
          receiver: 'discord-info'
          repeat_interval: 30m
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            alertname: InfoInhibitor
          receiver: 'null'

    receivers:
      - name: 'discord-critical'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/critical-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/ops-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 장애 복구{{ else }}🚨 장애 감지{{ end }} [{{ with index .Alerts 0 }}{{ .StartsAt | tz "Asia/Seoul" | date "20060102-150405" }}{{ else }}unknown{{ end }}]
            text: |-
              {{ if ne .Status "resolved" }}@개발팀 @admins{{ end }}
              ```text
              알림: {{ or .CommonLabels.alertname "N/A" }}
              서비스: {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              네임스페이스: {{ or .CommonLabels.namespace "N/A" }}
              대상건수: {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              인스턴스: {{ or .Labels.instance .Labels.node "N/A" }}
              발생(KST): {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}복구(KST): {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-warning'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/warning-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/ops-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 경고 복구 알림{{ else }}🟡 경고 알림{{ end }}
            text: |-
              ```text
              🏷 알림        | {{ or .CommonLabels.alertname "N/A" }}
              🧩 서비스      | {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              📦 네임스페이스 | {{ or .CommonLabels.namespace "N/A" }}
              🔢 대상건수    | {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              🖥 인스턴스    | {{ or .Labels.instance .Labels.node "N/A" }}
              🕒 발생(KST)   | {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}✅ 복구(KST)   | {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-info'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/info-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/ops-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 정보 처리 완료 알림{{ else }}🔵 정보 알림{{ end }}
            text: |-
              ```text
              🏷 알림        | {{ or .CommonLabels.alertname "N/A" }}
              🧩 서비스      | {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              📦 네임스페이스 | {{ or .CommonLabels.namespace "N/A" }}
              🔢 대상건수    | {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              🖥 인스턴스    | {{ or .Labels.instance .Labels.node "N/A" }}
              🕒 발생(KST)   | {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}✅ 종료(KST)   | {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-security-critical'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/critical-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/security-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 보안 알림 복구{{ else }}🚨 보안 알림{{ end }} [{{ with index .Alerts 0 }}{{ .StartsAt | tz "Asia/Seoul" | date "20060102-150405" }}{{ else }}unknown{{ end }}]
            text: |-
              ```text
              알림: {{ or .CommonLabels.alertname "N/A" }}
              서비스: {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              네임스페이스: {{ or .CommonLabels.namespace "N/A" }}
              대상건수: {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              인스턴스: {{ or .Labels.instance .Labels.node "N/A" }}
              발생(KST): {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}복구(KST): {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-security-warning'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/warning-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/security-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 보안 경고 복구 알림{{ else }}🟡 보안 경고 알림{{ end }}
            text: |-
              ```text
              🏷 알림        | {{ or .CommonLabels.alertname "N/A" }}
              🧩 서비스      | {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              📦 네임스페이스 | {{ or .CommonLabels.namespace "N/A" }}
              🔢 대상건수    | {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              🖥 인스턴스    | {{ or .Labels.instance .Labels.node "N/A" }}
              🕒 발생(KST)   | {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}✅ 복구(KST)   | {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-security-info'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/info-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/d/security-alert-overview'
            title: |-
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 보안 정보 처리 완료 알림{{ else }}🔵 보안 정보 알림{{ end }}
            text: |-
              ```text
              🏷 알림        | {{ or .CommonLabels.alertname "N/A" }}
              🧩 서비스      | {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              📦 네임스페이스 | {{ or .CommonLabels.namespace "N/A" }}
              🔢 대상건수    | {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              🖥 인스턴스    | {{ or .Labels.instance .Labels.node "N/A" }}
              🕒 발생(KST)   | {{ .StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}
              {{ if eq $.Status "resolved" }}✅ 종료(KST)   | {{ .EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST" }}{{ end }}
              {{- end }}
              ```

      - name: 'null'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace', 'job']
