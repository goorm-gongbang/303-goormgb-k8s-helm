              {{- if or (eq $incidentId "") (lt $ts $incidentId) -}}{{- $incidentId = $ts -}}{{- end -}}
              {{- end -}}
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 보안 알림 복구{{ else }}🚨 보안 알림{{ end }} [{{ if ne $incidentId "" }}{{ $incidentId }}{{ else }}unknown{{ end }}]
            text: |-
              {{- $startedAt := "" -}}
              {{- $resolvedAt := "" -}}
              {{- range .Alerts -}}
              {{- $startTs := (.StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST") -}}
