              {{- if or (eq $resolvedAt "") (lt $resolvedAt $endTs) -}}{{- $resolvedAt = $endTs -}}{{- end -}}
              {{- end -}}
              {{- end }}
              ```text
              알림: {{ or .CommonLabels.alertname "N/A" }}
              서비스: {{ or .CommonLabels.service_name .CommonLabels.job "N/A" }}
              네임스페이스: {{ or .CommonLabels.namespace "N/A" }}
              대상건수: {{ len .Alerts }}
              {{ with index .Alerts 0 -}}
              인스턴스: {{ or .Labels.instance .Labels.node "N/A" }}
              발생(KST): {{ if ne $startedAt "" }}{{ $startedAt }}{{ else }}N/A{{ end }}
              {{ if eq $.Status "resolved" }}복구(KST): {{ if ne $resolvedAt "" }}{{ $resolvedAt }}{{ else }}N/A{{ end }}{{ end }}
              {{- end }}
              ```

