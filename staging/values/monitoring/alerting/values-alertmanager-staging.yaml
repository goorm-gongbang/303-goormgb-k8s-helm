# Alertmanager routing/receivers (staging)

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "staging/monitoring/discord-webhook-alerts"
  alertmanagerSpec:
    secrets:
      - alertmanager-discord-webhooks

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace', 'job', 'service_name']
      group_wait: 5s
      group_interval: 5m
      repeat_interval: 10m
      receiver: 'null'
      routes:
        - match:
            team: security
            environment: staging
            severity: critical
          receiver: 'discord-security-critical'
          repeat_interval: 30m
        - match:
            alertname: StagingAuthFailureRateWarning
            team: security
            environment: staging
          receiver: 'discord-security-warning'
          repeat_interval: 30m
        - match:
            alertname: StagingWafBlockedRequestsWarning
            team: security
            environment: staging
          receiver: 'discord-security-warning'
          repeat_interval: 30m
        - match:
            environment: staging
            severity: critical
          receiver: 'discord-critical'
          repeat_interval: 30m
        - match:
            alertname: StagingHttp5xxWarning
            environment: staging
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            alertname: StagingApiP99Warning
            environment: staging
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            alertname: StagingPostgresConnectionsWarning
            environment: staging
          receiver: 'discord-warning'
          repeat_interval: 30m
        - match:
            team: infra
            environment: staging
          receiver: 'discord-infra'
          repeat_interval: 10m
        - match:
            alertname: Watchdog
          receiver: 'null'
        - match:
            alertname: InfoInhibitor
          receiver: 'null'

    receivers:
      - name: 'discord-critical'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/critical-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/explore?orgId=1&left=%7B%22queries%22:%5B%7B%22expr%22:%22%7Bnamespace%3D%5C%22staging-webs%5C%22%7D%20%7C%20json%20%7C%20level%3D%5C%22ERROR%5C%22%22%7D%5D%7D'
            title: |-
              {{- $incidentId := "" -}}
              {{- range .Alerts -}}
              {{- $ts := (.StartsAt | tz "Asia/Seoul" | date "20060102-150405") -}}
              {{- if or (eq $incidentId "") (lt $ts $incidentId) -}}{{- $incidentId = $ts -}}{{- end -}}
              {{- end -}}
              [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ 장애 복구{{ else }}🚨 장애 감지{{ end }} [{{ if ne $incidentId "" }}{{ $incidentId }}{{ else }}unknown{{ end }}]
            text: |-
              {{ if ne .Status "resolved" }}@개발팀 @admins{{ end }}
              {{- $startedAt := "" -}}
              {{- $resolvedAt := "" -}}
              {{- range .Alerts -}}
              {{- $startTs := (.StartsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST") -}}
              {{- if or (eq $startedAt "") (lt $startTs $startedAt) -}}{{- $startedAt = $startTs -}}{{- end -}}
              {{- if eq $.Status "resolved" -}}
              {{- $endTs := (.EndsAt | tz "Asia/Seoul" | date "2006-01-02 15:04:05 KST") -}}
              {{- if or (eq $resolvedAt "") (lt $resolvedAt $endTs) -}}{{- $resolvedAt = $endTs -}}{{- end -}}
              {{- end -}}
              {{- end }}
              ```text
              알림: {{ or .CommonLabels.alertname "N/A" }}
              서비스: {{ or .CommonLabels.service_name .CommonLabels.app "N/A" }}
              네임스페이스: {{ or .CommonLabels.namespace "staging-webs" }}
              대상건수: {{ len .Alerts }}
              {{ range .Alerts -}}
              - {{ or .Labels.app "N/A" }} {{ or .Labels.http_route "" }} {{ or .Labels.http_response_status_code "" }} ({{ .Annotations.description | default "상세 없음" }})
              {{ end -}}
              {{ with index .Alerts 0 -}}
              발생(KST): {{ if ne $startedAt "" }}{{ $startedAt }}{{ else }}N/A{{ end }}
              {{ if eq $.Status "resolved" }}복구(KST): {{ if ne $resolvedAt "" }}{{ $resolvedAt }}{{ else }}N/A{{ end }}{{ end }}
              {{- end }}
              ```

      - name: 'discord-warning'
        slack_configs:
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/warning-webhook-url'
            send_resolved: true
            title_link: 'https://grafana.staging.playball.one/explore?orgId=1&left=%7B%22queries%22:%5B%7B%22expr%22:%22%7Bnamespace%3D%5C%22staging-webs%5C%22%7D%20%7C%20json%20%7C%20level%3D%5C%22ERROR%5C%22%22%7D%5D%7D'
