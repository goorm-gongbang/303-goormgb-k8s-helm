# Alert rule set (staging)

additionalPrometheusRulesMap:
  staging-ops-and-security:
    groups:
      - name: staging.ops.rules
        rules:
          - alert: StagingHttp5xxWarning
            expr: |
              sum by (app, http_route, http_response_status_code) (
                increase(
                  http_server_request_duration_seconds_count{
                    namespace="staging-webs",
                    app=~"staging-(api-gateway|auth-guard|order-core|queue|seat)",
                    http_response_status_code=~"5.."
                  }[5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: warning
              environment: staging
              team: dev
              service_name: "{{ $labels.app }}"
              namespace: staging-webs
            annotations:
              summary: "{{ $labels.app }} 5xx 발생 ({{ $labels.http_response_status_code }})"
              description: "서비스: {{ $labels.app }}\n경로: {{ $labels.http_route }}\n상태코드: {{ $labels.http_response_status_code }}\n발생건수(5m): {{ $value | printf \"%.0f\" }}건\n\nGrafana 로그: https://grafana.staging.playball.one/explore?orgId=1&left=%7B%22queries%22:%5B%7B%22datasource%22:%7B%22type%22:%22loki%22,%22uid%22:%22loki%22%7D,%22expr%22:%22%7Bnamespace%3D%5C%22staging-webs%5C%22%7D%20%7C%20json%20%7C%20level%20%3D%20%5C%22ERROR%5C%22%22%7D%5D%7D"

          - alert: StagingHttp5xxCritical
            expr: |
              sum by (app) (
                increase(
                  http_server_request_duration_seconds_count{
                    namespace="staging-webs",
                    app=~"staging-(api-gateway|auth-guard|order-core|queue|seat)",
                    http_response_status_code=~"5.."
                  }[5m]
                )
              ) > 10
            for: 0m
            labels:
              severity: critical
              environment: staging
              team: dev
              service_name: "{{ $labels.app }}"
              namespace: staging-webs
            annotations:
              summary: "{{ $labels.app }} 5xx 다수 발생"
              description: "서비스: {{ $labels.app }}\n5xx 발생건수(5m): {{ $value | printf \"%.0f\" }}건\n\n즉시 확인 필요합니다."

          - alert: StagingApiP99Warning
            expr: |
              histogram_quantile(
                0.99,
                sum by (app, le) (
                  rate(
                    http_server_request_duration_seconds_bucket{
                      namespace="staging-webs",
                      app=~"staging-(api-gateway|auth-guard|order-core|queue|seat)"
                    }[5m]
                  )
                )
              ) > 3
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: dev
            annotations:
              summary: "staging 환경 API P99 지연 경고"
              description: "최근 5m 동안 staging 웹 서비스의 P99 응답시간이 3초를 초과했습니다."

          - alert: StagingApiP99Critical
            expr: |
              histogram_quantile(
                0.99,
                sum by (app, le) (
                  rate(
                    http_server_request_duration_seconds_bucket{
                      namespace="staging-webs",
                      app=~"staging-(api-gateway|auth-guard|order-core|queue|seat)"
                    }[5m]
                  )
                )
              ) > 5
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging 환경 API P99 지연 치명"
              description: "최근 5m 동안 staging 웹 서비스의 P99 응답시간이 5초를 초과했습니다."

          - alert: StagingPodCrashLoopCritical
            expr: |
              sum by (namespace, pod) (
                increase(kube_pod_container_status_restarts_total{namespace="staging-webs"}[30m])
              ) > 2
            for: 0m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging 환경 Pod 재시작 급증"
              description: "최근 10m 동안 staging 웹 서비스 Pod 재시작이 3회를 초과했습니다."

          - alert: StagingNodeNotReadyCritical
            expr: |
              sum(kube_node_status_condition{condition="Ready", status="true"} == bool 0) > 0
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging 환경 Node NotReady 감지"
              description: "Ready가 아닌 노드가 5m 이상 지속되고 있습니다."

          - alert: StagingClusterCpuWarning
            expr: |
              100 * sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m]))
              /
              sum(kube_node_status_allocatable{resource="cpu"}) > 65
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: dev
            annotations:
              summary: "staging 클러스터 CPU 사용률 경고"
              description: "최근 5m 기준 클러스터 CPU 사용률이 65%를 초과했습니다."

          - alert: StagingClusterCpuCritical
            expr: |
              100 * sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m]))
              /
              sum(kube_node_status_allocatable{resource="cpu"}) > 80
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging 클러스터 CPU 사용률 치명"
              description: "최근 5m 기준 클러스터 CPU 사용률이 80%를 초과했습니다."

          - alert: StagingClusterMemoryWarning
            expr: |
              100 * sum(container_memory_working_set_bytes{container!="", container!="POD"})
              /
              sum(kube_node_status_allocatable{resource="memory"}) > 70
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: dev
            annotations:
              summary: "staging 클러스터 메모리 사용률 경고"
              description: "클러스터 메모리 사용률이 70%를 초과했습니다."

          - alert: StagingClusterMemoryCritical
            expr: |
              100 * sum(container_memory_working_set_bytes{container!="", container!="POD"})
              /
              sum(kube_node_status_allocatable{resource="memory"}) > 90
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging 클러스터 메모리 사용률 치명"
              description: "클러스터 메모리 사용률이 90%를 초과했습니다."

          - alert: StagingPostgresConnectionsWarning
            expr: |
              100 * sum(pg_stat_activity_count{namespace="data"})
              /
              clamp_min(max(pg_settings_max_connections{namespace="data"}), 1) > 70
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: dev
            annotations:
              summary: "staging PostgreSQL 연결 사용률 경고"
              description: "PostgreSQL 연결 사용률이 70%를 초과했습니다."

          - alert: StagingPostgresConnectionsCritical
            expr: |
              100 * sum(pg_stat_activity_count{namespace="data"})
              /
              clamp_min(max(pg_settings_max_connections{namespace="data"}), 1) > 90
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging PostgreSQL 연결 사용률 치명"
              description: "PostgreSQL 연결 사용률이 90%를 초과했습니다."

          - alert: StagingRedisDownCritical
            expr: |
              min(redis_up{namespace="data"}) == 0
            for: 1m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging Redis 비가용 감지"
              description: "Redis 인스턴스가 응답하지 않습니다."

          - alert: StagingRedisMemoryWarning
            expr: |
              100 * sum(redis_memory_used_bytes{namespace="data"})
              /
              clamp_min(sum(redis_memory_max_bytes{namespace="data"}), 1) > 80
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: dev
            annotations:
              summary: "staging Redis 메모리 사용률 경고"
              description: "Redis 메모리 사용률이 80%를 초과했습니다."

          - alert: StagingRedisMemoryCritical
            expr: |
              100 * sum(redis_memory_used_bytes{namespace="data"})
              /
              clamp_min(sum(redis_memory_max_bytes{namespace="data"}), 1) > 90
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: dev
            annotations:
              summary: "staging Redis 메모리 사용률 치명"
              description: "Redis 메모리 사용률이 90%를 초과했습니다."

      - name: staging.security.rules
        rules:
          - alert: StagingMacroDetectedWarning
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 50
            for: 0m
            labels:
              severity: warning
              environment: staging
              team: security
            annotations:
              summary: "staging 매크로/봇 탐지 경고"
              description: "최근 5m 동안 매크로/봇 탐지 수가 50건을 초과했습니다."

          - alert: StagingMacroDetectedCritical
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 200
            for: 0m
            labels:
              severity: critical
              environment: staging
              team: security
            annotations:
              summary: "staging 매크로/봇 탐지 치명"
              description: "최근 5m 동안 매크로/봇 탐지 수가 200건을 초과했습니다."

          - alert: StagingBlockedIpWarning
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 100
            for: 0m
            labels:
              severity: warning
              environment: staging
              team: security
            annotations:
              summary: "staging 차단 IP 수 경고"
              description: "최근 5m 동안 차단 IP 수가 100건을 초과했습니다."

          - alert: StagingBlockedIpCritical
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 500
            for: 0m
            labels:
              severity: critical
              environment: staging
              team: security
            annotations:
              summary: "staging 차단 IP 수 치명"
              description: "최근 5m 동안 차단 IP 수가 500건을 초과했습니다."

          - alert: StagingAuthFailureRateWarning
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 30
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: security
            annotations:
              summary: "staging 인증 실패율 경고"
              description: "최근 5m 동안 인증 실패율이 30%를 초과했습니다."

          - alert: StagingAuthFailureRateCritical
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 50
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: security
            annotations:
              summary: "staging 인증 실패율 치명"
              description: "최근 5m 동안 인증 실패율이 50%를 초과했습니다."

          - alert: StagingWafBlockedRequestsWarning
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 200
            for: 5m
            labels:
              severity: warning
              environment: staging
              team: security
            annotations:
              summary: "staging WAF 차단 요청 급증 경고"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 200건을 초과했습니다."

          - alert: StagingWafBlockedRequestsCritical
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 1000
            for: 5m
            labels:
              severity: critical
              environment: staging
              team: security
            annotations:
              summary: "staging WAF 차단 요청 급증 치명"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 1000건을 초과했습니다."

      # Spot 노드 교체 감지
      - name: staging.spot.rules
        rules:
          - alert: StagingSpotNodeAdded
            expr: |
              count(kube_node_info) > count(kube_node_info offset 2m)
            for: 0m
            labels:
              severity: info
              environment: staging
              team: infra
            annotations:
              summary: "staging 노드 추가 감지"
              description: "새로운 노드가 클러스터에 추가되었습니다. Spot 회수 후 교체일 수 있습니다."

          - alert: StagingSpotNodeRemoved
            expr: |
              count(kube_node_info) < count(kube_node_info offset 2m)
            for: 0m
            labels:
              severity: warning
              environment: staging
              team: infra
            annotations:
              summary: "staging 노드 제거 감지 (Spot 회수 가능)"
              description: "노드가 클러스터에서 제거되었습니다. Spot 인스턴스 회수일 수 있습니다."

          - alert: StagingNodeNotReady
            expr: |
              kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 2m
            labels:
              severity: warning
              environment: staging
              team: infra
            annotations:
              summary: "staging 노드 NotReady 상태"
              description: "노드 {{ $labels.node }}가 2분 이상 NotReady 상태입니다."
