# ArgoCD Config - EKS Staging
# Domain: playball.one

# ArgoCD Server Service - NLB + HTTPS
server:
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-northeast-2:274130523831:certificate/e2886626-a973-4451-a9fa-d4113da73284"
      service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

# Istio Gateway 설정 (Istio 설치 후 활성화)
gateway:
  host: "argocd.staging.playball.one"
  tls:
    enabled: true
    credentialName: staging-tls  # cert-manager로 관리

# Google OAuth 설정
oidc:
  enabled: true
  name: Google
  issuer: https://accounts.google.com
  secretManagerKey: staging/infra/oauth/google
  requestedScopes:
    - openid
    - profile
    - email

# RBAC 설정 - ESO에서 허용된 사용자 목록 가져옴
rbac:
  eso:
    enabled: true
    secretManagerKey: staging/oauth/rbac/argocd
  # 등록되지 않은 사용자는 접근 불가
  defaultPolicy: role:none

# Applications 정의
applications:
  # === Web Services (6개) ===
  - name: api-gateway
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-api-gateway.yaml
    enabled: true

  - name: auth-guard
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-auth-guard.yaml
    enabled: true

  - name: order-core
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-order-core.yaml
    enabled: true

  - name: queue
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-queue.yaml
    enabled: true

  - name: recommendation
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-recommendation.yaml
    enabled: true

  - name: seat
    namespace: staging-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/staging
    path: common-charts/apps/java-service
    valuesFile: ../../../staging/values/apps/values-seat.yaml
    enabled: true

# Prometheus 메트릭 수집
metrics:
  enabled: true

# ArgoCD Notifications - Discord (선택사항)
notifications:
  enabled: false
  discord:
    eso:
      enabled: false
      secretManagerKey: staging/argocd/discord-webhook
