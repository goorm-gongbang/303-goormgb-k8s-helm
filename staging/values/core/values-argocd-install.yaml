# ArgoCD Installation Values (argo/argo-cd chart)
# EKS Staging - ClusterIP (ALB Ingress로 노출)

# Global 노드 배치 설정 (Infra 노드에 배치)
global:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule

# Server 설정
server:
  # Insecure 모드 (TLS는 ALB에서 처리)
  extraArgs:
    - --insecure

  # ClusterIP - ALB Ingress에서 라우팅
  service:
    type: ClusterIP

  # 리소스 제한 (staging 환경)
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Controller 설정 (50+ apps reconcile로 메모리 증가 필요)
controller:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi

# Repo Server 설정 (helm template 렌더링 시 메모리 급증)
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 2Gi

# Redis 설정 (내장 Redis 사용)
redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ApplicationSet Controller
applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Notifications Controller
notifications:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Global 설정
configs:
  # RBAC은 ESO + sync-rbac.sh로 관리 (bootstrap repo)
  # Helm에서 argocd-rbac-cm 생성하지 않음
  rbac:
    create: false

  cm:
    create: true
    url: https://argocd.staging.playball.one
    admin.enabled: "true"
    oidc.config: |
      name: Google
      issuer: https://accounts.google.com
      clientID: $argocd-google-oauth:clientId
      clientSecret: $argocd-google-oauth:clientSecret
      redirectURI: https://argocd.staging.playball.one/auth/callback
      requestedScopes:
        - openid
        - profile
        - email
    # Calico 리소스 Healthy 처리 (EKS에서는 사용 안 함)
    resource.customizations.health.operator.tigera.io_Installation: |
      hs = {}
      hs.status = "Healthy"
      return hs
    resource.customizations.health.operator.tigera.io_APIServer: |
      hs = {}
      hs.status = "Healthy"
      return hs
