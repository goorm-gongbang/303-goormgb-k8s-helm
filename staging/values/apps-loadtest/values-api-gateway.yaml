# api-gateway - Load-test 환경
# /load-test/ prefix로 라우팅되는 부하 테스트 전용
fullnameOverride: "api-gateway"
contextPath: ""
replicaCount: 4

image:
  name: "staging/playball/web/api-gateway"
  tag: "0dfe3cf.25"
  pullPolicy: Always

imagePullSecrets: []

# Load-test 노드에 배치
nodeSelector:
  role: loadtest

tolerations:
  - key: loadtest
    value: "true"
    effect: NoSchedule
  - key: karpenter.sh/disrupted
    effect: NoSchedule
    operator: Exists

# HA: 노드 분산
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: api-gateway
          topologyKey: kubernetes.io/hostname

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio - VirtualService는 별도 관리
istio:
  sidecar: true
  gateway:
    enabled: false  # /load-test/ 라우팅은 별도 VirtualService

# Service
servicePort: &port 8085
service:
  type: ClusterIP
  port: *port

# Environment variables - loadtest-webs 서비스 참조
env:
  - name: ALLOWED_ORIGINS
    value: "https://staging.playball.one,https://swagger.staging.playball.one,http://localhost:3000"
  - name: AUTH_GUARD_URL
    value: "http://auth-guard.loadtest-webs.svc.cluster.local:8080"
  - name: QUEUE_URL
    value: "http://queue.loadtest-webs.svc.cluster.local:8081"
  - name: SEAT_URL
    value: "http://seat.loadtest-webs.svc.cluster.local:8082"
  - name: ORDER_CORE_URL
    value: "http://order-core.loadtest-webs.svc.cluster.local:8083"
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_PORT
  # HikariCP connection pool 크기 조정 (부하테스트용)
  - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
    value: "5"
  - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
    value: "2"
  # 로그 레벨 WARN (부하테스트 시 로그 감소)
  - name: LOGGING_LEVEL_ROOT
    value: "WARN"

envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 5
  failureThreshold: 6

otel:
  enabled: true

metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 30s

pdb:
  enabled: true
  minAvailable: 1
