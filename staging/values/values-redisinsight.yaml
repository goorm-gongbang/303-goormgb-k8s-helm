# RedisInsight for Staging
# URL: https://redis.staging.playball.one
# Google OAuth 인증 필요

replicaCount: 1

image:
  repository: redis/redisinsight
  tag: "2.68"
  pullPolicy: IfNotPresent

# OAuth2 Proxy sidecar
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.6.0"
  port: 4180
  config:
    provider: google
    cookieSecure: true
    cookieDomain: ".staging.playball.one"
    cookieRefresh: "1h"
    cookieExpire: "4h"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # ESO: staging/infra/oauth/teams-allow
  eso:
    enabled: true
    secretStoreRef:
      name: "aws-secrets-manager"
      kind: "ClusterSecretStore"
    remoteRef:
      key: "staging/infra/oauth/teams-allow"

service:
  type: ClusterIP
  port: 4180

# Monitoring node placement
nodeSelector:
  role: monitoring

tolerations:
  - key: role
    value: monitoring
    effect: NoSchedule

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi
  storageClass: gp3

virtualService:
  enabled: true
  gateway: "istio-system/api-gateway"
  hosts:
    - "redis.staging.playball.one"

# Redis connection (UI): ElastiCache
# Host: staging 환경의 ElastiCache endpoint
# Port: 6379
