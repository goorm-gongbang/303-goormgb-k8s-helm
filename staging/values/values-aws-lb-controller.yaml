# AWS Load Balancer Controller - Staging
# EKS에서 ALB/NLB를 관리하는 컨트롤러

clusterName: ktcloud_team4_260204-goormgb-staging

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::274130523831:role/ktcloud_team4_260204-aws-lb-controller"

# 리소스 제한
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 리전 설정
region: ap-northeast-2
vpcId: ""  # 자동 감지

# 로그 레벨
logLevel: info

# Webhook 인증서 자동 생성
enableCertManager: false

# Pod disruption budget
podDisruptionBudget:
  maxUnavailable: 1
