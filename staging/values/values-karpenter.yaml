# Karpenter Configuration - Staging
# EKS Cluster: goormgb-staging-eks

# Service Account with IRSA
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::497012402578:role/goormgb-staging-karpenter-controller

# Controller Settings
settings:
  clusterName: goormgb-staging-eks
  interruptionQueue: goormgb-staging-karpenter-interruption

# Controller Resources
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Replicas
replicas: 1

# Logging
logLevel: info

# [임시] Affinity 비활성화 - Managed Node Group 없이 Karpenter 노드에서 실행
# TODO: Managed Node Group baseline 복구 후 제거
affinity: {}
topologySpreadConstraints: []
