# EKS Staging - Loki Configuration
# SingleBinary 모드 (S3 불필요, 로컬 스토리지 사용)

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

  limits_config:
    retention_period: 24h  # 1일 (부하테스트 대응)
    allow_structured_metadata: true

  storage:
    type: filesystem

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: gp3

# 불필요한 컴포넌트 비활성화 (SingleBinary 모드)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false

# 테스트/캐시 비활성화
test:
  enabled: false
lokiCanary:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false
