# EKS Staging - kube-prometheus-stack Configuration
# Domain: staging.playball.one
# Note: kube-prometheus-stack을 직접 OCI 배포하므로 prefix 없이 root level에 값 설정
#
# ============================================================
# dev vs EKS 차이점:
# ------------------------------------------------------------
# [제거됨 - EKS 불필요]
# - nodeSelector/tolerations (kubeadm Control Plane 노드 배치용)
# - kubeControllerManager/kubeScheduler/kubeEtcd 모니터링 (kubeadm 전용)
# - etcd-client-cert secret 마운트 (kubeadm 전용)
# - endpoints 설정 (kubeadm 전용)
#
# [변경됨 - EKS 환경]
# - 도메인: goormgb.space -> staging.playball.one
# - 리소스: 스케일 업 (EKS 환경에 맞게)
# - retention: 7일로 증가
# ============================================================

# ===== prometheus-extras용 설정 (ExternalSecrets, VirtualService) =====
# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.staging.playball.one"
    # EKS: TLS는 CloudFront + ACM에서 처리

# Dashboard 설정 (EKS 환경: Calico, 로컬 exporter 대시보드 제외)
dashboards:
  infraTeam:
    exclude:
      - "calico-felix.json"
  devTeam:
    exclude:
      # 로컬 exporter 대시보드 제외 (EKS는 CloudWatch 사용)
      - "database-postgresql-local.json"
      - "cache-redis-local.json"
  alertOps:
    enabled: true
  businessKpi:
    enabled: true
  securityOps:
    enabled: true

# ===== kube-prometheus-stack 직접 배포용 설정 =====
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook 비활성화 (TLS 인증서 문제 방지)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# kube-state-metrics
kube-state-metrics:
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# EKS: kubeadm 전용 컴포넌트 모니터링 비활성화
kubeControllerManager:
  enabled: false  # EKS managed
kubeScheduler:
  enabled: false  # EKS managed
kubeEtcd:
  enabled: false  # EKS managed
kubeProxy:
  enabled: true

prometheus:
  prometheusSpec:
    # 모든 namespace 메트릭 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collector에서 메트릭 수신 (remote write)
    enableRemoteWriteReceiver: true

    retention: 7d
    retentionSize: "20GB"

    nodeSelector:
      role: monitoring
    tolerations:
      - key: role
        value: monitoring
        effect: NoSchedule

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 3Gi

    # EBS CSI driver 미사용 - emptyDir 사용
    # storageSpec:
    #   volumeClaimTemplate:
    #     metadata:
    #       name: data
    #     spec:
    #       storageClassName: gp2
    #       accessModes: ["ReadWriteOnce"]
    #       resources:
    #         requests:
    #           storage: 30Gi

grafana:
  # prometheus-extras용 ESO 설정
  eso:
    enabled: true
    secretManagerKey: staging/monitoring/grafana
    oauthSecretManagerKey: staging/infra/oauth/google

  fullnameOverride: grafana

  # IRSA for CloudWatch Data Source
  # Role created by Terraform: terraform output grafana_cloudwatch_irsa_role_arn
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::497012402578:role/goormgb-staging-grafana-cloudwatch

  # init-chown-data 비활성화 (PVC 권한 문제 방지)
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  # 대시보드 폴더 설정 (sidecar 방식)
  sidecar:
    dashboards:
      enabled: true
      folder: /tmp/dashboards
      folderAnnotation: grafana_folder
      searchNamespace: monitoring
      provider:
        foldersFromFilesStructure: true
        allowUiUpdates: true

  # kube-prometheus-stack 기본 대시보드 비활성화
  defaultDashboardsEnabled: false
  forceDeployDashboards: false
  defaultDashboardsTimezone: utc

  # 대시보드 프로바이더 설정
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "dev-team-observability-templates"
          orgId: 1
          folder: "Dev Team - Templates"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/dev-team-observability-templates

        - name: "infra-team-observability-templates"
          orgId: 1
          folder: "Infra Team - Templates"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/infra-team-observability-templates

  # Grafana.com 대시보드
  dashboards:
    dev-team-observability-templates:
      service-pod-health:
        gnetId: 17125
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      service-traffic-istio:
        gnetId: 7636
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      service-workload-istio:
        gnetId: 7630
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

    infra-team-observability-templates:
      platform-node-capacity:
        gnetId: 1860
        revision: 37
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      platform-cluster-overview:
        gnetId: 7249
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      # EKS Karpenter Dashboard
      platform-karpenter:
        gnetId: 20398
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      # Kubernetes Views - Global
      platform-k8s-views-global:
        gnetId: 15757
        revision: 37
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      # Kubernetes Views - Namespaces
      platform-k8s-views-namespaces:
        gnetId: 15758
        revision: 34
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      platform-prometheus-overview:
        gnetId: 19105
        revision: 3
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      platform-istio-mesh:
        gnetId: 7639
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

      platform-istio-control-plane:
        gnetId: 7645
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: Prometheus

  # ESO에서 생성한 secret 사용
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  # Google OAuth 설정 - Secret에서 환경변수 주입
  envFromSecret: google-oauth-credentials

