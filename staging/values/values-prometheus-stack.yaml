        contains(['212clab@gmail.com', 'rhuba23@gmail.com', 'chamchi0129@gmail.com'], email) && 'Admin' ||
        contains(['jusanha17@gmail.com', 'lab.jehyun@gmail.com', 'wnconc@gmail.com', 'jbyun1105@gmail.com', 'sayiamseyoun9@gmail.com', 'jminwook0120@gmail.com', 'siyeon0713@gmail.com', 'cdh4112618@gmail.com', 'rhkdgur120@gmail.com', 'wkdwlgus317@hanyang.ac.kr', 'yuuijin863@gmail.com', 'hs4734@gmail.com', 'hejwien@gmail.com', 'niceguy6112@gmail.com'], email) && 'Viewer' ||
        'Viewer'
    users:
      auto_assign_org: true
      auto_assign_org_role: Viewer
    auth:
      disable_login_form: false

  # EBS CSI driver 미사용 - persistence 비활성화
  persistence:
    enabled: false

  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Loki + Tempo + CloudWatch datasource
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000

    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true

    # CloudWatch Data Source (RDS, ElastiCache 메트릭)
    - name: CloudWatch
      type: cloudwatch
      uid: cloudwatch
      access: proxy
      isDefault: false
      editable: true
      jsonData:
        authType: default  # IRSA 사용
        defaultRegion: ap-northeast-2

# VPC CNI ServiceMonitor (awscni_* 메트릭 수집)
prometheus:
  additionalServiceMonitors:
    - name: aws-vpc-cni
      jobLabel: k8s-app
      namespaceSelector:
        matchNames:
          - kube-system
      selector:
        matchLabels:
          k8s-app: aws-node
      endpoints:
        - port: metrics
          interval: 30s
          path: /metrics

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      role: monitoring
    tolerations:
      - key: role
        value: monitoring
        effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
