# EKS Staging - Namespace 설정
# Istio sidecar injection 활성화

namespaces:
  # Application namespaces
  - name: staging-webs
    istio: true
  - name: staging-ai
    istio: true
  - name: data
    istio: false  # Kafka, Redis 등 데이터 레이어

  # Infrastructure namespaces
  - name: monitoring
    istio: false
  - name: external-dns
    istio: false

  # Security namespaces
  - name: trivy-system
    istio: false
  - name: falco
    istio: false
