# Trivy Operator - Container Vulnerability Scanning
# https://aquasecurity.github.io/trivy-operator/

# Operator configuration
operator:
  # Scan all namespaces
  scanJobsConcurrentLimit: 10
  # Cleanup completed scan jobs
  scanJobTTL: ""
  # Batch delete delay
  batchDeleteDelay: 10s

# Trivy scanner configuration
trivy:
  # Use Trivy in Standalone mode (no server)
  mode: Standalone

  # Image repository (uses default from chart)

  # Severity levels to report
  severity: CRITICAL,HIGH,MEDIUM

  # Ignore unfixed vulnerabilities
  ignoreUnfixed: false

  # Timeout for vulnerability scan
  timeout: 10m0s

  # Resource limits for scan jobs
  resources:
    requests:
      cpu: 100m
      memory: 100M
    limits:
      cpu: 500m
      memory: 500M

  # Skip files/directories
  skipFiles: ""
  skipDirs: ""

  # Offline mode (use downloaded DB)
  offlineScan: false

# Vulnerability Reports
vulnerabilityReports:
  # Scanner to use
  scanner: Trivy

# ConfigAudit Reports (K8s misconfiguration)
configAuditReports:
  scanner: Trivy

# RBAC Assessments
rbacAssessment:
  scanner: Trivy

# Exposed Secret Reports
exposedSecretReports:
  scanner: Trivy

# Scan specific namespaces only
targetNamespaces: "staging-webs,staging-ai,data,monitoring"

# Exclude namespaces from scanning
excludeNamespaces: "kube-system,kube-public,kube-node-lease,argocd,istio-system,karpenter,external-secrets,external-dns,kyverno"

# ServiceAccount
serviceAccount:
  create: true
  name: trivy-operator

# Node selector
nodeSelector:
  role: infra

# Tolerations
tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "infra"
    effect: "NoSchedule"

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 60s
