# Falco - Runtime Security and Threat Detection
# https://falco.org/docs/

# Driver configuration
driver:
  # Use modern_ebpf for better compatibility (kernel 5.8+)
  # Falls back to kernel module if eBPF not available
  kind: modern_ebpf

  # Loader settings
  loader:
    enabled: true
    initContainer:
      enabled: true

# Falco configuration
falco:
  # JSON output for log aggregation
  json_output: true
  json_include_output_property: true

  # Log level
  log_level: info

  # Buffered outputs
  buffered_outputs: false

  # Rule matching (first match wins)
  rule_matching: first

  # Syscall event drops
  syscall_event_drops:
    threshold: 0.1
    actions:
      - log
      - alert

  # Outputs
  stdout_output:
    enabled: true

  file_output:
    enabled: false

  http_output:
    enabled: false

  # gRPC output (for sidekick)
  grpc_output:
    enabled: true

  grpc:
    enabled: true
    bind_address: "unix:///run/falco/falco.sock"

# Custom rules (append to default)
customRules:
  # Block crypto mining
  crypto-mining-rules.yaml: |-
    - rule: Detect crypto miners
      desc: Detect crypto mining processes
      condition: >
        spawned_process and
        (proc.name in (crypto_miner_names) or
         proc.cmdline contains "stratum+tcp" or
         proc.cmdline contains "xmrig" or
         proc.cmdline contains "minerd")
      output: >
        Crypto miner detected
        (user=%user.name command=%proc.cmdline container=%container.name
         image=%container.image.repository k8s.ns=%k8s.ns.name k8s.pod=%k8s.pod.name)
      priority: CRITICAL
      tags: [cryptomining, mitre_execution]

  # Container escape attempts
  container-escape-rules.yaml: |-
    - rule: Container Escape via nsenter
      desc: Detect container escape attempts using nsenter
      condition: >
        spawned_process and proc.name = "nsenter" and container
      output: >
        Container escape attempt via nsenter
        (user=%user.name command=%proc.cmdline container=%container.name
         image=%container.image.repository k8s.ns=%k8s.ns.name k8s.pod=%k8s.pod.name)
      priority: CRITICAL
      tags: [container_escape, mitre_privilege_escalation]

  # Kubernetes secrets access
  k8s-secrets-rules.yaml: |-
    - rule: K8s Secrets Access from Container
      desc: Detect access to Kubernetes secrets from within containers
      condition: >
        open_read and container and
        (fd.name startswith "/var/run/secrets/kubernetes.io" or
         fd.name startswith "/run/secrets/kubernetes.io")
      output: >
        K8s secrets accessed from container
        (user=%user.name file=%fd.name container=%container.name
         image=%container.image.repository k8s.ns=%k8s.ns.name k8s.pod=%k8s.pod.name)
      priority: WARNING
      tags: [k8s_secrets, mitre_credential_access]

# Falcosidekick - output routing
falcosidekick:
  enabled: true

  # Web UI
  webui:
    enabled: true
    replicaCount: 1
    redis:
      enabled: true
      storageEnabled: false

  # Output configuration
  config:
    # Slack (optional - configure in secrets)
    slack:
      webhookurl: ""
      minimumpriority: "critical"

    # Prometheus metrics
    prometheus:
      extralabels: "env:staging"

    # Custom fields
    customfields:
      environment: staging
      cluster: goormgb-staging

# Resources
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

# DaemonSet configuration
controller:
  kind: daemonset

# Node selector - run on all nodes for full coverage
nodeSelector: {}

# Tolerations - run on all nodes including infra
tolerations:
  - operator: Exists

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  interval: 30s

# Priority class
priorityClassName: system-node-critical
