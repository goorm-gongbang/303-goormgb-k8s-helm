# Tetragon TracingPolicy Configuration for STAGING environment
# L3/L4 threat detection - logging + alerting

mode: staging

detection:
  connectionRate:
    enabled: true
    threshold: 100

  timingPattern:
    enabled: true
    suspiciousIntervals:
      - 1000
      - 500
      - 100

  suspiciousProcess:
    enabled: true
    paths:
      - "/tmp/"
      - "/dev/shm/"
      - "/var/tmp/"

# Staging: Post + Signal (logging + alerting)
actions:
  dev:
    - Post
  staging:
    - Post
    - Signal
  prod:
    - Post
    - Signal

targetNamespaces:
  - staging-webs
  - staging-ai

metrics:
  enabled: true
  port: 2112
  interval: "15s"
