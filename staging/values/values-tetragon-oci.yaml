# Tetragon OCI Chart Values for STAGING environment
# eBPF-based runtime security (works with AWS VPC CNI)

tetragon:
  enabled: true

  # Enable BPF-based runtime security
  enableProcessCred: true
  enableProcessNs: true

  # Prometheus metrics
  prometheus:
    enabled: true
    port: 2112
    serviceMonitor:
      enabled: false  # Using custom ServiceMonitor

  # Export configuration - JSON format for Loki
  export:
    stdout:
      enabledEvents:
        - PROCESS_EXEC
        - PROCESS_EXIT
        - PROCESS_KPROBE
        - PROCESS_TRACEPOINT
      extraEnv:
        - name: TETRAGON_JSON_EXPORT
          value: "true"

  # Resource limits (higher for staging)
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

  # Tetragon CLI
  tetra:
    enabled: true

  # Pod security
  podSecurityContext:
    runAsNonRoot: false

  # Tolerations for all nodes
  tolerations:
    - operator: Exists

  # Node selector for monitoring nodes
  nodeSelector:
    karpenter.sh/nodepool: goormgb-monitoring-pool

  # Update strategy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

# Tetragon Operator
tetragonOperator:
  enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector:
    karpenter.sh/nodepool: goormgb-monitoring-pool
