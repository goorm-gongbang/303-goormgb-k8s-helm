# Kafka UI Staging Environment

image:
  repository: provectuslabs/kafka-ui
  tag: v0.7.2
  pullPolicy: IfNotPresent

kafka:
  bootstrapServers: kafka-headless.messaging.svc.cluster.local:9092
  clusterName: goormgb-staging

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

virtualService:
  enabled: true
  host: kafka-ui.staging.playball.one
  gateway: istio-system/main-gateway

nodeSelector: {}
tolerations: []
