# Kyverno Configuration for Staging
# Chart version: 3.7.1

# Admission controller settings
admissionController:
  replicas: 1
  resources:
    limits:
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Node selection for infra nodes
  nodeSelector:
    node-role: infra
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

# Background controller
backgroundController:
  replicas: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector:
    node-role: infra
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

# Cleanup controller
cleanupController:
  replicas: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector:
    node-role: infra
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

# Reports controller
reportsController:
  replicas: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector:
    node-role: infra
  tolerations:
    - key: "node-role"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"

# Config settings
config:
  # Namespaces to exclude from policy enforcement
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - kyverno
    - argocd
    - istio-system
    - monitoring

# Webhook configuration
webhooks:
  failurePolicy: Ignore  # staging에서는 Ignore로 설정 (정책 위반시에도 배포 허용)

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  namespace: monitoring
