# ALB Ingress - EKS Staging
# Host-based routing for all services

ingress:
  enabled: true
  name: staging-alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # ExternalDNS
    external-dns.alpha.kubernetes.io/hostname: argocd.staging.playball.one,grafana.staging.playball.one,kiali.staging.playball.one,api.staging.playball.one

  # TLS 설정 (ACM 인증서)
  certificateArn: arn:aws:acm:ap-northeast-2:497012402578:certificate/86c2157d-b449-4af4-8b8a-c1ac9271d6d9

  rules:
    # ArgoCD - Istio 안 거침 (직접 라우팅)
    - host: argocd.staging.playball.one
      service:
        name: argocd-server
        namespace: argocd
        port: 80
        healthCheckPath: /healthz

    # Grafana - Istio 안 거침 (직접 라우팅)
    - host: grafana.staging.playball.one
      service:
        name: grafana
        namespace: monitoring
        port: 80
        healthCheckPath: /api/health

    # Kiali - Istio 안 거침 (직접 라우팅)
    - host: kiali.staging.playball.one
      service:
        name: kiali
        namespace: istio-system
        port: 20001
        healthCheckPath: /healthz

    # API - Istio IngressGateway 거침
    - host: api.staging.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready
