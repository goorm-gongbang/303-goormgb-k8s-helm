# ClusterSecretStore for EKS staging
# IRSA 기반 - ServiceAccount를 통해 IAM Role 인증

clusterSecretStore:
  enabled: true
  name: aws-secrets-manager
  region: ap-northeast-2
  # ESO ServiceAccount (IRSA role이 연결된 SA)
  serviceAccount:
    name: external-secrets
    namespace: external-secrets

# Service Config - 앱 서비스용 환경변수
# 시크릿 구조:
#   - staging/services/db       : DB + Redis 연결정보
#   - staging/services/jwt      : JWT + Admission 토큰 설정 (통합)
serviceConfig:
  enabled: true
  namespaces:
    - staging-webs
    - loadtest-webs
    - loadtest-ai
  secretManagerPrefix: staging/services
  environment: staging

# GHCR Secret - Private container registry access
# 시크릿 구조:
#   - staging/infra/ghcr : username, token
ghcrSecret:
  enabled: true
  secretManagerKey: staging/infra/ghcr
  # ghcr-secret이 필요한 네임스페이스 목록
  namespaces:
    - monitoring
