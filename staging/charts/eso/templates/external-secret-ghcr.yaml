{{- if .Values.ghcrSecret.enabled }}
{{- range .Values.ghcrSecret.namespaces }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-secret
  namespace: {{ . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $.Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: ghcr-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .token }}` }}","auth":"{{ `{{ printf "%s:%s" .username .token | b64enc }}` }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: {{ $.Values.ghcrSecret.secretManagerKey }}
        property: username
    - secretKey: token
      remoteRef:
        key: {{ $.Values.ghcrSecret.secretManagerKey }}
        property: token
{{- end }}
{{- end }}
