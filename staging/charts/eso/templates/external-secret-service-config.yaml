{{- if .Values.serviceConfig.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: service-config
  namespace: {{ .Values.serviceConfig.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: service-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # === Database (constructed from individual fields) ===
        SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ `{{ .db_host }}` }}:{{ `{{ .db_port }}` }}/{{ `{{ .db_dbname }}` }}"
        SPRING_DATASOURCE_USERNAME: "{{ `{{ .db_username }}` }}"
        SPRING_DATASOURCE_PASSWORD: "{{ `{{ .db_password }}` }}"
        DB_ENCRYPTION_KEY: "{{ `{{ .db_encryption_key }}` }}"
        # === Redis ===
        SPRING_DATA_REDIS_HOST: "{{ `{{ .redis_host }}` }}"
        SPRING_DATA_REDIS_PORT: "{{ `{{ .redis_port }}` }}"
        REDIS_QUEUE_HOST: "{{ `{{ .redis_host }}` }}"
        REDIS_QUEUE_PORT: "{{ `{{ .redis_port }}` }}"
        # === JWT ===
        JWT_PRIVATE_KEY: "{{ `{{ .jwt_private_key }}` }}"
        JWT_PUBLIC_KEY: "{{ `{{ .jwt_public_key }}` }}"
        JWT_ISSUER: "{{ `{{ .jwt_issuer }}` }}"
        JWT_ACCESS_TOKEN_AUDIENCE: "{{ `{{ .jwt_access_token_audience }}` }}"
        JWT_ACCESS_TOKEN_EXPIRATION: "{{ `{{ .jwt_access_token_expiration }}` }}"
        JWT_REFRESH_TOKEN_AUDIENCE: "{{ `{{ .jwt_refresh_token_audience }}` }}"
        JWT_REFRESH_TOKEN_EXPIRATION: "{{ `{{ .jwt_refresh_token_expiration }}` }}"
        # === Queue JWT ===
        ADMISSION_PRIVATE_KEY: "{{ `{{ .queue_private_key }}` }}"
        ADMISSION_PUBLIC_KEY: "{{ `{{ .queue_public_key }}` }}"
        # === Internal API Key (AI Server ↔ Auth-Guard) ===
        INTERNAL_API_KEY: "{{ `{{ .internal_api_key }}` }}"
        # === Kafka ===
        KAFKA_BOOTSTRAP_SERVERS: "{{ `{{ .kafka_bootstrap_servers }}` }}"
        KAFKA_PRODUCER_KEY_SERIALIZER: "{{ `{{ .kafka_producer_key_serializer }}` }}"
        KAFKA_PRODUCER_VALUE_SERIALIZER: "{{ `{{ .kafka_producer_value_serializer }}` }}"
        KAFKA_PRODUCER_ACKS: "{{ `{{ .kafka_producer_acks }}` }}"
        KAFKA_CONSUMER_KEY_DESERIALIZER: "{{ `{{ .kafka_consumer_key_deserializer }}` }}"
        KAFKA_CONSUMER_VALUE_DESERIALIZER: "{{ `{{ .kafka_consumer_value_deserializer }}` }}"
        KAFKA_CONSUMER_AUTO_OFFSET_RESET: "{{ `{{ .kafka_consumer_auto_offset_reset }}` }}"
        KAFKA_CONSUMER_TRUSTED_PACKAGES: "{{ `{{ .kafka_consumer_trusted_packages }}` }}"
        # === Kakao OAuth ===
        KAKAO_CLIENT_ID: "{{ `{{ .kakao_client_id }}` }}"
        KAKAO_CLIENT_SECRET: "{{ `{{ .kakao_client_secret }}` }}"
        KAKAO_REDIRECT_URI: "{{ `{{ .kakao_redirect_uri }}` }}"
        # === AWS S3 (QnA File Upload) ===
        S3_BUCKET: "{{ `{{ .s3_bucket }}` }}"
        S3_REGION: "{{ `{{ .s3_region }}` }}"
        S3_PREFIX: "{{ `{{ .s3_prefix }}` }}"
        AWS_ACCESS_KEY: "{{ `{{ .aws_access_key }}` }}"
        AWS_SECRET_KEY: "{{ `{{ .aws_secret_key }}` }}"
  data:
    # === Database (staging/services/db) ===
    # Terraform creates: host, port, dbname, username, password, engine
    - secretKey: db_host
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: host
    - secretKey: db_port
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: port
    - secretKey: db_dbname
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: dbname
    - secretKey: db_username
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: username
    - secretKey: db_password
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: password
    - secretKey: db_encryption_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: DB_ENCRYPTION_KEY

    # === Redis (staging/services/redis) ===
    # Terraform creates: host, port
    - secretKey: redis_host
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/redis
        property: host
    - secretKey: redis_port
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/redis
        property: port

    # === JWT (staging/services/jwt) ===
    # Secrets Manager keys: JWT_PRIVATE_KEY, JWT_PUBLIC_KEY, JWT_ISSUER, etc.
    - secretKey: jwt_private_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PRIVATE_KEY
    - secretKey: jwt_public_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PUBLIC_KEY
    - secretKey: jwt_issuer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ISSUER
    - secretKey: jwt_access_token_audience
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_AUDIENCE
    - secretKey: jwt_access_token_expiration
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_EXPIRATION
    - secretKey: jwt_refresh_token_audience
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_AUDIENCE
    - secretKey: jwt_refresh_token_expiration
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_EXPIRATION

    # === Queue JWT (staging/services/jwt) ===
    # Secrets Manager keys: ADMISSION_PRIVATE_KEY, ADMISSION_PUBLIC_KEY
    - secretKey: queue_private_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: ADMISSION_PRIVATE_KEY
    - secretKey: queue_public_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: ADMISSION_PUBLIC_KEY

    # === Internal API Key (AI Server ↔ Auth-Guard) ===
    - secretKey: internal_api_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/internal-api
        property: INTERNAL_API_KEY

    # === Kafka (staging/services/kafka) ===
    - secretKey: kafka_bootstrap_servers
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_BOOTSTRAP_SERVERS
    - secretKey: kafka_producer_key_serializer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_PRODUCER_KEY_SERIALIZER
    - secretKey: kafka_producer_value_serializer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_PRODUCER_VALUE_SERIALIZER
    - secretKey: kafka_producer_acks
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_PRODUCER_ACKS
    - secretKey: kafka_consumer_key_deserializer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_CONSUMER_KEY_DESERIALIZER
    - secretKey: kafka_consumer_value_deserializer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_CONSUMER_VALUE_DESERIALIZER
    - secretKey: kafka_consumer_auto_offset_reset
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_CONSUMER_AUTO_OFFSET_RESET
    - secretKey: kafka_consumer_trusted_packages
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/kafka
        property: KAFKA_CONSUMER_TRUSTED_PACKAGES

    # === Kakao OAuth ===
    - secretKey: kakao_client_id
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: clientId
    - secretKey: kakao_client_secret
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: clientSecret
    - secretKey: kakao_redirect_uri
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: redirectUri

    # === AWS S3 (QnA File Upload) ===
    - secretKey: s3_bucket
      remoteRef:
        key: common/s3-qna/{{ .Values.serviceConfig.environment }}
        property: S3_BUCKET
    - secretKey: s3_region
      remoteRef:
        key: common/s3-qna/{{ .Values.serviceConfig.environment }}
        property: S3_REGION
    - secretKey: s3_prefix
      remoteRef:
        key: common/s3-qna/{{ .Values.serviceConfig.environment }}
        property: S3_PREFIX
    - secretKey: aws_access_key
      remoteRef:
        key: common/s3-qna/{{ .Values.serviceConfig.environment }}
        property: AWS_ACCESS_KEY
    - secretKey: aws_secret_key
      remoteRef:
        key: common/s3-qna/{{ .Values.serviceConfig.environment }}
        property: AWS_SECRET_KEY
---
# Spring Profile ConfigMap (non-secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: {{ .Values.serviceConfig.namespace }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.serviceConfig.springProfile | default "staging" }}
{{- end }}
