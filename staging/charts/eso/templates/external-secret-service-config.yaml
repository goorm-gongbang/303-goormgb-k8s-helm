{{- if .Values.serviceConfig.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: service-config
  namespace: {{ .Values.serviceConfig.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: service-config
    creationPolicy: Owner
  data:
    # === Database (from staging/services/db) ===
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: SPRING_DATASOURCE_URL
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: SPRING_DATASOURCE_PASSWORD

    # === Redis (from staging/services/db) ===
    - secretKey: SPRING_DATA_REDIS_HOST
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: SPRING_DATA_REDIS_HOST
    - secretKey: SPRING_DATA_REDIS_PORT
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: SPRING_DATA_REDIS_PORT
    - secretKey: REDIS_QUEUE_HOST
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: REDIS_QUEUE_HOST
    - secretKey: REDIS_QUEUE_PORT
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: REDIS_QUEUE_PORT

    # === JWT (from staging/services/jwt) ===
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PRIVATE_KEY
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PUBLIC_KEY
    - secretKey: JWT_ISSUER
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ISSUER
    - secretKey: JWT_ACCESS_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_AUDIENCE
    - secretKey: JWT_ACCESS_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_EXPIRATION
    - secretKey: JWT_REFRESH_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_AUDIENCE
    - secretKey: JWT_REFRESH_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_EXPIRATION

    # === Queue Service Admission Token (from staging/services/queue-jwt) ===
    - secretKey: ADMISSION_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/queue-jwt
        property: ADMISSION_PRIVATE_KEY
    - secretKey: ADMISSION_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/queue-jwt
        property: ADMISSION_PUBLIC_KEY
{{- end }}
