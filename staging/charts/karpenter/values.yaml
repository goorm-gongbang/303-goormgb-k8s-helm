# Karpenter Configuration - Staging (Main Account: 497012402578)
clusterName: goormgb-staging-eks
nodeRole: goormgb-staging-karpenter-node

# 공통 Zone 설정
zones:
  - ap-northeast-2a
  - ap-northeast-2c

# =============================================================================
# NodePools - System (Infra) + Workloads (Apps)
# =============================================================================
nodePools:
  # -----------------------------------------------------------------------------
  # System NodePool: 인프라 전용 (on-demand)
  # ArgoCD, Istio, Prometheus, ESO, Karpenter 등
  # -----------------------------------------------------------------------------
  system:
    enabled: true

    # On-demand only (안정성 우선)
    capacityTypes:
      - on-demand

    # 인스턴스 설정
    arch: arm64
    instanceCategories:
      - t
      - m
    instanceSizes:
      - medium
      - large
      - xlarge

    # 리소스 제한 (인프라용)
    limits:
      cpu: 32
      memory: 64Gi

    # Taint 없음 - nodeSelector로 분리
    # (Taint 쓰면 모든 인프라 차트에 toleration 추가해야 함)
    # taints:
    #   - key: "node-role"
    #     value: "system"
    #     effect: "NoSchedule"

    # 높은 우선순위
    weight: 100

    # Disruption 설정
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
    expireAfter: 720h

  # -----------------------------------------------------------------------------
  # Workloads NodePool: 앱 서비스 전용 (spot 우선)
  # api-gateway, auth-guard, order-core, queue, seat
  # -----------------------------------------------------------------------------
  workloads:
    enabled: true

    # Spot 우선, On-demand fallback
    capacityTypes:
      - spot
      - on-demand

    # 인스턴스 설정 - arm64 (Graviton, 비용 효율)
    # TODO: CI에서 multi-arch 이미지 빌드 필요
    arch: arm64
    instanceCategories:
      - t
      - m
      - c
      - r
    instanceSizes:
      - xlarge     # 4 vCPU, 16GB - 5개 서비스 세트용
      - 2xlarge    # 8 vCPU, 32GB - 여유있게

    # 리소스 제한 (앱용)
    limits:
      cpu: 32
      memory: 64Gi

    # Taint 없음 (기본 워크로드용)
    # taints: []

    # 낮은 우선순위 (system 먼저)
    weight: 50

    # Disruption 설정 (빠른 통합)
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    expireAfter: 720h

# =============================================================================
# EC2NodeClass - 공통 설정
# =============================================================================
ec2NodeClass:
  name: default
  volumeSize: 50Gi
  volumeType: gp3
