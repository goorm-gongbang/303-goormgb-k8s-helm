# Karpenter Configuration - Staging (Main Account: 497012402578)
clusterName: goormgb-staging-eks
nodeRole: goormgb-staging-karpenter-node

# 공통 Zone 설정
zones:
  - ap-northeast-2a
  - ap-northeast-2c

# =============================================================================
# NodePools - Workloads (Apps)
# =============================================================================
# 인프라는 EKS Managed Node Groups 사용 (argocd, infra, monitoring)
# Karpenter는 앱 워크로드만 관리
nodePools:
  # -----------------------------------------------------------------------------
  # Workloads NodePool: 앱 서비스 전용
  # api-gateway, auth-guard, order-core, queue, seat
  # -----------------------------------------------------------------------------
  workloads:
    enabled: true
    role: app

    # Spot only (staging 비용 절감)
    capacityTypes:
      - spot

    # 인스턴스 설정 - arm64 (Graviton, 비용 효율)
    arch: arm64
    instanceCategories:
      - t
      - m
      - c
    instanceSizes:
      - xlarge     # 4 vCPU, 16GB - 기본 (노드 개수 줄이기)
      - 2xlarge    # 8 vCPU, 32GB - 버스트용

    # 리소스 제한 (앱용)
    limits:
      cpu: 100
      memory: 200Gi

    # Taint 없음 (기본 워크로드용)
    # taints: []

    # 낮은 우선순위 (system 먼저)
    weight: 50

    # Disruption 설정 (빠른 통합)
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    expireAfter: 720h

  # -----------------------------------------------------------------------------
  # Load-test NodePool: 부하 테스트 전용 앱 서비스
  # java-services + ai-services 2세트 운영
  # -----------------------------------------------------------------------------
  loadtest:
    enabled: true
    role: loadtest

    # Spot only (비용 절감)
    capacityTypes:
      - spot

    # 인스턴스 설정 - arm64 (Graviton)
    arch: arm64
    instanceCategories:
      - c  # Compute-optimized
      - m
    instanceSizes:
      - 2xlarge    # 8 vCPU, 16GB - 앱 2세트용

    # 리소스 제한 (노드 2개 정도)
    limits:
      cpu: 32
      memory: 64Gi

    # Taint 설정 (부하 테스트 전용 격리)
    taints:
      - key: loadtest
        value: "true"
        effect: NoSchedule

    weight: 50

    # Disruption 설정
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    expireAfter: 720h

# =============================================================================
# EC2NodeClass - 공통 설정
# =============================================================================
ec2NodeClass:
  name: default
  volumeSize: 50Gi
  volumeType: gp3
