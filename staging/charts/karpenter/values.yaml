# Karpenter Configuration - Staging (Main Account: 497012402578)
clusterName: goormgb-staging-eks
nodeRole: goormgb-staging-karpenter-node

# 공통 Zone 설정
zones:
  - ap-northeast-2a
  - ap-northeast-2c

# =============================================================================
# NodePools - Workloads (Apps)
# =============================================================================
# 인프라는 EKS Managed Node Groups 사용 (argocd, infra, monitoring)
# Karpenter는 앱 워크로드만 관리
nodePools:
  # -----------------------------------------------------------------------------
  # Workloads NodePool: 앱 서비스 전용
  # api-gateway, auth-guard, order-core, queue, seat
  # -----------------------------------------------------------------------------
  workloads:
    enabled: true
    role: app

    # Spot only (staging 비용 절감)
    capacityTypes:
      - spot

    # 인스턴스 설정 - arm64 (Graviton, 비용 효율)
    arch: arm64
    instanceCategories:
      - t
      - m
      - c
    instanceSizes:
      - xlarge     # 4 vCPU, 16GB - 기본 (노드 개수 줄이기)
      - 2xlarge    # 8 vCPU, 32GB - 버스트용

    # 리소스 제한 (앱용)
    limits:
      cpu: 100
      memory: 200Gi

    # Taint 없음 (기본 워크로드용)
    # taints: []

    # 낮은 우선순위 (system 먼저)
    weight: 50

    # Disruption 설정 (빠른 통합)
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    expireAfter: 720h

  # -----------------------------------------------------------------------------
  # Load-test NodePool: 부하 테스트 전용
  # k6-operator, load-test 워크로드
  # -----------------------------------------------------------------------------
  loadtest:
    enabled: true
    role: loadtest

    # Spot only (비용 절감)
    capacityTypes:
      - spot

    # 인스턴스 설정 - arm64 (Graviton, 비용 효율)
    arch: arm64
    instanceCategories:
      - c  # Compute-optimized (부하 테스트에 적합)
      - m
    instanceSizes:
      - xlarge     # 4 vCPU
      - 2xlarge    # 8 vCPU
      - 4xlarge    # 16 vCPU (대규모 테스트용)

    # 리소스 제한 (부하 테스트용)
    limits:
      cpu: 64
      memory: 128Gi

    # Taint 설정 (부하 테스트 전용 격리)
    taints:
      - key: loadtest
        value: "true"
        effect: NoSchedule

    # 높은 우선순위 (테스트 시 빠른 프로비저닝)
    weight: 100

    # Disruption 설정 (테스트 완료 후 빠른 정리)
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
    expireAfter: 24h  # 24시간 후 자동 만료

# =============================================================================
# EC2NodeClass - 공통 설정
# =============================================================================
ec2NodeClass:
  name: default
  volumeSize: 50Gi
  volumeType: gp3
