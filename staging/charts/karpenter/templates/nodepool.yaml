{{- range $name, $pool := .Values.nodePools }}
{{- if $pool.enabled }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ $name }}
spec:
  template:
    metadata:
      labels:
        nodepool: {{ $name }}
        node-role.kubernetes.io/{{ $name }}: ""
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ $.Values.ec2NodeClass.name }}

      {{- if $pool.taints }}
      taints:
        {{- toYaml $pool.taints | nindent 8 }}
      {{- end }}

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            - {{ $pool.arch | default "arm64" }}

        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            {{- toYaml $pool.instanceCategories | nindent 12 }}

        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]

        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            {{- toYaml $pool.instanceSizes | nindent 12 }}

        - key: karpenter.sh/capacity-type
          operator: In
          values:
            {{- toYaml $pool.capacityTypes | nindent 12 }}

        - key: topology.kubernetes.io/zone
          operator: In
          values:
            {{- toYaml ($.Values.zones | default (list "ap-northeast-2a" "ap-northeast-2c")) | nindent 12 }}

      expireAfter: {{ $pool.expireAfter | default "720h" }}

  limits:
    cpu: {{ $pool.limits.cpu }}
    memory: {{ $pool.limits.memory }}

  disruption:
    consolidationPolicy: {{ $pool.consolidationPolicy | default "WhenEmptyOrUnderutilized" }}
    consolidateAfter: {{ $pool.consolidateAfter | default "1m" }}
    budgets:
      - nodes: "10%"

  weight: {{ $pool.weight | default 100 }}
{{- end }}
{{- end }}
