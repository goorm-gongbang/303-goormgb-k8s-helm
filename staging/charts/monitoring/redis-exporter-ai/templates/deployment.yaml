{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter-ai
  labels:
    app: redis-exporter-ai
    app.kubernetes.io/name: redis-exporter-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter-ai
  template:
    metadata:
      labels:
        app: redis-exporter-ai
        app.kubernetes.io/name: redis-exporter-ai
        version: {{ .Values.image.tag | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.exporter.port }}"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: redis-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.exporter.port }}
              protocol: TCP
          env:
            - name: REDIS_ADDR
              value: "redis://$({{ .Values.redis.hostEnvVar }}):$({{ .Values.redis.portEnvVar }})"
            - name: {{ .Values.redis.hostEnvVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secretName }}
                  key: {{ .Values.redis.hostEnvVar }}
            - name: {{ .Values.redis.portEnvVar }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secretName }}
                  key: {{ .Values.redis.portEnvVar }}
                  optional: true
          {{- with .Values.exporter.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
