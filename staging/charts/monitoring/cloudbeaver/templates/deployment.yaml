apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  labels:
    app: cloudbeaver
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.initialConfig.enabled }}
      initContainers:
        - name: init-workspace
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              mkdir -p /workspace/GlobalConfiguration/.dbeaver
              cp /config/data-sources.json /workspace/GlobalConfiguration/.dbeaver/data-sources.json
              cp /config/.project /workspace/GlobalConfiguration/.project
          volumeMounts:
            - name: data
              mountPath: /workspace
            - name: initial-config
              mountPath: /config
      {{- end }}
      containers:
        {{- if .Values.oauth2Proxy.enabled }}
        # OAuth2 Proxy sidecar
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --provider={{ .Values.oauth2Proxy.config.provider }}
            - --email-domain=*
            - --http-address=0.0.0.0:{{ .Values.oauth2Proxy.port }}
            - --cookie-secure={{ .Values.oauth2Proxy.config.cookieSecure }}
            - --cookie-domain={{ .Values.oauth2Proxy.config.cookieDomain }}
            - --cookie-samesite=lax
            - --cookie-refresh={{ .Values.oauth2Proxy.config.cookieRefresh }}
            - --cookie-expire={{ .Values.oauth2Proxy.config.cookieExpire }}
            - --authenticated-emails-file=/etc/oauth2-proxy/authenticated-emails.txt
            - --skip-provider-button=false
            - --reverse-proxy=true
            - --proxy-prefix=/oauth2
            - --upstream=http://127.0.0.1:8978
          ports:
            - name: http
              containerPort: {{ .Values.oauth2Proxy.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: cloudbeaver-oauth
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          volumeMounts:
            - name: oauth-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
        {{- end }}
        # CloudBeaver
        - name: cloudbeaver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: cb-http
              containerPort: 8978
              protocol: TCP
          env:
            - name: CB_SERVER_NAME
              value: "CloudBeaver-Staging"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/cloudbeaver/workspace
          livenessProbe:
            httpGet:
              path: /
              port: cb-http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: cb-http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: cloudbeaver-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.oauth2Proxy.enabled }}
        - name: oauth-emails
          secret:
            secretName: cloudbeaver-emails
        {{- end }}
        {{- if .Values.initialConfig.enabled }}
        - name: initial-config
          configMap:
            name: cloudbeaver-initial-config
        {{- end }}
