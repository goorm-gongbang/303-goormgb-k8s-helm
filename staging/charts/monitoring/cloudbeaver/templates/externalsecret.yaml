{{- if and .Values.oauth2Proxy.enabled .Values.oauth2Proxy.eso.enabled }}
{{- $name := .Values.fullnameOverride | default .Release.Name | default "cloudbeaver" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}-oauth
  labels:
    app: {{ $name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.oauth2Proxy.eso.secretStoreRef.name }}
    kind: {{ .Values.oauth2Proxy.eso.secretStoreRef.kind }}
  target:
    name: {{ $name }}-oauth
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: clientId
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: clientSecret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: cookieSecret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $name }}-emails
  labels:
    app: {{ $name }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.oauth2Proxy.eso.secretStoreRef.name }}
    kind: {{ .Values.oauth2Proxy.eso.secretStoreRef.kind }}
  target:
    name: {{ $name }}-emails
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        authenticated-emails.txt: "{{ "{{ .emails }}" }}"
  data:
    - secretKey: emails
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: allowedEmails
{{- end }}
