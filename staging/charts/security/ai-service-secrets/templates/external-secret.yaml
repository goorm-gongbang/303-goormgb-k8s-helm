{{- range .Values.namespaces }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $.Values.secretName }}
  namespace: {{ . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ $.Values.secretName }}
  data:
    # === Redis (AI Defense 세션 저장소) ===
    - secretKey: AI_REDIS_HOST
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/redis
        property: host
    - secretKey: AI_REDIS_PORT
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/redis
        property: port
    # === PostgreSQL (AI Defense policy control-plane) ===
    - secretKey: AI_PG_HOST
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/postgres
        property: host
    - secretKey: AI_PG_PORT
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/postgres
        property: port
    - secretKey: AI_PG_USERNAME
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/postgres
        property: username
    - secretKey: AI_PG_PASSWORD
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/postgres
        property: password
    - secretKey: AI_PG_DBNAME
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/postgres
        property: dbname
    # === ClickHouse (AI Defense observability warehouse) ===
    - secretKey: AI_CLICKHOUSE_USER
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/clickhouse
        property: user
    - secretKey: AI_CLICKHOUSE_PASSWORD
      remoteRef:
        key: {{ $.Values.secretManagerPrefix }}/clickhouse
        property: password
{{- end }}
