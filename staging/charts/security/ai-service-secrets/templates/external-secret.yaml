apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
  data:
    # === Redis (AI Defense 세션 저장소) ===
    - secretKey: AI_REDIS_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: host
    - secretKey: AI_REDIS_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: port
