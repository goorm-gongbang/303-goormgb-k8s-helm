{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: redis:7-alpine
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: redis-credentials
                      key: REDIS_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: redis-backup-s3
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: redis-backup-s3
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: ap-northeast-2
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3Bucket }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3Prefix }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache aws-cli

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="dump-${TIMESTAMP}.rdb"

                  echo "=== Redis Backup ==="

                  LAST_SAVE_BEFORE=$(redis-cli -h redis -a $REDIS_PASSWORD LASTSAVE | awk '{print $1}')
                  redis-cli -h redis -a $REDIS_PASSWORD BGSAVE

                  echo "Waiting for BGSAVE..."
                  TIMEOUT=60
                  ELAPSED=0
                  while [ $ELAPSED -lt $TIMEOUT ]; do
                    LAST_SAVE_AFTER=$(redis-cli -h redis -a $REDIS_PASSWORD LASTSAVE | awk '{print $1}')
                    if [ "$LAST_SAVE_AFTER" != "$LAST_SAVE_BEFORE" ]; then
                      break
                    fi
                    sleep 1
                    ELAPSED=$((ELAPSED + 1))
                  done

                  redis-cli -h redis -a $REDIS_PASSWORD --rdb /tmp/${BACKUP_FILE}
                  aws s3 cp /tmp/${BACKUP_FILE} s3://${S3_BUCKET}/${S3_PREFIX}/${BACKUP_FILE}

                  echo "Backup complete!"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
{{- end }}
