# prod environment - sample app (EKS)
# Placeholder - to be configured when EKS is ready

replicaCount: 2

image:
  repository: ""  # ECR URI
  tag: ""         # CI/CD에서 주입
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-pull-secret

ingress:
  enabled: false

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

istio:
  sidecar: true
  gateway:
    enabled: true
    hosts:
      - "goormgb.space"
    tls:
      enabled: true
      mode: SIMPLE
      credentialName: goormgb-tls

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
