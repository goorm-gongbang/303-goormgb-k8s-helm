# ExternalDNS - Route53 DNS Record Management
# Prod Environment (Main Account: 497012402578)

# ServiceAccount with IRSA
serviceAccount:
  create: true
  name: external-dns
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::497012402578:role/goormgb-prod-external-dns

# AWS Provider 설정
provider: aws

# Route53 설정
extraArgs:
  - --source=service
  - --source=ingress
  - --aws-zone-type=public
  - --txt-owner-id=goormgb-prod-eks
  # 관리할 도메인 필터
  - --domain-filter=playball.one
  - --domain-filter=playball.one

# 정책: sync (레코드 삭제도 허용)
policy: sync

# 로그 레벨
logLevel: info

# 노드 배치
nodeSelector:
  role: infra
tolerations:
  - key: role
    value: infra
    effect: NoSchedule

# 리소스 설정
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
