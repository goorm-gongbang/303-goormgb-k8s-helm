# ArgoCD Config - EKS Prod
# Domain: playball.one

# ArgoCD Server Service - NLB + HTTPS (Istio 안 거침)
server:
  # 외부 URL (OAuth redirect용)
  url: https://argocd.playball.one
  # NLB에서 SSL 종료하므로 ArgoCD는 HTTP로 실행
  insecure: true
  service:
    type: LoadBalancer
    annotations:
      # AWS Load Balancer Controller 사용 (external)
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      # TODO: ACM 인증서 생성 후 ARN 설정
      # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-northeast-2:497012402578:certificate/CERTIFICATE_ID"
      # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
      # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"

# Istio Gateway 비활성화 (NLB 직접 노출)
gateway:
  enabled: false
  host: "argocd.playball.one"

# Google OAuth 설정
oidc:
  enabled: true
  name: Google
  issuer: https://accounts.google.com
  secretManagerKey: prod/argocd/oauth
  requestedScopes:
    - openid
    - profile
    - email

# RBAC 설정 - ESO에서 허용된 사용자 목록 가져옴
rbac:
  eso:
    enabled: true
    secretManagerKey: prod/oauth/rbac/argocd
  # 등록되지 않은 사용자는 접근 불가
  defaultPolicy: role:none

# Applications 정의
# 앱 서비스는 ApplicationSet (prod-webs-services)으로 관리
# 중복 방지를 위해 여기서는 비활성화
applications: []
  # ApplicationSet 사용: prod/root/values.yaml → applicationSets.prod-webs-services

# Prometheus 메트릭 수집 (Prometheus 설치 후 enabled: true로 변경)
metrics:
  enabled: false  # TODO: Prometheus 설치 후 true로 변경

# ArgoCD Notifications - Discord
notifications:
  enabled: true
  discord:
    eso:
      enabled: true
      secretManagerKey: prod/argocd/discord-webhook
