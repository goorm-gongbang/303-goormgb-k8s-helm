# EKS Prod - kube-prometheus-stack Configuration
# Domain: playball.one
# Note: kube-prometheus-stack을 직접 OCI 배포하므로 prefix 없이 root level에 값 설정
#
# ============================================================
# dev vs EKS 차이점:
# ------------------------------------------------------------
# [제거됨 - EKS 불필요]
# - nodeSelector/tolerations (kubeadm Control Plane 노드 배치용)
# - kubeControllerManager/kubeScheduler/kubeEtcd 모니터링 (kubeadm 전용)
# - etcd-client-cert secret 마운트 (kubeadm 전용)
# - endpoints 설정 (kubeadm 전용)
#
# [변경됨 - EKS 환경]
# - 도메인: goormgb.space -> playball.one
# - 리소스: 스케일 업 (EKS 환경에 맞게)
# - retention: 7일로 증가
# ============================================================

# ===== prometheus-extras용 설정 (ExternalSecrets, VirtualService) =====
# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.playball.one"
    # EKS: TLS는 CloudFront + ACM에서 처리
  prometheus:
    enabled: true
    host: "prometheus.playball.one"
    gatewayRef: "istio-system/api-gateway"

# Dashboard 설정 (EKS 환경: Calico, 로컬 exporter 대시보드 제외)
dashboards:
  infraTeam:
    folderName: "PROD 플랫폼 관측(인프라)"
    k6Enabled: false
    k6FolderName: "PROD 부하 테스트(k6)"
    wafFolderName: "PROD WAF 모니터링"
    cicdFolderName: "PROD CICD 모니터링"
    exclude:
      - "calico-felix.json"
    ciliumExclude:
      - "cilium-overview.json"
      - "hubble-overview.json"
  devTeam:
    folderName: "PROD 서비스 관측(개발)"
    namespacePattern: "prod-webs"
    redisClusterPattern: "goormgb-prod-.*"
    exclude:
      # 로컬 exporter 대시보드 제외 (EKS는 CloudWatch 사용)
      - "database-postgresql-local.json"
      - "cache-redis-local.json"
  aiTeam:
    folderName: "PROD 서비스 관측(AI)"
    aiNamespace: "prod-ai"
    websNamespace: "prod-webs"
  alertOps:
    enabled: true
    folderName: "PROD 알람 현황판"
  businessKpi:
    enabled: true
    folderName: "PROD 알람 현황판"
  businessPm:
    folderName: "PROD 사용자 행동 분석(PM)"
  securityOps:
    enabled: true
    folderName: "PROD 알람 현황판"

# ===== kube-prometheus-stack 직접 배포용 설정 =====
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook 비활성화 (TLS 인증서 문제 방지)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# kube-state-metrics
kube-state-metrics:
  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# EKS: kubeadm 전용 컴포넌트 모니터링 비활성화
kubeControllerManager:
  enabled: false  # EKS managed
kubeScheduler:
  enabled: false  # EKS managed
kubeEtcd:
  enabled: false  # EKS managed
kubeProxy:
  enabled: true

prometheus:
  prometheusSpec:
    # 모든 namespace 메트릭 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collector에서 메트릭 수신 (remote write)
    enableRemoteWriteReceiver: true

    retention: 7d
    retentionSize: "20GB"

    nodeSelector:
      role: monitoring
    tolerations:
      - key: role
        value: monitoring
        effect: NoSchedule

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 3Gi

    # EBS CSI driver 미사용 - emptyDir 사용
    # storageSpec:
    #   volumeClaimTemplate:
    #     metadata:
    #       name: data
    #     spec:
    #       storageClassName: gp2
    #       accessModes: ["ReadWriteOnce"]
    #       resources:
    #         requests:
    #           storage: 30Gi

