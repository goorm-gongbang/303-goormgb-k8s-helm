  # EBS CSI driver 미사용 - persistence 비활성화
  persistence:
    enabled: false

  nodeSelector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Loki + Tempo + CloudWatch datasource
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        maxLines: 1000

    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true

    # CloudWatch Data Source (RDS, ElastiCache 메트릭)
    - name: CloudWatch
      type: cloudwatch
      uid: cloudwatch
      access: proxy
      isDefault: false
      editable: true
      jsonData:
        authType: default  # IRSA 사용
        defaultRegion: ap-northeast-2

# VPC CNI ServiceMonitor (awscni_* 메트릭 수집)
prometheus:
  additionalServiceMonitors:
    - name: aws-vpc-cni
      jobLabel: k8s-app
      namespaceSelector:
        matchNames:
          - kube-system
      selector:
        matchLabels:
          k8s-app: aws-node
      endpoints:
        - port: metrics
          interval: 30s
          path: /metrics

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "prod/monitoring/discord-webhook-alerts"
      securityWebhooksEnabled: false
  alertmanagerSpec:
    nodeSelector:
      role: monitoring
    tolerations:
      - key: role
        value: monitoring
        effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
