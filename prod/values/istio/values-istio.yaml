# EKS Prod 클러스터 Istio 설정
# ALB Ingress 사용 - Istio IngressGateway는 API 트래픽만 처리

# istiod (Helm chart values)
pilot:
  nodeSelector:
    role: infra
  tolerations:
    - key: role
      value: infra
      effect: NoSchedule
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Sidecar Proxy 기본 리소스 설정
global:
  proxy:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

meshConfig:
  accessLogFile: /dev/stdout

# Legacy gateways 비활성화 (ALB Ingress 사용)
sharedGateway:
  enabled: false
apiGateway:
  enabled: false
monitoringGateway:
  enabled: false

# API Gateway CRD (Istio IngressGateway용)
# ALB → Istio IngressGateway → VirtualService → API Pods
apiGatewayConfig:
  enabled: true
  name: api-gateway
  selector: ingressgateway
  hosts:
    - "api.playball.one"
    - "prometheus.playball.one"

# =============================================================================
# Kiali - Service Mesh Observability
# =============================================================================
auth:
  strategy: openid
  openid:
    client_id_from_secret: kiali-oidc-secret
    client_id_secret_key: client_id
    issuer_uri: "https://accounts.google.com"
    username_claim: "email"
    scopes: ["openid", "profile", "email"]
    disable_rbac: true

server:
  web_fqdn: kiali.playball.one
  web_port: 443
  web_schema: https

deployment:
  node_selector:
    role: monitoring
  tolerations:
    - key: role
      value: monitoring
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

external_services:
  prometheus:
    url: "http://prom-prometheus.monitoring.svc.cluster.local:9090"
  grafana:
    enabled: true
    in_cluster_url: "http://grafana.monitoring.svc.cluster.local:80"
    url: "https://grafana.playball.one"
  tracing:
    enabled: true
    provider: "tempo"
    in_cluster_url: "http://tempo.monitoring.svc.cluster.local:3200"
    use_grpc: false
