# Grafana - Prod 환경 (독립 배포)
# kube-prometheus-stack에서 분리하여 별도 Application으로 배포

fullnameOverride: grafana

# Pod/Service label 일치 (app.kubernetes.io/instance)
# Service selector가 'grafana'를 찾도록 설정
podLabels:
  app.kubernetes.io/instance: grafana

# IRSA for CloudWatch Data Source
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::497012402578:role/goormgb-prod-grafana-cloudwatch

# init-chown-data 비활성화 (PVC 권한 문제 방지)
initChownData:
  enabled: false

securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# 대시보드 폴더 설정 (sidecar 방식)
sidecar:
  dashboards:
    enabled: true
    folder: /tmp/dashboards
    folderAnnotation: grafana_folder
    searchNamespace: monitoring
    provider:
      foldersFromFilesStructure: true
      allowUiUpdates: true

# kube-prometheus-stack 기본 대시보드 비활성화
defaultDashboardsEnabled: false
forceDeployDashboards: false
defaultDashboardsTimezone: utc

# 대시보드 프로바이더 설정
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "dev-team-observability-templates"
        orgId: 1
        folder: "Dev Team - Templates"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/dev-team-observability-templates

      - name: "infra-team-observability-templates"
        orgId: 1
        folder: "Infra Team - Templates"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/infra-team-observability-templates

# Grafana.com 대시보드
dashboards:
  dev-team-observability-templates:
    service-pod-health:
      gnetId: 17125
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    service-traffic-istio:
      gnetId: 7636
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    service-workload-istio:
      gnetId: 7630
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

  infra-team-observability-templates:
    platform-node-capacity:
      gnetId: 1860
      revision: 37
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-cluster-overview:
      gnetId: 7249
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    # EKS Karpenter Dashboard
    platform-karpenter:
      gnetId: 20398
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-k8s-views-global:
      gnetId: 15757
      revision: 37
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-k8s-views-namespaces:
      gnetId: 15758
      revision: 34
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-prometheus-overview:
      gnetId: 19105
      revision: 3
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-istio-mesh:
      gnetId: 7639
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

    platform-istio-control-plane:
      gnetId: 7645
      revision: 1
      datasource:
        - name: DS_PROMETHEUS
          value: Prometheus

# ESO에서 생성한 secret 사용
admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

# Google OAuth 설정 - Secret에서 환경변수 주입
envFromSecret: google-oauth-credentials

grafana.ini:
  server:
    root_url: https://grafana.playball.one
  unified_alerting:
    enabled: false
  alerting:
    enabled: false
  auth.google:
    enabled: true
    allow_sign_up: true
    auto_login: false
    scopes: openid email profile
    allow_assign_grafana_admin: true
    skip_org_role_sync: false
    role_attribute_strict: true
    auth_url: https://accounts.google.com/o/oauth2/auth
    token_url: https://oauth2.googleapis.com/token
    api_url: https://openidconnect.googleapis.com/v1/userinfo
    # 이메일 기반 역할 할당 (Staging과 동일 유지)
    role_attribute_path: >-
      contains(['212clab@gmail.com', 'rhuba23@gmail.com', 'chamchi0129@gmail.com'], email) && 'Admin' ||
      contains(['jusanha17@gmail.com', 'lab.jehyun@gmail.com', 'wnconc@gmail.com', 'jbyun1105@gmail.com', 'sayiamseyoun9@gmail.com', 'jminwook0120@gmail.com', 'siyeon0713@gmail.com', 'cdh4112618@gmail.com', 'rhkdgur120@gmail.com', 'wkdwlgus317@hanyang.ac.kr', 'yuuijin863@gmail.com', 'hs4734@gmail.com', 'hejwien@gmail.com', 'niceguy6112@gmail.com'], email) && 'Viewer' ||
      ''
  users:
    allow_sign_up: true
    auto_assign_org: true
    auto_assign_org_role: Viewer
  auth:
    disable_login_form: false

# EBS CSI driver 미사용 - persistence 비활성화
persistence:
  enabled: false

nodeSelector:
  role: monitoring
tolerations:
  - key: role
    value: monitoring
    effect: NoSchedule

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Datasources (Prometheus + Loki + Tempo + CloudWatch)
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prom-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: true

      # CloudWatch Data Source (RDS, ElastiCache 메트릭)
      - name: CloudWatch
        type: cloudwatch
        uid: cloudwatch
        access: proxy
        isDefault: false
        editable: true
        jsonData:
          authType: default  # IRSA 사용
          defaultRegion: ap-northeast-2
