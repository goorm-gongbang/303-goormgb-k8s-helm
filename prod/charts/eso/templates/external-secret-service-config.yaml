{{- if .Values.serviceConfig.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: service-config
  namespace: {{ .Values.serviceConfig.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: service-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # === Database (constructed from individual fields) ===
        SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ `{{ .db_host }}` }}:{{ `{{ .db_port }}` }}/{{ `{{ .db_dbname }}` }}"
        SPRING_DATASOURCE_USERNAME: "{{ `{{ .db_username }}` }}"
        SPRING_DATASOURCE_PASSWORD: "{{ `{{ .db_password }}` }}"
        # === Redis ===
        SPRING_DATA_REDIS_HOST: "{{ `{{ .redis_host }}` }}"
        SPRING_DATA_REDIS_PORT: "{{ `{{ .redis_port }}` }}"
        REDIS_QUEUE_HOST: "{{ `{{ .redis_host }}` }}"
        REDIS_QUEUE_PORT: "{{ `{{ .redis_port }}` }}"
        # === JWT ===
        JWT_PRIVATE_KEY: "{{ `{{ .jwt_private_key }}` }}"
        JWT_PUBLIC_KEY: "{{ `{{ .jwt_public_key }}` }}"
        JWT_ISSUER: "{{ `{{ .jwt_issuer }}` }}"
        JWT_ACCESS_TOKEN_AUDIENCE: "{{ `{{ .jwt_access_token_audience }}` }}"
        JWT_ACCESS_TOKEN_EXPIRATION: "{{ `{{ .jwt_access_token_expiration }}` }}"
        JWT_REFRESH_TOKEN_AUDIENCE: "{{ `{{ .jwt_refresh_token_audience }}` }}"
        JWT_REFRESH_TOKEN_EXPIRATION: "{{ `{{ .jwt_refresh_token_expiration }}` }}"
        # === Queue JWT ===
        ADMISSION_PRIVATE_KEY: "{{ `{{ .queue_private_key }}` }}"
        ADMISSION_PUBLIC_KEY: "{{ `{{ .queue_public_key }}` }}"
        # === Kakao OAuth ===
        KAKAO_CLIENT_ID: "{{ `{{ .kakao_client_id }}` }}"
        KAKAO_CLIENT_SECRET: "{{ `{{ .kakao_client_secret }}` }}"
        KAKAO_REDIRECT_URI: "{{ `{{ .kakao_redirect_uri }}` }}"
  data:
    # === Database (prod/services/db) ===
    # Terraform creates: host, port, dbname, username, password, engine
    - secretKey: db_host
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: host
    - secretKey: db_port
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: port
    - secretKey: db_dbname
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: dbname
    - secretKey: db_username
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: username
    - secretKey: db_password
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/db
        property: password

    # === Redis (prod/services/redis) ===
    # Terraform creates: host, port
    - secretKey: redis_host
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/redis
        property: host
    - secretKey: redis_port
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/redis
        property: port

    # === JWT (prod/services/jwt) ===
    # Secrets Manager keys: JWT_PRIVATE_KEY, JWT_PUBLIC_KEY, JWT_ISSUER, etc.
    - secretKey: jwt_private_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PRIVATE_KEY
    - secretKey: jwt_public_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_PUBLIC_KEY
    - secretKey: jwt_issuer
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ISSUER
    - secretKey: jwt_access_token_audience
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_AUDIENCE
    - secretKey: jwt_access_token_expiration
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_EXPIRATION
    - secretKey: jwt_refresh_token_audience
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_AUDIENCE
    - secretKey: jwt_refresh_token_expiration
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_EXPIRATION

    # === Queue JWT (prod/services/jwt) ===
    # Secrets Manager keys: ADMISSION_PRIVATE_KEY, ADMISSION_PUBLIC_KEY
    - secretKey: queue_private_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: ADMISSION_PRIVATE_KEY
    - secretKey: queue_public_key
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/jwt
        property: ADMISSION_PUBLIC_KEY

    # === Kakao OAuth ===
    - secretKey: kakao_client_id
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: clientId
    - secretKey: kakao_client_secret
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: clientSecret
    - secretKey: kakao_redirect_uri
      remoteRef:
        key: {{ .Values.serviceConfig.secretManagerPrefix }}/oauth/kakao
        property: redirectUri
{{- end }}
