# ALB Ingress - EKS Prod
# Host-based routing for all services

ingress:
  enabled: true
  name: prod-alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # ExternalDNS
    external-dns.alpha.kubernetes.io/hostname: argocd.playball.one,grafana.playball.one,kiali.playball.one,api.playball.one,prometheus.playball.one

  # TLS 설정 (ACM 인증서) - *.playball.one
  certificateArn: arn:aws:acm:ap-northeast-2:497012402578:certificate/e099c673-5089-4469-b459-7bbe61168057

  rules:
    # ArgoCD - Istio 안 거침 (직접 라우팅)
    - host: argocd.playball.one
      service:
        name: argocd-server
        namespace: argocd
        port: 80
        healthCheckPath: /healthz

    # Grafana - Istio 안 거침 (직접 라우팅)
    - host: grafana.playball.one
      service:
        name: grafana
        namespace: monitoring
        port: 80
        healthCheckPath: /api/health

    # Kiali - Istio 안 거침 (직접 라우팅)
    - host: kiali.playball.one
      service:
        name: kiali
        namespace: istio-system
        port: 20001
        healthCheckPath: /healthz

    # API - Istio IngressGateway 거침
    - host: api.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready

    # Prometheus Remote Write - Istio IngressGateway 거침
    - host: prometheus.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready
