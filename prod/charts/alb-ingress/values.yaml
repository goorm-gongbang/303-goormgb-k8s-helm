# ALB Ingress - EKS Prod
# Host-based routing for all services

ingress:
  enabled: true
  name: prod-alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # ExternalDNS
    external-dns.alpha.kubernetes.io/hostname: argocd.playball.one,grafana.playball.one,kiali.playball.one,api.playball.one,prometheus.playball.one

  # TLS 설정 (ACM 인증서) - *.playball.one
  # [수정됨] 기존의 안정적인 인증서 ARN으로 원복 완료
  certificateArn: arn:aws:acm:ap-northeast-2:497012402578:certificate/ee27ff43-5be6-4f96-bccd-091b45663091

  rules:
    # ArgoCD - Istio 보안 정책 적용을 위해 IngressGateway 경유
    - host: argocd.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready

    # Grafana - Istio 보안 정책 적용을 위해 IngressGateway 경유
    - host: grafana.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready

    # Kiali - Istio 보안 정책 적용을 위해 IngressGateway 경유
    - host: kiali.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready

    # API - Istio IngressGateway 거침
    - host: api.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready

    # Prometheus Remote Write - Istio IngressGateway 거침
    - host: prometheus.playball.one
      service:
        name: istio-ingressgateway
        namespace: istio-system
        port: 80
        healthCheckPath: /healthz/ready
