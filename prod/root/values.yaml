# ECR OCI Registry (main 계정에서 cross-account pull)
ecr:
  accountId: "497012402578"
  region: "ap-northeast-2"

# Git Repository
git:
  repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
  targetRevision: argocd-sync/prod

# ArgoCD Project
project: default

# Destination
destination:
  server: https://kubernetes.default.svc

# =============================================================================
# OCI Charts (ECR에서 직접 참조) - Multi-source Application
# =============================================================================
ociCharts:
  # Kyverno - Policy Engine
  kyverno:
    enabled: true
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    version: "3.2.6"
    namespace: kyverno
    syncWave: "-7"
    valueFiles:
      - $values/prod/values/security/values-kyverno.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        jsonPointers:
          - /webhooks
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations
          - /metadata/labels
  istio-base:
    enabled: true
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    version: "1.29.1"
    namespace: istio-system
    syncWave: "1"
    valueFiles:
      - $values/prod/values/istio/values-istio.yaml
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle
          - /webhooks/0/failurePolicy

  istiod:
    enabled: true
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    version: "1.29.1"
    namespace: istio-system
    syncWave: "1"
    valueFiles:
      - $values/prod/values/istio/values-istio.yaml
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        jsonPointers:
          - /webhooks/0/clientConfig/caBundle
          - /webhooks/0/failurePolicy
          - /webhooks/1/clientConfig/caBundle
          - /webhooks/1/failurePolicy
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        jsonPointers:
          - /webhooks
          - /metadata/resourceVersion
      - group: apps
        kind: Deployment
        jsonPointers:
          - /metadata/annotations/deployment.kubernetes.io~1revision
          - /spec
      - group: monitoring.coreos.com
        kind: PodMonitor
        jsonPointers:
          - /spec/podMetricsEndpoints

  # Istio IngressGateway (ClusterIP - ALB Ingress에서 라우팅)
  istio-ingressgateway:
    enabled: true
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    version: "1.29.1"
    namespace: istio-system
    syncWave: "2"
    valueFiles:
      - $values/prod/values/istio/values-istio-gateway.yaml

  kiali-server:
    enabled: true
    repoURL: https://kiali.org/helm-charts
    chart: kiali-server
    version: "2.23.0"
    namespace: istio-system
    syncWave: "3"
    valueFiles:
      - $values/prod/values/istio/values-istio.yaml
    ignoreDifferences:
      - group: ""
        kind: ConfigMap
        name: kiali
        jsonPointers:
          - /data/config.yaml
      - group: apps
        kind: Deployment
        name: kiali
        jsonPointers:
          - /spec/template/metadata/annotations

  tigera-operator:
    enabled: false  # EKS는 VPC CNI 사용
    repoURL: https://docs.tigera.io/calico/charts
    chart: tigera-operator
    version: "v3.29.3"
    namespace: tigera-operator
    syncWave: "-10"
    valueFiles: []

  # Karpenter - Node Auto-scaling
  karpenter:
    enabled: true
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    version: "1.9.0"
    namespace: karpenter
    syncWave: "2"
    valueFiles:
      - $values/prod/values/infra/values-karpenter.yaml
    syncOptions:
      - ServerSideApply=true

  loki:
    enabled: true
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    version: "6.55.0"
    namespace: monitoring
    syncWave: "3"
    valueFiles:
      - $values/prod/values/monitoring/logs/values-loki.yaml
    syncOptions:
      - Replace=true
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  promtail:
    enabled: true
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    version: "6.17.1"
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - $values/prod/values/monitoring/logs/values-promtail.yaml

  kube-prometheus-stack:
    enabled: true
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    version: "82.10.3"
    namespace: monitoring
    syncWave: "3"
    valueFiles:
      - $values/prod/values/monitoring/metrics/values-prometheus-stack.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /spec/conversion
          - /metadata/annotations
      - group: ""
        kind: Endpoints
        jsonPointers:
          - /metadata
          - /subsets

  aws-load-balancer-controller:
    enabled: true
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    version: "1.11.0"
    namespace: kube-system
    syncWave: "1"
    valueFiles:
      - $values/prod/values/infra/values-aws-lb-controller.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    ignoreDifferences:
      - group: ""
        kind: Secret
        name: aws-load-balancer-tls
        jsonPointers:
          - /data
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration
        name: aws-load-balancer-webhook
        jsonPointers:
          - /webhooks
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
        name: aws-load-balancer-webhook
        jsonPointers:
          - /webhooks
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations

  external-secrets:
    enabled: true
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    version: "2.1.0"
    namespace: external-secrets
    syncWave: "0"
    valueFiles:
      - $values/prod/values/infra/values-eso.yaml
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    ignoreDifferences:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        jsonPointers:
          - /status
          - /metadata/annotations

  external-dns:
    enabled: true
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    version: "1.15.2"
    namespace: external-dns
    syncWave: "2"
    valueFiles:
      - $values/prod/values/infra/values-external-dns.yaml

  alloy:
    enabled: true
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    version: "1.6.2"
    namespace: monitoring
    syncWave: "3"
    valueFiles:
      - $values/prod/values/monitoring/logs/values-alloy.yaml

  k6-operator:
    enabled: false
    repoURL: https://grafana.github.io/helm-charts
    chart: k6-operator
    version: "4.3.0"
    namespace: k6-operator
    syncWave: "0"
    valueFiles: []

  tempo:
    enabled: true
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    version: "1.10.3"
    namespace: monitoring
    syncWave: "3"
    valueFiles:
      - $values/prod/values/monitoring/traces/values-tempo.yaml
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
          - /spec/volumeName
          - /spec/storageClassName

  # Grafana (kube-prometheus-stack에서 분리)
  grafana:
    enabled: true
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    version: "8.14.0"
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - $values/prod/values/monitoring/visualization/values-grafana.yaml

  opentelemetry-collector:
    enabled: true
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    version: "0.147.1"
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - $values/prod/values/monitoring/metrics/values-opentelemetry-collector.yaml

  # Metrics Server - kubectl top nodes/pods
  metrics-server:
    enabled: true
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    version: "3.13.0"
    namespace: kube-system
    syncWave: "-9"
    valueFiles: []

# =============================================================================
# Git Charts (Git 레포에서 참조) - 단일 source Application
# =============================================================================
gitCharts:
  # === Core ===
  namespaces:
    enabled: true
    path: common-charts/infra/namespaces
    namespace: default
    syncWave: "-10"
    valueFiles:
      - ../../../prod/values/core/values-namespaces.yaml

  # === Security ===
  kyverno-policies:
    enabled: true
    path: common-charts/infra/namespaces  # namespace 생성용 차튇 재사용 (raw yaml 배포용)
    namespace: default
    syncWave: "-6"
    valueFiles:
      - ../../../prod/values/security/values-kyverno-policies.yaml

  network-policies:
    enabled: true
    path: common-charts/infra/namespaces
    namespace: default
    syncWave: "-5"
    valueFiles:
      - ../../../prod/values/security/values-network-policies.yaml

  ai-service-secrets:
    enabled: true
    path: prod/charts/security/ai-service-secrets
    namespace: prod-ai
    syncWave: "-4"

  mail-config:
    enabled: true
    path: common-charts/infra/namespaces
    namespace: prod-webs
    syncWave: "2"
    valueFiles:
      - ../../../prod/values/apps/values-mail-config.yaml

  # === Security ===
  rbac:
    enabled: true
    path: common-charts/infra/rbac
    namespace: default
    valueFiles:
      - ../../../prod/values/security/values-rbac.yaml

  # ESO ClusterSecretStore (IRSA 기반)
  eso-config:
    enabled: true
    path: prod/charts/eso
    namespace: external-secrets
    syncWave: "-8"

  # Karpenter NodePool & EC2NodeClass
  karpenter-config:
    enabled: true
    path: prod/charts/karpenter
    namespace: karpenter
    syncWave: "-6"
    syncOptions:
      - SkipDryRunOnMissingResource=true

  # PostgreSQL 보조 백업 (pg_dump -> S3)
  rds-backup:
    enabled: true
    path: prod/charts/data/rds-backup
    namespace: data
    syncWave: "-5"

  # === ALB Ingress (Host-based routing) ===
  alb-ingress:
    enabled: true
    path: prod/charts/alb-ingress
    namespace: istio-system
    syncWave: "5"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - Prune=false

  # === Istio ===
  istio-gateway:
    enabled: true
    path: common-charts/infra/istio/gateway
    namespace: istio-system
    syncWave: "-2"
    valueFiles:
      - ../../../../prod/values/istio/values-istio.yaml

  istio-security:
    enabled: true
    path: common-charts/infra/istio-security
    namespace: istio-system
    syncWave: "-1"
    valueFiles:
      - ../../../prod/values/istio/values-istio-security.yaml

  # === OCI Chart Extras (추가 모니터링/설정) ===
  istiod-monitoring:
    enabled: true
    path: common-charts/infra/istio/istiod
    namespace: istio-system
    syncWave: "-2"
    valueFiles:
      - ../../../../prod/values/istio/values-istio.yaml

  prometheus-extras:
    enabled: true
    path: common-charts/infra/monitoring/prometheus-stack
    namespace: monitoring
    syncWave: "0"
    valueFiles:
      - ../../../../prod/values/monitoring/metrics/values-prometheus-stack.yaml
      - ../../../../prod/values/monitoring/alerting/values-alertmanager-prod.yaml
      - ../../../../prod/values/monitoring/alerting/values-rules-prod.yaml
    syncOptions:
      - Replace=true

  redis-exporter-ai:
    enabled: true
    path: prod/charts/monitoring/redis-exporter-ai
    namespace: monitoring
    syncWave: "3"

  # === Data ===
  clickhouse:
    enabled: true
    path: common-charts/data/clickhouse
    namespace: data
    syncWave: "3"
    valueFiles:
      - ../../../prod/values/data/values-clickhouse.yaml

  redisinsight:
    enabled: true
    path: common-charts/data/redisinsight
    namespace: data
    syncWave: "3"
    valueFiles:
      - ../../../prod/values/data/values-redisinsight.yaml

  # === Messaging ===
  kafka:
    enabled: true
    path: common-charts/messaging/kafka
    namespace: messaging
    syncWave: "4"
    valueFiles:
      - ../../../prod/values/messaging/values-kafka.yaml

  kafka-ui:
    enabled: true
    path: common-charts/messaging/kafka-ui
    namespace: messaging
    syncWave: "5"
    valueFiles:
      - ../../../prod/values/messaging/values-kafka-ui.yaml
    enabled: true
    path: common-charts/infra/monitoring/alloy
    releaseName: alloy
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - ../../../../prod/values/monitoring/logs/values-alloy.yaml

  loki-backup:
    enabled: false  # prod에서 필요시 활성화
    path: common-charts/infra/monitoring/loki
    namespace: monitoring
    syncWave: "1"
    valueFiles:
      - ../../../../prod/values/monitoring/metrics/values-monitoring.yaml

  # === ArgoCD Config (OAuth, Applications) ===
  argocd-config:
    enabled: true
    path: common-charts/infra/argocd
    namespace: argocd
    valueFiles:
      - ../../../prod/values/core/values-argocd.yaml

  # === Monitoring ===
  # tempo: OCI로 이동 (ociCharts.tempo)
  # otel-collector: OCI로 이동 (ociCharts.opentelemetry-collector)

# =============================================================================
# ApplicationSets
# =============================================================================
applicationSets:
  prod-webs-services:
    enabled: true
    syncWave: "10"
    namespace: prod-webs
    chartPath: common-charts/apps/java-service
    valueFilesPattern: ../../../prod/values/apps/values-{{name}}.yaml
    services:
      # 순차 배포: auth-guard → 나머지 서비스 → api-gateway
      - name: auth-guard
        syncWave: "10"
      - name: queue
        syncWave: "11"
      - name: seat
        syncWave: "11"
      - name: order-core
        syncWave: "11"
      - name: api-gateway
        syncWave: "12"

  prod-ai-services:
    enabled: true
    syncWave: "10"
    namespace: prod-ai
    chartPath: common-charts/apps/ai-service
    valueFilesPattern: ../../../prod/values/apps/values-{{name}}.yaml
    services:
      - name: authz-adapter
        syncWave: "10"
      - name: ai-defense
        syncWave: "11"

  prod-ai-etl:
    enabled: true
    syncWave: "15"
    namespace: prod-ai
    chartPath: common-charts/apps/cronjob
    valueFilesPattern: ../../../prod/values/apps/values-{{name}}.yaml
    services:
      - name: ai-etl
        syncWave: "15"


# =============================================================================
# Raw Manifests (Gateway, VirtualService, EnvoyFilter)
# =============================================================================
rawManifests:
  apiGateway:
    enabled: false  # prod에서 필요시 활성화
  swaggerGateway:
    enabled: false
  swagger403Redirect:
    enabled: false
  aiDefenseRoute:
    enabled: false
