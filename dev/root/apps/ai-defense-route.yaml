# AI Defense 서비스 라우팅
# api.dev.goormgb.space/ai/* → ai-defense 서비스
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ai-defense-route
  namespace: dev-ai
spec:
  hosts:
    - "api.dev.goormgb.space"
  gateways:
    - istio-system/api-gateway  # 공통 Gateway 참조
  http:
    # /ai/* 경로 라우팅 (Swagger UI 포함)
    - match:
        - uri:
            prefix: /ai/
      rewrite:
        uri: /
      route:
        - destination:
            host: dev-ai-defense.dev-ai.svc.cluster.local
            port:
              number: 8000
    # /ai (trailing slash 없이) → /ai/로 리다이렉트
    - match:
        - uri:
            exact: /ai
      redirect:
        uri: /ai/
