apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # === Core ===
  - infra/core/namespaces.yaml      # sync-wave: -10 (가장 먼저)
  - infra/core/ecr-creds.yaml       # sync-wave: -8
  - infra/core/argocd.yaml
  - infra/core/ddns.yaml

  # === Security ===
  # - infra/security/eso.yaml       # Bootstrap에서 설치, ArgoCD 관리 제외
  - infra/security/cert-manager.yaml
  - infra/security/rbac.yaml
  - infra/security/service-secrets.yaml

  # === Data ===
  - infra/data/data.yaml
  - infra/data/cloudbeaver.yaml
  - infra/data/redisinsight.yaml

  # === Istio ===
  - infra/istio/istio.yaml
  - infra/istio/kiali.yaml

  # === Monitoring ===
  - infra/monitoring/prometheus-stack.yaml
  - infra/monitoring/loki.yaml
  - infra/monitoring/tempo.yaml
  - infra/monitoring/otel-collector.yaml

  # === Applications (ApplicationSet) ===
  - dev-webs-applicationset.yaml    # dev-webs: Spring Boot + Next.js
  - dev-ai-applicationset.yaml      # dev-ai: FastAPI AI Agent
