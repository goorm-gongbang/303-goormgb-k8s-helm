# Dev 환경 - AI 서비스 ApplicationSet (FastAPI)
# 새 서비스 추가 시 list에 서비스명만 추가하면 됨
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-ai-services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # 인프라 준비 후 서비스 배포
spec:
  generators:
    - list:
        elements:
          - name: ai-defense
  template:
    metadata:
      name: 'dev-{{name}}'
      labels:
        ns: dev-ai
      annotations:
        notifications.argoproj.io/subscribe.on-sync-running.discord: ""
        notifications.argoproj.io/subscribe.on-deployed.discord: ""
        notifications.argoproj.io/subscribe.on-deploy-failed.discord: ""
        notifications.argoproj.io/subscribe.on-health-degraded.discord: ""
    spec:
      project: default
      source:
        repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
        targetRevision: argocd-sync/dev
        path: common-charts/apps/python-service
        helm:
          valueFiles:
            - ../../../dev/values/apps/values-{{name}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: dev-ai
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
