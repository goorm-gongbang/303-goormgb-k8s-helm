# RedisInsight - Redis GUI Tool
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redisinsight
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: dev/charts/data/redisinsight
    helm:
      valueFiles:
        - ../../../values/data/values-redisinsight.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
