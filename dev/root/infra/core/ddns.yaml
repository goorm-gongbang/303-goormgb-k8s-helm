# DDNS Cloudflare
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ddns-cloudflare
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: dev/charts/core/ddns
    helm:
      valueFiles:
        - ../../../values/core/values-ddns.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
