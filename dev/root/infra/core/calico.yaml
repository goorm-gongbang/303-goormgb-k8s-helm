# Calico CNI with Tigera Operator
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calico
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"  # CNI는 가장 먼저 설치
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: common-charts/infra/calico
    helm:
      valueFiles:
        - ../../../dev/values/core/values-calico.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tigera-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # CRD는 tigera-operator가 관리 - ArgoCD는 변경사항 무시
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /spec
        - /metadata
    - group: operator.tigera.io
      kind: Installation
      jsonPointers:
        - /status
        - /spec
    - group: operator.tigera.io
      kind: APIServer
      jsonPointers:
        - /status
    - group: monitoring.coreos.com
      kind: PodMonitor
      jsonPointers:
        - /spec
