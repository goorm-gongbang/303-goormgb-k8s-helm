# Istio Base (CRDs) - 가장 먼저 설치
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
    notifications.argoproj.io/subscribe.on-infra-deploy-failed.discord-infra: ""
    notifications.argoproj.io/subscribe.on-infra-health-degraded.discord-infra: ""
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: common-charts/infra/istio/base
    helm:
      valueFiles:
        - ../../../../dev/values/istio/values-istio.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/0/failurePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Istiod (Control Plane) - istio-base 이후 설치
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
    notifications.argoproj.io/subscribe.on-infra-deploy-failed.discord-infra: ""
    notifications.argoproj.io/subscribe.on-infra-health-degraded.discord-infra: ""
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: common-charts/infra/istio/istiod
    helm:
      valueFiles:
        - ../../../../dev/values/istio/values-istio.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/0/failurePolicy
        - /webhooks/1/clientConfig/caBundle
        - /webhooks/1/failurePolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Istio Gateway - istiod 이후 설치
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    notifications.argoproj.io/subscribe.on-infra-deploy-failed.discord-infra: ""
    notifications.argoproj.io/subscribe.on-infra-health-degraded.discord-infra: ""
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: common-charts/infra/istio/gateway
    helm:
      valueFiles:
        - ../../../../dev/values/istio/values-istio.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
