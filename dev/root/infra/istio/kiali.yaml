# Kiali - Istio Service Mesh 시각화
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: common-charts/infra/istio/kiali
    helm:
      valueFiles:
        - ../../../../dev/values/istio/values-istio.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  # Kiali chart의 ConfigMap이 매 렌더링마다 미세하게 달라지는 문제 해결
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: kiali
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      name: kiali
      jsonPointers:
        - /spec/template/metadata/annotations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
