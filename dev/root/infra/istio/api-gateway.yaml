# API Gateway (Istio Gateway)
# Ž™®Žď† namespacežĚė VirtualServicežóźžĄú žįłž°į: istio-system/api-gateway
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: api-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: goormgb-tls
      hosts:
        - "api.dev.goormgb.space"
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.dev.goormgb.space"
      tls:
        httpsRedirect: true
