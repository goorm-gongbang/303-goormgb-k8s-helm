# Dev 환경 - Web 서비스 ApplicationSet (Spring Boot + Next.js)
# 새 서비스 추가 시 list에 서비스명만 추가하면 됨
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-webs-services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # 인프라 준비 후 서비스 배포
spec:
  generators:
    - list:
        elements:
          - name: auth-guard
          - name: order-core
          - name: queue
          - name: recommendation
          - name: seat
          # 새 서비스 추가 예시:
          # - name: frontend
  template:
    metadata:
      name: 'dev-{{name}}'
      labels:
        ns: dev-webs
    spec:
      project: default
      source:
        repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
        targetRevision: argocd-sync/dev
        path: common-charts/apps/java-service
        helm:
          valueFiles:
            - ../../../dev/values/apps/values-{{name}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: dev-webs
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
