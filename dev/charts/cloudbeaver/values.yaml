# CloudBeaver defaults
replicaCount: 1

image:
  repository: dbeaver/cloudbeaver
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8978

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

persistence:
  enabled: true
  size: 2Gi
  storageClass: ""

nodeSelector: {}
tolerations: []

# Istio VirtualService
virtualService:
  enabled: false
  host: ""
  gateway: "istio-system/goormgb-gateway"

# PostgreSQL connection (data namespace)
postgresql:
  host: postgresql.data.svc.cluster.local
  port: 5432
