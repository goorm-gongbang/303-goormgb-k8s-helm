{{- if and .Values.oauth2Proxy.enabled .Values.oauth2Proxy.eso.enabled }}
# OAuth2 Proxy credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafka-ui-oauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.oauth2Proxy.eso.secretStoreRef.name }}
    kind: {{ .Values.oauth2Proxy.eso.secretStoreRef.kind }}
  target:
    name: kafka-ui-oauth
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: client_id
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: client_secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: cookie_secret
---
# Allowed emails from AWS Secrets Manager
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafka-ui-emails
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.oauth2Proxy.eso.secretStoreRef.name }}
    kind: {{ .Values.oauth2Proxy.eso.secretStoreRef.kind }}
  target:
    name: kafka-ui-emails
    creationPolicy: Owner
  data:
    - secretKey: authenticated-emails.txt
      remoteRef:
        key: {{ .Values.oauth2Proxy.eso.remoteRef.key }}
        property: authenticated_emails
{{- end }}
