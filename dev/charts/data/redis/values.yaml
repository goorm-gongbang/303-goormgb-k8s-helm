# Redis for MiniPC kubeadm

image:
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

externalSecret:
  enabled: false  # 백엔드에서 비밀번호 미사용
  secretStore: aws-secrets-manager
  remoteRef: dev/services/redis

persistence:
  enabled: true
  storageClass: local-path
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  port: 6379

config:
  maxmemory: 200mb
  maxmemoryPolicy: allkeys-lru
  appendonly: "yes"

backup:
  enabled: false  # TODO: S3 bucket 설정 후 활성화
  schedule: "0 4 * * *"
  s3Bucket: goormgb-minipc-backup
  s3Prefix: redis
  externalSecret:
    remoteRef: dev/backup/s3

nodeSelector: {}
tolerations: []

probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 5
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
