# PostgreSQL for MiniPC kubeadm

config:
  maxConnections: 200

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

databases:
  - goormgb

externalSecret:
  enabled: true
  secretStore: aws-secrets-manager
  remoteRef: dev/services/db

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  port: 5432

backup:
  enabled: true
  schedule: "0 3 * * *"  # 매일 오전 3시 (KST 12시)
  s3Bucket: goormgb-backup
  s3Prefix: dev/postgres
  externalSecret:
    remoteRef: dev/infra/s3-backup

nodeSelector:
  kubernetes.io/hostname: mini-gmk
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5

# ===== Schema & Seed Data Initialization =====
# SQL 파일: files/init-schema.sql
# 수동 실행: kubectl create job manual-init --from=job/postgresql-init-schema -n data
initSchema:
  enabled: false
  database: goormgb
