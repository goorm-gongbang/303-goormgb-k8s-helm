{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-3am-s3-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"  # CronJob은 sidecar 제외 (안 끝남)
        spec:
          restartPolicy: OnFailure
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: POSTGRES_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-backup-s3
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-backup-s3
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: ap-northeast-2
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3Bucket }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3Prefix }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache aws-cli

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="backup-${TIMESTAMP}.sql.gz"

                  echo "=== PostgreSQL Backup ==="

                  {{- range .Values.databases }}
                  echo "Backing up {{ . }}..."
                  pg_dump -h postgresql -U $POSTGRES_USER -d {{ . }} | gzip > /tmp/{{ . }}-${TIMESTAMP}.sql.gz
                  aws s3 cp /tmp/{{ . }}-${TIMESTAMP}.sql.gz s3://${S3_BUCKET}/${S3_PREFIX}/{{ . }}/${BACKUP_FILE}
                  {{- end }}

                  echo "Backup complete!"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
{{- end }}
