{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef }}
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef }}
        property: password
    - secretKey: BACKEND_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef }}
        property: BACKEND_PASSWORD
    - secretKey: FRONTEND_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef }}
        property: FRONTEND_PASSWORD
    - secretKey: CLOUD_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.remoteRef }}
        property: CLOUD_PASSWORD
---
{{- if .Values.backup.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-backup-s3
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: postgresql-backup-s3
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.backup.externalSecret.remoteRef }}
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.backup.externalSecret.remoteRef }}
        property: AWS_SECRET_ACCESS_KEY
{{- end }}
{{- end }}
