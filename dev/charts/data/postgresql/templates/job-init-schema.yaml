{{- if .Values.initSchema.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: postgresql-init-schema
  namespace: {{ .Release.Namespace }}
  annotations:
    # ArgoCD hook: 수동으로 실행 필요 시 사용
    # argocd.argoproj.io/hook: PostSync
    # argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"  # Job은 sidecar 제외 (안 끝남)
    spec:
      restartPolicy: Never
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: init-schema
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: PGHOST
              value: postgresql
            - name: PGDATABASE
              value: {{ .Values.initSchema.database | default "goormgb" }}
            - name: BACKEND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: BACKEND_PASSWORD
            - name: FRONTEND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: FRONTEND_PASSWORD
            - name: CLOUD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: CLOUD_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "=== PostgreSQL Schema Initialization ==="
              echo "Database: ${PGDATABASE}"
              echo ""

              echo "[1/3] Waiting for PostgreSQL to be ready..."
              until pg_isready -h ${PGHOST} -U ${PGUSER}; do
                echo "Waiting..."
                sleep 2
              done
              echo "PostgreSQL is ready."
              echo ""

              echo "[2/3] Running init-schema.sql..."
              psql -h ${PGHOST} -U ${PGUSER} -d ${PGDATABASE} -f /scripts/init-schema.sql

              echo ""
              echo "[3/3] Creating team users..."
              psql -h ${PGHOST} -U ${PGUSER} -d ${PGDATABASE} <<EOF
              -- Backend team user
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'backend') THEN
                  CREATE USER backend WITH PASSWORD '${BACKEND_PASSWORD}';
                END IF;
              END \$\$;
              GRANT ALL PRIVILEGES ON DATABASE ${PGDATABASE} TO backend;
              GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO backend;
              GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO backend;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO backend;

              -- Frontend team user (read-only)
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'frontend') THEN
                  CREATE USER frontend WITH PASSWORD '${FRONTEND_PASSWORD}';
                END IF;
              END \$\$;
              GRANT CONNECT ON DATABASE ${PGDATABASE} TO frontend;
              GRANT SELECT ON ALL TABLES IN SCHEMA public TO frontend;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO frontend;

              -- Cloud team user (admin)
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'cloud') THEN
                  CREATE USER cloud WITH PASSWORD '${CLOUD_PASSWORD}';
                END IF;
              END \$\$;
              GRANT ALL PRIVILEGES ON DATABASE ${PGDATABASE} TO cloud;
              GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO cloud;
              GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO cloud;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO cloud;
              EOF

              echo "Team users created: backend, frontend (read-only), cloud"
              echo ""
              echo "=== Schema Initialization Complete ==="
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init-schema
{{- end }}
