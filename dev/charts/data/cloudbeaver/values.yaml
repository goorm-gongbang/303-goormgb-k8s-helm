# CloudBeaver for Dev
# Google OAuth via OAuth2 Proxy sidecar
replicaCount: 1

image:
  repository: dbeaver/cloudbeaver
  tag: "24.0.0"
  pullPolicy: IfNotPresent

# OAuth2 Proxy sidecar
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.6.0"
  port: 4180
  config:
    provider: google
    cookieSecure: true
    cookieDomain: ".goormgb.space"
    cookieRefresh: "1h"
    cookieExpire: "4h"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # ESO: dev/infra/oauth/teams-allow
  eso:
    enabled: true
    secretStoreRef:
      name: "aws-secrets-manager"
      kind: "ClusterSecretStore"
    remoteRef:
      key: "dev/infra"
      propertyPrefix: "oauth_teams-allow_"

service:
  type: ClusterIP
  port: 4180  # OAuth2 Proxy port

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 2Gi

persistence:
  enabled: true
  size: 2Gi
  storageClass: ""

nodeSelector:
  kubernetes.io/hostname: mini-gmk
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Istio VirtualService
virtualService:
  enabled: true
  host: "cloudbeaver.goormgb.space"
  gateway: "istio-system/goormgb-gateway"

# PostgreSQL connection (data namespace)
postgresql:
  host: postgresql.data.svc.cluster.local
  port: 5432
