apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.gateway.name }}-vs
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - {{ .Values.gateway.host | quote }}
  gateways:
    - {{ .Values.gateway.name }}
  http:
    {{- range .Values.services }}
    - match:
        - uri:
            prefix: {{ .prefix }}
      {{- if $.Values.cors.enabled }}
      corsPolicy:
        allowOrigins:
          {{- range $.Values.cors.allowOrigins }}
          - regex: {{ . | replace "*" ".*" | quote }}
          {{- end }}
        allowMethods:
          {{- range $.Values.cors.allowMethods }}
          - {{ . }}
          {{- end }}
        allowHeaders:
          {{- range $.Values.cors.allowHeaders }}
          - {{ . }}
          {{- end }}
        allowCredentials: {{ $.Values.cors.allowCredentials }}
        maxAge: "24h"
      {{- end }}
      route:
        - destination:
            host: dev-{{ .name }}.{{ $.Release.Namespace }}.svc.cluster.local
            port:
              number: {{ .port }}
    {{- end }}
    # Health check endpoint
    - match:
        - uri:
            exact: /health
      route:
        - destination:
            host: dev-auth-guard.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: 8080
