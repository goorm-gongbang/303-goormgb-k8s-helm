apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  url: {{ .Values.coraza.image }}
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  failStrategy: {{ .Values.coraza.failStrategy }}
  pluginConfig:
    directives_map:
      default:
        - "Include @recommended-conf"
        - "SecRuleEngine {{ .Values.mode }}"
        {{- if gt (int .Values.paranoiaLevel) 1 }}
        - "SecAction \"id:900000,phase:1,pass,t:none,nolog,setvar:tx.blocking_paranoia_level={{ .Values.paranoiaLevel }}\""
        {{- end }}
        # 로깅 설정 - JSON 포맷으로 Envoy stdout 출력
        # RE2는 negative lookahead 미지원, 단순화된 패턴 사용
        - "SecAuditEngine RelevantOnly"
        - "SecAuditLogRelevantStatus \"^[45]\""
        - "SecAuditLogParts ABIJDEFHZ"
        - "SecAuditLogType Serial"
        - "SecAuditLog /dev/stdout"
        {{- if eq .Values.logging.format "json" }}
        - "SecAuditLogFormat JSON"
        {{- end }}
        - "Include @crs-setup-conf"
        - "Include @owasp_crs/*.conf"
    default_directives: "default"
    {{- if .Values.perHostRules }}
    per_authority_directives:
      {{- range $host, $ruleset := .Values.perHostRules }}
      {{ $host }}: {{ $ruleset | quote }}
      {{- end }}
    {{- end }}
