# Coraza WAF (OWASP CRS v4 내장)
# Istio WasmPlugin으로 Envoy에 주입

coraza:
  image: "oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0"
  failStrategy: FAIL_CLOSE

# SecRuleEngine 모드
# On: 차단 모드 (운영)
# DetectionOnly: 탐지만, 차단 안함 (튜닝 시)
mode: "On"

# Paranoia Level (1~4, 높을수록 엄격)
paranoiaLevel: 1

# 로깅 설정 (Loki로 수집됨)
logging:
  # JSON 포맷으로 로그 출력 (Loki 파싱 용이)
  format: json
  # 로그 레벨: debug, info, warn, error
  level: info

# 호스트별 규칙 분기 (선택)
perHostRules: {}

# OAuth 콜백 예외 (LFI 오탐 방지)
# scope 파라미터의 .profile이 LFI로 오탐됨 (rule 930120)
oauthExceptions:
  - name: argocd
    path: "/auth/callback"
    disableRules: [930120]
  - name: grafana
    path: "/login/google"
    disableRules: [930120]
  - name: cloudbeaver
    path: "/api/oauth2/callback"
    disableRules: [930120]
  - name: kiali
    path: "/kiali/api/authenticate"
    disableRules: [930120]
