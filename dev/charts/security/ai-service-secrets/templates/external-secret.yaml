apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
  data:
    # === Redis (AI Defense 세션 저장소) ===
    - secretKey: AI_REDIS_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: host
    - secretKey: AI_REDIS_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: port

    # === PostgreSQL (Control Plane / Policy DB) ===
    - secretKey: AI_PG_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/postgresql
        property: host
    - secretKey: AI_PG_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/postgresql
        property: port
    - secretKey: AI_PG_DBNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/postgresql
        property: dbname
    - secretKey: AI_PG_USERNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/postgresql
        property: username
    - secretKey: AI_PG_PASSWORD
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/postgresql
        property: password

    # === S3 (Raw Archive) ===
    - secretKey: AI_S3_BUCKET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/s3
        property: bucket
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/s3
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/s3
        property: AWS_SECRET_ACCESS_KEY
