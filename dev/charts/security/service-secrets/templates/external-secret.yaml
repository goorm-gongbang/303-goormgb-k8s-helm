apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
  data:
    # === Database (Spring Boot 형식) ===
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: db_url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: db_username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: db_password
    - secretKey: DB_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: db_DB_ENCRYPTION_KEY
    - secretKey: OLD_DB_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: db_OLD_DB_ENCRYPTION_KEY

    # === Redis Cache (세션/캐시용) ===
    - secretKey: SPRING_DATA_REDIS_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: redis-cache_host
    - secretKey: SPRING_DATA_REDIS_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: redis-cache_port
    # === Redis Queue (대기열용) ===
    - secretKey: REDIS_QUEUE_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: redis-queue_host
    - secretKey: REDIS_QUEUE_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: redis-queue_port

    # === JWT (RSA keys) ===
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_PRIVATE_KEY
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_PUBLIC_KEY
    - secretKey: JWT_ISSUER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_ISSUER
    - secretKey: JWT_ACCESS_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_ACCESS_TOKEN_AUDIENCE
    - secretKey: JWT_ACCESS_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_ACCESS_TOKEN_EXPIRATION
    - secretKey: JWT_REFRESH_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_REFRESH_TOKEN_AUDIENCE
    - secretKey: JWT_REFRESH_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_JWT_REFRESH_TOKEN_EXPIRATION

    # === Kakao OAuth ===
    - secretKey: KAKAO_CLIENT_ID
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: oauth_kakao_clientId
    - secretKey: KAKAO_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: oauth_kakao_clientSecret
    - secretKey: KAKAO_REDIRECT_URI
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: oauth_kakao_redirectUri

    # === Queue Service Admission Token (RSA keys) ===
    - secretKey: ADMISSION_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: queue-jwt_ADMISSION_PRIVATE_KEY
    - secretKey: ADMISSION_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: queue-jwt_ADMISSION_PUBLIC_KEY

    # === X-Bot-Token (HMAC 서명 검증용 공유 시크릿) ===
    # 프론트 NEXT_PUBLIC_BOT_TOKEN_SECRET 과 반드시 동일한 값.
    - secretKey: BOT_TOKEN_SECRET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: jwt_BOT_TOKEN_SECRET

    # === Internal API Key (AI Server ↔ Auth-Guard) ===
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: internal-api_INTERNAL_API_KEY

    # === Kafka ===
    - secretKey: KAFKA_BOOTSTRAP_SERVERS
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_BOOTSTRAP_SERVERS
    - secretKey: KAFKA_PRODUCER_KEY_SERIALIZER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_PRODUCER_KEY_SERIALIZER
    - secretKey: KAFKA_PRODUCER_VALUE_SERIALIZER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_PRODUCER_VALUE_SERIALIZER
    - secretKey: KAFKA_PRODUCER_ACKS
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_PRODUCER_ACKS
    - secretKey: KAFKA_CONSUMER_KEY_DESERIALIZER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_CONSUMER_KEY_DESERIALIZER
    - secretKey: KAFKA_CONSUMER_VALUE_DESERIALIZER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_CONSUMER_VALUE_DESERIALIZER
    - secretKey: KAFKA_CONSUMER_AUTO_OFFSET_RESET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_CONSUMER_AUTO_OFFSET_RESET
    - secretKey: KAFKA_CONSUMER_TRUSTED_PACKAGES
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: kafka_KAFKA_CONSUMER_TRUSTED_PACKAGES

    # === Mail Configuration ===
    - secretKey: MAIL_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_HOST
    - secretKey: MAIL_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_PORT
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_USERNAME
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_PASSWORD
    - secretKey: MAIL_FROM
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_FROM
    - secretKey: MAIL_FROM_NAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}
        property: mail_MAIL_FROM_NAME
---
# Spring Profile ConfigMap (non-secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: {{ .Values.namespace }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.spring.profile }}
