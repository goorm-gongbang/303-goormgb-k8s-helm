apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
  data:
    # === Database (Spring Boot 형식) ===
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: password

    # === Redis Cache (세션/캐시용) ===
    - secretKey: SPRING_DATA_REDIS_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis-cache
        property: host
    - secretKey: SPRING_DATA_REDIS_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis-cache
        property: port
    # === Redis Queue (대기열용) ===
    - secretKey: REDIS_QUEUE_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis-queue
        property: host
    - secretKey: REDIS_QUEUE_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis-queue
        property: port

    # === JWT (RSA keys) ===
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_PRIVATE_KEY
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_PUBLIC_KEY
    - secretKey: JWT_ISSUER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_ISSUER
    - secretKey: JWT_ACCESS_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_AUDIENCE
    - secretKey: JWT_ACCESS_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_ACCESS_TOKEN_EXPIRATION
    - secretKey: JWT_REFRESH_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_AUDIENCE
    - secretKey: JWT_REFRESH_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: JWT_REFRESH_TOKEN_EXPIRATION

    # === Kakao OAuth ===
    - secretKey: KAKAO_CLIENT_ID
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: clientId
    - secretKey: KAKAO_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: clientSecret
    - secretKey: KAKAO_REDIRECT_URI
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: redirectUri

    # === Queue Service Admission Token (RSA keys) ===
    - secretKey: ADMISSION_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/queue-jwt
        property: ADMISSION_PRIVATE_KEY
    - secretKey: ADMISSION_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/queue-jwt
        property: ADMISSION_PUBLIC_KEY
---
# Spring Profile ConfigMap (non-secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: {{ .Values.namespace }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.spring.profile }}
