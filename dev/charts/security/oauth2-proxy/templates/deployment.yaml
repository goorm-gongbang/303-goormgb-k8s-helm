apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
        sidecar.istio.io/inject: "false"
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --provider=google
            - --email-domain=*
            - --upstream=static://200
            - --http-address=0.0.0.0:4180
            - --cookie-secure={{ .Values.config.cookieSecure }}
            - --cookie-samesite=lax
            - --set-xauthrequest=true
            - --authenticated-emails-file=/etc/oauth2-proxy/authenticated-emails.txt
            - --skip-provider-button=false
            - --reverse-proxy=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: authenticated-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: authenticated-emails
          {{- if .Values.eso.enabled }}
          secret:
            secretName: oauth2-proxy-emails
          {{- else }}
          configMap:
            name: oauth2-proxy-emails
          {{- end }}
