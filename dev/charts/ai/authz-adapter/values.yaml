# Default values for authz-adapter

replicaCount: 2

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/authz-adapter
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  grpcPort: 9001
  metricsPort: 9090

config:
  aiDefenseUrl: "http://dev-ai-defense.dev-ai.svc.cluster.local:8000/ai/evaluate"
  aiDefenseTimeoutMs: 800
  logLevel: info
  otelEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  serviceName: authz-adapter

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}
