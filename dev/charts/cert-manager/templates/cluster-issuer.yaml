{{- if .Values.letsencrypt.staging.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: {{ .Values.letsencrypt.staging.server }}
    email: {{ .Values.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          route53:
            region: {{ .Values.route53.region }}
            hostedZoneID: {{ .Values.route53.hostedZoneID }}
            accessKeyIDSecretRef:
              name: {{ .Values.route53.secret.name }}
              key: access-key-id
            secretAccessKeySecretRef:
              name: {{ .Values.route53.secret.name }}
              key: secret-access-key
{{- end }}
---
{{- if .Values.letsencrypt.production.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: {{ .Values.letsencrypt.production.server }}
    email: {{ .Values.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          route53:
            region: {{ .Values.route53.region }}
            hostedZoneID: {{ .Values.route53.hostedZoneID }}
            accessKeyIDSecretRef:
              name: {{ .Values.route53.secret.name }}
              key: access-key-id
            secretAccessKeySecretRef:
              name: {{ .Values.route53.secret.name }}
              key: secret-access-key
{{- end }}
