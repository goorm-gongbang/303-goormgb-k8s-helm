apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: {{ .Values.secretName }}
  data:
    # === Database ===
    - secretKey: DB_URL
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: url
    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/db
        property: password

    # === Redis ===
    - secretKey: REDIS_HOST
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/redis
        property: port

    # === JWT ===
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: secretKey
    - secretKey: JWT_ISSUER
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: issuer
    - secretKey: JWT_ACCESS_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: accessTokenAudience
    - secretKey: JWT_ACCESS_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: accessTokenExpiration
    - secretKey: JWT_REFRESH_TOKEN_AUDIENCE
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: refreshTokenAudience
    - secretKey: JWT_REFRESH_TOKEN_EXPIRATION
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/jwt
        property: refreshTokenExpiration

    # === Kakao OAuth ===
    - secretKey: KAKAO_CLIENT_ID
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: clientId
    - secretKey: KAKAO_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: clientSecret
    - secretKey: KAKAO_REDIRECT_URI
      remoteRef:
        key: {{ .Values.secretManagerPrefix }}/oauth/kakao
        property: redirectUri
---
# Spring Profile ConfigMap (non-secret)
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: {{ .Values.namespace }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.spring.profile }}
