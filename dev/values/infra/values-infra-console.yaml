# Infra Console - Dev Environment
replicaCount: 1

image:
  repository: ghcr.io/goorm-gongbang/305-goormgb-infra-console
  tag: "v0.3.0"
  pullPolicy: Always

# GHCR pull secret
imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8088

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

config:
  logLevel: info
  listenAddr: ":8088"

# GitOps disabled for now
gitops:
  enabled: false

# VirtualService for Istio routing
virtualService:
  enabled: true
  gateway: "istio-system/goormgb-gateway"
  hosts:
    - "console.goormgb.space"

# Google OAuth (ESO에서 secret 생성)
oauth:
  enabled: true
  secretManagerKey: "dev/infra/oauth/google"
  redirectUrl: "https://console.goormgb.space/auth/callback"
  secureCookie: true
  allowEmails:
    - "212clab@gmail.com"
    - "rhuba23@gmail.com"
    - "chamchi0129@gmail.com"

# Loki configuration for IP detection
loki:
  enabled: true
  endpoint: "http://loki-gateway.monitoring.svc:80"

# Prometheus configuration for Tetragon metrics
prometheus:
  enabled: true
  endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"

# Node selector for infra nodes (mini-gmk)
nodeSelector:
  node-role: infra

tolerations:
  - key: "node-role"
    operator: "Equal"
    value: "infra"
    effect: "NoSchedule"
  # control-plane 노드에서 실행 허용
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
