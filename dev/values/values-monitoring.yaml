# kubeadm - 모니터링 스택 설정
# Domain: goormgb.help
# Components: Prometheus, Grafana, Loki, Tempo

# Grafana ESO 설정
grafana:
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google  # 공용 OAuth

# ===== Prometheus Stack =====
kube-prometheus-stack:
  # Admission webhook 비활성화 (TLS 인증서 문제 방지)
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false

  # kubeadm: 컨트롤 플레인 컴포넌트 모니터링 활성화
  kubeControllerManager:
    enabled: true
    endpoints:
      - 192.168.45.123
  kubeScheduler:
    enabled: true
    endpoints:
      - 192.168.45.123
  kubeEtcd:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 2381
      targetPort: 2381
  kubeProxy:
    enabled: true

  prometheus:
    prometheusSpec:
      # 모든 namespace 메트릭 수집
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      retention: 7d
      retentionSize: "5GB"

      # CP 노드에 배치
      nodeSelector:
        kubernetes.io/hostname: mini-gmk
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    # ESO에서 생성한 secret 사용
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    # Google OAuth 설정
    envFromSecret: grafana-oauth-credentials

    grafana.ini:
      server:
        root_url: https://grafana.goormgb.help
      auth.google:
        enabled: true
        allow_sign_up: true
        auto_login: false
        scopes: openid email profile
        auth_url: https://accounts.google.com/o/oauth2/auth
        token_url: https://oauth2.googleapis.com/token
        api_url: https://openidconnect.googleapis.com/v1/userinfo
        # client_id, client_secret은 envFromSecret에서 주입
      users:
        auto_assign_org: true
        auto_assign_org_role: Viewer  # 기본 역할
      auth:
        disable_login_form: false  # admin 로그인 유지

    # Role mapping (이메일 기반)
    # DevOps: Admin, Developer: Viewer
    # 주의: Grafana Enterprise나 별도 플러그인 필요할 수 있음

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Loki + Tempo datasource 추가
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            filterBySpanID: true

  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        kubernetes.io/hostname: mini-gmk
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.help"
    tls:
      credentialName: goormgb-tls

# ===== Loki =====
loki-stack:
  # Grafana datasource는 prometheus-stack의 additionalDataSources에서 관리
  grafana:
    sidecar:
      datasources:
        enabled: false
  loki:
    persistence:
      enabled: true
      size: 10Gi

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    config:
      limits_config:
        retention_period: 72h  # 3일

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

  promtail:
    # 모든 노드에서 실행
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ===== Tempo =====
tempo:
  tempo:
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi
