# ECR Credential Refresh - kubeadm-dev
aws:
  region: ap-northeast-2

targetNamespaces:
  - dev-app

schedule: "0 */12 * * *"  # 12시간마다

secretName: ecr-pull-secret

awsCredentialsSecret:
  name: route53-ddns-credentials
  namespace: infra  # kube-system → infra로 이동

# CP 노드에 배치 (인프라 작업)
nodeSelector:
  kubernetes.io/hostname: mini-gmk
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
