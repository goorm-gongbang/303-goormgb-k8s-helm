# Kiali Server values
# https://github.com/kiali/helm-charts

server:
  web_root: /kiali

external_services:
  prometheus:
    url: http://kube-prometheus-stack-prometheus.monitoring:9090
  grafana:
    enabled: true
    in_cluster_url: http://kube-prometheus-stack-grafana.monitoring:80
    url: https://grafana.goormgb.space
  tracing:
    enabled: true
    in_cluster_url: http://tempo.monitoring:3100
