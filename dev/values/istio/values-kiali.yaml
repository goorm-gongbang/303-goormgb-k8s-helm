# Kiali Server values (OCI chart)
# https://github.com/kiali/helm-charts

deployment:
  logger:
    log_level: debug

auth:
  strategy: anonymous

server:
  web_root: /kiali

# 멀티클러스터 비활성화 (single cluster 환경)
# 이게 없으면 Kiali가 trace 쿼리에 istio.cluster_id 필터 추가함
clustering:
  enabled: false

# Istio 라벨 설정 - app 라벨 사용 (app.kubernetes.io/name 대신)
istio_labels:
  app_label_name: app
  version_label_name: version

external_services:
  prometheus:
    url: http://prom-prometheus.monitoring.svc.cluster.local:9090
  grafana:
    enabled: true
    in_cluster_url: http://grafana.monitoring.svc.cluster.local:80
    url: https://grafana.goormgb.space
  tracing:
    enabled: true
    provider: tempo
    in_cluster_url: http://tempo.monitoring.svc.cluster.local:3200
    use_grpc: false
    # cluster filter 비활성화 (single cluster 환경)
    query_scope: {}
    # Kiali가 멀티클러스터 모드에서 추가하는 cluster 필터 비활성화
    custom_headers: {}
    whitelist_istio_system: []
    tempo_config:
      org_id: "1"
      cache_enabled: true
      cache_capacity: 200

# kiali-config (Git chart) values
kialiVirtualService:
  enabled: true
  host: kiali.goormgb.space
