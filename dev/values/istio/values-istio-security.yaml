# Istio Security - Dev Environment
# WAF-like protection using EnvoyFilter + Lua

enabled: true

# 적용 대상 (Istio IngressGateway)
selector:
  labels:
    istio: ingressgateway

# 차단 모드: block (차단) | detect (로그만)
# Dev 환경에서는 detect 모드로 시작하여 테스트 후 block으로 전환 권장
mode: detect

# 로깅 설정
logging:
  enabled: true
  level: warn

# 탐지 패턴
patterns:
  sqlInjection:
    enabled: true
  xss:
    enabled: true
  pathTraversal:
    enabled: true
  commandInjection:
    enabled: true
  ldapInjection:
    enabled: true
  xxeInjection:
    enabled: true
  ssrf:
    enabled: true
  log4shell:
    enabled: true
  headerInjection:
    enabled: true
  botScanner:
    enabled: true

# 제외 경로 (health check, metrics, 내부 서비스 등)
excludePaths:
  # Faro RUM (프론트엔드 텔레메트리)
  - "/faro/"

  # Grafana 내부 API (Loki 쿼리 등 - SQL Injection 오탐 방지)
  - "/api/datasources/"

  # Socket.IO (실시간 폴링 - sid 패턴이 SQL 주입으로 오탐됨)
  - "/socket.io/"

  # Health checks
  - "/health"
  - "/healthz"
  - "/ready"
  - "/readyz"
  - "/livez"
  - "/actuator/health"
  - "/actuator/info"
  - "/actuator/prometheus"

  # Metrics & Monitoring
  - "/metrics"
  - "/stats/prometheus"

  # Kubernetes probes
  - "/api/v1/health"

  # Swagger/OpenAPI (개발 환경)
  - "/swagger"
  - "/swagger-ui"
  - "/v3/api-docs"
  - "/openapi"

  # OAuth callback (Google OAuth authorization code 내 '--' 문자열로 sql-comment 오탐)
  # Grafana: /login/google, OAuth2 Proxy(CloudBeaver 등): /oauth2/callback, 기타: /auth/callback
  - "/login/"
  - "/oauth2/"
  - "/auth/callback"

# IP Whitelist (정확 매칭: WAF/차단 전부 bypass)
# 팀원 사무실/홈 고정 IP
ipWhitelist:
  - "59.12.199.140"
  - "219.241.49.248"
  - "118.33.22.122"
  - "182.222.162.2"
  - "180.70.114.57"
  - "59.7.27.64"
  - "221.149.74.70"
  - "58.148.70.203"
  - "59.20.70.146"
  - "39.119.192.15"
  - "124.49.102.36"
  - "122.34.166.131"
  - "121.160.234.212"
  - "59.30.250.162"
  - "211.244.208.42"
# IP Whitelist 접두사 (예: "39.119.192.")
ipWhitelistPrefixes: []

# 응답 설정
response:
  statusCode: 403
  body: "Forbidden: Security violation detected"

# 내부 경로 차단 (외부 접근 불가)
# 주의: 접미사 와일드카드(*/path)는 오탐 위험이 있어 접두사 기반만 사용
denyPaths:
  enabled: true
  paths:
    # Prometheus/Metrics (접두사 기반만 사용)
    - "/api/prometheus*"
    - "/actuator/prometheus*"
    - "/metrics*"
    # Health checks (접두사 기반만 사용)
    - "/health*"
    - "/healthz*"
    - "/ready*"
    - "/readyz*"
    - "/livez*"
    - "/actuator/health*"

# External Authorization (AI Defense) - gRPC Adapter
extAuthz:
  enabled: true

  # gRPC authz adapter 연결 설정 (202-goormgb-authz-adapter)
  service:
    host: authz-adapter.dev-ai.svc.cluster.local
    port: 9001

  # 타임아웃 설정
  connectTimeout: "0.5s"
  timeout: "0.8s"

  # AI 서버 장애 시 통과 허용 (fail-open)
  failOpen: true

  # ext_authz 제외 경로 (AI direct routes, health checks)
  excludePaths:
    - "/ai/"
    - "/health"
    - "/healthz"
    - "/ready"
    - "/metrics"
    - "/actuator/"

  # ext_authz 적용 대상 API (Critical APIs)
  includePaths:
    # Queue 서비스
    - method: POST
      pattern: "^/queue/matches/[0-9]+/enter$"
      eventType: QUEUE_ENTER

    # Seat 서비스 - 추천 블럭 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/recommendations/blocks$"
      eventType: RECOMMENDATION_BLOCKS

    # Seat 서비스 - 좌석 자동 배정
    - method: POST
      pattern: "^/seat/matches/[0-9]+/recommendations/blocks/[0-9]+/assign$"
      eventType: ASSIGN_HOLD

    # Seat 서비스 - 구역 리스트 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/seat-groups$"
      eventType: SEAT_ENTRY

    # Seat 서비스 - 블럭별 포도알 조회
    - method: GET
      pattern: "^/seat/matches/[0-9]+/sections/[0-9]+/blocks$"
      eventType: SECTION_BLOCKS

    # Seat 서비스 - Hold 생성
    - method: POST
      pattern: "^/seat/matches/[0-9]+/seat-holds$"
      eventType: SEAT_HOLDS

# Rate Limiting - Dev 환경에서는 비활성화 (부하테스트용)
rateLimiting:
  local:
    enabled: false  # Dev 환경에서 rate limiting 비활성화
    default:
      enabled: false
    perClient:
      enabled: false
    perRoute:
      enabled: false
  global:
    enabled: false
  excludePaths:
    # 기본 헬스체크
    - "/health"
    - "/healthz"
    - "/ready"
    - "/metrics"
    - "/actuator/health"
    # 내부 도구 (정적 파일 다수 로드)
    - ".js"
    - ".css"
    - ".woff"
    - ".woff2"
    - ".ttf"
    - ".png"
    - ".jpg"
    - ".svg"
    - ".ico"

# JWT 인증 - 비활성화
# auth-guard가 JWKS 엔드포인트(/.well-known/jwks.json)를 제공하지 않아
# Istio에서 JWT 검증 불가 → 백엔드(Spring Cloud Gateway)에서 자체 처리
jwtAuth:
  enabled: false
