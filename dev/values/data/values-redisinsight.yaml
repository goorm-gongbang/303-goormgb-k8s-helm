# RedisInsight for Dev (kubeadm-dev)
# URL: https://redisinsight.goormgb.space
# Google OAuth 인증 필요

replicaCount: 1

image:
  repository: redis/redisinsight
  tag: "2.68"
  pullPolicy: IfNotPresent

# OAuth2 Proxy sidecar
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.6.0"
  port: 4180
  config:
    provider: google
    cookieSecure: true
    cookieDomain: ".goormgb.space"
    cookieRefresh: "1h"
    cookieExpire: "4h"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # ESO: dev/infra/oauth/teams-allow
  eso:
    enabled: true
    secretStoreRef:
      name: "aws-secrets-manager"
      kind: "ClusterSecretStore"
    remoteRef:
      key: "dev/infra"
      propertyPrefix: "oauth_teams-allow_"

service:
  type: ClusterIP
  port: 4180

# CP node placement
nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 1Gi
  storageClass: local-path

virtualService:
  enabled: true
  gateway: "istio-system/goormgb-gateway"
  hosts:
    - "redisinsight.goormgb.space"

# Redis connections (UI):
# redis-cache: redis-cache.data.svc.cluster.local:6379
# redis-queue: redis-queue.data.svc.cluster.local:6379
