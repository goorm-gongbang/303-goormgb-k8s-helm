# kubeadm-dev 클러스터 데이터 서비스 설정
# PostgreSQL, Redis → CP 노드 (mini-gmk)에 스케줄링

# S3 백업 활성화 (dev/infra/s3-backup secret 생성 완료)
backup:
  enabled: true

nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# ===== PostgreSQL Schema Initialization =====
# SQL 파일: dev/charts/data/postgresql/files/init-schema.sql
# 실행: kubectl create job manual-init --from=job/postgresql-init-schema -n data
initSchema:
  enabled: false  # 자동 실행 비활성화 - 수동 실행만 허용
  database: goormgb
    
