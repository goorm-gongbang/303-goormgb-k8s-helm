# kubeadm-dev - CloudBeaver 설정
# Domain: cloudbeaver-dev.playball.one

replicaCount: 1

# OAuth 비활성화 (dev는 Istio OAuth2 Proxy로 보호)
oauth:
  enabled: false

image:
  repository: dbeaver/cloudbeaver
  tag: "24.0.0"
  pullPolicy: IfNotPresent

# CP 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-gmk

resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: 500m
    memory: 2Gi

persistence:
  enabled: true
  size: 2Gi

# Istio VirtualService
virtualService:
  enabled: true
  host: "cloudbeaver-dev.playball.one"
  gateway: "istio-system/goormgb-gateway"

# PostgreSQL connection info (개발자가 CloudBeaver UI에서 직접 연결 설정)
# host: postgresql.data.svc.cluster.local
# port: 5432
