# kubeadm-dev - DDNS Route53 설정
# Domain: goormgb.homes

domain: "goormgb.homes"
hostedZoneID: "Z04073612LBMT2Z1I30S4"

records:
  - "" # goormgb.homes (root)
  - "api.dev" # api.dev.goormgb.homes (백엔드 API)
  - "argocd" # argocd.goormgb.homes
  - "grafana" # grafana.goormgb.homes
  - "kiali" # kiali.goormgb.homes
  - "cloudbeaver" # cloudbeaver.goormgb.homes
  # dev.goormgb.homes는 Vercel CNAME이라 제외

# CP 노드에 배치 (인프라 작업)
nodeSelector:
  kubernetes.io/hostname: mini-gmk
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
