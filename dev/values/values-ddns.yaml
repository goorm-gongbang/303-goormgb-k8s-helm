# kubeadm-dev - DDNS Route53 설정
# Domain: goormgb.help

domain: "goormgb.help"
hostedZoneID: "Z08735923FCA9QTFLOQSL"

records:
  - ""              # goormgb.help (root)
  - "api.dev"       # api.dev.goormgb.help (백엔드 API)
  - "argocd"        # argocd.goormgb.help
  - "grafana"       # grafana.goormgb.help
  - "kiali"         # kiali.goormgb.help
  - "cloudbeaver"   # cloudbeaver.goormgb.help
  # dev.goormgb.help는 Vercel CNAME이라 제외

# CP 노드에 배치 (인프라 작업)
nodeSelector:
  kubernetes.io/hostname: mini-gmk
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
