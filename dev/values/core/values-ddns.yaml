# kubeadm-dev - DDNS Cloudflare 설정
# Domain: playball.one (dev)

domain: "playball.one"
zoneID: "f9fdc81712963738bc9d5ee628849e53"

records:
  - "dev" # dev.playball.one (root)
  - "api-dev" # api-dev.playball.one (백엔드 API)
  - "swagger-dev" # swagger-dev.playball.one (Swagger UI)
  - "console-dev" # console-dev.playball.one (Infra Console)
  - "argocd-dev" # argocd-dev.playball.one
  - "grafana-dev" # grafana-dev.playball.one
  - "kiali-dev" # kiali-dev.playball.one
  - "cloudbeaver-dev" # cloudbeaver-dev.playball.one
  # dev.playball.one은 Vercel CNAME이라 제외

# CP 노드에 배치 (인프라 작업)
nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
