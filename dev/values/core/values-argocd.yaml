# kubeadm-dev - ArgoCD 설정
# Domain: playball.one (dev)

# ArgoCD Server - Istio Gateway에서 TLS 종료
server:
  url: https://argocd-dev.playball.one
  insecure: true

# ECR 설정 (applications에 주입)
ecr:
  accountId: "497012402578"
  region: "ap-northeast-2"

# CP 노드에 배치 (설정 관련)
nodeSelector:
  kubernetes.io/hostname: mini-gmk

gateway:
  enabled: true
  host: "argocd-dev.playball.one"
  gatewayRef: "istio-system/goormgb-gateway"
  tls:
    enabled: true
    credentialName: goormgb-tls

# Google OAuth 설정 (admin + OAuth 둘 다 가능)
oidc:
  enabled: true
  name: Google
  issuer: https://accounts.google.com
  secretManagerKey: dev/infra
  propertyPrefix: "oauth_google_"
  requestedScopes:
    - openid
    - profile
    - email

# RBAC 설정 - ESO에서 허용된 사용자 목록 가져옴
rbac:
  eso:
    enabled: false  # ESO → Sealed Secrets 전환 완료
  # 등록되지 않은 사용자는 접근 불가
  defaultPolicy: role:none

# Applications - root-dev에서 관리하므로 여기서는 비활성화
applications: []

# Prometheus 메트릭 수집
metrics:
  enabled: true

# ArgoCD Notifications - Discord 알림
notifications:
  enabled: true
  discord:
    eso:
      enabled: true
      secretManagerKey: dev/infra
      propertyPrefix: "argocd_"
