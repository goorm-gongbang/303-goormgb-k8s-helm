# kubeadm-dev - ArgoCD 설정
# Domain: goormgb.space

# CP 노드에 배치 (설정 관련)
nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

gateway:
  host: "argocd.goormgb.space"
  tls:
    enabled: true
    credentialName: goormgb-tls

# Google OAuth 설정 (admin + OAuth 둘 다 가능)
oidc:
  enabled: true
  name: Google
  issuer: https://accounts.google.com
  secretManagerKey: common/infra/oauth/google
  requestedScopes:
    - openid
    - profile
    - email

# RBAC 설정 - ESO에서 허용된 사용자 목록 가져옴
rbac:
  eso:
    enabled: true
    secretManagerKey: common/oauth/rbac/argocd
  # 등록되지 않은 사용자는 접근 불가
  defaultPolicy: role:none

applications:
  - name: dev-sample
    namespace: dev-webs
    repoURL: "git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git"
    targetRevision: argocd-sync/dev
    path: common-charts/apps/java-service
    valuesFile: ../../../dev/values/values-sample.yaml
    enabled: false # 아직 비활성화
