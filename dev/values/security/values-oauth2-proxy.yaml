# OAuth2 Proxy - Swagger 인증용
# 허용된 이메일만 /swagger-ui, /ai/docs 접근 가능

replicaCount: 1

# CP 노드에 배치 (보안 관련)
nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Google OAuth 설정
config:
  provider: google
  cookieSecure: true

# ESO - AWS Secrets Manager에서 OAuth credentials + 이메일 목록 가져옴
eso:
  enabled: true
  secretKey: dev/infra/oauth/swagger  # client_id, client_secret, cookie_secret, authenticated_emails

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
