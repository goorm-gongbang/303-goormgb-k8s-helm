# kubeadm-dev - cert-manager ClusterIssuer 설정
# Domain: goormgb.space

# CP 노드에 배치 (설정 관련)
nodeSelector:
  kubernetes.io/hostname: mini-gmk

email: "212clab@gmail.com"

cloudflare:
  secret:
    awsSecretKey: dev/infra
    propertyPrefix: "cloudflare_"

certificates:
  - name: goormgb-tls
    dnsNames:
      - "*.goormgb.space"
      - "*.dev.goormgb.space"
      - "goormgb.space"
    issuerRef: letsencrypt-prod # 새 도메인이라 prod 사용 가능
