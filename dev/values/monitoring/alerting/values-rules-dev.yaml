# Alert rule set (dev)

additionalPrometheusRulesMap:
  dev-ops-and-security:
    groups:
      - name: dev.ops.rules
        rules:
          - alert: DevApiP99Warning
            expr: |
              histogram_quantile(
                0.99,
                sum by (service_name, le) (
                  rate(
                    http_server_request_duration_seconds_bucket{
                      namespace="dev-webs",
                      service_name=~"(java-cloud-gateway|dev-auth-guard|dev-order-core|dev-queue|dev-seat)"
                    }[5m]
                  )
                )
              ) > 3
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: dev
            annotations:
              summary: "dev 환경 API P99 지연 경고"
              description: "최근 5m 동안 dev 웹 서비스의 P99 응답시간이 3초를 초과했습니다."

          - alert: DevApiP99Critical
            expr: |
              histogram_quantile(
                0.99,
                sum by (service_name, le) (
                  rate(
                    http_server_request_duration_seconds_bucket{
                      namespace="dev-webs",
                      service_name=~"(java-cloud-gateway|dev-auth-guard|dev-order-core|dev-queue|dev-seat)"
                    }[5m]
                  )
                )
              ) > 5
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev 환경 API P99 지연 치명"
              description: "최근 5m 동안 dev 웹 서비스의 P99 응답시간이 5초를 초과했습니다."

          - alert: DevPodCrashLoopCritical
            expr: |
              sum by (namespace, pod) (
                increase(kube_pod_container_status_restarts_total{namespace="dev-webs"}[10m])
              ) > 3
            for: 0m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev 환경 Pod 재시작 급증"
              description: "최근 10m 동안 dev 웹 서비스 Pod 재시작이 3회를 초과했습니다."

          - alert: DevNodeNotReadyCritical
            expr: |
              sum(kube_node_status_condition{condition="Ready", status="true"} == bool 0) > 0
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev 환경 Node NotReady 감지"
              description: "Ready가 아닌 노드가 5m 이상 지속되고 있습니다."

          - alert: DevClusterCpuWarning
            expr: |
              100 * sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m]))
              /
              sum(kube_node_status_allocatable{resource="cpu"}) > 65
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: dev
            annotations:
              summary: "dev 클러스터 CPU 사용률 경고"
              description: "최근 5m 기준 클러스터 CPU 사용률이 65%를 초과했습니다."

          - alert: DevClusterCpuCritical
            expr: |
              100 * sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m]))
              /
              sum(kube_node_status_allocatable{resource="cpu"}) > 80
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev 클러스터 CPU 사용률 치명"
              description: "최근 5m 기준 클러스터 CPU 사용률이 80%를 초과했습니다."

          - alert: DevClusterMemoryWarning
            expr: |
              100 * sum(container_memory_working_set_bytes{container!="", container!="POD"})
              /
              sum(kube_node_status_allocatable{resource="memory"}) > 70
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: dev
            annotations:
              summary: "dev 클러스터 메모리 사용률 경고"
              description: "클러스터 메모리 사용률이 70%를 초과했습니다."

          - alert: DevClusterMemoryCritical
            expr: |
              100 * sum(container_memory_working_set_bytes{container!="", container!="POD"})
              /
              sum(kube_node_status_allocatable{resource="memory"}) > 90
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev 클러스터 메모리 사용률 치명"
              description: "클러스터 메모리 사용률이 90%를 초과했습니다."

          - alert: DevPostgresConnectionsWarning
            expr: |
              100 * sum(pg_stat_activity_count{namespace="data"})
              /
              clamp_min(max(pg_settings_max_connections{namespace="data"}), 1) > 70
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: dev
            annotations:
              summary: "dev PostgreSQL 연결 사용률 경고"
              description: "PostgreSQL 연결 사용률이 70%를 초과했습니다."

          - alert: DevPostgresConnectionsCritical
            expr: |
              100 * sum(pg_stat_activity_count{namespace="data"})
              /
              clamp_min(max(pg_settings_max_connections{namespace="data"}), 1) > 90
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev PostgreSQL 연결 사용률 치명"
              description: "PostgreSQL 연결 사용률이 90%를 초과했습니다."

          - alert: DevRedisDownCritical
            expr: |
              min(redis_up{namespace="data"}) == 0
            for: 1m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev Redis 비가용 감지"
              description: "Redis 인스턴스가 응답하지 않습니다."

          - alert: DevRedisMemoryWarning
            expr: |
              100 * sum(redis_memory_used_bytes{namespace="data"})
              /
              clamp_min(sum(redis_memory_max_bytes{namespace="data"}), 1) > 80
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: dev
            annotations:
              summary: "dev Redis 메모리 사용률 경고"
              description: "Redis 메모리 사용률이 80%를 초과했습니다."

          - alert: DevRedisMemoryCritical
            expr: |
              100 * sum(redis_memory_used_bytes{namespace="data"})
              /
              clamp_min(sum(redis_memory_max_bytes{namespace="data"}), 1) > 90
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: dev
            annotations:
              summary: "dev Redis 메모리 사용률 치명"
              description: "Redis 메모리 사용률이 90%를 초과했습니다."

      - name: dev.security.rules
        rules:
          - alert: DevMacroDetectedWarning
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 50
            for: 0m
            labels:
              severity: warning
              environment: dev
              team: security
            annotations:
              summary: "dev 매크로/봇 탐지 경고"
              description: "최근 5m 동안 매크로/봇 탐지 수가 50건을 초과했습니다."

          - alert: DevMacroDetectedCritical
            expr: |
              increase(ticketing_security_macro_detected_total[5m]) > 200
            for: 0m
            labels:
              severity: critical
              environment: dev
              team: security
            annotations:
              summary: "dev 매크로/봇 탐지 치명"
              description: "최근 5m 동안 매크로/봇 탐지 수가 200건을 초과했습니다."

          - alert: DevBlockedIpWarning
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 100
            for: 0m
            labels:
              severity: warning
              environment: dev
              team: security
            annotations:
              summary: "dev 차단 IP 수 경고"
              description: "최근 5m 동안 차단 IP 수가 100건을 초과했습니다."

          - alert: DevBlockedIpCritical
            expr: |
              increase(ticketing_security_blocked_ip_total[5m]) > 500
            for: 0m
            labels:
              severity: critical
              environment: dev
              team: security
            annotations:
              summary: "dev 차단 IP 수 치명"
              description: "최근 5m 동안 차단 IP 수가 500건을 초과했습니다."

          - alert: DevAuthFailureRateWarning
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 30
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: security
            annotations:
              summary: "dev 인증 실패율 경고"
              description: "최근 5m 동안 인증 실패율이 30%를 초과했습니다."

          - alert: DevAuthFailureRateCritical
            expr: |
              (
                1 - (
                  sum(rate(ticketing_auth_success_total[5m]))
                  /
                  clamp_min(sum(rate(ticketing_auth_attempts_total[5m])), 1)
                )
              ) * 100 > 50
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: security
            annotations:
              summary: "dev 인증 실패율 치명"
              description: "최근 5m 동안 인증 실패율이 50%를 초과했습니다."

          - alert: DevWafBlockedRequestsWarning
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 200
            for: 5m
            labels:
              severity: warning
              environment: dev
              team: security
            annotations:
              summary: "dev WAF 차단 요청 급증 경고"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 200건을 초과했습니다."

          - alert: DevWafBlockedRequestsCritical
            expr: |
              sum(
                increase(
                  istio_requests_total{
                    reporter="destination",
                    destination_workload_namespace="istio-system",
                    destination_workload="istio-ingressgateway",
                    response_code=~"403|429"
                  }[15m]
                )
              ) > 1000
            for: 5m
            labels:
              severity: critical
              environment: dev
              team: security
            annotations:
              summary: "dev WAF 차단 요청 급증 치명"
              description: "최근 15m 동안 Istio IngressGateway의 403/429 차단 요청 수가 1000건을 초과했습니다."
