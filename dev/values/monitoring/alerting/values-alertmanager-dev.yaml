# Alertmanager routing/receivers (dev)

alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "dev/monitoring/discord-webhook-alerts"

kube-prometheus-stack:
  alertmanager:
    alertmanagerSpec:
      secrets:
        - alertmanager-discord-webhooks

    config:
      global:
        resolve_timeout: 5m

      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 30m
        receiver: 'null'
        routes:
          # Dev 임시 정책: 5xx 알람만 Discord 전송
          - match:
              alertname: DevHttp5xxDetected
            receiver: 'discord-critical'
            repeat_interval: 30m
          - match:
              alertname: Watchdog
            receiver: 'null'
          - match:
              alertname: InfoInhibitor
            receiver: 'null'

      receivers:
        - name: 'discord-critical'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/critical-webhook-url'
              send_resolved: true
              title: |-
                [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}{{ if eq .CommonLabels.severity "critical" }}🔴 CRITICAL{{ else if eq .CommonLabels.severity "warning" }}🟡 WARNING{{ else }}🔵 INFO{{ end }}{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                {{ if ne .Status "resolved" }}@개발팀 @admins{{ end }}
                *Alert:* {{ .CommonLabels.alertname }}
                *Environment:* {{ or .CommonLabels.environment "unknown" }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ or .CommonLabels.namespace "N/A" }}
                *Description:* {{ or .CommonAnnotations.description "No description" }}
                {{ range .Alerts }}
                *Instance:* {{ or .Labels.instance .Labels.node "N/A" }}
                *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                {{ end }}

        # Future use
        - name: 'discord-warning'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/warning-webhook-url'
              send_resolved: true
              title: |-
                [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}🟡 WARNING{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Environment:* {{ or .CommonLabels.environment "unknown" }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ or .CommonLabels.namespace "N/A" }}
                *Description:* {{ or .CommonAnnotations.description "No description" }}

        # Future use
        - name: 'discord-info'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhooks/info-webhook-url'
              send_resolved: true
              title: |-
                [{{ or .CommonLabels.environment "unknown" }}] {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}🔵 INFO{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Environment:* {{ or .CommonLabels.environment "unknown" }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ or .CommonLabels.namespace "N/A" }}
                *Description:* {{ or .CommonAnnotations.description "No description" }}

        - name: 'null'

      inhibit_rules:
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'namespace']
