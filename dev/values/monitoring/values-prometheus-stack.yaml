# kube-prometheus-stack - Dev 환경
# Domain: goormgb.space
# Note: kube-prometheus-stack을 직접 배포하므로 prefix 없이 root level에 값 설정

# ===== prometheus-extras용 설정 (ExternalSecrets, VirtualService) =====
# Grafana Gateway (prometheus-extras 차트에서 사용)
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls
  prometheus:
    enabled: true
    host: "prometheus.goormgb.space"

# Dashboard 설정 (kubeadm 환경: EKS/CloudWatch 전용 대시보드 제외)
dashboards:
  infraTeam:
    exclude:
      - "karpenter.json"
      - "eks-cluster-overview.json"
      - "vpc-cni.json"
  devTeam:
    exclude:
      # CloudWatch 기반 대시보드 제외 (Dev는 로컬 exporter 사용)
      - "database-rds-postgresql.json"
      - "cache-elasticache-redis.json"

# ===== kube-prometheus-stack용 설정 =====
# Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook 비활성화 (TLS 인증서 문제 방지)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: mini-gmk

# kube-state-metrics: CP 노드에 배치
kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: mini-gmk

# kubeadm: 컨트롤 플레인 컴포넌트 모니터링
# NOTE: ArgoCD sync 이슈로 인해 비활성화 (ServerSideApply 충돌)
# 필요시 수동으로 ServiceMonitor 생성 권장
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: true

prometheus:
  prometheusSpec:
    # 모든 namespace 메트릭 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collector에서 메트릭 수신 (remote write)
    enableRemoteWriteReceiver: true

    # etcd TLS 인증서 마운트
    secrets:
      - etcd-client-cert

    retention: 3d
    retentionSize: "5GB"

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1536Mi

    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  # prometheus-extras용 ESO 설정
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google

  fullnameOverride: grafana

  # init-chown-data 비활성화 (PVC 권한 문제 방지)
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  # 대시보드 폴더 설정 (sidecar 방식)
  sidecar:
    dashboards:
      enabled: true
      folder: /tmp/dashboards
      folderAnnotation: grafana_folder
      searchNamespace: monitoring
      provider:
        foldersFromFilesStructure: true
        allowUiUpdates: true

  # kube-prometheus-stack 기본 대시보드 완전 비활성화
  defaultDashboardsEnabled: false
  forceDeployDashboards: false
  defaultDashboardsTimezone: utc

  # 대시보드 프로바이더 설정 (비활성화 - sidecar ConfigMap 방식만 사용)
  # dashboardProviders:
  #   dashboardproviders.yaml:
  #     apiVersion: 1
  #     providers:
  #       - name: "dev-team-observability-templates"
  #         orgId: 1
  #         folder: "필요시 조회 - 표준 템플릿 (개발)"
  #         type: file
  #         disableDeletion: false
  #         editable: true
  #         options:
  #           path: /var/lib/grafana/dashboards/dev-team-observability-templates
  #
  #       - name: "infra-team-observability-templates"
  #         orgId: 1
  #         folder: "필요시 조회 - 표준 템플릿 (인프라)"
