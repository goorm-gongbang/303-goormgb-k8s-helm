# kube-prometheus-stack - Dev 환경
# Domain: goormgb.space
# Note: kube-prometheus-stack을 직접 배포하므로 prefix 없이 root level에 값 설정

# ===== prometheus-extras용 설정 (ExternalSecrets, VirtualService) =====
# Grafana Gateway (prometheus-extras 차트에서 사용)
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls
  prometheus:
    enabled: true
    host: "prometheus.goormgb.space"

# Dashboard 설정 (kubeadm 환경: EKS/CloudWatch 전용 대시보드 제외)
dashboards:
  infraTeam:
    exclude:
      - "karpenter.json"
      - "eks-cluster-overview.json"
      - "vpc-cni.json"
  devTeam:
    exclude:
      # CloudWatch 기반 대시보드 제외 (Dev는 로컬 exporter 사용)
      - "database-rds-postgresql.json"
      - "cache-elasticache-redis.json"

# ===== kube-prometheus-stack용 설정 =====
# Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook 비활성화 (TLS 인증서 문제 방지)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: mini-gmk

# kube-state-metrics: CP 노드에 배치
kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: mini-gmk

# kubeadm: 컨트롤 플레인 컴포넌트 모니터링
# NOTE: ArgoCD sync 이슈로 인해 비활성화 (ServerSideApply 충돌)
# 필요시 수동으로 ServiceMonitor 생성 권장
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: true

prometheus:
  prometheusSpec:
    # 모든 namespace 메트릭 수집
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collector에서 메트릭 수신 (remote write)
    enableRemoteWriteReceiver: true

    # etcd TLS 인증서 마운트
    secrets:
      - etcd-client-cert

    retention: 3d
    retentionSize: "5GB"

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1536Mi

    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Grafana는 별도 Application으로 분리 (ociCharts.grafana)
# values-grafana.yaml 참조
grafana:
  enabled: false

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: mini-gmk

    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
