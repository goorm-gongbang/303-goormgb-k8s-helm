# kube-prometheus-stack - Dev нҷҳкІҪ
# Domain: playball.one (dev)
# Note: kube-prometheus-stackмқ„ м§Ғм ‘ л°°нҸ¬н•ҳлҜҖлЎң prefix м—Ҷмқҙ root levelм—җ к°’ м„Өм •

# ===== prometheus-extrasмҡ© м„Өм • (ExternalSecrets, VirtualService) =====
# Grafana Gateway (prometheus-extras м°ЁнҠём—җм„ң мӮ¬мҡ©)
gateway:
  grafana:
    enabled: true
    host: "grafana-dev.playball.one"
    gatewayRef: "istio-system/goormgb-gateway"
    tls:
      credentialName: goormgb-tls
  prometheus:
    enabled: false
    host: "prometheus-dev.playball.one"

# Dashboard м„Өм • (kubeadm нҷҳкІҪ: EKS/CloudWatch м „мҡ© лҢҖмӢңліҙл“ң м ңмҷё)
dashboards:
  infraTeam:
    exclude:
      - "karpenter.json"
      - "eks-cluster-overview.json"
      - "vpc-cni.json"
      - "calico-felix.json"  # Cilium eBPFлЎң лҢҖмІҙлҗЁ
  devTeam:
    namespacePattern: "dev-webs"
    defaultNamespace: "dev-webs"
    namespaceRegex: "/(dev-webs)/"
    redisClusterPattern: "goormgb-.*"
    dbInstancePattern: "goormgb-dev-postgresql"
    exclude:
      # CloudWatch кё°л°ҳ лҢҖмӢңліҙл“ң м ңмҷё (DevлҠ” лЎңм»¬ exporter мӮ¬мҡ©)
      - "database-rds-postgresql.json"
      - "cache-elasticache-redis.json"

# ===== kube-prometheus-stackмҡ© м„Өм • =====
# CRDsлҠ” bootstrapм—җм„ң м„Өм№ҳ (make install-prometheus-crds)
# ArgoCD Applicationм—җм„ң skipCrds: true м„Өм •лҗЁ

# Pod мқҙлҰ„ лӢЁмҲңнҷ” (prometheus-stack-xxx вҶ’ prom-xxx)
fullnameOverride: prom
cleanPrometheusOperatorObjectNames: true

# Admission webhook л№„нҷңм„ұнҷ” (TLS мқёмҰқм„ң л¬ём ң л°©м§Җ)
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  # CP л…ёл“ңм—җ л°°м№ҳ
  nodeSelector:
    kubernetes.io/hostname: mini-gmk
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# kube-state-metrics: CP л…ёл“ңм—җ л°°м№ҳ
kube-state-metrics:
  nodeSelector:
    kubernetes.io/hostname: mini-gmk
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# kubeadm: м»ЁнҠёлЎӨ н”Ңл Ҳмқё м»ҙнҸ¬л„ҢнҠё лӘЁлӢҲн„°л§Ғ
# NOTE: ArgoCD sync мқҙмҠҲлЎң мқён•ҙ л№„нҷңм„ұнҷ” (ServerSideApply м¶©лҸҢ)
# н•„мҡ”мӢң мҲҳлҸҷмңјлЎң ServiceMonitor мғқм„ұ к¶ҢмһҘ
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false  # Cilium eBPFк°Җ kube-proxy лҢҖмІҙ

prometheus:
  prometheusSpec:
    # лӘЁл“  namespace л©”нҠёлҰӯ мҲҳм§‘
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # OTel Collectorм—җм„ң л©”нҠёлҰӯ мҲҳмӢ  (remote write)
    enableRemoteWriteReceiver: true

    # etcd TLS мқёмҰқм„ң л§ҲмҡҙнҠё (kubeEtcd disabledмқҙлҜҖлЎң л¶Ҳн•„мҡ”)
    # secrets:
    #   - etcd-client-cert

    retention: 3d
    retentionSize: "5GB"

    # CP л…ёл“ңм—җ л°°м№ҳ
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1536Mi

    storageSpec:
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# GrafanaлҠ” лі„лҸ„ ApplicationмңјлЎң л¶„лҰ¬ (ociCharts.grafana)
