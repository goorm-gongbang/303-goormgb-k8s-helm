  # NOTE: grafana.com 대시보드 다운로드 비활성화 (2026-03-25)
  # sidecar ConfigMap 방식만 사용하여 중복 방지
  # 필요시 gnetId로 복원 가능:
  # - dev-team: 17125 (pod-health), 7636 (traffic), 7630 (workload)
  # - infra-team: 1860 (node), 7249 (cluster), 14314 (network), 19105 (prometheus)
  #               7639/7645 (istio), 3070 (etcd), 13639 (logs), 16110 (traces)

  # ESO에서 생성한 secret 사용
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

