# AlertManager 설정 - Discord 알람
# kube-prometheus-stack의 alertmanager 설정을 오버라이드
#
# ⚠️ 보안 주의: Discord webhook URL은 External Secret으로 관리됩니다.
# AWS Secrets Manager에 저장 후 ESO를 통해 주입됩니다.
#
# 채널 구조:
#   - #alerts-critical: 심각한 알람 (노드 다운, 서비스 장애 등)
#   - #alerts-warning: 경고 알람 (리소스 부족 등)
#   - #alerts-info: 정보성 알람

# Alertmanager Discord webhook ESO 설정
alertmanager:
  discord:
    eso:
      enabled: true
      secretManagerKey: "dev/monitoring/discord-webhook-alerts"  # AWS Secrets Manager 키

kube-prometheus-stack:
  alertmanager:
    alertmanagerSpec:
      # Discord webhook 시크릿을 /etc/alertmanager/secrets/에 마운트
      secrets:
        - alertmanager-discord-webhook

    config:
      global:
        resolve_timeout: 5m

      # 알람 라우팅
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'discord-warning'  # 기본 receiver
        routes:
          # 🔴 Critical 알람 (노드 다운 등) - 1시간마다 반복
          - match:
              severity: critical
            receiver: 'discord-critical'
            repeat_interval: 1h
          # 🟡 Warning 알람 - 4시간마다 반복
          - match:
              severity: warning
            receiver: 'discord-warning'
            repeat_interval: 4h
          # 🔵 Info 알람 - 12시간마다 반복
          - match:
              severity: info
            receiver: 'discord-info'
            repeat_interval: 12h
          # Watchdog (heartbeat) 알람 무시
          - match:
              alertname: Watchdog
            receiver: 'null'
          # InfoInhibitor 무시
          - match:
              alertname: InfoInhibitor
            receiver: 'null'

      # 수신자 설정 - 채널별 분리
      receivers:
        # 🔴 Critical 알람 → #alerts-critical
        - name: 'discord-critical'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhook/critical-webhook-url'
              channel: '#alerts-critical'
              send_resolved: true
              title: |-
                {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}🔴 CRITICAL{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ .CommonLabels.namespace | default "N/A" }}
                *Description:* {{ .CommonAnnotations.description | default "No description" }}
                {{ range .Alerts }}
                *Instance:* {{ .Labels.instance | default .Labels.node | default "N/A" }}
                *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                {{ end }}

        # 🟡 Warning 알람 → #alerts-warning
        - name: 'discord-warning'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhook/warning-webhook-url'
              channel: '#alerts-warning'
              send_resolved: true
              title: |-
                {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}🟡 WARNING{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ .CommonLabels.namespace | default "N/A" }}
                *Description:* {{ .CommonAnnotations.description | default "No description" }}
                {{ range .Alerts }}
                *Instance:* {{ .Labels.instance | default .Labels.node | default "N/A" }}
                *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                {{ end }}

        # 🔵 Info 알람 → #alerts-info
        - name: 'discord-info'
          slack_configs:
            - api_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhook/info-webhook-url'
              channel: '#alerts-info'
              send_resolved: true
              title: |-
                {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}🔵 INFO{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ .CommonLabels.namespace | default "N/A" }}
                *Description:* {{ .CommonAnnotations.description | default "No description" }}
                {{ range .Alerts }}
                *Instance:* {{ .Labels.instance | default .Labels.node | default "N/A" }}
                *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                {{ end }}

        # 무시할 알람용
        - name: 'null'

      # 알람 억제 규칙
      inhibit_rules:
        # Critical 발생 시 같은 alertname의 Warning 억제
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'namespace']
