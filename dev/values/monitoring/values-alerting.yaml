# AlertManager 설정 - Discord 알람
# kube-prometheus-stack의 alertmanager 설정을 오버라이드

kube-prometheus-stack:
  alertmanager:
    config:
      global:
        resolve_timeout: 5m

      # 알람 라우팅
      route:
        group_by: ['alertname', 'namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'discord'
        routes:
          # 🔴 Critical 알람 (노드 다운 등) - 1시간마다 반복
          - match:
              severity: critical
            receiver: 'discord'
            repeat_interval: 1h
          # 🟡 Warning 알람 - 4시간마다 반복
          - match:
              severity: warning
            receiver: 'discord'
            repeat_interval: 4h
          # 🔵 Info 알람 - 12시간마다 반복
          - match:
              severity: info
            receiver: 'discord'
            repeat_interval: 12h
          # Watchdog (heartbeat) 알람 무시
          - match:
              alertname: Watchdog
            receiver: 'null'
          # InfoInhibitor 무시
          - match:
              alertname: InfoInhibitor
            receiver: 'null'

      # 수신자 설정
      receivers:
        # Discord (Slack 호환 endpoint 사용)
        - name: 'discord'
          slack_configs:
            - api_url: 'https://discord.com/api/webhooks/1474372827590299750/BvVUlJF6JdT3pG5atAVfhz-R-Yybho_yPUcBKDZL6UQC26M3bA5p90yVr0VF2pYq-EEQ/slack'
              channel: '#alerts'
              send_resolved: true
              title: |-
                {{ if eq .Status "resolved" }}✅ RESOLVED{{ else }}{{ if eq .CommonLabels.severity "critical" }}🔴 CRITICAL{{ else if eq .CommonLabels.severity "warning" }}🟡 WARNING{{ else }}🔵 INFO{{ end }}{{ end }} {{ .CommonAnnotations.summary }}
              text: |-
                *Alert:* {{ .CommonLabels.alertname }}
                *Severity:* {{ .CommonLabels.severity }}
                *Namespace:* {{ .CommonLabels.namespace | default "N/A" }}
                *Description:* {{ .CommonAnnotations.description | default "No description" }}
                {{ range .Alerts }}
                *Instance:* {{ .Labels.instance | default .Labels.node | default "N/A" }}
                *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                {{ end }}

        # 무시할 알람용
        - name: 'null'

      # 알람 억제 규칙
      inhibit_rules:
        # Critical 발생 시 같은 alertname의 Warning 억제
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'namespace']
