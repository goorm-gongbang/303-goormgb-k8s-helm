# Loki values
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  limits_config:
    retention_period: 48h  # 문서 기준 dev Loki 2일
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: mini-gmk
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  persistence:
    size: 10Gi

gateway:
  enabled: false

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Cache 비활성화 (dev 환경에서는 불필요)
chunksCache:
  enabled: false

resultsCache:
  enabled: false
