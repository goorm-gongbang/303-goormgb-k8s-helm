# Promtail values
config:
  clients:
    - url: http://loki:3100/loki/api/v1/push

  snippets:
    # Pod의 'app' 라벨을 Loki 'app' 라벨로 설정 (Prometheus와 통일)
    # 예: app=dev-auth-guard, app=dev-seat 등
    extraRelabelConfigs:
      - source_labels:
          - __meta_kubernetes_pod_label_app
        target_label: app
        regex: (.+)
        action: replace

# 모든 노드에서 실행 (DaemonSet - 로그 수집은 전 노드 필수)
tolerations:
  - operator: Exists
