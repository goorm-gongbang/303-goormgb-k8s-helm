# kubeadm - 모니터링 스택 설정
# Domain: goormgb.space
# Components: Prometheus, Grafana, Loki, Tempo
# Note: kubeadm Endpoints는 302-bootstrap에서 관리 (ArgoCD가 Endpoints exclude함)

# Grafana ESO 설정
grafana:
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google

# ===== Prometheus Stack =====
kube-prometheus-stack:
  # Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
  fullnameOverride: prom
  cleanPrometheusOperatorObjectNames: true

  # Admission webhook 비활성화 (TLS 인증서 문제 방지)
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kube-state-metrics: CP 노드에 배치
  kube-state-metrics:
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kubeadm: 컨트롤 플레인 컴포넌트 모니터링 활성화
  kubeControllerManager:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeScheduler:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeEtcd:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 2381
      targetPort: 2381
    serviceMonitor:
      scheme: http
  kubeProxy:
    enabled: true

  prometheus:
    prometheusSpec:
      # 모든 namespace 메트릭 수집
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      # OTel Collector에서 메트릭 수신 (remote write)
      enableRemoteWriteReceiver: true

      # etcd TLS 인증서 마운트
      secrets:
        - etcd-client-cert

      retention: 3d
      retentionSize: "5GB"

      # CP 노드에 배치
      nodeSelector:
        kubernetes.io/hostname: mini-gmk
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1536Mi

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    fullnameOverride: grafana

    # 대시보드 폴더 설정
    sidecar:
      dashboards:
        enabled: true
        folder: /tmp/dashboards
        defaultFolderName: "플랫폼 관측 (인프라팀)" # annotation 없는 대시보드 기본 폴더
        folderAnnotation: grafana_folder # ConfigMap annotation으로 폴더 지정
        searchNamespace: monitoring # 다른 namespace의 불필요한 대시보드 수집 방지
        provider:
          foldersFromFilesStructure: false
          allowUiUpdates: true # UI에서 대시보드 수정 허용

    # kube-prometheus-stack 기본 대시보드 완전 비활성화
    # (우리가 test 폴더에 직접 구성한 대시보드 사용)
    defaultDashboardsEnabled: false
    forceDeployDashboards: false
    defaultDashboardsTimezone: utc

    # 대시보드 프로바이더 설정
    # - 팀 메인 폴더: 커스텀 대시보드용
    # - 팀 템플릿 폴더: provisioned 기본 대시보드 보관용
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "dev-team-observability"
            orgId: 1
            folder: "서비스 관측 (개발팀)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/dev-team-observability

          - name: "dev-team-observability-templates"
            orgId: 1
            folder: "서비스 관측 템플릿 (개발팀)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/dev-team-observability-templates

          - name: "infra-team-observability"
            orgId: 1
            folder: "플랫폼 관측 (인프라팀)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infra-team-observability

          - name: "infra-team-observability-templates"
            orgId: 1
            folder: "플랫폼 관측 템플릿 (인프라팀)"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infra-team-observability-templates

          - name: "test"
            orgId: 1
            folder: "test"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/test

    # ConfigMap 기반 커스텀 대시보드 매핑 (파일 분리)
    # 한글 설명이 포함된 학습용 대시보드
    dashboardsConfigMaps:
      dev-team-observability: grafana-dashboards-dev-team-observability
      infra-team-observability: grafana-dashboards-infra-team-observability
      korean: grafana-dashboards-test

    # Grafana.com 대시보드 매핑
    dashboards:
      dev-team-observability-templates:
        service-pod-health:
          gnetId: 17125
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        service-traffic-istio:
          gnetId: 7636
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        service-workload-istio:
          gnetId: 7630
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

