              value: Prometheus

        platform-logs-overview:
          gnetId: 13639
          revision: 2
          datasource:
            - name: DS_LOKI
              value: Loki

        platform-traces-overview:
          gnetId: 16110
          revision: 1
          datasource:
            - name: DS_TEMPO
              value: Tempo

      # ===================================================
      # test 폴더 - DevOps 통합 모니터링 대시보드
      # ===================================================
      test:
        # -------------------------------------------
        # [서버/노드 모니터링]
        # -------------------------------------------

        # Node Exporter Full
        # 용도: 서버(노드) 하드웨어 상태 모니터링
        # - CPU 사용률, 로드 평균, 코어별 상태
        # - 메모리 사용량, 스왑, 캐시
        # - 디스크 I/O, 용량, inode
        # - 네트워크 트래픽 (rx/tx), 에러, 드랍
        # - 시스템 업타임, 부팅 시간
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [Kubernetes 클러스터 모니터링]
        # -------------------------------------------

        # Kubernetes Cluster Overview
        # 용도: K8s 클러스터 전체 상태 한눈에 보기
        # - 노드 수, 파드 수, 네임스페이스 수
        # - 클러스터 CPU/메모리 총 사용량
        # - 파드 상태별 개수 (Running, Pending, Failed)
        # - 디플로이먼트/스테이트풀셋 상태
        k8s-cluster:
          gnetId: 7249
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # Kubernetes Pods 상세
        # 용도: 개별 파드 리소스 상세 모니터링
        # - 파드별 CPU 사용량 및 Request/Limit
        # - 파드별 메모리 사용량 및 OOM 위험도
        # - 파드별 네트워크 트래픽
        # - 컨테이너 재시작 횟수
        k8s-pods:
          gnetId: 6336
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [K8s 컨트롤 플레인 모니터링]
        # -------------------------------------------

        # Etcd Health
        # 용도: K8s 데이터베이스(etcd) 상태 모니터링
        # - 리더 선출 상태 및 변경 횟수
        # - 디스크 fsync 지연시간 (느리면 클러스터 불안정)
        # - 메모리 사용량, DB 크기
        # - gRPC 요청 처리량 및 에러
        etcd:
          gnetId: 3070
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # API Server
        # 용도: K8s API 서버 성능 모니터링
        # - API 요청 처리량 (QPS)
        # - API 응답 지연시간 (느리면 kubectl 느려짐)
        # - 에러율 (4xx, 5xx)
        # - 인증/인가 실패 횟수
        apiserver:
          gnetId: 15761
          revision: 17
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # kubelet
        # 용도: 각 노드의 kubelet 에이전트 상태
        # - 노드별 파드 실행 상태
        # - 컨테이너 런타임 지연시간
        # - 볼륨 마운트 상태
        # - 파드 시작/종료 지연시간
        kubelet:
          gnetId: 16361
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # CoreDNS
        # 용도: K8s 내부 DNS 서버 모니터링
        # - DNS 쿼리 처리량 (QPS)
        # - DNS 응답 지연시간
        # - DNS 쿼리 실패율 (NXDOMAIN, SERVFAIL)
        # - 캐시 히트율
        coredns:
          gnetId: 15762
          revision: 18
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [네트워크 모니터링]
        # -------------------------------------------

        # Network Overview
        # 용도: 클러스터 네트워크 전체 상태
        # - 노드간 네트워크 트래픽
        # - 네트워크 에러 및 드랍
        # - TCP 연결 상태
        network:
          gnetId: 14314
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # Calico
        # 용도: CNI 네트워크 플러그인 모니터링
        # - 네트워크 정책 적용 상태
        # - Felix 에이전트 상태
        # - BGP 피어링 상태 (멀티노드)
        # - IP 풀 사용량
        calico:
          gnetId: 12175
          revision: 5
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [Istio 서비스 메시 모니터링]
        # -------------------------------------------

        # Istio Mesh
        # 용도: 서비스간 트래픽 흐름 모니터링
        # - 서비스별 요청 처리량 (RPS)
        # - 서비스별 응답 지연시간 (P50, P90, P99)
        # - 서비스별 에러율 (5xx)
        # - 트래픽 흐름 시각화
        istio-mesh:
          gnetId: 7639
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # Istio Control Plane
        # 용도: Istiod 컨트롤 플레인 상태
        # - Pilot 설정 푸시 상태
        # - Envoy 사이드카 연결 수
        # - xDS 설정 동기화 상태
        # - 인증서 발급 상태
        istio-control-plane:
          gnetId: 7645
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [스토리지 모니터링]
        # -------------------------------------------

        # PVC Storage
        # 용도: 퍼시스턴트 볼륨 용량 모니터링
        # - PVC별 사용량 및 남은 용량
        # - 용량 부족 경고 (80% 이상)
        # - inode 사용량
        # - I/O 지연시간
        pvc-storage:
          gnetId: 13646
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [로그/트레이스/알람]
        # -------------------------------------------

        # Logs Overview (Loki)
        # 용도: 로그 수집 및 검색 현황
        # - 로그 수집량 (초당 라인 수)
        # - 네임스페이스별 로그 볼륨
        # - 에러 로그 비율
        logs-overview:
          gnetId: 13639
          revision: 2
          datasource:
            - name: DS_LOKI
              value: Loki

        # Traces Overview (Tempo)
        # 용도: 분산 트레이싱 현황
        # - 트레이스 수집량
        # - 서비스별 트레이스 분포
        # - 스팬 지연시간 분포
        traces-overview:
          gnetId: 16110
          revision: 1
          datasource:
            - name: DS_TEMPO
              value: Tempo

        # Prometheus Overview
        # 용도: 모니터링 시스템 자체 상태
        # - 메트릭 수집 타겟 상태 (Up/Down)
        # - 메트릭 스크래핑 지연시간
        # - TSDB 저장소 사용량
        # - 알람 규칙 평가 상태
        prometheus:
          gnetId: 19105
          revision: 3
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # Alertmanager
        # 용도: 알람 발송 및 처리 현황
        # - 현재 활성 알람 목록
        # - 알람 발송 성공/실패
        # - 알람 그룹핑 상태
        # - Silence(무시) 설정 현황
        alertmanager:
          gnetId: 9578
          revision: 4
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # -------------------------------------------
        # [k9s 스타일 - 전체 현황 대시보드]
        # -------------------------------------------

        # Kubernetes Views / Global
        # 용도: k9s처럼 클러스터 전체 현황 한눈에 보기
        # - 모든 네임스페이스 파드 상태
        # - 노드별 리소스 사용량
        # - 워크로드 전체 현황
        k8s-views-global:
          gnetId: 15760
          revision: 37
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        # Kubernetes Views / Pods
        # 용도: 파드 목록 및 상태 (k9s 메인 화면과 유사)
        # - 파드 목록 테이블
        # - 상태별 필터링
        # - 리소스 사용량
        k8s-views-pods:
          gnetId: 15759
          revision: 31
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

