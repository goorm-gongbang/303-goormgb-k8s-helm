      infra-team-observability-templates:
        platform-node-capacity:
          gnetId: 1860
          revision: 37
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        platform-cluster-overview:
          gnetId: 7249
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        platform-network-overview:
          gnetId: 14314
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        platform-prometheus-overview:
          gnetId: 19105
          revision: 3
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        platform-istio-mesh:
          gnetId: 7639
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        platform-istio-control-plane:
          gnetId: 7645
          revision: 1
          datasource:
