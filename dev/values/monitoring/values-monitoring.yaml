# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls

# ===== Loki (공식 grafana/loki 차트) =====
loki:
  # 단일 바이너리 모드 (dev 환경)
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    # OTLP 수신 지원 (Loki 3.0+)
    limits_config:
      retention_period: 48h # 2일
      allow_structured_metadata: true # OTLP 메타데이터

    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  singleBinary:
    replicas: 1
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 768Mi
    persistence:
      enabled: true
      size: 10Gi

  # 불필요한 컴포넌트 비활성화 (SingleBinary 모드)
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  # 캐시 비활성화 (dev 환경)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  # minio 비활성화
  minio:
    enabled: false

# ===== Promtail =====
promtail:
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}

  # 모든 노드에서 실행
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ===== Logs Backup to S3 =====
backup:
  enabled: true
  schedule: "0 4 * * *" # 매일 오전 4시 (UTC) - DB 백업 1시간 후
  s3Bucket: goormgb-backup
  s3Prefix: dev/logs
  externalSecret:
    remoteRef: dev/infra/s3-backup # PostgreSQL 백업과 동일한 credentials

# ===== Tempo =====
tempo:
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: mini-gmk
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  tempo:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 768Mi

    # Trace retention: 2일
    retention: 48h

    # Compactor로 오래된 trace 정리
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        block:
          bloom_filter_false_positive: 0.05

  persistence:
    enabled: true
    size: 10Gi
