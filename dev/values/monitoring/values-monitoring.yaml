# kubeadm - 모니터링 스택 설정
# Domain: goormgb.space
# Components: Prometheus, Grafana, Loki, Tempo

# Grafana ESO 설정
grafana:
  eso:
    enabled: true
    secretManagerKey: dev/monitoring/grafana
    oauthSecretManagerKey: dev/infra/oauth/google # 공용 OAuth

# ===== Prometheus Stack =====
kube-prometheus-stack:
  # Pod 이름 단순화 (prometheus-stack-xxx → prom-xxx)
  fullnameOverride: prom
  cleanPrometheusOperatorObjectNames: true

  # Admission webhook 비활성화 (TLS 인증서 문제 방지)
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kube-state-metrics: CP 노드에 배치
  kube-state-metrics:
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

  # kubeadm: 컨트롤 플레인 컴포넌트 모니터링 활성화
  kubeControllerManager:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 10257
      targetPort: 10257
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeScheduler:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 10259
      targetPort: 10259
    serviceMonitor:
      https: true
      insecureSkipVerify: true
  kubeEtcd:
    enabled: true
    endpoints:
      - 192.168.45.123
    service:
      enabled: true
      port: 2381
      targetPort: 2381
    serviceMonitor:
      scheme: http
  kubeProxy:
    enabled: true

  prometheus:
    prometheusSpec:
      # 모든 namespace 메트릭 수집
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      # OTel Collector에서 메트릭 수신 (remote write)
      enableRemoteWriteReceiver: true

      # etcd TLS 인증서 마운트
      secrets:
        - etcd-client-cert

      retention: 7d
      retentionSize: "5GB"

      # CP 노드에 배치
      nodeSelector:
        kubernetes.io/hostname: mini-gmk
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    fullnameOverride: grafana

    # 대시보드 폴더 설정
    sidecar:
      dashboards:
        enabled: true
        folder: /tmp/dashboards
        defaultFolderName: "플랫폼 관측 (인프라팀)" # annotation 없는 대시보드 기본 폴더
        folderAnnotation: grafana_folder   # ConfigMap annotation으로 폴더 지정
        searchNamespace: monitoring        # 다른 namespace의 불필요한 대시보드 수집 방지
        provider:
          foldersFromFilesStructure: false
          allowUiUpdates: true             # UI에서 대시보드 수정 허용

    # kube-prometheus-stack Angular 기본 대시보드 모두 비활성화 (React 버전 사용)
    defaultDashboardsEnabled: false
    forceDeployDashboards: false

    # 대시보드 프로바이더 설정 (팀 기준 2개 폴더)
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'dev-team-observability'
            orgId: 1
            folder: '서비스 관측 (개발팀)'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/dev-team-observability

          - name: 'infra-team-observability'
            orgId: 1
            folder: '플랫폼 관측 (인프라팀)'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infra-team-observability

    # Grafana.com 대시보드 매핑
    dashboards:
      dev-team-observability:
        k8s-pods:
          gnetId: 17125
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        istio-service:
          gnetId: 7636
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        istio-workload:
          gnetId: 7630
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        loki-logs:
          gnetId: 15141
          revision: 1
          datasource:
            - name: DS_LOKI
              value: Loki

      infra-team-observability:
        node-exporter:
          gnetId: 1860
          revision: 37
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-cluster:
          gnetId: 7249
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        etcd:
          gnetId: 3070
          revision: 3
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-networking:
          gnetId: 14314
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        prometheus-overview:
          gnetId: 19105
          revision: 3
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        istio-mesh:
          gnetId: 7639
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        istio-control-plane:
          gnetId: 7645
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        loki-dashboard:
          gnetId: 13639
          revision: 2
          datasource:
            - name: DS_LOKI
              value: Loki

        tempo-operational:
          gnetId: 16110
          revision: 1
          datasource:
            - name: DS_TEMPO
              value: Tempo

    # ESO에서 생성한 secret 사용
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password

    # Google OAuth 설정
    envFromSecret: google-oauth-credentials

    grafana.ini:
      server:
        root_url: https://grafana.goormgb.space
      auth.google:
        enabled: true
        allow_sign_up: true
        auto_login: false
        scopes: openid email profile
        allow_assign_grafana_admin: true
        skip_org_role_sync: false
        auth_url: https://accounts.google.com/o/oauth2/auth
        token_url: https://oauth2.googleapis.com/token
        api_url: https://openidconnect.googleapis.com/v1/userinfo
        # client_id, client_secret은 envFromSecret에서 주입
        # 허용된 이메일만 로그인 가능 (빈 문자열 반환 시 로그인 거부)
        # Admin: DevOps, Editor: Developers, Viewer: 기타 허용된 멤버
        role_attribute_path: >-
          contains(['212clab@gmail.com', 'rhuba23@gmail.com', 'chamchi0129@gmail.com'], email) && 'Admin' ||
          contains(['jusanha17@gmail.com', 'yuuijin863@gmail.com', 'rhkdgur120@gmail.com', 'siyeon0713@gmail.com', 'wkdwlgus317@hanyang.ac.kr', 'cdh4112618@gmail.com'], email) && 'Editor' ||
          contains(['lab.jehyun@gmail.com', 'hs4734@gmail.com', 'sayiamseyoun9@gmail.com', 'jbyun1105@gmail.com', 'jminwook0120@gmail.com', 'hejwien@gmail.com', 'wnconc@gmail.com', 'niceguy6112@gmail.com'], email) && 'Viewer' ||
          ''
      users:
        auto_assign_org: true
        auto_assign_org_role: Viewer # 기본 역할
      auth:
        disable_login_form: false # admin 로그인 유지

    # Role mapping (이메일 기반)
    # DevOps: Admin, Developer: Viewer
    # 주의: Grafana Enterprise나 별도 플러그인 필요할 수 있음

    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

    persistence:
      enabled: true
      size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Loki + Tempo datasource 추가
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: true

  alertmanager:
    # 알람 설정은 values-alerting.yaml에서 관리
    alertmanagerSpec:
      nodeSelector:
        kubernetes.io/hostname: mini-gmk
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

# Grafana Gateway
gateway:
  grafana:
    enabled: true
    host: "grafana.goormgb.space"
    tls:
      credentialName: goormgb-tls

# ===== Loki (공식 grafana/loki 차트) =====
loki:
  # 단일 바이너리 모드 (dev 환경)
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    # OTLP 수신 지원 (Loki 3.0+)
    limits_config:
      retention_period: 72h # 3일
      allow_structured_metadata: true  # OTLP 메타데이터

    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  singleBinary:
    replicas: 1
    # CP 노드에 배치
    nodeSelector:
      kubernetes.io/hostname: mini-gmk
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi
    persistence:
      enabled: true
      size: 10Gi

  # 불필요한 컴포넌트 비활성화 (SingleBinary 모드)
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  # 캐시 비활성화 (dev 환경)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  # minio 비활성화
  minio:
    enabled: false

# ===== Promtail =====
promtail:
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}

  # 모든 노드에서 실행
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ===== Tempo =====
tempo:
  # CP 노드에 배치
  nodeSelector:
    kubernetes.io/hostname: mini-gmk
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  tempo:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

    # Trace retention: 3일
    retention: 72h

    # Compactor로 오래된 trace 정리
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
        block:
          bloom_filter_false_positive: 0.05

  persistence:
    enabled: true
    size: 10Gi
