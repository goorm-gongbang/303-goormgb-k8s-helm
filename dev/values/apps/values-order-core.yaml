# order-core - Dev 환경
contextPath: "/order"
replicaCount: 1

image:
  name: "dev/goormgb/order-core"
  tag: "fb64b2f"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false

# Service
servicePort: &port 8083
service:
  type: ClusterIP
  port: *port

# Health checks (contextPath가 자동으로 추가됨)
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

# Prometheus Metrics (Spring Boot Actuator)
# management 포트 분리 (서비스 포트와 별도로 actuator 노출)
metrics:
  enabled: true
  port: 9090
  path: /actuator/prometheus
  interval: 15s

# OpenTelemetry Java Agent
otel:
  enabled: true
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"

# Kafka consumer group ID (서비스별 고유값)
env:
  - name: KAFKA_CONSUMER_GROUP_ID
    value: "order-core-notification"

# DB, Redis, JWT, Kafka, Mail - envFrom으로 주입
envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config
  - secretRef:
      name: mail-config
