# queue - Dev 환경
contextPath: "/queue"
replicaCount: 1

image:
  name: "dev/goormgb/queue"
  tag: "c67c431"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false

# Service
servicePort: &port 8081
service:
  type: ClusterIP
  port: *port

# Health checks (contextPath가 자동으로 추가됨)
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

# Environment variables - Redis Queue 매핑
env:
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: REDIS_QUEUE_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: REDIS_QUEUE_PORT
  # Spring Boot 자동 바인딩 덮어쓰기 (SPRING_DATA_REDIS_* 우선 적용 방지)
  - name: SPRING_DATA_REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: REDIS_QUEUE_HOST
  - name: SPRING_DATA_REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: REDIS_QUEUE_PORT

# Prometheus Metrics (Spring Boot Actuator)
metrics:
  enabled: true
  path: /actuator/prometheus
  interval: 15s

# OpenTelemetry Java Agent
otel:
  enabled: true
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
