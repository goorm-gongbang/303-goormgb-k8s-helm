# authz-adapter - Dev 환경
# Go 기반 gRPC ext_authz 서비스

replicaCount: 1

# ECR 설정은 ApplicationSet에서 자동 주입됨 (dev/root/values.yaml의 ecr 설정)

image:
  name: "dev/goormgb/authz-adapter"
  tag: "818ba0c"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# gRPC 메인 포트를 service.port로 사용
service:
  type: ClusterIP
  port: 9001
  portName: grpc
  grpc:
    enabled: false  # 메인 포트가 이미 gRPC
    port: 9001      # GRPC_PORT 환경변수용

# Prometheus Metrics
metrics:
  enabled: true
  port: 9090
  portName: metrics
  path: /metrics
  interval: 15s

# authz-adapter 전용 설정
authzAdapter:
  enabled: true
  aiDefenseUrl: "http://dev-ai-defense.dev-ai.svc.cluster.local:8000/ai/evaluate"
  aiDefenseTimeoutMs: 800
  logLevel: info

# Redis Blacklist 설정
env:
  - name: REDIS_BLACKLIST_ENABLED
    value: "true"
  - name: REDIS_HOST
    value: "redis-cache.data.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: REDIS_PASSWORD
    value: ""
  - name: REDIS_DB
    value: "2"
  - name: BLACKLIST_TTL_SECS
    value: "3600"
  # CDN Blocklist + X-Bot-Token 검증 (Redis DB 3)
  - name: CDN_BLOCKLIST_ENABLED
    value: "true"
  - name: CDN_BLOCKLIST_DB
    value: "3"
  - name: ENVIRONMENT
    value: "dev"

# OpenTelemetry
otel:
  enabled: true
  collectorEndpoint: "otel-collector.monitoring.svc.cluster.local:4317"

# Health checks (Go HTTP 서버)
livenessProbe:
  httpGet:
    path: /healthz
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 9090
  initialDelaySeconds: 5
  periodSeconds: 5

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio sidecar 비활성화 (ext_authz는 sidecar 없이 동작)
istio:
  sidecar: false
