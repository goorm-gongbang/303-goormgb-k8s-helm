# api-gateway - Dev 환경
# Java Cloud Gateway (Spring Cloud Gateway)
contextPath: ""  # api-gateway는 context path 없음
fullnameOverride: "java-cloud-gateway"

replicaCount: 2

image:
  name: "dev/goormgb/api-gateway"
  tag: "fccd0d4"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Istio - 공통 Gateway(istio-system/api-gateway) 사용
istio:
  sidecar: true
  gateway:
    enabled: true
    externalRef: "istio-system/api-gateway"  # 외부 Gateway 참조 (Gateway CRD 생성 안 함)
    host: "api.goormgb.space"
  # Swagger 외부 노출 차단 - OAuth 보호된 swagger.goormgb.space로 리다이렉트
  swaggerRedirect:
    enabled: true
    host: "swagger.goormgb.space"
  # CORS 설정 - Istio VirtualService 레벨
  cors:
    enabled: true
    allowOrigins:
      - "https://dev.goormgb.space"
      - "https://swagger.goormgb.space"
      - "http://localhost:3000"
      - "http://localhost:6060"  # k6-controller 로컬 개발용
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowHeaders:
      - "*"
    allowCredentials: true
    maxAge: "24h"

# Service
servicePort: &port 8085
service:
  type: ClusterIP
  port: *port

# Environment variables - 백엔드 서비스 URL
env:
  - name: ALLOWED_ORIGINS
    value: "https://dev.goormgb.space,https://swagger.goormgb.space,http://localhost:3000"
  - name: AUTH_GUARD_URL
    value: "http://dev-auth-guard.dev-webs.svc.cluster.local:8080"
  - name: QUEUE_URL
    value: "http://dev-queue.dev-webs.svc.cluster.local:8081"
  - name: SEAT_URL
    value: "http://dev-seat.dev-webs.svc.cluster.local:8082"
  - name: ORDER_CORE_URL
    value: "http://dev-order-core.dev-webs.svc.cluster.local:8083"
  # Redis - API Gateway는 REDIS_HOST/PORT 사용
  - name: REDIS_HOST
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_HOST
  - name: REDIS_PORT
    valueFrom:
      secretKeyRef:
        name: service-config
        key: SPRING_DATA_REDIS_PORT

# JWT, Spring config - envFrom으로 주입
envFrom:
  - configMapRef:
      name: service-config
  - secretRef:
      name: service-config

# Health checks (Gateway는 context-path 없음)
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

# Prometheus Metrics (Spring Boot Actuator)
# management 포트 분리 (서비스 포트와 별도로 actuator 노출)
metrics:
  enabled: true
  port: 9090
  path: /actuator/prometheus
  interval: 15s

# OpenTelemetry Java Agent
otel:
  enabled: true
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
