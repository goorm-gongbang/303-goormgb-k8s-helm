# auth-guard - Dev 환경
contextPath: "/auth"
replicaCount: 1

image:
  name: "dev/goormgb/auth-guard"
  tag: "d73a760"
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 4Gi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false  # API Gateway 뒤에서 동작

# Service
servicePort: &port 8080
service:
  type: ClusterIP
  port: *port

# Health checks (contextPath가 자동으로 추가됨)
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: *port
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: *port
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 3

# Prometheus Metrics (Spring Boot Actuator)
# management 포트 분리 (서비스 포트와 별도로 actuator 노출)
metrics:
  enabled: true
  port: 9090
  path: /actuator/prometheus
  interval: 15s

# OpenTelemetry Java Agent
otel:
  enabled: true
  agentVersion: "2.11.0"
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
