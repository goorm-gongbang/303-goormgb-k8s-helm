# ai-defense - Dev 환경
# ECR: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/ai
# Python FastAPI 기반 AI Defense API

replicaCount: 1

# Uvicorn 실행 명령어 (root-path 설정 for /ai prefix)
command:
  - "python"
args:
  - "-m"
  - "uvicorn"
  - "traffic_master_ai.defense.api.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
  - "--root-path"
  - "/ai"

image:
  repository: 497012402578.dkr.ecr.ap-northeast-2.amazonaws.com/dev/goormgb/ai
  tag: "de7a2ad"
  pullPolicy: Always

# Python 모듈 경로 설정 (src/ 디렉토리 기준)
env:
  - name: PYTHONPATH
    value: /app/src

imagePullSecrets:
  - name: ecr-pull-secret

# Worker 노드에 배치
nodeSelector:
  kubernetes.io/hostname: mini-might

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Istio
istio:
  sidecar: true
  gateway:
    enabled: false  # api.dev.goormgb.space/ai/* 경로로 접근

# Service
service:
  type: ClusterIP
  port: 8000

# Health checks (FastAPI endpoints)
livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# OpenTelemetry (앱에 opentelemetry SDK 설치 필요)
otel:
  enabled: true
  collectorEndpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
