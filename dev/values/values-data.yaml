# kubeadm-dev 클러스터 데이터 서비스 설정
# PostgreSQL, Redis → CP 노드 (mini-gmk)에 스케줄링

# TODO: S3 백업 활성화 시 AWS Secrets Manager에 dev/infra/s3-backup 추가 필요
backup:
  enabled: false

nodeSelector:
  kubernetes.io/hostname: mini-gmk

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
