# Coraza WAF - Istio WasmPlugin
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: waf
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Istio + Kiali 이후 설치
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: dev/charts/waf
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
