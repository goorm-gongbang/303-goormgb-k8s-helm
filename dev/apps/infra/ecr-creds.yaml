# ECR Credentials Auto-Refresh
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecr-creds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"  # namespaces 후, 앱 배포 전
spec:
  project: default
  source:
    repoURL: git@github.com:goorm-gongbang/303-goormgb-k8s-helm.git
    targetRevision: argocd-sync/dev
    path: dev/charts/ecr-creds
    helm:
      valueFiles:
        - ../../../dev/values/values-ecr-creds.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
